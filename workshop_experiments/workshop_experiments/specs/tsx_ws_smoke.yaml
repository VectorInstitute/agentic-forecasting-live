# Smoke spec — 3 weekly origins in late 2025, on clean S&P/TSX trading sessions.
# Run conventional methods first to validate the pipeline end-to-end (data fetch,
# per-origin persist, resume, scoring) before any API spend. Loaded as a
# MultiTargetBacktestSpec: one single-horizon task per target (tsx_logret_{1,5,21}b),
# h = 1 / 5 / 21 business days, CRPS-scored.
#
# Origins Nov 3 / 10 / 17 2025 are all S&P/TSX sessions (deliberately clear of
# Canadian Thanksgiving, Oct 13 2025, when the TSX is closed) — origins are keyed
# to the target's own trading calendar, not the NYSE.
#
# Prerequisites: none beyond network access for the Yahoo Finance target/covariate
# fetch (the S&P/TSX Composite ^GSPTSE and the market covariate tickers).

spec_id: tsx_ws_smoke

description: >-
  Workshop smoke: 3 weekly origins on late-2025 S&P/TSX sessions (post-cutoff),
  forecasting S&P/TSX Composite close-to-close cumulative log returns at
  1 / 5 / 21 business days.

tasks:
  - task_id: tsx_logret_1b
    target_series_id: tsx_logret_1b
    horizons: [1]
    frequency: B
    description: >-
      S&P/TSX Composite close-to-close cumulative log return, 1 business day ahead
      (next-session return / direction).

  - task_id: tsx_logret_5b
    target_series_id: tsx_logret_5b
    horizons: [5]
    frequency: B
    description: >-
      S&P/TSX Composite close-to-close cumulative log return, 5 business days ahead
      (forward 1-week return).

  - task_id: tsx_logret_21b
    target_series_id: tsx_logret_21b
    horizons: [21]
    frequency: B
    description: >-
      S&P/TSX Composite close-to-close cumulative log return, 21 business days ahead
      (forward 1-month return).

start: "2025-11-03"
end: "2025-11-19"
stride: 5            # weekly origins (3): Nov 3, 10, 17
warmup: 250
