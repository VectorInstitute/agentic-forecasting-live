# Canonical comparison grid — weekly origins across 2025 (post-cutoff backtest).
#
# 2025 is after the Gemini training cutoff (~Jan 2025), so conventional methods,
# LLM-Process, and agents can all be compared fairly here. This is the workshop
# paper's head-to-head grid: every method runs on the same weekly origins.
# Loaded as a MultiTargetBacktestSpec (one single-horizon task per target),
# CRPS-scored at h = 1 / 5 / 21 business days.

spec_id: sp500_ws_backtest_2025_weekly

description: >-
  Workshop canonical backtest: weekly origins across 2025 (post-cutoff),
  forecasting S&P 500 close-to-close cumulative log returns at 1 / 5 / 21
  business days.

tasks:
  - task_id: sp500_logret_1b
    target_series_id: sp500_logret_1b
    horizons: [1]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 1 business day ahead
      (next-session return / direction).

  - task_id: sp500_logret_5b
    target_series_id: sp500_logret_5b
    horizons: [5]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 5 business days ahead
      (forward 1-week return).

  - task_id: sp500_logret_21b
    target_series_id: sp500_logret_21b
    horizons: [21]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 21 business days ahead
      (forward 1-month return).

start: "2025-01-06"
end: "2025-12-31"
stride: 5            # weekly origins (~52)
warmup: 250
