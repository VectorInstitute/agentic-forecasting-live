# Smoke spec — 3 weekly origins in late 2025. Run conventional methods first to
# validate the pipeline end-to-end (data fetch, per-origin persist, resume,
# scoring) before any API spend. Loaded as a MultiTargetBacktestSpec: one
# single-horizon task per target (sp500_logret_{1,5,21}b), h = 1 / 5 / 21
# business days, CRPS-scored.
#
# Prerequisites (warm caches to the present first):
#   uv run python scripts/fetch_sp500_market.py --refresh   # ^GSPC / ^VIX / ^IXIC
#   uv run python scripts/fetch_fred.py                     # macro covariates

spec_id: sp500_ws_smoke

description: >-
  Workshop smoke: 3 weekly origins in late 2025 (post-cutoff), forecasting
  S&P 500 close-to-close cumulative log returns at 1 / 5 / 21 business days.

tasks:
  - task_id: sp500_logret_1b
    target_series_id: sp500_logret_1b
    horizons: [1]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 1 business day ahead
      (next-session return / direction).

  - task_id: sp500_logret_5b
    target_series_id: sp500_logret_5b
    horizons: [5]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 5 business days ahead
      (forward 1-week return).

  - task_id: sp500_logret_21b
    target_series_id: sp500_logret_21b
    horizons: [21]
    frequency: B
    description: >-
      S&P 500 close-to-close cumulative log return, 21 business days ahead
      (forward 1-month return).

start: "2025-10-06"
end: "2025-10-22"
stride: 5            # weekly origins (3)
warmup: 250
