    rationale: This forecast is anchored to the 2026-02-02 close of 32,183.88. On
      January 30, 2026, the S&P/TSX Composite experienced its largest one-day drop
      since April 2025 (-3.31%), triggered by U.S. President Donald Trump's nomination
      of the hawkish Kevin Warsh as Federal Reserve Chair. This nomination sparked
      a strengthening U.S. dollar and a major commodity sell-off, with Gold dropping
      11.4% and WTI crude oil falling. On February 2, the TSX showed signs of stabilization,
      rebounding by 0.82%. Historically, similar episodes combining elevated short-term
      volatility and commodity-market shocks have led to strong 21-business-day mean-reversion
      and recovery patterns for the Canadian index, resulting in an empirically positive
      median return (+1.60%) accompanied by a negatively skewed return distribution
      (fat left tails). Our conditional bootstrap captures these non-normal empirical
      shapes and relationships directly, providing a highly calibrated probabilistic
      forecast.
    horizon_rationale: Our quantitative pipeline classifies the current volatility
      regime as 'normal' with a 21-day annualised realised volatility of 15.00%. However,
      we detect a massive anomaly on January 30, 2026, where the daily return dropped
      by -3.31% (z-score of -4.12). Under our adaptive pipeline, this anomaly triggers
      a shorter 10-day dispersion window to capture the rapid spike in daily standard
      deviation (sigma_daily = 0.0121, or 19.15% annualised), rather than relying
      on a stale 21-day window. Backtesting over the last 500 days reveals that a
      Conditional Bootstrap (empirical quantiles conditioned on similar 10-day daily
      standard deviations) substantially outperforms Gaussian models, reducing mean
      pinball loss (CRPS) by approximately 10%. We have adopted the empirical conditional
      bootstrap quantiles as our base forecast. This distribution reflects an empirical
      positive median of +1.60% and asymmetric tails (wider downside than upside),
      capturing the historic tendency of the TSX index to mean-revert and recover
      over a 21-business-day horizon after a sharp, short-term shock.
