    horizon_rationale: Forecast for the 21-business-day horizon cumulative log return
      is constructed via a calibrated parametric distribution centered at a trend-adjusted
      drift of 0.0080. The 21-day rolling realized volatility of the S&P/TSX Composite
      stands at 8.98%, placing the index in a Low Volatility Regime (<10%). No return
      anomalies are detected (latest daily return z-score is 1.14), dictating a standard
      21-day dispersion window. The resulting daily sigma of 0.005654 scales to 0.025910
      over the 21-business-day horizon. While a pure martingale prior puts the median
      at 0.0, historical backtesting and cross-validation of low-volatility periods
      preceded by high annual returns (such as the TSX's 28% gain in 2025) reveal
      strong trend-continuation/momentum. A grid search on these historical periods
      identifies an optimal median of 0.0080 (0.8% return) that minimizes out-of-sample
      CRPS. This drift-adjusted model is supported by a stable macro backdrop following
      the Bank of Canada's decision to hold interest rates at 2.25% in late December
      2025, even as we maintain a conservative spread to account for potential US
      trade tariff uncertainty and a slightly cooling domestic labour market (unemployment
      at 6.8%).
