    horizon_rationale: 'The S&P/TSX Composite index is projected over the 5-business-day
      horizon using a statistical pipeline calibrated on recent realized volatility
      and adjusted for a powerful geopolitical/commodity catalyst. Daily 21-day realized
      volatility of the TSX is currently 18.92%, placing the index in the ''elevated''
      volatility regime. Accordingly, we select a 10-day dispersion window (sigma_daily
      = 0.010889) and apply a 1.12 widening multiplier to account for heightened tail
      risk.


      While the martingale prior suggests a median of 0.0, we apply a strong +1.30%
      positive directional lean. This shift is justified by a massive commodity/geopolitical
      shock: following U.S. and Israeli strikes on Iran, Brent and WTI crude surged
      by over 28.5% over the trailing 5 business days (WTI ending at $94.77). Although
      the TSX initially pulled back by -3.99% due to global risk-off panic and a spike
      in VIX to 29.5, VIX has begun to recede to 25.5 as of March 9. A systematic
      historical backtest of instances since 2000 where WTI surged >10% over 5 days
      while the TSX fell <-2% confirms a powerful energy-sector catch-up effect, yielding
      a mean forward 5-business-day return of +1.33% and median of +1.63%. Evaluating
      various shifts using the Continuous Ranked Probability Score (CRPS) on these
      historical episodes confirms that a shift of +1.30% (+0.013 log return) minimizes
      the CRPS from 0.018051 to 0.016970.'
