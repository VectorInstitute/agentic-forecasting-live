    rationale: This forecast is generated as of June 8, 2026, using an adaptive, data-driven
      approach that combines yfinance market data with empirical conditioning of past
      equity volatility shocks. The S&P/TSX Composite experienced a significant daily
      drop of -2.31% on June 5, 2026, on the back of strong US and Canadian labor
      reports, which raised concerns about prolonged central bank interest rate holds
      (Bank of Canada rate currently at 2.25%). Additionally, a sharp correction in
      precious and base metals (gold and oil) acted as a major drag on the resource-heavy
      TSX index. On June 8, the index stabilized slightly (+0.19%). Standard models
      under-represent the wide dispersion and left-skewed tail risks following such
      volatility events. Our calibrated model blends a parametric normal projection
      (calibrated to the 10-day realized volatility of 17.18% annualized and widened
      by 1.44x) with the empirical distribution of similar historical shocks since
      2010 where the VIX was >= 18.0. This blend offers a robust, asymmetric quantile
      grid that properly values extreme tail risk.
    horizon_rationale: For the 5-day cumulative log return horizon on the S&P/TSX
      Composite (^GSPTSE) as of June 8, 2026, we apply a combined parametric and empirical
      high-VIX shock methodology. The TSX experienced a severe -2.31% drop on Friday,
      June 5 (z-score of -2.49), before stabilizing slightly on Monday, June 8 with
      a mild +0.19% gain. Concurrently, the US VIX rose sharply from 15.4 to 21.51
      on June 5, before settling at 18.92 on June 8. To capture this sudden increase
      in near-term volatility, we adapt our dispersion window from 21 days to a shorter
      10-day window, raising the daily realized sigma from 0.009052 (14.37% annualized)
      to 0.010821 (17.18% annualized). Historically, 5-day forward returns following
      such acute volatility shocks exhibit significant dispersion (std of ~3.8% to
      4.4%) and pronounced left-skewness due to fat-tailed sell-off risks. To optimize
      our pinball loss, we blend a widened parametric model (using 10-day sigma scaled
      by a 1.44x factor) with the empirical distribution of similar high-VIX shock
      episodes since 2010. This blend centers our median at +0.006589 (+0.66%), reflecting
      a moderate mean-reverting recovery tendency that is tempered by hawkish macro-sentiment
      (following strong employment data in both the US and Canada). It also extends
      the downside tail to -7.85% (0.05 quantile) to protect against further cascading
      sell-offs while capping the upside at +4.96% (0.95 quantile) under the headwind
      of high interest rates.
