    rationale: Statistical analysis of the daily returns of ^GSPTSE up to February
      2, 2026, reveals a high-stress state triggered by a massive daily return shock
      on January 30. An adaptive 10-day dispersion window is used to reflect this
      sudden risk shift, yielding a daily standard deviation of 0.012060. For the
      5-business-day horizon, the base cumulative standard deviation is scaled by
      sqrt(5) to 0.026967. Applying a widen factor of 1.12 to account for the elevated
      volatility regime results in an effective 5-day standard deviation of 3.02%.
      Grounded market news reveals that the index drop was driven by a major precious
      metals crash and a late-month drop in oil (WTI fell 4.7% on February 2). Because
      these commodity headwinds directly affect a major share of the TSX, the point
      forecast is centered at 0.0, balancing historical mean-reversion tendencies
      with current commodity-market headwinds.
    horizon_rationale: As of February 2, 2026, the S&P/TSX Composite Index is recovering
      from a major downward anomaly that occurred on January 30, where the daily log
      return was -3.37% (a -4.12 z-score shock relative to the trailing 63 days).
      Realized annualized 21-day volatility stands at 15.00%, which sits precisely
      on the boundary between the normal and elevated regimes. Because of the major
      daily return anomaly, the adaptive dispersion strategy selects a shorter 10-day
      window to capture the rapid risk shift, giving a daily standard deviation of
      0.012060 (19.15% annualized). This yields a base 5-day cumulative standard deviation
      of 0.026967. To reflect the elevated risk environment and prevent underestimating
      tail risks, a standard widen factor of 1.12 is applied, scaling the effective
      5-day standard deviation to 3.02% (0.030203). Grounded news context up to February
      2, 2026, shows a severe commodity crash (Gold dropped over 11% on January 30
      and continued lower on February 2; WTI crude plummeted 4.7% on February 2),
      which acts as a massive headwind for the materials- and energy-heavy TSX. This
      headwind opposes the historical mean-reversion tendency typically seen after
      sharp index drops. Consequently, the point forecast (median) is kept exactly
      at 0.0 (the standard martingale prior), and the symmetric quantile grid is calibrated
      to an effective volatility of 3.02%.
