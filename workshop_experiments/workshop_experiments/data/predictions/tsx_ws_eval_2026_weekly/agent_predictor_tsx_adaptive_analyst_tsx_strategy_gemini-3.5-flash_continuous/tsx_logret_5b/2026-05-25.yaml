    rationale: Our analysis pipeline combines a rigorous statistical backtest with
      web-grounded market news to calibrate the forecast of the S&P/TSX Composite's
      5-day forward cumulative log returns. As of May 25, 2026, the TSX is hovering
      near record highs at 34,724.80, supported by its heavy energy and materials
      weights. While a geopolitical energy spike in mid-May drove oil prices (WTI)
      to a peak of $107.77/bbl, prices have corrected sharply by -8.74% over the last
      5 business days to close at $96.60/bbl, cooling inflation and policy tightening
      fears. Meanwhile, the Bank of Canada held its overnight policy rate steady at
      2.25%. Quantitative backtests show that utilizing a positive historical drift
      prior (median = 0.0010) coupled with a 21-day realized daily return volatility
      scaled by the square root of the horizon provides the most accurate probabilistic
      forecast for 5-day returns, outperforming EWMA and empirical models under the
      CRPS metric.
    horizon_rationale: Forecast centered at a positive historical drift prior of 0.0010
      (0.10%), which reflects the long-term upward trajectory of the TSX Composite
      index and has been backtested to yield a lower CRPS (0.010106) compared to a
      pure martingale prior (0.010162). Under our vol-regime skill, the 21-day annualized
      realized volatility of the S&P/TSX Composite index as of May 25, 2026 is 12.73%
      (daily std of 0.008016), placing the market in a 'normal' volatility regime
      (10% - 15%). The latest daily return on May 25 (+0.18%) shows a z-score of 0.16
      against the trailing 63-day average, signaling no recent anomaly. Using the
      21-day adaptive dispersion window, the daily return standard deviation is scaled
      to the 5-business-day horizon by multiplying by the square root of 5, resulting
      in a 5-day return standard deviation of 0.017924. Standard-normal quantiles
      are then computed using this calibrated dispersion. This parametric normal approach
      outperforms alternative methodologies (such as direct 5b trailing return estimation
      or EWMA) in extensive historical backtesting on the TSX.
