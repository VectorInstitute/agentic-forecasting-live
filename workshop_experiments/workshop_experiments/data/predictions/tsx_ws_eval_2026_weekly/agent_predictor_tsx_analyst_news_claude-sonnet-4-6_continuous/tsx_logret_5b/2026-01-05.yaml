    rationale: 'Overall forecast reflects a mildly constructive near-term outlook
      for the TSX over 5 business days as of 2026-01-05. The BoC on-hold stance removes
      a near-term tightening risk, gold remains supportive for materials, and the
      TSX enters the new year with momentum. However, the macro backdrop is not unambiguously
      bullish: US tariff threats remain an overhang, oil prices are under pressure,
      the loonie is weak, GoC yields are under upward pressure, and valuations are
      stretched after a 28% gain in 2025. The median forecast of +0.2% reflects modest
      positive drift. Symmetric volatility of ~3.2% for the 5-day window (from trailing
      daily vol of 1.43%) drives the spread of quantiles, with tail risks modestly
      wider than a pure Gaussian to account for geopolitical and trade-policy event
      risk.'
    horizon_rationale: "5-business-day (1 calendar week) cumulative log-return forecast\
      \ anchored on 2026-01-05. Key macro inputs: (1) Bank of Canada on hold at 2.25%\
      \ \u2014 December 10, 2025 decision signalled 'about right', data-dependent\
      \ stance; no cut or hike expected in the near term, providing a stable and modestly\
      \ supportive backdrop for equities. (2) Canadian CPI at 2.4% YoY (Dec 2025),\
      \ core slightly elevated (~2.5%); inflation is contained but not yet at target,\
      \ leaving the BoC cautious \u2014 not a fresh stimulus catalyst. (3) Labour\
      \ market: unemployment 6.8% in Dec 2025, elevated but improving; soft labour\
      \ conditions restrain consumer and real-estate sensitive sectors. (4) Commodities:\
      \ gold at record highs supports materials/miners (large TSX weight); oil under\
      \ downward pressure from global oversupply, creating a drag on TSX energy names.\
      \ Net commodity effect roughly balanced to slightly positive given gold's outsized\
      \ TSX weight. (5) USD/CAD: loonie trading ~1.3774, under pressure from BoC-Fed\
      \ policy divergence; a weak CAD is a mild headwind for TSX financials but translates\
      \ earnings of multinational miners favourably. (6) US spillovers: tariff threats\
      \ (steel, aluminum, auto) remain unresolved \u2014 key left-tail risk; Fed more\
      \ hawkish than BoC, widening yield differential. (7) Market momentum: TSX had\
      \ a record +28.2% in 2025; entering 2026 with positive tone but elevated valuations\
      \ and year-end profit-taking overhang. The Jan 5 session closed with a solid\
      \ +0.685% day gain, suggesting early-year buying. Volatility calibration: trailing\
      \ 63-day daily std = 1.43%; 5-day std \u2248 1.43% \xD7 \u221A5 \u2248 3.20%.\
      \ Median drift set at +0.20% (slight positive reflecting momentum and BoC stability,\
      \ offset by tariff and oil headwinds). Distribution is approximately Gaussian\
      \ with modest positive skew given supportive macro baseline. Left-tail risk\
      \ is amplified by US tariff escalation potential. Quantiles computed as median\
      \ \xB1 z \xD7 \u03C3 with slight positive skew applied at upper tail."
