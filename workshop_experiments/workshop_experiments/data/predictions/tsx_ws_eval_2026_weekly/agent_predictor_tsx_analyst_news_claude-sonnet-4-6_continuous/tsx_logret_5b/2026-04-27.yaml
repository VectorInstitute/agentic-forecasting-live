    rationale: "Overall macro backdrop for the S&P/TSX Composite over the next 5 business\
      \ days (week of 2026-04-28): Neutral-to-slightly-constructive bias, with significant\
      \ uncertainty. The BoC's rate hold at 2.25% provides a stable monetary backdrop.\
      \ Commodity prices (oil elevated on Middle East tensions, gold strong) support\
      \ the energy and materials sectors that dominate the TSX. The CAD near multi-year\
      \ lows benefits exporters. However, US tariff uncertainty remains a persistent\
      \ headwind, the labour market is softening, and the TSX has already seen a strong\
      \ April recovery rally \u2014 suggesting some consolidation risk. The 5bd median\
      \ forecast is +0.003 (roughly +0.3%), with a symmetric-ish distribution around\
      \ that level, using \u03C3\u2085bd \u2248 0.020 and mild negative skew to capture\
      \ downside tail risks from geopolitical and trade policy escalation."
    horizon_rationale: "Forecast as of 2026-04-27 for a 5-business-day (1-week) cumulative\
      \ log-return on the S&P/TSX Composite. Key inputs and assumptions: (1) Bank\
      \ of Canada Policy: BoC holds overnight rate at 2.25% (since Oct 2025). Data-dependent\
      \ 'hold'; no cut or hike imminent. The stable rate environment is mildly supportive\
      \ for TSX valuations, particularly financials. (2) Canadian Inflation & Labour:\
      \ Core CPI near 2% target; headline elevated by energy/Middle East supply disruptions.\
      \ Unemployment ~6.9% \u2014 softening but not collapsing ('low hire, low fire').\
      \ No imminent macro shock from BoC on this front. (3) Commodity prices: Oil\
      \ volatile and elevated due to Middle East conflict (Strait of Hormuz tensions).\
      \ Higher oil prices support TSX energy sector revenues but weigh on household\
      \ spending. Gold strong on safe-haven demand and central bank buying \u2014\
      \ positive for TSX materials. Net commodity impulse is cautiously positive for\
      \ the TSX. (4) USD/CAD & GoC Yields: CAD weak near 70 US cents (USD/CAD ~1.43),\
      \ driven by broad USD strength. Weak CAD is net positive for TSX exporters (energy,\
      \ mining) but compresses domestic purchasing power. GoC 10yr yield ~3.5%, tracking\
      \ US Treasuries \u2014 not a major incremental headwind. (5) US Policy Spillovers:\
      \ Fed steady; US tariffs remain an overhang. Post-Supreme Court ruling, new\
      \ sector-specific US tariff proposals create uncertainty for Canadian exporters.\
      \ This is a persistent negative tail risk. (6) TSX Technicals/Momentum: The\
      \ index recovered strongly from the March 2026 drawdown but has shown some consolidation\
      \ pressure. Last daily return was -0.0159 (down day on 2026-04-27). Recent weekly\
      \ returns (past 4 weeks) were mixed: -0.06 (Apr 13), +0.04 (Apr 20), +0.02 (Apr\
      \ 27 week in CSV). The market appears to be digesting the prior rebound. (7)\
      \ Volatility Regime: Trailing 63-day daily std = 0.02269 \u2192 5bd scaling\
      \ gives ~0.0507 theoretical max, but historical weekly return std from the CSV\
      \ is ~0.015-0.020. I used \u03C3\u2085bd \u2248 0.020, reflecting elevated but\
      \ not crisis-level volatility. (8) Central tendency: Mild positive drift of\
      \ +0.003 reflecting: commodity tailwinds (oil/gold), stable BoC, financials\
      \ resilience \u2014 offset by CAD weakness headwinds, trade tariff uncertainty,\
      \ softening labour market, and near-term consolidation after the April recovery\
      \ rally. (9) Skew: Modest negative skew applied to account for asymmetric left-tail\
      \ risks (tariff escalation, geopolitical shock, energy price spike crushing\
      \ consumption). The distribution is near-Gaussian but with slightly fatter left\
      \ tail. Quantiles are consistent with a mildly positively-centered, slightly\
      \ left-skewed distribution with \u03C3\u2085bd \u2248 0.020."
