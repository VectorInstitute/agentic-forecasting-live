    rationale: 'Overall macro backdrop for the S&P/TSX Composite over the next 5 business
      days (ending ~2026-03-09): mildly constructive. The Bank of Canada is on hold
      at 2.25%, core inflation is controlled, and the commodity complex (oil, gold)
      is providing sector-level support to the energy and materials heavyweights of
      the index. Big bank earnings are solid. The main risks are: (a) US trade policy
      escalation beyond current tariff levels, (b) geopolitical shock from Middle
      East conflict spilling into broader risk-off, and (c) mean-reversion after a
      +2.2% prior week. The 5-day median forecast is +0.2% log-return (~+0.2% price),
      with a 90% confidence interval of approximately -4.3% to +4.7%. The distribution
      is approximately symmetric with slight positive drift, widened tails relative
      to a pure Gaussian to account for binary event risk (tariff announcement, energy
      price spike). Trailing 63-day volatility of 1.55%/day annualizes to ~24.5%,
      placing this index in an elevated-but-not-extreme volatility regime.'
    horizon_rationale: "5-business-day cumulative log-return forecast as of 2026-03-02.\
      \ Key inputs and assumptions: (1) Bank of Canada Policy: Overnight rate held\
      \ at 2.25% \u2014 neutral stance, no near-term cuts or hikes signaled. Supportive\
      \ for equities via stable financial conditions. (2) Inflation & Labour: Core\
      \ CPI near 2% target; headline slightly elevated on energy. Unemployment 6.5\u2013\
      7.0% \u2014 labour slack reduces wage-inflation spiral risk. No hawkish BoC\
