    rationale: 'Overall macro backdrop as of 2026-03-23 is challenging for the TSX:
      US tariff shock, weak Canadian labour market, rising bond yields, and CAD headwinds
      are significant negatives. Partially offset by: high oil prices (>$100 Brent)
      benefiting the energy-heavy TSX, gold advancing on safe-haven demand supporting
      materials, and potential mean-reversion after a severe multi-week drawdown.
      The BoC holding at 2.25% is neutral. Net: a very modest positive median (+0.3%)
      for the upcoming week, with elevated uncertainty (effective weekly vol ~4.8%)
      reflecting the volatile macro and geopolitical environment.'
    horizon_rationale: "Forecast for the 5-business-day horizon ending approximately\
      \ 2026-03-30, as of 2026-03-23. Key drivers and assumptions: (1) RECENT PRICE\
      \ ACTION: The TSX logged a -3.07% weekly return on 2026-03-23, with the preceding\
      \ 3-4 weeks showing a sustained downtrend (-2% to -4% per week since late February).\
      \ This is a severe short-term drawdown. However, extreme negative momentum sometimes\
      \ precedes mean-reversion bounces. (2) BANK OF CANADA: Held overnight rate at\
      \ 2.25% on March 18. Data-dependent 'wait-and-see' posture. No imminent cut\
      \ or hike expected. Policy neutral-to-slightly supportive for equities but constrained\
      \ by inflation risks. (3) MACRO/LABOUR: Canadian unemployment at 6.7% after\
      \ -84K February job losses \u2014 notably weak, adding to downside growth concerns\
      \ and limiting consumer confidence. (4) INFLATION/COMMODITIES: Middle East tensions\
      \ (Strait of Hormuz) pushed Brent crude above $100/bbl. This is a double-edged\
      \ sword for the TSX: positive for the large energy sector (CNQ, SU, etc.) but\
      \ raises stagflation concerns. Gold advancing on safe-haven demand, supporting\
      \ materials. Net commodity impulse is modestly TSX-positive given index weights.\
      \ (5) USD/CAD & YIELDS: CAD under pressure from US tariff shock (new 10% global\
      \ tariff from Feb 24 + sector tariffs on steel/aluminum/autos/lumber) and BoC-Fed\
      \ rate differential. Rising GoC 10yr yields (inflation repricing) creates headwind\
      \ for rate-sensitive sectors (REITs, utilities, financials valuation). (6) US\
      \ POLICY SPILLOVERS: US-Canada trade war materially elevated. The 10% global\
      \ tariff + sector duties represent a significant headwind for export-oriented\
      \ Canadian industries. Auto, agriculture, metals, forestry sectors are particularly\
      \ exposed. Some investor rotation toward domestic-focused financials and utilities.\
      \ (7) DISTRIBUTION: Trailing 63-day daily std = 0.02061, implying 5-day std\
      \ \u2248 0.0461. I apply a slight positive adjustment to the median (+0.003)\
      \ reflecting mean-reversion tendency after consecutive large down weeks and\
      \ the positive commodity impulse from high oil/gold. However, macro headwinds\
      \ (tariffs, weak jobs, CAD weakness, rising yields, geopolitical risk) cap the\
      \ upside and keep the distribution relatively symmetric with mild positive skew\
      \ from commodity/energy potential. Effective distribution: approximately normal\
      \ with mean +0.003, std ~0.048, capturing modest positive skew from energy tailwinds\
      \ but material left-tail risk from tariff escalation or further geopolitical\
      \ shock."
