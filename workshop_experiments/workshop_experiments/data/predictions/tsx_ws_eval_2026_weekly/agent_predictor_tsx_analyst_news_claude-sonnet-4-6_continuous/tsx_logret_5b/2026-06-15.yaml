    rationale: "Overall forecast rationale for S&P/TSX Composite 5-business-day log\
      \ return (horizon=5, as_of=2026-06-15): The TSX enters the forecast week in\
      \ a constructive but uncertain environment. The BoC's hold at 2.25% removes\
      \ near-term monetary policy noise. Commodity prices (oil and gold) are elevated\
      \ due to Middle East geopolitical conflict, providing meaningful support to\
      \ the energy (~18%) and materials (~14%) sectors that dominate the TSX. Core\
      \ inflation remains anchored near 2%, limiting the risk of a surprise hawkish\
      \ pivot. However, headline CPI at 3.2% and soft labour markets (unemployment\
      \ 6.5\u20137%) create a fragile macroeconomic backdrop. US tariff risks and\
      \ CUSMA uncertainty continue to dampen business confidence and weigh on trade-exposed\
      \ sectors. The loonie's weakness vs USD is a neutral-to-slight-positive for\
      \ TSX earnings but signals underlying macro stress. The TSX recently tested\
      \ record highs, suggesting near-term momentum but also elevated vulnerability\
      \ to a pullback. The point forecast median of +0.002 (approximately +0.2% over\
      \ 5 days) reflects a slight positive bias from commodity tailwinds, restrained\
      \ by macro and trade headwinds. The distribution is calibrated using trailing\
      \ 63d volatility (\u03C3_5d \u2248 0.040) with slight widening for elevated\
      \ geopolitical event risk, and is approximately symmetric with modest positive\
      \ skew."
    horizon_rationale: "5-business-day (1-week) cumulative log-return forecast for\
      \ the S&P/TSX Composite as of 2026-06-15. Key inputs and assumptions: (1) Bank\
      \ of Canada: Holding overnight rate at 2.25% since Oct 2025. 'Wait-and-see'\
      \ posture with no imminent move priced, providing a neutral monetary backdrop\
      \ for equities. (2) Inflation: Headline CPI jumped to 3.2% in May 2026 (from\
      \ 2.8% in April) driven by an energy price spike tied to Middle East/US-Iran\
      \ conflict; core inflation remains near 2% target, limiting broad pass-through\
      \ concerns. Elevated headline CPI introduces a modest hawkish tail risk but\
      \ the BoC has signaled patience. (3) Labour market: Unemployment 6.5\u20137%,\
      \ soft but stable. Cautious hiring posture caps domestic demand optimism. (4)\
      \ Commodities: Oil prices elevated from Middle East supply disruptions \u2014\
      \ a clear tailwind for TSX energy sector (~18% index weight). Gold benefiting\
      \ from safe-haven demand and geopolitical uncertainty \u2014 supportive for\
      \ TSX materials/mining (~14% weight). Net commodity impulse is constructive\
      \ for the TSX. (5) USD/CAD: Loonie under modest downward pressure from widening\
      \ Canada-US yield spread and USD strength; a weaker CAD is slightly supportive\
      \ for TSX earnings of multinational exporters but represents a macro risk signal.\
      \ (6) GoC yields: 10-year range-bound; widening spread vs US Treasuries is incrementally\
      \ negative for equity valuations but manageable at current levels. (7) US tariff/trade\
      \ risks: Sector-specific tariffs on steel, aluminum, autos, and CUSMA review\
      \ uncertainty continue to weigh on business investment and Canadian export-oriented\
      \ sectors. This is a persistent headwind. (8) TSX recent performance: Index\
      \ recently at/near record highs per reports; the June 15 session recorded a\
      \ +2.28% gain (last_log_return), suggesting some near-term momentum but also\
      \ mean-reversion risk after a strong day. Recent pattern in May\u2013June 2026\
      \ shows choppy but generally positive weekly returns. (9) Statistical calibration:\
      \ Trailing 63-day daily std dev = 0.01794. 5-day std \u2248 0.01794 \xD7 \u221A\
      5 \u2248 0.0401. With slightly elevated geopolitical volatility, I apply a distributional\
      \ width of ~0.042 (5-day \u03C3). The median is set at +0.002, reflecting modest\
      \ positive drift from commodity tailwinds partially offset by macro/trade headwinds.\
      \ The distribution is approximately normal with a slight positive skew (upside\
      \ from commodity surprise; downside from geopolitical escalation). The 5th/95th\
      \ percentile band of \xB10.070 captures rare tail events (geopolitical shock,\
      \ sudden BoC pivot surprise, commodity crash). Historical 5-day return distributions\
      \ for TSX confirm that \xB17% tails are plausible but uncommon (~1-in-20 week\
      \ occurrences)."
