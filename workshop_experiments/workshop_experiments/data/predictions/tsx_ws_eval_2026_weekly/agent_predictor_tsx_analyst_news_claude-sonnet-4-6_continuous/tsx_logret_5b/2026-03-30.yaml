    rationale: "Overall macro environment as of 2026-03-30: The TSX faces a complex,\
      \ elevated-uncertainty backdrop. The BoC is on hold at 2.25% \u2014 supportive\
      \ but not stimulative. The Canadian economy is in or near a technical recession\
      \ (two consecutive quarters of marginal contraction), with the labour market\
      \ deteriorating (unemployment 6.7%). Inflation is picking up again driven by\
      \ energy (2.4% in March), limiting the BoC's room to cut. Commodity markets\
      \ are bifurcated: oil >$100/bbl (supportive for energy names) while gold has\
      \ corrected sharply from record highs (headwind for miners). The CAD is soft\
      \ at ~1.3725/USD, and GoC 10-year yields are rising (~3.53%), compressing equity\
      \ multiples at the margin. US spillovers are mixed: solid US bank earnings provide\
      \ positive tone for Canadian financials, but CUSMA/tariff uncertainty weighs\
      \ on business investment and export outlook. The recent sharp March selloff\
      \ (largest monthly decline since early 2025) appears to have stabilized at month-end,\
      \ providing a base for a modest mean-reversion bounce in the near term. The\
      \ 5-day forecast uses \u03C3=0.0205 (the empirical 5-day trailing vol) and a\
      \ median of +0.002, reflecting a slight positive drift bias from mean-reversion\
      \ after a major drawdown, partially offset by ongoing headwinds."
    horizon_rationale: "Forecast for the 5-business-day horizon (week ending ~April\
      \ 6, 2026) is centered at a modest positive drift of +0.20% (log return), grounded\
      \ in the following key inputs: (1) Bank of Canada Policy \u2014 BoC held overnight\
      \ rate steady at 2.25% at its March 18 meeting, with no imminent policy change\
      \ expected. The hold removes near-term rate-hike risk but limits dovish tailwinds.\
      \ (2) Labour Market \u2014 Soft: unemployment rose to 6.7% by Feb 2026, with\
      \ 100k+ cumulative job losses in Jan-Feb. Weak hiring weighs on domestic demand\
      \ and financial sector loan growth. (3) Inflation \u2014 Headline CPI rose to\
      \ 2.4% in March (energy-driven by Middle East spike), within the 1-3% target\
      \ band but rising; constrains BoC easing optionality. (4) Commodities \u2014\
      \ Oil above $100/bbl (positive for TSX energy sector, which provides near-term\
      \ upside support) but gold pulled back sharply from its ~$5,589/oz January ATH,\
      \ a headwind for TSX materials/miners. Net commodity impact is roughly neutral-to-slightly-positive.\
      \ (5) USD/CAD and GoC yields \u2014 CAD at ~1.3725 vs. USD (mild weakness);\
      \ 10-year GoC yield rising (~3.53%), tracking US Treasuries upward \u2014 modest\
      \ valuation headwind for equities. (6) US/Trade policy \u2014 Fed on hold, tariff/CUSMA\
      \ uncertainty persists as a background drag on business confidence and TSX breadth.\
      \ Canadian banks benefit from solid US earnings spillover. (7) Price momentum\
      \ context \u2014 TSX experienced a severe multi-week drawdown in early-to-mid\
      \ March 2026 (cumulative roughly -15% from late Feb peak based on daily returns\
