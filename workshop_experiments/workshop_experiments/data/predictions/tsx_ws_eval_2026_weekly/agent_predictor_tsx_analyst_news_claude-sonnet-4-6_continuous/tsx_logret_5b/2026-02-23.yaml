    rationale: "Overall macro backdrop for the S&P/TSX Composite over the next 5 business\
      \ days (week of Feb 23\u201327, 2026) is cautiously constructive. The index\
      \ is at record highs, propelled by commodity strength and rotation from US tech,\
      \ with the BoC on hold and inflation cooling. The main risks are: (a) US tariff\
      \ escalation headlines, which could trigger a sharp risk-off episode (captured\
      \ in the fat left tail at Q0.05 = -5.7%); (b) overbought conditions after a\
      \ +2.1% single-day gain, likely causing some consolidation or mean reversion;\
      \ (c) soft Canadian labour market undermining domestic consumer/financial earnings\
      \ expectations. The positive skew from energy/gold momentum and falling GoC\
      \ yields is modest but real. Net expected 5-day log return centred at +0.2%\
      \ with \u03C3 \u2248 3.6%, giving a roughly symmetric distribution with slightly\
      \ heavier downside tails."
    horizon_rationale: "Forecast origin: 2026-02-23, horizon: 5 business days. Key\
      \ inputs and assumptions: (1) Bank of Canada policy rate held at 2.25%, on-hold\
      \ stance with no imminent cuts or hikes expected until 2027; this neutral monetary\
      \ backdrop is equity-supportive but not a fresh catalyst. (2) Canadian CPI at\
      \ 2.3% YoY (Jan 2026), decelerating, with core near 2% \u2014 removes near-term\
      \ inflation shock risk. (3) Labour market soft: -25K jobs in January, unemployment\
      \ 6.5% (fell due to participation drop), wage growth slowing \u2014 limits consumer\
      \ spending upside but not acutely negative for equities in the short run. (4)\
      \ TSX in strong momentum mode in February 2026, reaching record highs, driven\
      \ by a rotation into energy & materials as investors sold US tech (AI/SaaS valuation\
      \ concerns). The as-of date saw a very large single-day gain of +2.1% log return,\
      \ creating a slight mean-reversion pull in the near term. (5) Commodities supportive:\
      \ crude oil firm on Middle East geopolitical risk premium; gold positive as\
      \ safe haven. Both support TSX's energy and materials heavyweights. (6) USD/CAD:\
      \ CAD relatively stable; GoC 10-year yields trending lower on softer CPI and\
      \ flight-to-quality flows \u2014 lower yields are modestly equity-positive for\
      \ rate-sensitive sectors. (7) Downside tail risk: US tariff uncertainty (25%\
      \ levies on autos, steel, aluminum, agriculture) creates macro/earnings headline\
      \ risk for Canadian exporters; a tariff escalation event could produce a sharp\
      \ left-tail return. (8) Statistical anchoring: trailing 63-day daily std of\
      \ 1.596% implies a 5-business-day \u03C3 \u2248 3.57% (\u22481.596%\xD7\u221A\
      5). Mean drift set at ~+0.2% over the week (small positive, reflecting bullish\
