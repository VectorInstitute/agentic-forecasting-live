    rationale: 'Overall framework: The 21-business-day S&P/TSX Composite log-return
      forecast uses a scaled normal-like distribution anchored to: (a) a median of
      +0.018, reflecting positive but decelerating recent momentum and a supportive
      but cautious macro environment; (b) an effective sigma of ~0.076 for 21 days,
      calibrated from the trailing 63-day daily vol of 0.01715 and adjusted for the
      current low-volatility regime; (c) mild left-tail fattening for tariff/trade
      uncertainty and weak Canadian labour data; and (d) upside moderated by sluggish
      growth and BoC caution. The Bank of Canada''s rate hold at 2.25%, inflation
      within target, stable bank earnings, and geopolitical commodity support (oil,
      gold) provide a constructive but not exuberant backdrop. The primary tail risks
      are: (downside) a US tariff escalation that severely disrupts Canada-US trade,
      a sharp oil sell-off, or a renewed inflation spike forcing BoC tightening; (upside)
      a commodity price surge driven by Middle East escalation, faster-than-expected
      BoC easing signaling, or a resolution of US trade tensions.'
    horizon_rationale: "Forecast as of 2026-02-23 for the 21-business-day (one calendar\
      \ month) cumulative log return on the S&P/TSX Composite. Key inputs and assumptions:\
      \ (1) Bank of Canada: Policy rate held at 2.25%, neutral/data-dependent stance\
      \ with no rate hikes expected until 2027. The BoC on-hold posture is modestly\
      \ supportive for equity valuations, particularly financials. (2) Canadian CPI/Labour:\
      \ Jan 2026 headline CPI at 2.3% YoY \u2014 within target, not a near-term shock.\
      \ January employment registered a net loss of ~25,000 jobs; unemployment at\
      \ 6.5% (partly a participation-rate artefact). Labour slack is a mild headwind\
      \ to consumer-facing sectors but reinforces the BoC hold. (3) Commodities: Crude\
      \ oil elevated but volatile amid Middle East geopolitical tensions; energy sector\
      \ benefits from higher oil margins but broader economic uncertainty is a headwind.\
      \ Gold acting as safe-haven, supporting TSX materials/gold miners. The mixed\
      \ commodity backdrop nets roughly neutral to slight positive for TSX energy/materials\
      \ (~40% of the index). (4) CAD & GoC yields: CAD relatively stable; GoC bond\
      \ yields drifted lower in Feb 2026 on soft data, curve flattening \u2014 modestly\
      \ positive for rate-sensitive equities and financial sector spreads. (5) US\
      \ spillovers: Persistent US tariff/trade uncertainty (CUSMA friction, sector-specific\
      \ levies) weighs on business sentiment and cross-border supply chains. US-Canada\
      \ interest rate differential (Fed higher than BoC) keeps CAD under soft pressure.\
      \ This tariff risk contributes to left-tail fattening. (6) TSX sector tone:\
      \ Big Six banks reporting resilient earnings with stable credit outlooks. Energy/materials\
      \ volatile. Technology modest. Recent 21-day rolling return decelerated from\
      \ ~+0.04 in mid-Jan 2026 to ~+0.02 at the forecast origin. Volatility: trailing\
      \ 63-day daily std = 0.01715, implying a 21-day annualised vol of ~27% and a\
      \ raw 21-day sigma of ~0.079. I calibrate the effective distributional sigma\
      \ to ~0.076, slightly below the raw estimate given the recent low-volatility\
      \ regime and BoC stability, while fattening the left tail modestly to reflect\
      \ tariff/trade-war downside risk. Median set at +0.018 log-return (~+1.8%),\
      \ reflecting a modest positive drift consistent with long-run TSX average returns\
      \ but tempered by the soft labour market, trade uncertainty, and the deceleration\
      \ in recent momentum. The distribution is approximately symmetric with a slight\
      \ left-skew: the 5th\u201350th percentile spread (0.130 log units) is marginally\
      \ wider than the 50th\u201395th spread (0.120 log units)."
