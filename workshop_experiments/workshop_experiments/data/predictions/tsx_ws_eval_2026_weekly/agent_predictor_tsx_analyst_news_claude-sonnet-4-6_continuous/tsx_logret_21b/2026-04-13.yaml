    rationale: "Overall approach: combined macro factor analysis with historical return\
      \ distribution calibration. The as-of date (April 13, 2026) sits at a post-drawdown\
      \ recovery inflection \u2014 the TSX fell sharply in March 2026 and began recovering\
      \ in early April. Key bullish forces: oil price elevation (Middle East tensions),\
      \ BoC on hold (not hiking), stable core inflation, modest global recovery. Key\
      \ bearish forces: US-Canada trade uncertainty (tariffs/CUSMA), CAD weakness,\
      \ soft domestic labour market, geopolitical risk premium, global uncertainty\
      \ from Middle East conflict. The 21-business-day horizon (~one calendar month)\
      \ is long enough for macro catalysts to materialize but short enough to be dominated\
      \ by current momentum and sentiment. Volatility is calibrated at ~0.040 for\
      \ 21-day cumulative returns \u2014 above the calm-regime ~0.025 observed in\
      \ 2024, reflecting the elevated trailing 63-day daily vol of 0.0352. The distribution\
      \ is constructed using a mildly asymmetric normal approximation, with a slight\
      \ positive skew at upper quantiles reflecting commodity upside optionality and\
      \ a fat lower tail reflecting tail geopolitical/trade risks."
    horizon_rationale: "Forecast for 21-business-day cumulative log return of the\
      \ S&P/TSX Composite as of April 13, 2026. Key inputs and assumptions: (1) Bank\
      \ of Canada on hold at 2.25% since Oct 2025, 'wait-and-see' stance \u2014 not\
      \ hiking removes a headwind, but no cuts imminent given CPI at ~2.4% driven\
      \ by energy prices; broadly neutral-to-mildly supportive for equities. (2) Canadian\
      \ inflation: headline CPI ~2.4% (March 2026), primarily energy/gasoline-driven;\
      \ core stable near 2%, limiting BoC urgency. Unemployment 6.5\u20137% \u2014\
      \ labour slack is mild growth headwind but not alarming. (3) Commodity outlook:\
      \ Oil prices elevated on Middle East geopolitical tensions (U.S.-Iran conflict),\
      \ providing direct tailwind for TSX energy sector (~20% of index). Gold has\
      \ safe-haven support amid uncertainty. Copper/base metals mixed. Net commodity\
      \ backdrop is positive for TSX. (4) USD/CAD at ~1.3789 (CAD ~72.5 US cents)\
      \ \u2014 moderate CAD weakness reflects yield differentials vs. USD but also\
      \ supports commodity-sector earnings in CAD terms. (5) US spillovers: trade\
      \ uncertainty persists (CUSMA/tariffs ongoing), dampening business investment\
      \ and export-oriented sectors. US bank earnings were positive. TSX broadly integrates\
      \ US sentiment. (6) Price history context: TSX was deeply negative in late March\
      \ 2026 (cumulative log return reaching -0.07 to -0.08) but has staged a recovery\
      \ through early April (+0.01 to +0.03 range). As of April 13 the 21-day rolling\
      \ return is +0.031, signaling early-stage recovery momentum. (7) Volatility:\
      \ trailing 63-day daily vol = 0.0352, implying elevated uncertainty. 21-day\
      \ cumulative return distribution estimated with std ~0.040, reflecting above-normal\
      \ but sub-crisis volatility. (8) Central tendency: median set at +0.020, reflecting\
      \ a mild recovery continuation given commodity tailwinds and BoC stability,\
      \ partially offset by trade uncertainty, elevated geopolitical risk, and softening\
      \ domestic demand. Distribution is slightly positively skewed (oil/commodity\
      \ upside scenarios) but maintains a fat left tail (geopolitical escalation,\
      \ trade shock, USD CAD blowout). Downside 5th percentile at -0.075 captures\
      \ a scenario of sharp oil supply shock reversal, renewed tariff escalation,\
      \ or BoC hawkish surprise. Upside 95th percentile at +0.10 captures a commodity/oil\
      \ surge scenario combined with positive US trade resolution or BoC cut signal."
