    rationale: "Overall forecast centred on a modestly positive 21-business-day outlook\
      \ (~+1.2% median log return) for the S&P/TSX Composite as of June 8, 2026. The\
      \ TSX benefits from strong commodity sector support (elevated oil, strong gold)\
      \ and positive recent price momentum at or near all-time highs. Counterbalancing\
      \ factors include: BoC on hold with no near-term cut expected, headline inflation\
      \ tick-up to 3.2% (potential BoC tightening trigger), soft labour market (unemployment\
      \ 6.5\u20137.0%), a weak Canadian dollar that signals macro stress, US tariff\
      \ uncertainty, and Middle East geopolitical risks. The distributional spread\
      \ (\u03C3\u22480.037 for 21bd) is calibrated from the trailing 63-day std of\
      \ the target return series, with a slight left-fat-tail adjustment for asymmetric\
      \ downside risks. Q05 at -0.054 and Q95 at +0.074 imply an inter-90th-percentile\
      \ range of about 12.8 log-return points, consistent with moderate-elevated volatility\
      \ and a balanced but left-skewed risk environment."
    horizon_rationale: "Forecast as of 2026-06-08 for a 21-business-day S&P/TSX Composite\
      \ cumulative log-return horizon. Key inputs and assumptions: (1) Bank of Canada\
      \ Policy: BoC held overnight rate at 2.25% throughout H1 2026 and signalled\
      \ a 'higher-for-longer' approach through year-end. No rate cuts are imminent,\
      \ removing a potential equity tailwind but also eliminating a hawkish surprise\
      \ shock in the near term. Neutral influence on equities. (2) Canadian Inflation\
      \ & Labour: Headline CPI rose to 3.2% in May 2026 (driven by energy/gasoline\
      \ spike from Middle East tensions); core CPI anchored near 2%. Labour market\
      \ soft with unemployment 6.5\u20137.0%, excess capacity in the economy but signs\
      \ of May stabilisation. The inflation overshoot above target introduces risk\
      \ the BoC turns restrictive, creating left-tail risk. (3) Commodity Prices:\
      \ Oil elevated/volatile due to Middle East geopolitical tensions \u2014 directly\
      \ supportive of TSX energy sector (the index's largest weight). Gold strong\
      \ on safe-haven demand, benefiting materials/mining. These dual commodity tailwinds\
      \ are the primary positive driver for the forecast median being modestly above\
      \ zero. (4) CAD & GoC Yields: USD/CAD near 1.3940 \u2014 the loonie under pressure\
      \ from widening Canada-US rate differential. Weaker CAD boosts foreign-currency\
      \ earnings for exporters (energy, miners) but signals macro caution. GoC 10-yr\
      \ yields elevated. Mixed net impact. (5) US Policy Spillovers: US Fed 'higher-for-longer'\
      \ keeps pressure on risk assets globally. Tariff/CUSMA uncertainty creates sector-specific\
      \ headwinds (auto, steel, forestry) while energy and materials are relatively\
      \ insulated. (6) TSX Momentum: The index reportedly reached all-time highs by\
      \ early June 2026 following recovery from a mid-2026 drawdown. Recent 21-day\
      \ trailing return is +0.02. Positive near-term momentum supports a slightly\
      \ positive median. (7) Volatility regime: Trailing 63-day std of the 21-day\
      \ return series is 0.0372 \u2014 moderate-elevated relative to the historical\
      \ norm of ~0.03, reflecting recent geopolitical/macro uncertainty. This is used\
      \ as the distributional spread (\u03C3 \u2248 0.037). Distribution is approximately\
      \ normal with a mild left-fat-tail adjustment reflecting asymmetric downside\
      \ risks (inflation surprise forcing BoC hike, oil/geopolitical shock, trade\
      \ escalation). Median set at +0.012 (~+1.2% over 21bd), reflecting modest positive\
      \ drift offset by macro headwinds."
