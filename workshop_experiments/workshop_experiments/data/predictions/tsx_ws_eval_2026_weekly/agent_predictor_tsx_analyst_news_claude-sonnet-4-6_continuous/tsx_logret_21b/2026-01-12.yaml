    rationale: "Overall forecast framework: The S&P/TSX Composite enters February\
      \ 2026 from a position of strength after a record-breaking 2025, supported by\
      \ stable BoC policy at neutral (2.25%), constructive commodity prices (gold\
      \ safe-haven demand, firm oil), and strong financial-sector earnings. The primary\
      \ upside risks are a commodity price rally (oil/gold spike) and continued bank\
      \ earnings outperformance. The primary downside risks are US tariff escalation\
      \ against Canadian goods, a sharper-than-expected global growth slowdown affecting\
      \ base metal demand, a USD/CAD overshoot, or a surprise BoC policy shift. With\
      \ daily volatility near 2% and the 21BD horizon, the forecast distribution is\
      \ wide (\xB19\u201315% 1\u03C3 to 2\u03C3 range), reflecting genuine uncertainty.\
      \ The median +1.2% reflects slightly above-zero drift with mean-reversion from\
      \ an elevated recent return, consistent with historical TSX monthly return averages\
      \ near +0.5\u20131.5% in non-crisis regimes."
    horizon_rationale: "Forecast as of 2026-01-12 for a 21-business-day (\u22481 calendar\
      \ month) cumulative log return on the S&P/TSX Composite. Key inputs and assumptions:\
      \ (1) Bank of Canada policy: BoC is on hold at 2.25% (neutral level) with a\
      \ clear holding bias since October 2025, providing a stable monetary backdrop\
      \ \u2014 neither stimulative nor restrictive for equities. (2) Inflation/Labour:\
      \ Canadian CPI is tracking near the 2% target; the unemployment rate is elevated\
      \ (~6.8\u20137.0%) but stable, implying modest domestic demand growth and no\
      \ imminent policy shock. (3) Commodity prices: Oil remains firm and volatile,\
      \ supported by geopolitical tensions (Middle East) which benefit the TSX energy\
      \ sector (~18% weight). Gold/precious metals continue to attract safe-haven\
      \ flows, supporting the materials sector. Base metals face headwinds from global\
      \ growth softness and tariff-related demand uncertainty. Net commodity impact\
      \ is mildly constructive for the TSX. (4) CAD/GoC yields: USD/CAD faces depreciation\
      \ pressure from the BoC\u2013Fed policy divergence; GoC 10-year yields are firm.\
      \ A weaker CAD provides a translation boost to commodity revenues but may dampen\
      \ capital inflows. (5) US spillovers: US tariff uncertainty on Canadian goods\
      \ remains the dominant tail risk, contributing to elevated left-tail probability.\
      \ The Fed is maintaining a more restrictive stance than the BoC, widening yield\
      \ spreads. (6) TSX momentum/valuation: The index has had an exceptional 2025\
      \ (~28% gain), driven by financials (Big Six bank earnings beat), energy, and\
      \ gold miners. The trailing 21BD log return entering this period is +0.0509,\
      \ reflecting strong near-term momentum. However, this elevated baseline creates\
      \ mean-reversion pressure \u2014 the index has largely priced in the positive\
      \ news. (7) Volatility calibration: Trailing 63-day daily std = 2.01%, implying\
