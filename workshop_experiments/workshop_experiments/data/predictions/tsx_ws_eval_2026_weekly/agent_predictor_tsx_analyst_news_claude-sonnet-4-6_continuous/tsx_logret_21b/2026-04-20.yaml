    rationale: "Overall framework: The TSX faces a mixed macro environment as of April\
      \ 20, 2026. The index has just completed a powerful 21bd rally (+7.6%) recovering\
      \ from late-March tariff-shock lows. The Bank of Canada is on hold at 2.25%\
      \ (accommodative); gold and oil prices are elevated on geopolitical grounds;\
      \ the Canadian dollar is soft vs USD. Labour market weakness (unemployment 6.7%,\
      \ Q1 job losses) caps the upside, while mean-reversion risk after the large\
      \ recent gain introduces uncertainty. The 21-business-day ahead point forecast\
      \ is set at +0.5% log return with a distribution width (Q5\u2013Q95 spread)\
      \ of ~8.8 percentage points, consistent with the elevated trailing volatility\
      \ regime (annualized ~28%). Key downside risks: oil price reversal if Middle\
      \ East tensions ease, US tariff escalation beyond CUSMA-protected goods, further\
      \ CAD weakness, BoC being forced to hold longer than expected. Key upside risks:\
      \ US-Canada trade deal progress, gold continuing to surge, BoC cutting rates\
      \ on weak data, strong bank earnings season."
    horizon_rationale: "Forecast as of 2026-04-20 for the next 21 business days (~one\
      \ calendar month). KEY INPUTS: (1) MOMENTUM/STARTING LEVEL: The trailing 21bd\
      \ log return of +7.57% is an exceptionally strong reading (~2.1 sigma above\
      \ the long-run mean), driven by the TSX's sharp April rally after a brutal late-March\
      \ drawdown. This creates both a positive momentum signal and a meaningful mean-reversion\
      \ risk. (2) BANK OF CANADA: Policy rate held at 2.25% with a 'wait-and-see'\
      \ stance. Accommodative relative to neutral; dovish tilt given unemployment\
      \ at ~6.7% and soft Q1 GDP. No rate hikes expected; modest probability of a\
      \ cut later in 2026 if labour market weakens further. This is marginally supportive\
      \ for equities via lower discount rates. (3) INFLATION & LABOUR: CPI near 2%\
      \ target with energy-driven volatility; core inflation contained. Net ~94,600\
      \ jobs lost in Q1 2026, unemployment 6.7%. Soft labour market limits consumer\
      \ spending upside but also caps BoC hawkishness \u2014 net neutral to slightly\
      \ positive for equities. (4) COMMODITIES: Gold benefiting from strong safe-haven\
      \ flows (Middle East conflict), supporting TSX materials/miners. Oil elevated\
      \ but volatile due to geopolitical supply disruptions (Strait of Hormuz tensions);\
      \ energy sector earnings boosted short-term but sustainability uncertain. Base\
      \ metals mixed. Net positive for TSX given large resource sector weight. (5)\
      \ CAD/GoC YIELDS: USD/CAD ~1.37\u20131.43; loonie under pressure from Canada\u2013\
      US rate differential (BoC at 2.25% vs Fed at 3.50\u20133.75%). GoC 10-year yields\
      \ drifted lower \u2014 supportive for financials, REITs, and rate-sensitive\
      \ names. Weak CAD provides a partial FX buffer for commodity exporters. (6)\
      \ US POLICY/TRADE: Fed on hold with hawkish tone and resilient US data. US tariffs\
      \ and CUSMA review uncertainty remain headwinds for Canadian manufacturing,\
      \ auto, forestry sectors; most goods still protected under CUSMA. Bank earnings\
