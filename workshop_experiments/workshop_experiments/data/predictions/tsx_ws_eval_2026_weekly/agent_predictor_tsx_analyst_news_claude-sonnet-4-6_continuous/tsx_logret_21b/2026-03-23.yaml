      \ market deterioration is a material headwind for consumer-sensitive sectors\
      \ and domestic demand. (5) INFLATION \u2014 Headline CPI under upward pressure\
      \ from oil/energy prices (Middle East conflict), while core inflation remains\
      \ near the 2% target. Stagflation risk is elevated: the BoC cannot ease aggressively\
      \ while headline CPI is rising, constraining the policy backstop for equities.\
      \ (6) COMMODITIES \u2014 Oil prices elevated due to Middle East geopolitical\
      \ tensions, which supports TSX energy producers but simultaneously stoking inflation\
      \ fears. Gold prices elevated on safe-haven demand, supporting the TSX materials/mining\
      \ sector. These offsetting forces create a partial natural hedge within the\
      \ TSX but not a clear directional catalyst. (7) USD/CAD AND YIELDS \u2014 The\
      \ 10-year Government of Canada bond yield has risen to approximately 3.47% by\
      \ March 2026, tracking higher US Treasury yields. A rising yield environment\
      \ pressures valuations, particularly for rate-sensitive financials and utilities.\
      \ The Canadian dollar remains weak vs USD, providing a partial hedge for exporters\
      \ but increasing cost-of-capital concerns. (8) US TRADE SPILLOVERS \u2014 US\
      \ tariffs on Canadian steel, aluminum, and autos continue to weigh on business\
