      \ OF CANADA \u2014 Policy rate held at 2.25% through early 2026 in a 'wait-and-see'\
      \ posture. This neutral stance provides neither a catalyst for a sharp rally\
      \ nor a headwind from further tightening. The BoC is unlikely to cut further\
