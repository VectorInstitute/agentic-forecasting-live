      \ spillovers, TSX sector earnings tone) via search before calibrating the forecast.\
      \ The dominant signals for the 21-bd forward window are: (a) still-elevated\
      \ oil prices supporting the energy-heavy TSX; (b) gold at historic highs supporting\
      \ materials; (c) BoC on hold \u2014 supportive policy backdrop; (d) the sharp\
      \ April recovery creating mean-reversion headwinds; (e) elevated trailing volatility\
      \ (63-day \u03C3/day = 0.0378) requiring a wider-than-normal predictive interval.\
      \ The median is set at +0.02 log-return (~+2% price gain over one calendar month),\
      \ with the distribution skewed only modestly to the right given post-rally consolidation\
      \ risk. Tail risks on the downside include a Middle East escalation causing\
      \ global risk-off, a surprise US tariff shock, or a BoC dovish surprise that\
      \ weakens CAD and triggers capital outflows."
    horizon_rationale: "Forecast as of 2026-04-27 for the 21-business-day cumulative\
      \ log return on the S&P/TSX Composite. Key inputs and assumptions: (1) Bank\
      \ of Canada Policy: BoC held overnight rate at 2.25% in April 2026, following\
      \ an October 2025 cut. The 'wait-and-see' stance is supportive \u2014 no near-term\
      \ hike risk, with the possibility of further cuts if growth disappoints. Net\
      \ effect: mildly positive for equities. (2) Canadian Inflation & Labour: CPI\
      \ at ~2.4% in March 2026, expected to peak near 3% before easing; core inflation\
      \ well-anchored. Unemployment 6.5\u20137%, with job losses in early 2026 now\
      \ stabilising. Labour softness is a mild drag but does not justify aggressive\
      \ BoC tightening. (3) Commodities \u2014 Oil: Brent crude surged to ~$118 in\
      \ March 2026 (Middle East supply shock/Strait of Hormuz tensions) before moderating\
      \ to the $90s in April. Still well above the 2025 average, providing substantial\
      \ support to TSX Energy sector (~20% index weight). Net: positive for index.\
      \ (4) Commodities \u2014 Gold & Base Metals: Gold rallied to historic highs\
      \ on safe-haven demand; materials sector significantly outperformed YTD. Minor\
      \ headwind from elevated energy costs for miners. Net: positive. (5) USD/CAD\
      \ & GoC Yields: CAD trading around 1.37 USD/CAD, supported by elevated oil income.\
      \ GoC 10-year yields stable, reflecting BoC hold and no near-term tightening\
      \ expectations. Mild US-Canada rate differential (US Fed distinctly hawkish)\
      \ keeps some modest downward pressure on CAD. Net: roughly neutral for equity\
      \ returns. (6) US Policy Spillovers: CUSMA intact; sector-specific tariffs on\
      \ steel/aluminum persist. Trade uncertainty remains a drag on business investment\
      \ and hiring but has been largely priced in following the 2025 trade-war shock.\
      \ US Fed hawkishness creates some capital outflow risk. Net: mild negative.\
      \ (7) Price History/Momentum: The 21-bd cumulative log return just printed +0.059,\
      \ recovering sharply from a trough of -0.08 in late March/early April 2026.\
      \ This sharp rally creates mean-reversion risk over the next month. Trailing\
      \ 63-day daily vol = 0.0378, implying a 21-bd \u03C3 \u2248 0.173 (raw); however,\
      \ normalising for current regime and the fact that much of the April volatility\
      \ has already resolved, I use an effective \u03C3 \u2248 0.065\u20130.068 for\
      \ the forward distribution. (8) Distribution calibration: Median set at +0.020\
      \ (log), reflecting commodity tailwinds and BoC support offset by mean-reversion\
      \ risk after the April recovery and ongoing trade/geopolitical uncertainties.\
      \ The left tail is fattened relative to a Normal (5th percentile at -0.095)\
      \ to reflect Middle East escalation and CUSMA breakdown risks. The right tail\
      \ is modestly compressed (95th percentile at +0.123) given that much of the\
      \ commodity/geopolitical upside has already been captured in the April rally."
