    rationale: Overall macro backdrop for the TSX over a 21bd forward window from
      Feb 2, 2026 is modestly positive but uncertainty-laden. The BoC is on hold at
      a mildly accommodative 2.25%, inflation is near target, and Canadian bank earnings
      remain resilient. However, commodity softness (oil supply glut, gold pullback),
      CAD depreciation pressure, a soft labour market, and US tariff/trade uncertainty
      create meaningful left-tail risk. The 21bd volatility estimate of ~9.6% (annualised
      ~67%) is based on the trailing 63d daily std of 2.09%. The median forecast of
      +0.010 (roughly +1% total log return) reflects a flat-to-modestly-positive outlook
      consistent with stable BoC policy and financial sector support, offset by commodity
      and trade headwinds. Downside tail (Q5 = -0.158) reflects scenarios of commodity
      shock + tariff escalation; upside tail (Q95 = +0.172) captures a surprise trade
      deal resolution or commodity rebound.
    horizon_rationale: "21-business-day (\u22481 calendar month) cumulative log-return\
      \ forecast anchored as of 2026-02-02. Key inputs: (1) Bank of Canada: held overnight\
      \ rate at 2.25% on Jan 28, 2026 \u2014 second consecutive pause after 100bp\
      \ of 2025 cuts. BoC signalled a data-dependent, 'wait-and-see' stance amid elevated\
      \ trade uncertainty; neutral to marginally supportive for equities. (2) Inflation/Labour:\
      \ headline CPI ~2.4% (Dec 2025, boosted by GST/HST expiry base effect), core\
      \ measures moderating. Jan 2026 LFS showed -25K jobs but unemployment fell to\
      \ 6.5% on participation drop \u2014 mixed signal, not acutely bearish. (3) Commodities:\
      \ crude oil subdued (supply-glut narrative), gold pulled back sharply in late\
      \ Jan 2026 (slump in precious metals triggered TSX's 3.3% sell-off Jan 30).\
      \ Both energy and materials sectors face near-term headwinds. (4) CAD/GoC yields:\
      \ USD/CAD ~1.3637 with CAD under depreciation pressure from US-Canada yield\
      \ differential; GoC 10yr broadly stable. Currency weakness provides partial\
      \ offset for exporters. (5) US spillovers: Fed first cut pushed to ~June 2026\
      \ (hawkish hold), US tariff/CUSMA uncertainty a persistent headwind. (6) Sector\
      \ tone: financials ('Big Six' banks) resilient and attracting rotation; energy\
      \ and materials under pressure. Consensus double-digit EPS growth expected for\
      \ TSX in 2026. (7) Price dynamics: last 21bd cumulative log return = +0.0094;\
      \ trailing 63d daily std = 0.02092, implying 21bd horizon \u03C3 \u2248 0.096.\
      \ Median set at +0.010 (near last observation, slight positive drift from financial\
      \ sector tailwind and BoC accommodation), with slight negative skew applied\
      \ to downside quantiles to capture tariff/commodity risk asymmetry. The distribution\
      \ is wider than the recent calm period would suggest due to elevated US trade\
      \ policy and CUSMA uncertainty."
