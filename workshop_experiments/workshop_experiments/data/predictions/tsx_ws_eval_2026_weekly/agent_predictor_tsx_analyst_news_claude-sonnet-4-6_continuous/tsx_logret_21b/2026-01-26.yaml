    rationale: "Overall: The S&P/TSX Composite faces a constructive but uncertain\
      \ environment at the 21-business-day horizon from January 26, 2026. The primary\
      \ positive drivers are: (a) record gold prices and rising oil/copper supporting\
      \ the energy and materials-heavy TSX, (b) BoC on hold at an accommodative 2.25%,\
      \ and (c) inflation near target reducing policy risk. The primary downside risks\
      \ are: (a) US tariff escalation and trade uncertainty, (b) soft Canadian labour\
      \ market potentially weakening domestic demand, and (c) mean-reversion risk\
      \ after TSX reaching record highs. The median return of +0.020 (~+2% over ~4\
      \ calendar weeks) is modestly above the long-run historical average, reflecting\
      \ the net positive commodity/monetary backdrop. Uncertainty bands are calibrated\
      \ to current lower-volatility regime (trailing 63d std implies ~0.096 21-day\
      \ \u03C3, but recently realized vol appears closer to 0.076), with the distribution\
      \ anchored on a near-normal shape with slight right skew from commodity momentum."
    horizon_rationale: "Forecast for the S&P/TSX Composite 21-business-day cumulative\
      \ log return as of 2026-01-26. Key inputs and assumptions: (1) Bank of Canada\
      \ Policy: BoC holds at 2.25% with a 'wait-and-see' stance after cutting from\
      \ 3.00% in 2025. No near-term rate changes anticipated, providing a neutral-to-mildly-supportive\
      \ monetary backdrop for equities. (2) Inflation & Labour: CPI at ~2.3% YoY is\
      \ near-target and disinflationary \u2014 not a headwind. Labour market is soft\
      \ (unemployment 6.5%, ~25-27K job losses in January, declining participation),\
      \ representing a modest demand headwind. (3) Commodities \u2014 KEY TAILWIND:\
      \ Oil and gold rising in January 2026, with gold reaching record highs and copper/steel\
      \ also elevated. TSX is heavily weighted toward energy and materials, so this\
      \ is a significant positive catalyst for index performance. Energy sector is\
      \ the top January performer. (4) CAD & GoC Yields: CAD appreciated ~1.3% vs\
      \ USD in January \u2014 a modest mixed signal (import benefit, slight headwind\
      \ for export earnings translation). GoC 10-year yields stable even with US Treasury\
      \ pressure, supporting equity valuation multiples. (5) US Tariff/Trade Risk:\
      \ Elevated US tariff uncertainty remains the primary macro headwind. US tariffs\
      \ on Canadian goods weigh on trade-exposed sectors and business confidence.\
      \ This is the main downside risk for the forecast horizon. (6) TSX Momentum:\
      \ TSX reached record highs in January 2026 driven by energy and materials. The\
      \ last 21-day return of +3.18% reflects strong momentum. However, mean-reversion\
      \ risk from record highs tempers the upside. (7) Volatility Calibration: Trailing\
      \ 63-day daily std = 0.021, implying 21-day std \u2248 0.096. However, recent\
      \ observed 21-day returns cluster in \xB10.03\u20130.06, suggesting realized\
      \ vol is below the long-run average. I use \u03C3 \u2248 0.076 for the distribution,\
      \ reflecting current lower-vol regime. (8) Point Forecast/Median: Set at +0.020,\
      \ reflecting positive commodity tailwinds and stable monetary conditions offset\
      \ by US trade uncertainty, soft labour market, and mean-reversion risk from\
      \ record highs. The distribution is approximately symmetric but with slight\
      \ positive skew given commodity support. Q05 at -0.105 and Q95 at +0.145 capture\
      \ fat-tail risks from potential tariff escalation (downside) or commodity surge\
      \ continuation (upside)."
