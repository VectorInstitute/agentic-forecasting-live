      \ for rate-sensitive sectors (real estate, utilities). (5) US SPILLOVERS: Fed\
      \ on hold; persistent US tariff headwinds via Trade Act 1974 measures targeting\
      \ steel, aluminum, and auto sectors. Some trade disruption headwind for Canadian\
