      \ (3) COMMODITIES: Brent crude surged 50%+ in March on Strait of Hormuz disruption\
      \ and Iran conflict escalation; this is a direct positive for TSX energy stocks\
      \ (~20% index weight), though equity prices tend to lag spot prices. Gold faced\
      \ downward pressure/volatility, limiting materials-sector tailwind. Net commodity\
      \ effect: moderately positive for TSX given energy weight. (4) CAD & GOC YIELDS:\
      \ USD/CAD near 1.3686; CAD modestly stronger on broad USD weakness, a mild positive\
