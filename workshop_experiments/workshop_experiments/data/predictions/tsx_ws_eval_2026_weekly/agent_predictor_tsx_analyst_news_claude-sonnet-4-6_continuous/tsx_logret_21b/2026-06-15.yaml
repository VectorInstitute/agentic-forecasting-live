      equals the 0.50 quantile at +0.012.
    horizon_rationale: "21-business-day (approx. 1-month) cumulative log-return forecast\
      \ for the S&P/TSX Composite as of 2026-06-15. Key inputs and assumptions: (1)\
      \ Bank of Canada Policy: BoC held the overnight rate at 2.25% at its June 10\
      \ meeting, marking six consecutive holds. The Governing Council signalled a\
      \ 'wait-and-see' stance amid a technical recession (H2-2025/early-2026 contractions)\
      \ and elevated but energy-driven headline CPI of 3.2% (May 2026), while core\
      \ inflation held near 2.1%. No rate moves are expected in the near term, providing\
      \ a stable backdrop for equities. (2) Canadian Macro: Unemployment eased to\
      \ 6.6% on a strong May LFS (+88K jobs), but labour market broadly remains soft.\
      \ Growth is fragile. The stable rate environment and soft labour market are\
      \ net-neutral for the TSX. (3) Commodities: Oil prices are elevated but volatile\
      \ due to Middle East geopolitical tensions \u2014 supportive of TSX energy names\
      \ but introducing downside tail risk if conflict escalates or reverses. Gold\
      \ benefits from safe-haven demand (positive for TSX materials). Base metals\
      \ resilient. The commodity backdrop is a net tailwind for the TSX's heavy energy/materials\
      \ weighting. (4) TSX Momentum and Valuation: The index hit a record high of\
      \ ~35,217 on June 4, 2026. The last 21-BD log-return reading is +0.029, suggesting\
      \ a strong recent rally from the April tariff-shock lows. Mean reversion from\
      \ elevated levels moderates the forward point estimate relative to recent momentum.\
      \ (5) USD/CAD and GoC Yields: The Canadian dollar faces downward pressure from\
      \ the US-Canada yield differential (Fed 'higher-for-longer' vs. BoC on hold).\
      \ A weaker CAD provides some FX tailwind for TSX exporters but adds imported\
      \ inflation risk. GoC 10Y yields were relatively stable. (6) US Spillovers:\
      \ CUSMA tariff uncertainty and US sector-specific tariffs (steel, aluminum,\
      \ autos) are persistent headwinds for manufacturing and capex, but energy and\
      \ financials are largely insulated. (7) Statistical calibration: Trailing 63-day\
      \ std of 21BD log returns is 0.0370. I set the conditional median at +0.012\
      \ (positive drift from commodity support and stable rates, moderated by mean\
      \ reversion from recent record highs). The distribution is approximately normal\
      \ with a slightly fattened left tail (geopolitical tail risk: Middle East escalation,\
      \ tariff shock). This yields Q5=-0.055, Q95=+0.073, broadly symmetric but with\
      \ modest left-skew adjustment."
