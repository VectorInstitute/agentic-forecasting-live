    rationale: "Overall forecast framework: As of April 6, 2026, the S&P/TSX Composite\
      \ has experienced a significant drawdown in March 2026 (21-day returns reaching\
      \ -0.07 to -0.08) and is beginning to recover (-0.01 as of the forecast date).\
      \ The dominant macro forces are: (1) BoC on hold at 2.25% \u2014 neutral to\
      \ mildly positive for equities; (2) elevated oil prices from Middle East tensions\
      \ \u2014 positive for TSX energy sector but creating inflation uncertainty;\
      \ (3) soft labour market (UR 6.7%) and US tariff headwinds \u2014 mildly negative;\
      \ (4) USD/CAD at 1.38-1.39 \u2014 modestly supportive of export earnings; (5)\
      \ GoC 10Y at 3.60% \u2014 manageable but creating some multiple compression.\
      \ The net effect is a modestly positive median forecast (+1.0% over 21 days)\
      \ reflecting mean-reversion potential from an oversold position, balanced against\
      \ persistent structural headwinds. The distribution is calibrated with a left-skewed\
      \ profile and a 21-day \u03C3 of approximately 6.3%, reflecting the elevated-but-not-extreme\
      \ volatility environment (trailing 63d daily std of 3.61%). Tail risks are asymmetric,\
      \ with the downside tail extended to account for geopolitical escalation and\
      \ trade policy tail risks."
    horizon_rationale: "Forecast as of 2026-04-06 for the 21-business-day ahead cumulative\
      \ log return on the S&P/TSX Composite.\n\nKEY MACRO ASSUMPTIONS:\n1. Bank of\
      \ Canada Policy: BoC held overnight rate at 2.25% in March 2026 (second consecutive\
      \ hold). Data-dependent stance with no near-term cuts priced in. This is mildly\
      \ supportive for equities (no tightening), but the economy is operating below\
      \ potential with unemployment at ~6.7%.\n2. Canadian Inflation/Labour: CPI at\
      \ 1.8% YoY (Feb 2026), with March/April expected to tick higher on energy/gasoline\
      \ prices from Middle East conflict. Labour market soft (+14K jobs, unemployment\
      \ 6.7%). Wage growth 4.7% YoY \u2014 creates cost pressure but also some consumer\
      \ support.\n3. Commodities: Oil prices elevated due to Middle East geopolitical\
      \ tensions (Brent rising sharply through March), positive for TSX energy sector\
      \ (Canada is a net oil exporter). Gold corrected in March but remains a support\
      \ for materials sector. Industrial metals (copper) supported by electrification/AI\
      \ themes long-term.\n4. USD/CAD: 1.38\u20131.39, CAD mildly weak vs. USD. The\
      \ rate differential (BoC at 2.25% vs. Fed maintaining higher stance) and tariff\
      \ uncertainty weigh on the loonie. A weaker CAD benefits TSX energy/materials\
      \ companies reporting in USD.\n5. GoC 10Y Yield: ~3.60%, reflecting energy-inflation\
      \ risk. Higher yields compress financial sector multiples but not dramatically.\n\
      6. US Spillovers: US Fed maintaining firm stance, CUSMA uncertainty and sectoral\
      \ tariffs (steel, aluminum) create persistent headwinds for Canadian exporters.\
      \ TSX has high correlation with US markets; US resilience is a partial offset\
      \ to domestic weakness.\n7. TSX Price History: The index recently traded at\
      \ 21-day cumulative log returns of -0.07 to -0.08 in late March 2026, recovering\
      \ to -0.01 by April 6. This represents a significant drawdown followed by a\
      \ nascent recovery. Trailing 63-day daily std = 3.61% implies 21-day vol of\
      \ ~16.5% (annualized), but empirical 21-day realized returns in 2025-2026 cluster\
      \ in \xB10.08 range in normal markets.\n\nDISTRIBUTION RATIONALE:\n- Median\
      \ set at +0.010 (slight positive): Mild mean-reversion from the recent -0.07/-0.08\
      \ trough, partially offset by ongoing macro headwinds (tariff drag, soft labour\
      \ market, higher GoC yields). Energy sector tailwind from elevated oil prices\
      \ provides support.\n- The distribution is asymmetric with a heavier left tail:\
      \ (a) downside scenarios include Middle East conflict escalation crushing global\
      \ demand, further tariff shock, or unexpected BoC hawkishness; (b) upside scenarios\
      \ include trade deal progress, commodity surge, or US soft landing validating\
      \ risk appetite.\n- 21-day \u03C3 calibrated to approximately 0.063 (slightly\
      \ below the full-sample implied vol) reflecting the recent recovery from oversold\
      \ conditions and the absence of an acute near-term catalyst for a new leg lower.\n\
      - Left tail (Q5 = -0.110) reflects the realistic probability of renewed sell-off\
      \ (e.g., Middle East escalation, US recession signal, or major tariff shock)\
      \ \u2014 consistent with historical tail events in the 2014-2016 and 2020 periods.\n\
      - Right tail (Q95 = +0.104) reflects a strong rebound scenario (geopolitical\
      \ de-escalation, strong commodities, BoC dovish pivot signal), consistent with\
      \ the May 2025 pattern (+0.08 within a few weeks) observed in the CSV history."
