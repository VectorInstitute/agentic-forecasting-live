    rationale: "Overall forecast is for a mildly positive 21-business-day cumulative\
      \ log return on the S&P/TSX Composite from March 9, 2026. The TSX's commodity\
      \ and financial-heavy composition benefits from higher oil/gold prices driven\
      \ by Middle East tensions and a stable BoC at 2.25%. However, US tariff headwinds,\
      \ soft domestic labour market, and geopolitical risk create meaningful downside\
      \ uncertainty. The distribution is modestly wider than 'calm' periods (using\
      \ trailing vol of 1.71%/day \u2192 ~8% over 21 biz days) and exhibits a slight\
      \ left-skew given asymmetric tail risks. The median is set at +2.0%, reflecting\
      \ positive but not exuberant conditions, with mean reversion from the recently\
      \ elevated +3.7% 21-day reading."
    horizon_rationale: "Forecast origin: 2026-03-09. The 21-business-day cumulative\
      \ log-return forecast is anchored by the following key inputs: (1) PRICE HISTORY\
      \ & MOMENTUM: The trailing 21-day log return as of the origin date is +3.7%,\
      \ reflecting a positive but moderating trend from recent peaks of ~+6% in late\
      \ 2025. The trailing 63-day daily std of 1.71% translates to approximately \xB1\
      7.8\u20138.0% at the 21-day horizon, forming the basis of the distributional\
      \ spread. (2) BANK OF CANADA: The BoC held the policy rate at 2.25% in early\
      \ 2026. Core inflation remains near the 2% target, and the BoC is on hold for\
      \ most of 2026. This removes a major equity headwind (rate hike risk) and supports\
      \ a mildly positive rate environment for financials and dividend-paying sectors.\
      \ (3) CANADIAN MACRO: Headline CPI at ~2.3% y/y (slightly below consensus),\
      \ labour market soft (unemployment 6.5\u20137%), and GDP growth subdued due\
      \ to trade-related headwinds. This mixed domestic picture is broadly neutral\
      \ for equities. (4) COMMODITIES: Brent crude surged past $80/bbl driven by Middle\
      \ East conflict (late Feb 2026). This is a positive for TSX's ~20% energy weight\
      \ (higher free cash flow, buybacks) but also introduces inflationary risk and\
      \ global demand uncertainty. Gold prices remain elevated on safe-haven demand,\
      \ supporting the materials sector. Net commodity effect is mildly positive for\
      \ the TSX. (5) CAD & YIELDS: USD/CAD near 1.36 (weak CAD), helpful for resource\
      \ exporters priced in USD. GoC 10-year at 3.47%, stable and not an incremental\
      \ headwind. (6) US POLICY SPILLOVERS: A 10% global US tariff is in effect, with\
      \ CUSMA-compliant Canadian goods largely exempted, but sectoral tariffs on steel,\
      \ aluminum, and pharmaceuticals remain a drag on Canadian manufacturers and\
      \ create business confidence uncertainty. The risk of further escalation is\
      \ elevated. This is the primary downside tail risk. (7) SECTOR TONE: Energy\
      \ and materials benefit from higher oil/gold. Canadian financials (banks) are\
      \ stable. Manufacturing and export sectors face tariff pressure. Net sector\
      \ picture is modestly positive given resource-heavy TSX weighting. MEDIAN (Q50):\
      \ Set at +0.020, reflecting a modest positive drift from mean-reversion of the\
      \ recent +3.7% reading toward a more neutral medium-term trend, partially supported\
      \ by commodity tailwinds and stable BoC but partially offset by US tariff headwinds\
      \ and geopolitical uncertainty. DISTRIBUTION: Slightly left-skewed to account\
      \ for asymmetric tail risk \u2014 US tariff escalation and Middle East conflict\
      \ could produce sharp downside shocks (analogous to H2 2022 or H1 2025 drawdowns)\
      \ while the upside is more bounded by moderate domestic growth. The 5th percentile\
      \ at -0.115 and 95th at +0.148 capture the historically observed 21-day extremes\
      \ at elevated volatility regimes."
