    horizon_rationale: "Forecast horizon: 21 business days (~1 calendar month) from\
      \ 2026-03-02. Key macro drivers and their expected impact: (1) Bank of Canada\
      \ policy: BoC on hold at 2.25% after 2025 easing cycle \u2014 neutral for equities,\
      \ no near-term catalyst from policy rate changes. (2) Labour market: Notably\
      \ weak \u2014 84,000 jobs lost in February 2026, unemployment at 6.7%, a headwind\
      \ for consumer-facing sectors and overall sentiment. (3) Inflation/CPI: Headline\
      \ pressured upward by Middle East energy shock, but core CPI near 2% target\
      \ \u2014 mixed signals, net slight headwind as GoC 10-yr yield rose to 3.47%\
      \ in Feb (from 3.20% in Jan), creating valuation headwind. (4) Commodities:\
      \ Oil prices elevated and volatile due to Middle East conflict (Strait of Hormuz\
      \ risk premium) \u2014 bullish for TSX energy sector (~20%+ index weight). Gold\
      \ supported by safe-haven demand and central bank buying \u2014 bullish for\
      \ materials. Net commodity effect: moderately positive for TSX. (5) CAD/FX:\
      \ USD/CAD ~1.365, weak loonie reduces CAD-denominated returns for foreign investors\
      \ but benefits Canadian exporters and commodity producers. (6) US spillovers:\
      \ 10% US global tariff partially exempts CUSMA goods but creates ongoing trade\
      \ uncertainty; hawkish Fed under new leadership widens Canada-US rate differential,\
      \ pressuring CAD and adding uncertainty discount. (7) TSX momentum: Recent 21-bd\
      \ cumulative log returns have been positive and moderate (+0.03 to +0.05 range\
      \ through Jan-Mar 2026), with index near record highs. (8) Volatility calibration:\
      \ Trailing 63-day std of 21-bd returns \u2248 0.0166 (low/moderate vol regime).\
      \ I apply a modest upward asymmetry to reflect commodity tailwinds and recent\
      \ momentum, but widen tails relative to recent realized vol to reflect geopolitical\
      \ risk (Middle East escalation scenario), trade uncertainty, and weak domestic\
      \ jobs data. Point forecast (median) set at +0.020 log return (~+2%), reflecting\
