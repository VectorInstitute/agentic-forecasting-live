    rationale: "Overall: The S&P/TSX Composite sits in a moderately constructive but\
      \ uncertain environment as of late May 2026. The commodity tailwind from elevated\
      \ oil and gold prices provides structural support for the energy-heavy index.\
      \ However, the BoC's hold stance amid a soft labour market and elevated headline\
      \ inflation, combined with US trade policy headwinds (tariffs on metals/forestry,\
      \ CUSMA uncertainty) and geopolitical risk premia from Middle East tensions,\
      \ create a balanced risk profile with modest positive bias. The April\u2013\
      May 2026 recovery from the March drawdown appears to be fading, with the latest\
      \ 21-day log-return settling near +2.4% and momentum decelerating. The median\
      \ forecast of +1.2% reflects continuation of modest positive drift consistent\
      \ with long-run TSX historical tendencies, while the spread is calibrated to\
      \ the trailing 63-day realized volatility of 3.82% and a slight negative skew\
      \ for tail risks."
    horizon_rationale: "Forecast for the 21-business-day (\u22481-month) cumulative\
      \ log-return of the S&P/TSX Composite, origin date 2026-05-25. Key assumptions\
      \ and drivers: (1) Bank of Canada policy: BoC holding overnight rate at 2.25%\
      \ in a data-dependent pause after 2025 rate cuts. Two-sided risk language signals\
      \ no imminent move in either direction. This is broadly neutral for equities.\
      \ (2) Canadian inflation: Headline CPI has risen to ~3.2% in May 2026 driven\
      \ primarily by gasoline/energy costs linked to Middle East conflict. Core inflation\
      \ remains contained (~2.1%), reducing the probability of a surprise tightening.\
      \ The energy-price driver provides a mixed signal: positive for TSX energy sector\
      \ earnings, but negative for consumer discretionary and rate-sensitive sectors.\
      \ (3) Labour market: Unemployment in the 6.5\u20137% range; soft conditions\
      \ create economic slack, reducing the chance of a BoC hike but also signalling\
      \ limited organic earnings growth. (4) Commodities (oil and gold): Elevated\
      \ oil prices due to geopolitical risk premium from Middle East (Strait of Hormuz\
      \ tensions). This is a tailwind for TSX energy producers (CNQ, SU, CVE). Gold\
      \ prices also elevated, supporting materials/miners. These sectors represent\
      \ ~35\u201340% of TSX market cap, providing a structural bid. (5) USD/CAD and\
      \ GoC yields: CAD somewhat supported by broad USD weakness but undermined by\
      \ the BoC-Fed rate differential. GoC 10yr yields tracking US Treasuries. Higher\
      \ GoC yields are a mild headwind for rate-sensitive names (REITs, utilities).\
      \ (6) US policy/trade spillovers: Fed holding at higher-for-longer stance; US\
      \ tariffs on Canadian metals and forestry continue to weigh on those sub-sectors.\
      \ CUSMA review uncertainty persists. (7) Recent TSX price dynamics: The index\
      \ bounced strongly from a -7% to -8% 21-day trough in March 2026 to +6\u2013\
      8% readings in April\u2013early May 2026. As of 2026-05-25, the most recent\
      \ 21-day return has settled back to ~+2.4% (0.0237 log-return), indicating the\
      \ rebound is maturing. The trailing 63-day standard deviation is 3.82%, indicating\
      \ moderately elevated realized volatility. (8) Distribution construction: Baseline\
      \ 21-day \u03C3 \u2248 3.8% from trailing realized vol. Applying a mild negative\
      \ skew reflecting asymmetric downside risks (geopolitical escalation, US recession\
      \ spillover, tariff shock) versus upside (Middle East de-escalation, commodity\
      \ price surge, BoC surprise cut). Point forecast (median) set at +1.2%, slightly\
      \ below the most recent reading of +2.4% as momentum from the April bounce normalizes.\
      \ The 5th\u201395th percentile range spans approximately \u22125.5% to +7.8%,\
      \ reflecting the elevated but not extreme volatility environment."
