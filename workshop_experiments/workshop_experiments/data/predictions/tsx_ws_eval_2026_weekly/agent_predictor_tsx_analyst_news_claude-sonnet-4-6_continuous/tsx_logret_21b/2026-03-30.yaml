    horizon_rationale: "As of 2026-03-30, the S&P/TSX Composite has just posted a\
      \ severe -7.26% cumulative 21-business-day log return \u2014 roughly a 2-sigma\
      \ drawdown relative to the trailing 63-day std of 3.47%. This deep trough creates\
      \ a mean-reversion anchor that tilts the next-period median modestly positive.\
      \ Key factors informing this forecast:\n\n1. BANK OF CANADA POLICY: BoC held\
      \ the overnight rate at 2.25% at its March 18 meeting, maintaining an accommodative\
      \ 'hold' stance. Rates have been on hold since an October 2025 cut, and the\
      \ policy rate is below the neutral range, providing mild support for equity\
      \ valuations. No near-term hikes expected.\n\n2. CANADIAN INFLATION & LABOUR:\
      \ CPI fell to 1.8% YoY in February 2026 \u2014 below the 2% target \u2014 reducing\
      \ hawkish pressure. However, the labour market is deteriorating sharply: February\
      \ LFS showed -84,000 jobs (following -25,000 in January) with unemployment at\
      \ 6.7%, signaling weak domestic demand and potential earnings headwinds for\
      \ consumer-facing sectors.\n\n3. COMMODITIES: Oil prices have been volatile\
      \ due to Middle East geopolitical tensions (US-Iran conflict), providing mixed\
      \ signals for the TSX energy sector \u2014 higher prices boost revenues but\
      \ also create inflationary headwinds. Gold has benefited from safe-haven demand,\
      \ supporting the materials sector. Net commodity impulse is modestly positive\
      \ but uncertain.\n\n4. USD/CAD & GoC YIELDS: The CAD traded around 1.37 per\
      \ USD in March, reflecting tariff-related weakness. A softer loonie helps commodity\
      \ exporters but raises import costs. GoC bond yields remain influenced by US\
      \ spillovers and fiscal uncertainty, with the yield curve somewhat flat.\n\n\
      5. US TARIFF SPILLOVERS: 25% US tariffs on Canadian autos, steel, aluminum,\
      \ and agricultural products remain a key structural headwind. This has weighed\
      \ heavily on the TSX throughout Q1 2026 and is the primary driver of the recent\
      \ sharp decline. Tariff uncertainty makes the downside tail fatter than usual.\n\
      \n6. SECTOR DYNAMICS: Canadian 'Big Six' banks face credit quality concerns\
      \ from tariff-exposed loans and weak consumer balance sheets. Energy is volatile\
      \ but tactically supported by oil price spikes. Gold miners are a relative bright\
      \ spot. The earnings outlook for Q1 2026 reports (released in April-May 2026)\
      \ introduces uncertainty.\n\n7. MEAN REVERSION vs. MOMENTUM: The -7.3% 21bd\
      \ return places the index in territory consistent with 2008 (partial), 2014-15,\
      \ and 2020 dip recoveries. Historical patterns show a tendency to partially\
      \ recover from such troughs within 21 business days, but tariff-driven structural\
      \ headwinds reduce the speed and magnitude of any bounce compared to typical\
      \ cycles.\n\n8. FORECAST DISTRIBUTION: Median (Q0.50) = +0.010, reflecting modest\
      \ mean reversion from oversold levels against a difficult macro backdrop. Trailing\
      \ vol elevated at ~3.5% (21bd std), nudged up to ~4.2% given current geopolitical\
      \ premium and tariff uncertainty. Slight negative skew applied: the left tail\
      \ is fatter than the right due to tariff escalation risk, further labour deterioration,\
      \ and potential energy price reversal. Q0.05 at -0.075 captures a scenario where\
      \ the TSX extends its decline to new lows; Q0.95 at +0.090 captures a scenario\
      \ of tariff relief or commodity-driven surge."
