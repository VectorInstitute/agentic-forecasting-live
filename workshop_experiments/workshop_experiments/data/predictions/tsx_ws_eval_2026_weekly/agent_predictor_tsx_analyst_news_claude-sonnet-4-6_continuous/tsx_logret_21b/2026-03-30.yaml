    rationale: "Overall forecast anchored by: (a) deep mean-reversion signal from\
      \ -7.26% 21bd drawdown at origin; (b) accommodative BoC at 2.25% with no hike\
      \ risk; (c) soft CPI (1.8%) but deteriorating labour (6.7% UE, -84K Feb jobs);\
      \ (d) commodity vol from Middle East tensions \u2014 mixed for energy, positive\
      \ for gold; (e) 25% US tariffs as the primary structural headwind creating negative\
      \ skew; (f) CAD at 1.37 providing export-sector cushion. Net: modest positive\
      \ median (+1%), elevated vol (~4.2%), negative skew reflecting asymmetric downside\
