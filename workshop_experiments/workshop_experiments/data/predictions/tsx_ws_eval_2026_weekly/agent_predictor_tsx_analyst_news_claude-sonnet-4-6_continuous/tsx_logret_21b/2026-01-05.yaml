    rationale: "Overall framework: The TSX at the start of 2026 is exiting a strong\
      \ recovery year with positive but decelerating momentum. The central scenario\
      \ (median +2.5% log return over 21 business days) reflects: a supportive-but-not-stimulative\
      \ BoC at 2.25%, gold prices near record highs supporting the materials sector,\
      \ Canadian banks in solid shape after outperforming earnings, and most of the\
      \ 2025 tariff shock already digested by markets. The primary risks to the downside\
      \ are a resurgence of US-Canada trade tensions, a sharper-than-expected slowdown\
      \ in Canadian domestic demand given rising unemployment, a correction in gold\
      \ prices reducing materials support, and oil price weakness pressuring energy.\
      \ The primary upside risks are a trade deal or tariff rollback, further gold\
      \ appreciation, a weaker USD boosting commodity prices, and stronger-than-expected\
      \ Canadian Q4 2025 GDP data. Volatility (\u03C3\u22480.035 over 21 bdays) is\
      \ consistent with the trailing 63-day realised daily vol of 0.0206 and is at\
      \ the lower end of the TSX's historical range, reflecting a relatively calm\
      \ post-rally environment."
    horizon_rationale: "Forecast as of 2026-01-05 for the 21-business-day (\u2248\
      1-month) cumulative log return of the S&P/TSX Composite. Key assumptions and\
      \ inputs: (1) Bank of Canada: Policy rate held at 2.25% following the 175bp\
      \ easing cycle of 2024-2025. The BoC is in a 'hold' mode for 2026; no further\
      \ cuts are the base case, with a small risk of hikes if core inflation re-accelerates.\
      \ This is broadly neutral-to-supportive for bank stocks and rate-sensitive sectors.\
      \ (2) Inflation/Labour: Canadian headline CPI near 1.9-2% (at target), but core\
      \ CPI measures remain elevated. Unemployment has drifted up to 6.5-7.1%, signalling\
      \ labour market cooling but not collapse. Mixed macro data creates two-sided\
      \ risk. (3) Commodities: Gold at or near record highs (strong safe-haven demand,\
      \ central bank buying, geopolitical hedging) \u2014 very supportive for TSX\
      \ materials/gold miners. Oil/energy sector is mixed: OPEC+ discipline provides\
      \ floor but global surplus fears and tepid China demand are headwinds. Base\
      \ metals under pressure from USD strength. Net commodity impulse is mildly positive\
      \ for the TSX given gold's index weight. (4) USD/CAD and GoC Yields: The loonie\
      \ has been under sustained pressure (USD/CAD ~1.40-1.44), reflecting the large\
      \ BoC-Fed policy divergence (~135bp 2yr spread at widest). A weaker CAD boosts\
      \ commodity revenues in CAD terms (positive for energy/miners) but raises import\
      \ costs and inflation risk. GoC 10yr yields have drifted higher on fiscal and\
      \ growth-data surprises. (5) US Spillovers: US tariffs on Canadian goods (imposed\
      \ Feb 2025) are largely priced in by year-end 2025, with some tariff-related\
      \ fears easing into late 2025 and contributing to the TSX's strong H2 2025 rally\
      \ (+20%+ from lows). Ongoing US policy uncertainty (trade, fiscal) remains a\
      \ background risk; the Fed's 'higher-for-longer' stance continues to create\
      \ cross-border spread widening. (6) Technical/Momentum: The most recent 21-bday\
      \ trailing log return was +0.037 (Jan 5, 2026), confirming positive near-term\
      \ momentum following a robust late-2025 rally. However, the series has been\
      \ decelerating from peak values of 0.06-0.07 in Sept-Oct 2025 toward 0.02-0.04\
      \ by year-end, suggesting momentum is fading. (7) Volatility Regime: The trailing\
      \ 63-day daily std is 0.0206, implying 21-bday vol of roughly 0.035 (0.0206\
      \ \xD7 sqrt(21/63) \xD7 sqrt(21) \u2248 0.0206 \xD7 sqrt(21) \u2248 0.094 per\
      \ year, consistent with ~15-20% annualised vol typical for the TSX). Median\
      \ set at +0.025 (roughly +2.5% log return over 1 month), reflecting a small\
      \ positive drift from positive momentum, supportive BoC stance, and gold tailwinds,\
      \ tempered by tariff residual risk, cooling labour market, energy uncertainty,\
      \ and a weakening loonie. Distribution is approximately normal with \u03C3\u2248\
      0.035, with slight left-tail fattening to account for commodity crash and geopolitical\
      \ downside risks. The 5th percentile at -0.038 captures a meaningful correction\
      \ scenario (e.g., oil price collapse or trade shock), while the 95th percentile\
      \ at +0.086 captures a commodity surge or risk-on rally."
