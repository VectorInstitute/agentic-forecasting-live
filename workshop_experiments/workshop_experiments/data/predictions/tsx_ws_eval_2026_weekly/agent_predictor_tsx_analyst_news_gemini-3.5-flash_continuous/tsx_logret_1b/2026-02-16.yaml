    horizon_rationale: 'For Tuesday, February 17, 2026 (the next business day after
      the February 16 Family Day holiday), we forecast the S&P/TSX Composite''s 1-day
      cumulative log return. Our forecast incorporates several key macroeconomic and
      market factors:

      1. **Bank of Canada Policy Path**: The BoC maintained its overnight rate at
      2.25% on January 28, 2026, signaling a cautious, data-dependent approach.

      2. **Inflation and Jobs**: The January jobs report showed a soft labor market
      (loss of 25k jobs, with unemployment at 6.5% due to labor force contraction).
      Importantly, Canada''s January CPI is scheduled for release on Tuesday morning,
      February 17, 2026, with consensus expecting a ''sticky'' 2.4% y/y headline rate.
      This high-impact catalyst landing right at the market open warrants elevated
      uncertainty.

      3. **Commodity Prices**: Crude oil prices are elevated due to geopolitical risk
      premium (Middle East tensions), and gold continues to act as a hedge, providing
      strong support for the TSX energy and materials sectors.

      4. **Canadian Dollar and GoC Yields**: USD/CAD trades near 1.37-1.38, and GoC
      bond yields are trending lower amid safe-haven flows and soft job data.

      5. **US Spillovers**: Markets are closed on February 16 for both Canadian Family
      Day and US Presidents'' Day, meaning Tuesday''s session must absorb both a long
      weekend''s news flow and the Tuesday morning CPI release.

      6. **Volatility Dynamics**: Daily volatility has clustered intensely, with multiple
      recent daily moves exceeding 1% or 2% (including a +1.86% gain on Friday, Feb
      13). We model this using a standard deviation of 1.10% (higher than the trailing
      63-day standard deviation of 0.897% but below the short-term 10-day volatility
      of 1.65%) to reflect the CPI announcement and holiday-weekend resolution.'
