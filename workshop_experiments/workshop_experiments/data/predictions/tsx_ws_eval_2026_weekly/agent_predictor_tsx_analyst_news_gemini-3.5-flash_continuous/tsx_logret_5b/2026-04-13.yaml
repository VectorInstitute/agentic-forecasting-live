      stabilization with a modest 14k jobs added, keeping the unemployment rate at
      6.7%.

      3. **Commodity Prices**: Geopolitical tensions in the Middle East have driven
      oil and gold prices higher, providing a significant structural cushion for the
      TSX''s heavily weighted energy and materials sectors.

      4. **Yields and Currency**: Rising energy costs have put upward pressure on
      Government of Canada bond yields, as investors price in higher-for-longer central
      bank rates, which keeps equity upside somewhat capped.

      5. **US Spillovers**: Lingering trade/tariff uncertainties with the US continue
      to cloud Canada''s growth path, although resilient US corporate earnings help
      steady global risk appetite.


