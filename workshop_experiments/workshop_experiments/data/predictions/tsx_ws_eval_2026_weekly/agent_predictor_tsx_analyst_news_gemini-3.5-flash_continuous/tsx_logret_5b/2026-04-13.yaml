    horizon_rationale: 'As of April 13, 2026, our 5-day cumulative log-return forecast
      for the S&P/TSX Composite Index is grounded in several key macro factors:

      1. **Bank of Canada Policy Path**: The BoC held its overnight rate at 2.25%
