    rationale: Analytical forecast for the S&P/TSX Composite 5-business-day cumulative
      log return as of February 9, 2026. Models the return distribution using a Student-t
      distribution to account for fat tails and the heightened uncertainty surrounding
      US trade policies, CUSMA renegotiations, and cooling global commodity prices,
      while factoring in the supportive domestic monetary pause and solid financial
      sector earnings.
    horizon_rationale: We forecast the 5-business-day cumulative log return starting
      from February 9, 2026. The Bank of Canada held its benchmark rate steady at
      2.25% on January 28, 2026, signaling a data-dependent pause. January CPI decelerated
      slightly to 2.3%, and core inflation metrics continue to edge lower. The jobs
      report for January showed a soft labor market, shedding 25,000 jobs, while the
      unemployment rate fell to 6.5% on lower labor participation. The TSX has rebounded
      (+2.57% over the last 5 days) due to a rotation into resilient financials and
      defensive value sectors, offsetting weaker performance in energy and mining
      sectors as oil and gold prices cooled. Due to trade-policy uncertainty (such
      as proposed US tariffs and the CUSMA review) and high local volatility, we model
      returns using a Student-t distribution (df=5) with a slight positive drift (+0.12%)
      and an elevated effective volatility of 1.94% (scale parameter of 1.50%).
