    horizon_rationale: 'The S&P/TSX Composite index enters late January 2026 with
      positive short-term momentum but is constrained by structural domestic and external
      risks. Key assumptions guiding this forecast include:

      1. **Bank of Canada Path**: The BoC is on hold at 2.25%, maintaining a neutral
      data-dependent stance after cutting rates through 2025. This rate stability
      supports domestic equity valuations.

      2. **Inflation and Jobs**: Dec CPI came in at 2.4% due to base effects, while
      the labour market shows excess supply and softening wage growth with the unemployment
      rate at 6.8%. This limits consumer-driven domestic growth.

      3. **Commodity Prices**: Crude oil and gold have provided a significant cushion.
      Strong performance in gold due to safe-haven flows and stable energy prices
      support materials and energy sectors.

      4. **Canadian Dollar and GoC Yields**: The loonie remains sensitive to the US-Canada
      rate differential, while 10-year yields have stabilized. A weaker loonie benefits
      Canadian commodity exporters.

      5. **US Policy Spillovers**: Tariff uncertainties and protectionist trade rhetoric
      from the US continue to cast a shadow on business investment and trade outlook
      (CUSMA review), introducing caution.

      6. **Volatility Dynamics**: The trailing 63-day standard deviation is relatively
      low at 1.42%. Over the 5-business-day horizon, we model a slightly expanded
      volatility band (around 1.5%) using a Student''s t-distribution with 5 degrees
      of freedom to capture downside risks from potential geopolitical and trade headlines.'
