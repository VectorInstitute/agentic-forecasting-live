    horizon_rationale: 'The S&P/TSX Composite has declined approximately 3% over the
      last 5 business days (last log return of -0.0307) amid heightened geopolitical
      and trade policy uncertainty. Under typical market conditions, a decline of
      this magnitude triggers a mean-reverting bounce. However, the current macro
      backdrop is mixed: (1) Bank of Canada policy: The BoC maintained its overnight
      rate at 2.25% on March 18, taking a cautious wait-and-see stance. (2) Domestic
      economy: A very soft February LFS jobs report (-84,000 jobs, 6.7% unemployment)
      indicates domestic weakness, although February CPI was contained at 1.8% YoY.
      (3) Commodities: The Middle East conflict and Strait of Hormuz tensions have
      pushed Brent crude above $100/bbl, which supports the TSX''s heavy energy and
      materials sectors. (4) US trade spillovers: The Trump administration''s introduction
      of a new 10% global tariff framework acts as a major headwind for Canadian export-oriented
      stocks. Given these offsetting factors, we model a positive but muted mean-reverting
      median 5b return of +0.2% with a fat-tailed, slightly negatively skewed distribution
      (modeled using historical 63-day standard deviation of ~2.06% and a t-distribution
      scale) to account for potential downside geopolitical/tariff risks.'
