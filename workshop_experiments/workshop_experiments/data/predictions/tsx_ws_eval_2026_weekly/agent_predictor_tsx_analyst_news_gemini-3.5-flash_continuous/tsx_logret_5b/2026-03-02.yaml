    horizon_rationale: Forecast for the 5-day cumulative log return starting March
      2, 2026. The Bank of Canada maintains its policy rate steady at 2.25% in a wait-and-see
      stance amid weak domestic growth and a cooling labour market (unemployment rising
      to 6.7% with 84,000 jobs lost in February). While the major geopolitical shock
      of US-Israel military strikes on Iran on February 28 has driven a dramatic spike
      in crude oil (to $71.23) and gold ($5,311.60), initially boosting the commodity-heavy
      TSX, the broader equity environment faces significant headwinds. These include
      the 10% US baseline tariff on imports effective February 24, potential renewed
      inflationary pressures from the Middle East conflict, and risk-off spillovers
      from US markets (S&P 500 down in late February). Our point forecast is slightly
      positive (0.05%), with a volatility assumption of 1.65% (adjusted upward from
      the trailing 63-day standard of 1.55%) and a slight negative skew to reflect
      asymmetric tail risks from trade policies and global inflation shocks.
