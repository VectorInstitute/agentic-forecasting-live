    horizon_rationale: At the forecast origin of February 16, 2026, the S&P/TSX Composite
      Index is navigating a macro environment of heightened global volatility against
      supportive domestic commodity dynamics. The Bank of Canada maintained its policy
      interest rate at 2.25% in late January, adopting a data-dependent wait-and-see
      stance. Domestic CPI slowed to 2.3% YoY in January, with core measures edging
      closer to the 2.0% target, while the jobs market showed signs of cooling with
      a loss of 25k jobs. Although the resource-heavy TSX has touched record highs
      in February on a recovery in gold and crude oil prices, US spillovers present
      near-term headwinds. Specifically, a sticky US core CPI print of 2.7% sparked
      a massive +18% surge in the VIX index to 20.82 on February 13, raising expectations
      of higher-for-longer US interest rates and increasing equity risk premiums.
      Given this backdrop, while the trailing 63-day standard deviation of the 21-day
      log return has been exceptionally low at 1.86%, forward-looking volatility is
      projected to be much higher, around 3.8% to 4.2%. We establish a slightly positive
      point forecast of +0.2% (0.002) over the next 21 business days, reflecting supportive
      domestic monetary conditions and commodity tails, while applying a negatively-skewed
      t-distribution to capture the pronounced downside risks from US monetary spillovers,
      CUSMA trade/tariff uncertainties, and global macroeconomic headwinds.
