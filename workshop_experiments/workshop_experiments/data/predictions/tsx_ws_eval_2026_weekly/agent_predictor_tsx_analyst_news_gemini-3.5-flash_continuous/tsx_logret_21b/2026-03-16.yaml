    horizon_rationale: 'Forecast for the 21-day cumulative log return of the S&P/TSX
      Composite from March 16, 2026. The point forecast (0.50 quantile) is set to
      a mild +0.5% (+0.005) reflecting short-term stabilization and potential mean-reversion
      after the index''s sharp 9.3% drop from its record close of 34,541.27 on March
      2 to 31,317.41 on March 16. However, the distribution is set wide and with a
      pronounced negative skew (ranging from -13.5% at the 0.05 quantile to +12.5%
      at the 0.95 quantile) because of the trailing 63-day daily volatility of 1.923%
      (approx 30.5% annualized) and several major headwinds. Key drivers include:
      1) Bank of Canada policy rate held at 2.25% since Dec 2025 in a ''wait-and-see''
      stance; 2) weak Canadian employment data (-100k jobs in Jan-Feb, 6.7% unemployment
      rate) representing stagnant growth/recession; 3) elevated oil prices (Brent
      over $105/bbl) boosting the TSX energy sector but fueling inflationary pressures;
      4) trade and tariff friction with the US (CUSMA review, 25% tariffs on Canadian
      exports) weighing on business investment and the CAD; and 5) rising GoC bond
      yields tracking US Treasuries.'
