    horizon_rationale: 'Our 21-business-day forecast for the S&P/TSX Composite cumulative
      log return balances strong resource-sector tailwinds against a soft domestic
      economy and international trade risks as of late May 2026.


      1. **Bank of Canada Path**: The BoC is holding its overnight rate steady at
      2.25%. While a Q1 2026 technical recession supports an accommodative stance,
      energy-driven headline CPI inflation (2.8% in April) limits aggressive near-term
      cuts.

      2. **Jobs and Inflation**: Labour market softness is evident as unemployment
      rises to 6.9%. Domestic growth is sluggish, but core inflation remains relatively
      contained.

      3. **Commodities**: Geopolitical tensions in the Middle East (including disruptions
      near the Strait of Hormuz) keep oil and gold prices elevated. This provides
      a strong support buffer for the TSX''s heavily weighted energy and materials/mining
      sectors.

      4. **Loonie & Yields**: The accommodative BoC policy relative to the US Fed
      keeps the Canadian Dollar under pressure. A weaker Loonie boosts the earnings
      of export-oriented resource firms on the TSX whose revenues are USD-denominated.

      5. **US Trade Spillovers**: Tariff uncertainties and US trade policy spillovers
      remain key downside risks that heighten equity market volatility.

      6. **Forecast Calibration**: The recent 21-day log return of 2.37% reflects
      stabilization after a correction from April''s +8% peak. We model the next 21
      business days with a mild positive median return of +0.3% (0.003) and elevated
      forward volatility (estimated standard deviation of 4.16%, up from the trailing
      63-day standard deviation of 3.82%). We employ a Student''s t-distribution (df=6)
      to capture fat tails caused by heightened geopolitical and trade spillover risks.'
