      4. **US Spillovers & Tariffs**: Tariff risks under the Trump administration
      remain volatile, although a Supreme Court decision limiting emergency tariff
      power has alleviated some immediate pressure.

      5. **Sector Earnings & Historical Dynamics**: TSX financials remain relatively
      resilient (e.g., Scotiabank''s strong Q1 earnings). Historically, after a 21-day
