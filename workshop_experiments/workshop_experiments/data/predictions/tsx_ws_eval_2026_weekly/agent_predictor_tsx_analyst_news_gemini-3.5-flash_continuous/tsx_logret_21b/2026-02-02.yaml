      defensive and financial sectors.


      2. **US Trade Spillovers**: Ongoing US tariffs and policy uncertainty under
      the US administration act as a strong structural headwind for Canadian export
      and manufacturing sectors, putting a soft ceiling on TSX corporate earnings.


      3. **Commodity and Sector Shifts**: January 2026 ended with high volatility
      as precious metals corrected sharply (gold sliding over 10% from record highs),
      leading to a massive drag on materials and mining. While financials and defensive
      consumer stocks are leading a rebound (evidenced by the 0.82% rise on Feb 2
      following a 3.31% drop on Jan 30), energy and mining remain sensitive to global
      demand dynamics.


      4. **Volatility Dynamics**: The index experienced a significant 3.31% single-day
      drop on January 30, which has sharply elevated local volatility. The distribution
