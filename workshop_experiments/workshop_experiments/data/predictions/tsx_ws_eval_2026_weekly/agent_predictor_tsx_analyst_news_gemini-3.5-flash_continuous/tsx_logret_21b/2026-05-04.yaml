    horizon_rationale: For the 21-day forecasting horizon, the S&P/TSX Composite is
      expected to navigate a mixed environment. On the bullish side, strong commodity
      prices (oil, gold) bolstered by Middle East geopolitical risks provide direct
      earnings support to the heavyweight energy and materials sectors. On the bearish
      side, domestic economic performance is soft, with a technical recession in Q1
      2026, a soft labour market (unemployment 6.5%-7.0%), and significant US trade
      tariff uncertainty (25% on auto, steel, aluminum). The BoC's decision to hold
      the overnight rate at 2.25% on April 29, 2026, balances inflation concerns (CPI
      rose to 2.4% in March) against economic slack. The 21-day log return has decelerated
      from +8% in mid-April to +1.59% as of May 4. We model the 21-day return distribution
      around a median expectation of +0.3%, with a standard deviation of ~4.2% (reflecting
      trailing 63-day std of 3.81% plus tariff-related tail-risk premium), applying
      a slight negative skew to reflect downside tariff spillovers.
