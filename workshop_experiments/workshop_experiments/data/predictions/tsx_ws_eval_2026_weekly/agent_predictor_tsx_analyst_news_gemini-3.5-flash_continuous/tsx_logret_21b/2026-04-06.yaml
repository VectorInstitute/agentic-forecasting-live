    horizon_rationale: 'For the 21-business-day horizon starting April 6, 2026, the
      S&P/TSX Composite Index is projected to have a slightly positive drift of +0.60%
      (point forecast 0.006), recovering further from the late March pullback. Key
      drivers of this forecast include:

      1. Bank of Canada Policy: The BoC maintained the overnight policy rate at 2.25%
      in its March 18, 2026 announcement, opting for a wait-and-see approach amid
      heightened global uncertainty.

      2. Canadian Inflation & Jobs: March CPI inflation ticked up to 2.4% (from 1.8%
      in February) driven by volatile energy costs. The unemployment rate remains
      stable at 6.7%.

      3. Commodity Drivers: Crude oil (May contract) is highly elevated at $112.41
      per barrel due to the US-Iran conflict and Strait of Hormuz supply disruptions.
      This provides a robust tailwind for TSX Energy sector earnings but acts as an
      inflation tax on other sectors.

      4. US Spillovers & Yields: Higher US Treasury yields and rising inflation expectations
      exert upward pressure on Government of Canada yields, limiting valuation expansions
      in rate-sensitive sectors like technology and real estate.

      5. Historical return dynamics: The 21-day log return rebounded from -0.08 on
      March 27 to -0.0128 on April 6. We model this environment using a slightly elevated
      conditional volatility of ~3.8% and a negatively skewed distribution to account
      for fat-tailed downside geopolitical risks.'
