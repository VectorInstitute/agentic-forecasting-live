    rationale: Calibrated forecast of S&P/TSX Composite log returns over a 21-business-day
      horizon as of March 2, 2026. The forecast balances positive momentum from strong
      commodity prices (oil, gold) and solid bank earnings against a very weak domestic
      labour market (84k jobs lost in February) and ongoing tariff policy uncertainty.
    horizon_rationale: 'Over the next 21 business days (ending early April 2026),
      the S&P/TSX Composite Index is projected to consolidate after a powerful ~7.7%
      surge in February 2026. Key drivers of our outlook include:

      1. **Monetary Policy**: The Bank of Canada held its overnight rate at 2.25%
      in early 2026. The next meeting is scheduled for March 18, 2026, where the BoC
      is expected to maintain a cautious ''wait-and-see'' approach given trade frictions.

      2. **Labour Market Softness**: Domestic jobs data for February showed a severe
      loss of 84,000 jobs, pushing the unemployment rate up to 6.7% and indicating
      underlying domestic economic weakness.

      3. **Commodity Support**: Geopolitical risks, particularly involving Iran, have
      reintroduced a risk premium to crude markets, with WTI prices climbing to around
      $64.51/barrel. Gold also has safe-haven strength, boosting the TSX Energy and
      Materials sectors.

      4. **Trade Policies**: Following a Supreme Court ruling striking down certain
      emergency tariffs, the US implemented a 10% global tariff that largely exempted
      CUSMA-compliant goods, providing relief to Canadian exporters.

      5. **Sector Earnings**: Financials are anchored by positive Q1 bank earnings
      (such as BMO and National Bank) that beat analyst expectations.

      We project a modest point forecast of +0.50% (0.005) with volatility calibrated
      using a fatter-tailed Student''s t-distribution with a 4.3% standard deviation
      to reflect both positive commodity spillovers and domestic macro/trade headwinds.'
