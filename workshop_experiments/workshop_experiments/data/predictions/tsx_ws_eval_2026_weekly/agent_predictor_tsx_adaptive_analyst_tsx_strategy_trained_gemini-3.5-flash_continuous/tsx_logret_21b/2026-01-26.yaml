    rationale: The S&P/TSX Composite 21-day forward cumulative log-return is projected
      using a hybrid of quantitative volatility-regime modeling and news-grounded
      macro risk assessment. As of January 26, 2026, the TSX is in a LOW volatility
      regime (8.55% annualised), which typically undergoes volatility mean-reversion.
      A significant physical Gold weekly surge (+10.17%) triggers a commodity shock
      condition. Consequently, standard-normal prediction intervals are widened by
      29% to ensure target coverage. The lower 5% and 10% tail quantiles are further
      shifted downward by 10% to protect against the historically verified downside
      tail asymmetry characteristic of the low-volatility regime. Given the conflicting
      forces of a negative US tariff threat and record-high gold price tailwinds,
      the martingale prior (median point forecast = 0.0) is retained.
    horizon_rationale: Base model is constructed using the 21-day trailing standard
      deviation of daily log returns (sigma_daily = 0.005389, or 8.55% annualized),
      which is scaled to the 21-day business horizon by multiplying by sqrt(21). Because
      the annualised realized volatility is below 10%, the market is classified in
      the LOW volatility regime. Additionally, physical Gold has surged by 10.17%
      over the last 5 business days, triggering a trailing 5-day commodity shock (Gold
      weekly return >= +3.5%). According to the active calibration corrections in
      the tsx-strategy, the joint occurrence of a LOW volatility regime and a commodity
      shock requires widening the prediction intervals by 29% across all horizons
      to protect against rapid shock propagation. Furthermore, the active calibration
      rules state that under LOW and ELEVATED regimes at the 21bd horizon, the S&P/TSX
      Composite exhibits structural downside tail skewness; we therefore apply a 10%
      downward shift to the lower 5% and 10% quantiles. The point forecast (median)
      is kept at 0.0 under the martingale prior, supported by the balance between
      a negative US tariff threat (Trump's 100% tariff warning) and the positive bullion
      surge.
