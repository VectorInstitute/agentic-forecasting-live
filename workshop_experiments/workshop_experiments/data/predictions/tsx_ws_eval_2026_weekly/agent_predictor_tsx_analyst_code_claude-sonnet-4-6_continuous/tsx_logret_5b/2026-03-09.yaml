    horizon_rationale: "Forecast for the 5-business-day horizon ending ~2026-03-16,\
      \ anchored on the following analysis:\n\n1. STARTING CONDITIONS: The as_of return\
      \ was -3.99% (approx -4%), the single-worst 5-day reading in the recent data\
      \ outside of COVID/GFC events. The last five consecutive 5-day periods were\
      \ all negative (-1%, -1%, -3%, -4%, -4%), producing a strongly bearish momentum\
      \ signal. Trailing 63-day std = 1.76% (5-day basis), slightly above the long-run\
      \ average, indicating an elevated-volatility regime.\n\n2. BANK OF CANADA POLICY:\
      \ BoC held at 2.25% (cut in Oct 2025, now on hold). Policy path is uncertain\
      \ due to dual pressures \u2014 Iran-US conflict driving energy inflation vs.\
      \ soft labour market (unemployment 6.5-7%) and US tariff headwinds. No imminent\
      \ catalyst for a BoC-driven rally.\n\n3. GEOPOLITICAL/TRADE: Iran-US conflict\
      \ elevated oil prices and volatility. US 10% global tariff (Feb 24, 2026) with\
      \ CUSMA exemptions but residual sector duties (steel, aluminum, lumber, autos)\
      \ weigh on Canadian business confidence. TSX fell ~2% on March 3 and ~4% the\
      \ last week.\n\n4. COMMODITIES: Gold retreated from ~$5,124/oz highs (April\
      \ futures -$188 on March 3). Oil volatile but TSX energy sector partially insulated\
      \ as Canada is a net exporter. Materials sector under pressure from gold pullback.\n\
      \n5. CANADIAN BANKS: Strong Q1 2026 earnings (+10% YoY aggregate adjusted net\
      \ income, RBC record $5.8B). This provides a partial floor for the TSX's large\
      \ financial-sector weight (~33%).\n\n6. QUANTITATIVE ANALYSIS: Empirically,\
      \ conditional on prior 5-day return \u2264 -4%, the next-period mean is approximately\
      \ -1.5% (n=34 obs), with significant right-skew from some bounce-back episodes\
      \ and fat left tails from crisis continuation. The distribution is best modeled\
      \ with a t-distribution (df\u22484.5) given the leptokurtosis observed. A blended\
      \ model (60% Gaussian mixture: 70% bearish regime mu=-0.8%/sigma=2%, 30% recovery\
      \ regime mu=+0.5%/sigma=1.5%; 40% t-dist with mu=-0.5%, scale=1.76%) yields\
      \ the forecast quantiles above.\n\n7. MEDIAN/POINT FORECAST: -0.40% (slight\
      \ further weakness, reflecting dominant bearish momentum partially offset by\
      \ oversold mean-reversion tendency and strong bank earnings support). The distribution\
      \ is left-skewed given geopolitical and trade tail risks. The 5th percentile\
      \ at -3.9% captures extreme continuation-of-selloff risk."
