      \ empirical evidence from recent weekly TSX returns. The TSX is in a positive\
      \ momentum regime as of early March 2026, supported by BoC accommodation, strong\
      \ commodity prices (oil, gold), and resilient Canadian bank earnings. The primary\
      \ downside risks are US tariff escalation (which could hit Canadian industrials\
      \ and autos), a commodity price reversal, and CAD depreciation from US monetary\
      \ policy divergence. The median forecast of +0.50% reflects a modest positive\
      \ drift \u2014 above the unconditional long-run weekly mean (~0.20%) but well\
      \ below the recent 5-week average (+2.4%), reflecting mean-reversion. The distribution\
      \ is slightly right-skewed via the positive drift, with fat tails to capture\
      \ the elevated uncertainty from trade and geopolitical risks."
