      \ std=1.95%, heavy negative skew (-1.68) and excess kurtosis (~10.5). Recent\
      \ 3-year (2023\u20132026) weekly data shows mean=+0.25%, std=1.51%. Trailing\
      \ 63-day rolling std (given)=2.03%, which is elevated vs the recent 3-year std\
