      \ last 4 weekly returns averaged +1.5% (strong positive momentum), with the\
      \ most recent week a very strong +2.6%. (2) MEAN-REVERSION vs MOMENTUM \u2014\
      \ After a +2.6% week and a 4-week run of positive returns, partial mean-reversion\
      \ is expected, but the positive macro backdrop prevents outright reversal. Forecast\
      \ mu set at +0.25% per week, slightly above the long-run mean but below recent\
      \ momentum. (3) BANK OF CANADA \u2014 BoC has maintained the overnight rate\
      \ at 2.25% through spring 2026. A neutral-to-mildly-accommodative stance with\
      \ a 'hold' posture supports equity valuations; the rate cycle appears stable.\
      \ (4) COMMODITY PRICES \u2014 Elevated crude oil prices (Middle East supply\
