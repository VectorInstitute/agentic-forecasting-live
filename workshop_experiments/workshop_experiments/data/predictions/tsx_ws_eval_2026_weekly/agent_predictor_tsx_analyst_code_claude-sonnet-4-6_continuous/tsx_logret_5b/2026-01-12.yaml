    rationale: 'Overall approach: Blended a t(df=8) parametric distribution (capturing
      fat tails consistent with TSX historical kurtosis ~2.0) with the empirical quantiles
      from the recent return history. The key tension is between the very strong recent
      momentum (last 5 weekly periods all +1-2%) and the risk of mean-reversion at
      all-time highs. I set mu=0.007 (slightly positive, below recent ~1% weekly mean)
      and sigma=0.018 (low-vol regime, above the very recent ~1.3% but below the full
      daily-scaling implied ~3.2%). The Bank of Canada neutral stance, CPI near target,
      gold/energy support, and no imminent macro catalyst in the 5-day window all
      support a mild positive median return. The 5th percentile of -2.2% and 95th
      of +3.6% reflect the asymmetric distribution (negative skew) and current low-vol
      environment.'
    horizon_rationale: "Forecast for the 5-business-day (1-week) cumulative log return\
      \ on the S&P/TSX Composite from 2026-01-12. Distribution: Student-t with df=8\
      \ (moderate fat tails), mu=0.007, sigma=0.018. Key assumptions and reasoning:\
      \ (1) MOMENTUM/REGIME \u2014 The TSX entered January 2026 at record highs, supported\
      \ by five consecutive positive weekly returns (+1 to +2% per week) through late\
      \ 2025 and early January. The last_log_return on 2026-01-12 itself was +2.0%,\
      \ confirming strong near-term momentum. The trailing 63-day realised daily std\
      \ is 0.0145 (~23% annualised), but the recent weekly series shows even lower\
      \ realised vol (~1.3% per 5-day period), consistent with a calm, trending-up\
      \ regime. Sigma is set at 0.018 \u2014 between the very-recent realised (0.013)\
      \ and the daily-scaling implied (0.032) \u2014 to blend low-vol regime persistence\
      \ with realistic short-horizon uncertainty. (2) BANK OF CANADA \u2014 BoC held\
      \ the overnight rate at 2.25% as of December 2025 (following ~100bps of cuts\
      \ in 2025) and is in a data-dependent 'wait-and-see' stance ahead of the January\
      \ 28 decision (outside this 5-day window). The neutral policy stance is mildly\
      \ supportive for equities. (3) MACRO DATA \u2014 December 2025 CPI at 2.4% YoY\
      \ (slightly above target due to base effects), unemployment at 6.8% (soft labour\
      \ market). Both data points are consistent with the BoC staying on hold, providing\
      \ a broadly stable backdrop. (4) COMMODITIES \u2014 Gold prices entered 2026\
      \ with strong structural support, benefiting the TSX materials sector. Energy\
      \ prices remain supported by geopolitical tensions and OPEC+ discipline. Both\
      \ are constructive for the resource-heavy TSX. (5) CAD/MACRO \u2014 USD/CAD\
      \ near 1.38, reflecting mild CAD weakness from BoC-Fed policy divergence, but\
      \ the exchange rate is broadly stable. GoC 10-year yields navigating a range\
      \ consistent with BoC's neutral stance. (6) US SPILLOVERS \u2014 US tariff uncertainties\
      \ persist from 2025 but markets have adjusted. The TSX has diverged constructively\
      \ from US tech-heavy indices given its commodity/financial tilt. No near-term\
      \ tariff escalation expected in the 5-day window. (7) DISTRIBUTION SHAPE \u2014\
      \ Using t(df=8) to reflect slight negative skew (empirical full-history skew\
      \ = -0.74) and excess kurtosis; the left tail is wider than normal but not extreme,\
      \ consistent with the current low-vol regime. The positive mu of 0.007 reflects\
      \ the favourable momentum, constructive fundamentals, and slightly positive\
      \ drift of the TSX over this horizon, partially mean-reverting from the very\
      \ recent +0.02/week run."
