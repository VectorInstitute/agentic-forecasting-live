    rationale: "Overall forecast philosophy: The S&P/TSX Composite enters the 21-business-day\
      \ window following an exceptionally strong February (+7.7%) and a +3.67% last-21d\
      \ cumulative log return. The macro environment is bifurcated: commodity tailwinds\
      \ (oil from Middle East tensions, gold safe-haven demand) and a steady BoC at\
      \ 2.25% argue for continued moderate positive drift, while the US tariff regime\
      \ (25% on key Canadian exports) and a soft domestic labour market (6.5\u2013\
      7% unemployment) introduce meaningful downside risk. The distribution is calibrated\
      \ to reflect: a mild positive central tendency (~+1.4% median over 21 days),\
      \ a moderately fat left tail (Q0.05 at -6.5% to capture tariff-shock or oil-reversal\
      \ scenarios), and a compressed right tail relative to a pure normal (upside\
      \ capped by trade uncertainty and post-rally consolidation). The current low-volatility\
      \ regime (daily std 0.0171) is acknowledged but not fully trusted given structural\
      \ tariff uncertainty, so historical and parametric components with higher vol\
      \ are included in the blend."
    horizon_rationale: "Forecast as of 2026-03-09 for the 21-business-day horizon.\
      \ Key inputs and assumptions: (1) Bank of Canada policy: rate on hold at 2.25%\
      \ since Oct 2025 \u2013 neutral/slightly accommodative, no near-term rate catalyst\
      \ expected. (2) Momentum: last 21d TSX log-return was +3.67% and February 2026\
      \ saw a +7.7% TSX rally ('HALO' sector rotation into Energy/Materials/Utilities).\
      \ This strong prior-period return introduces modest mean-reversion risk. (3)\
      \ Commodity support: oil elevated due to Middle East tensions (positive for\
      \ TSX energy sector ~20% weight); gold in safe-haven demand (positive for TSX\
      \ materials); base metals supported by green-energy demand. Net commodity backdrop\
      \ is positive for the resource-heavy index. (4) Trade headwinds: US 25% tariffs\
      \ on Canadian goods (steel, aluminum, autos, agriculture) remain a persistent\
      \ uncertainty, weighing on business confidence and capping upside; this is the\
      \ primary left-tail risk. (5) CAD/FX: USD/CAD ~1.3587 (mildly weak CAD, supportive\
      \ for exporters); GoC 10yr yield at 3.47% \u2013 moderate, not impeding equity\
      \ valuations. (6) Labour market: unemployment 6.5\u20137%, soft but stabilizing;\
      \ core CPI near 2% target, giving BoC flexibility. (7) Volatility regime: trailing\
      \ 63d daily std = 0.0171 (relatively calm), but structural uncertainty from\
      \ trade conflict implies fat left tail. Distribution constructed as a blend\
      \ of: 35% full empirical historical 21d quantiles (mean ~+0.38%), 35% post-2020\
      \ empirical quantiles (mean ~+0.86%), and 30% t-distribution (df=5, mu=1.0%,\
      \ scale=4.25%) to capture fat tails. A +0.6% positive bias was applied to the\
      \ empirical anchor to reflect the commodity/BoC support offset against tariff\
      \ headwinds, and an extra 50bps left-tail stretch at Q0.05 was added for tariff\
      \ escalation risk. Resulting median of +1.42% reflects modest positive expected\
      \ return consistent with a supportive commodity/monetary backdrop tempered by\
      \ trade uncertainty and post-rally consolidation risk."
