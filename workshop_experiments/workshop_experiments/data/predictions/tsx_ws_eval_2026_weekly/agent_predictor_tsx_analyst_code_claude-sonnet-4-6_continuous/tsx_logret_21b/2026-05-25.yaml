      recovery rally fading into late May. We set the median 21-bd log-return at +0.5%,
      slightly above zero reflecting the commodity tailwind, with distribution spread
      anchored to the trailing 63-day vol of 3.82% and fat tails widened to reflect
      geopolitical/trade tail risks.'
