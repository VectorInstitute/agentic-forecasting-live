    rationale: "Overall approach: anchored on the empirical forward-return distribution\
      \ from the target history CSV (weekly 21-day cumulative log returns since 2000),\
      \ with the distribution re-centred and re-scaled to the current regime. Current\
      \ regime characteristics: (a) TSX at record highs in Jan 2026, positive 21-day\
      \ trailing return of +0.032; (b) trailing 63d daily vol = 0.02105 (annualised\
      \ ~13.3%); (c) BoC on hold at 2.25%, commodities (gold/oil) supportive, but\
      \ US tariff and CUSMA review risks create a persistent left tail. The quantile\
      \ fan uses an effective 21-day std of ~0.030, centred at +0.015, with mild left\
      \ skew (5th pct at \u20130.048, 95th at +0.074), reflecting asymmetric downside\
      \ from trade policy shocks vs. limited upside surprise potential given stretched\
      \ valuations."
    horizon_rationale: "21-business-day (\u22481 calendar month) cumulative log-return\
      \ forecast as of 2026-01-26. Key inputs and assumptions: (1) Bank of Canada\
      \ policy: BoC widely expected to hold at 2.25% at its Jan 28 meeting and to\
      \ remain on hold through most of 2026 \u2014 a neutral-to-mildly-supportive\
      \ backdrop for equities. (2) Inflation and labour: CPI near 2% target (supportive),\
      \ but January jobs data showed a net loss of ~25K positions (unemployment rate\
      \ fell to 6.5% as participation dropped) \u2014 a mixed signal that mildly weights\
      \ the distribution leftward. (3) Commodities: Gold at record highs and oil prices\
      \ elevated/volatile \u2014 positive tailwind for the TSX's large energy and\
      \ materials sector weights; this lifts the median slightly above zero. (4) USD/CAD\
      \ and GoC yields: CAD under modest pressure (USD/CAD ~1.369), reflecting US\
      \ tariff threat rhetoric; GoC 10-year yields stable in a narrow band. The weaker\
      \ loonie is a mild positive for TSX exporters but signals risk aversion. (5)\
      \ US policy spillovers: Fed holding at 3.5\u20133.75%, data-dependent. US tariff\
      \ uncertainty (including threats of 100% tariffs on Canada-China trade routes\
      \ and CUSMA review uncertainty ahead of July 2026) represents the primary left-tail\
      \ risk and justifies asymmetric skew. (6) TSX was at record highs entering the\
      \ forecast window, but analysts note valuations are stretched and earnings must\
      \ 'do the heavy lifting'. (7) Volatility calibration: trailing 63-day daily\
      \ std = 0.02105, implying 21-day cumulative std \u2248 0.02105 \xD7 \u221A21\
      \ \u2248 0.096. However, the empirical CSV distribution for recent 2024\u2013\
      2026 periods shows 21-day cumulative returns clustering in a much tighter band\
      \ (roughly \u20130.05 to +0.08), consistent with an effective 21-day std of\
      \ ~0.028\u20130.032 in the current low-volatility regime. I use ~0.030 as the\
      \ effective 21-day std (daily vol annualises to ~13\u201314%), with mild negative\
      \ skew to capture the trade/tariff left tail. Point forecast (median) = +0.015,\
      \ reflecting positive carry from commodities and BoC hold, tempered by trade\
      \ uncertainty and mixed labour data."
