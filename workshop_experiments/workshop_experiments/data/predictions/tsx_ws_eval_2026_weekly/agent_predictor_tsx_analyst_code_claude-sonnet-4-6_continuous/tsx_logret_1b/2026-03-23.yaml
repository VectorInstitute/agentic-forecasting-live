    horizon_rationale: "1-day ahead S&P/TSX log-return forecast as of 2026-03-23.\
      \ Key inputs and assumptions: (1) BANK OF CANADA POLICY \u2014 BoC held overnight\
      \ rate at 2.25% in March 2026, adopting a wait-and-see posture after a prolonged\
      \ easing cycle that began mid-2024. The hold removes near-term rate-cut catalyst\
      \ but also avoids tightening headwinds. (2) MACRO/TRADE HEADWINDS \u2014 US\
      \ Section 122 tariffs of 25% on Canadian autos, steel, and aluminum are a significant\
      \ structural drag on TSX earnings, particularly for industrials and exporters.\
      \ This elevates macro uncertainty and biases the distribution slightly left.\
      \ (3) COMMODITIES \u2014 Middle East conflict has boosted crude oil, providing\
      \ support for the TSX energy sector (>20% index weight). Gold also elevated\
      \ on safe-haven demand, aiding materials/miners. This partially offsets tariff\
      \ headwinds. (4) CAD \u2014 Under pressure from trade uncertainty and negative\
      \ terms-of-trade effects outside energy. Weaker CAD provides modest translation\
      \ boost to foreign-earners. (5) PRIOR DAY RETURN \u2014 The as-of date recorded\
      \ a large +1.79% log return (roughly +1.7 standard deviations), likely a mean-reversion\
      \ bounce after a run of negative sessions (-2%, -1%, -2% on Mar 18-20). A mild\
      \ mean-reversion tendency after such a large up-day warrants a slightly negative\
      \ median estimate (~-0.03%). (6) VOLATILITY REGIME \u2014 Trailing 63-day realised\
      \ vol is 1.045%/day, elevated versus long-run average (~0.98%), reflecting the\
      \ trade/geopolitical uncertainty. We apply this as the forward vol estimate.\
      \ (7) DISTRIBUTION SHAPE \u2014 Blended 60% Student-t(df=5) parametric (capturing\
