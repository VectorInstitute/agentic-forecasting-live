      \ trailing 63d daily std scaled by \u221A5) anchors the distribution width.\
      \ Slight negative skew reflects the TSX's historical left-tail fat tails (GFC,\
      \ COVID, tariff events). Macro backdrop is broadly neutral-to-supportive: BoC\
      \ on hold, inflation controlled, BoC not expected to tighten. Commodity sensitivity\
      \ (energy, gold) adds idiosyncratic risk. Point forecast = median = +0.002 (+0.2%),\
      \ reflecting weak positive drift from the recent up-trend tempered by October's\
      \ consolidation."
    horizon_rationale: "Horizon: 5 business days (1 calendar week). Forecast origin:\
      \ 2025-11-03. Key inputs: (1) Volatility \u2014 trailing 63-day daily std =\
      \ 1.019%, implying 5-day weekly std \u2248 2.28% (\xD7\u221A5). Recent daily\
      \ regime (Aug\u2013Nov 2025) shows std ~1.16\u20131.20%/day, weekly \u2248 2.3\u2013\
      2.5%. I use ~2.3% as the base weekly vol. (2) Drift \u2014 the recent regime\
      \ (Aug\u2013Nov 2025 daily data) shows a mean daily return of ~+0.43\u20130.76%,\
      \ which translates to a 5-day drift of roughly +0.2\u20130.4%. However, the\
      \ last several weeks of October showed choppier action (Oct 10: -2%, Oct 21/22:\
      \ -2% each), and the Nov 3 close was essentially flat (-0.002%). I apply a modest\
      \ positive drift of +0.2% for the 5-day median. (3) Distribution shape \u2014\
      \ full 25-year weekly return history shows negative skew (-2.18) and excess\
      \ kurtosis (~8). I apply mild negative skew in the distribution (left tail slightly\
      \ fatter than right). (4) Macro \u2014 BoC on hold with rates near 2.75%, core\
      \ inflation near 2% target, labour market slack (unemployment 6.5\u20137%),\
      \ no imminent rate catalyst. US tariff uncertainty persists but TSX has been\
      \ resilient post-April 2025 tariff shock. Oil/gold commodity sensitivity remains.\
      \ (5) Regime \u2014 the TSX has been in a sustained positive momentum regime\
      \ from May\u2013Sept 2025, but Oct 2025 showed consolidation/pullback. Current\
      \ vol is low-moderate, supportive of contained weekly moves. The 5th percentile\
      \ is set at -3.8% (roughly -1.66\u03C3 with slight fat-tail adjustment), and\
