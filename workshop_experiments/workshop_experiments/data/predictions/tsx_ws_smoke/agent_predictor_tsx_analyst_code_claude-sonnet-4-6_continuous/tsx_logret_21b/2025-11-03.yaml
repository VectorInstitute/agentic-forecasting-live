    rationale: "Overall: The TSX enters the 21-day forecast window in a stabilizing\
      \ regime \u2014 post-tariff-shock recovery largely priced, BoC now on pause\
      \ at 2.25%, inflation near target, labour market resilient. The main upside\
      \ catalysts are gold/materials strength and potential trade de-escalation; downside\
      \ risks are a renewed tariff escalation, CAD weakness feeding import inflation,\
      \ or a commodity price reversal. Volatility is elevated relative to 2023-2024\
      \ norms (63d daily vol of 1.63% vs ~1.0% pre-2025) but declining from the April\
      \ 2025 tariff spike. The quantile fan is calibrated to this realized volatility\
      \ with mild negative skew."
    horizon_rationale: "Forecast as of 2025-11-03 for 21 business days (\u22481 calendar\
      \ month) ahead. Key inputs: (1) Bank of Canada cut overnight rate to 2.25% on\
      \ Oct 29 2025 \u2014 fifth cut in the cycle \u2014 and signaled a PAUSE at the\
      \ lower bound of neutral; this removes the near-term rate-cut tailwind that\
      \ had supported equities but also anchors policy stability. (2) Canada CPI cooled\
      \ to 2.2% in October (near target) \u2014 benign for risk assets. (3) Labour\
      \ Force Survey October surprise: +67K jobs, unemployment fell to 6.9% \u2014\
      \ soft landing signal, positive for bank earnings and consumer sectors. (4)\
      \ USD/CAD ~1.4053 \u2014 loonie weak but stabilizing; BoC pause reduces further\
      \ widening of Canada-US 2yr spread. (5) TSX benefiting from gold/materials exposure\
      \ as gold acts as geopolitical hedge; oil uncertain amid Middle East tensions\
      \ and OPEC+ supply management. (6) US tariff overhang on Canadian trade-exposed\
      \ sectors (manufacturing, autos) persists but acute volatility from April 2025\
      \ tariff shock has abated. (7) Trailing 63d daily vol = 0.01635; 21bd horizon\
      \ sigma = 0.01635 \xD7 sqrt(21) \u2248 0.075. The target return history shows\
      \ the cumulative 21bd log-return has drifted from ~+0.07 in mid-Sep to ~0.00\
      \ by Nov 3, indicating momentum fading from the post-shock recovery. Point forecast\
      \ (median) set at +0.005 \u2014 slightly positive reflecting soft-landing bias\
      \ and commodity sector support, but muted given BoC pause and fading recovery\
      \ momentum. Distribution is approximately t-distribution shaped with slight\
      \ left skew to capture residual tariff/trade tail risk. The 5th\u201395th percentile\
      \ spread of ~23.5pp is consistent with the 75bp empirical 21bd range typical\
      \ at this volatility level."
