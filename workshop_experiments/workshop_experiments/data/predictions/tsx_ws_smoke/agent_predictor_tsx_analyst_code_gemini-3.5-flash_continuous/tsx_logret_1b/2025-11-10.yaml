    horizon_rationale: "Our 1-business-day forecast for the S&P/TSX Composite cumulative\
      \ log return is grounded in both macroeconomic policy and high-frequency statistical\
      \ diagnostics. \n\n1. Macroeconomic Context: The Bank of Canada (BoC) lowered\
      \ its policy rate to 2.25% on October 29, 2025, but governing council signals\
      \ have pivoted toward a data-dependent, wait-and-see stance (effectively a pause).\
      \ This hawkish pivot is supported by strong recent jobs data (October LFS adding\
      \ 67,000 jobs, bringing unemployment down to 6.9%) and stable headline CPI inflation\
      \ around 2.2%. \n2. Sector and Commodity Drivers: S&P/TSX Composite has hit\
      \ record highs, but faces divergent forces. Weakness in WTI crude oil (trading\
      \ below $60/bbl) remains a structural drag on the heavy energy sector, while\
      \ strong gold prices provide a tailwind for materials. In addition, US tariff\
      \ uncertainties and potential trade barriers present ongoing headwinds for Canadian\
      \ exports. \n3. Currency and Yields: GoC 10-year yields have drifted higher\
      \ and the USD/CAD exchange rate has faced volatility under the BoC's pause guidance.\
      \ \n4. Quantitative Diagnostics: Daily price history analysis reveals significant\
      \ short-term volatility clustering. While the trailing 63-day standard deviation\
      \ is 0.0068, short-term realized volatility has risen sharply, with the 5-day\
      \ standard deviation climbing to 0.0113. A custom-fitted normal GARCH(1,1) model\
      \ projects a next-day conditional volatility of 0.008857. Furthermore, an AR(1)\
      \ specification shows weak but significant negative autocorrelation (-0.046)\
      \ which, following the +1.34% close on Nov 10, pulls the conditional mean slightly\
      \ negative to -0.0001. We model the return distribution using a Student's t-distribution\
      \ with 6 degrees of freedom to capture fat tails, scaling the quantiles based\
      \ on the GARCH conditional variance forecast."
