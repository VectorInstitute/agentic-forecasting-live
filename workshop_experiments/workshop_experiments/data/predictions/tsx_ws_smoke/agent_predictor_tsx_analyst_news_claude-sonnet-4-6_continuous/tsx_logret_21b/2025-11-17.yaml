    rationale: "Overall forecast: The S&P/TSX Composite 21-business-day (one calendar\
      \ month) cumulative log return is centered at +1.0% as of 2025-11-17. The BoC\
      \ has concluded its easing cycle at 2.25% with a clear hold signal, inflation\
      \ is near target at 2.2%, the labour market has improved (unemployment down\
      \ to ~6.9%), and GDP is tracking stronger than feared recession scenarios. Gold\
      \ prices are bullish (supporting TSX materials). Offsetting factors include:\
      \ weak crude oil (headwind for TSX energy), persistent US tariff uncertainty,\
      \ softening price momentum over recent weeks, and the BoC-Fed divergence maintaining\
      \ CAD pressure. Effective 21-day volatility is estimated at ~8% (\u03C3), yielding\
      \ a distribution that spans approximately -12.5% to +13.8% at the 5th/95th percentiles,\
      \ consistent with historical 21-day return ranges observed in the provided time\
      \ series. A mild left-skew adjustment reflects asymmetric downside tail risks."
    horizon_rationale: "Forecast origin: 2025-11-17. The 21-business-day horizon covers\
      \ approximately mid-November to mid-December 2025. Key inputs and reasoning:\
      \ (1) Bank of Canada Policy: BoC has cut its overnight rate to 2.25% by late\
      \ October 2025 and has explicitly signaled a pause \u2014 'wait and see' mode\
      \ with no further near-term cuts anticipated. This removes a rate-hike headwind\
      \ but also removes the stimulative impulse of active cutting. Mildly supportive\
      \ for equities. (2) Inflation & Labour: CPI at ~2.2% YoY (cooling toward target),\
      \ with unemployment declining from a September peak of ~7.1% to ~6.9% in November.\
      \ GDP tracking ~2.6% annualized \u2014 meaningfully above recession fears. This\
      \ improved macro backdrop provides a modest fundamental tailwind. (3) Oil: Crude\
      \ facing downward pressure from global oversupply and softening demand. This\
      \ is a notable headwind for the TSX energy sector (~18-20% of index weight),\
      \ capping upside in the short horizon. (4) Gold: Trending higher throughout\
      \ 2025 as a geopolitical hedge and inflation store. Positive for TSX materials/gold\
      \ miners (~12-15% of index weight). (5) USD/CAD and GoC Yields: BoC-Fed policy\
      \ divergence keeps CAD somewhat soft. GoC 10-year yields in a narrow band. A\
      \ weaker CAD is modestly supportive for TSX in CAD-denominated terms (resource\
      \ exporters benefit). (6) US tariff spillovers: Broad tariffs on Canadian goods\
      \ remain a structural headwind for business investment and corporate margins\
      \ \u2014 a persistent but partially priced risk. (7) Seasonal: Mid-November\
      \ to mid-December has a modestly positive seasonal tendency (holiday period,\
      \ year-end positioning). (8) Recent momentum: The last several 21-day rolling\
      \ return readings have declined from ~+0.05-0.07 in September to essentially\
      \ flat (-0.001) as of Nov 17, suggesting momentum exhaustion but not a breakdown.\
      \ (9) Volatility calibration: The trailing 63-day daily standard deviation is\
      \ 2.294%, implying a 21-business-day sigma of ~10.5% (2.294% \xD7 \u221A21).\
      \ However, observed 21-day return dispersion over recent months is narrower\
      \ (~7-9%), reflecting a period of declining volatility from the spring 2025\
      \ tariff-shock spike. I use an effective \u03C3\u2082\u2081 \u2248 8.0% with\
      \ a mild left-skew adjustment (fat left tail) to account for tail risks from\
      \ oil weakness, tariff escalation, or US spillovers. (10) The median (0.50)\
      \ is set at +1.0% log return (~+1% price appreciation), reflecting positive\
      \ but modest macro momentum, BoC pause stability, gold strength, and seasonal\
      \ effects, offset by oil weakness and tariff uncertainty. The distribution is\
      \ approximately normal with slight negative skew \u2014 the left tail (Q5 =\
