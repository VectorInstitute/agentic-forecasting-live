    horizon_rationale: At the 5-day horizon, the S&P/TSX Composite is projected to
      have a slightly positive drift (median of 0.15%) with standard volatility (5-day
      standard deviation ~2.44% scaled from daily volatility of 1.09%). This outlook
      balances positive domestic drivers against notable headwinds. On the positive
      side, the Canadian domestic economy shows resilience following a strong October
      labor report (+67k jobs, unemployment down to 6.9%) and stable inflation (headline
      CPI at 2.2%). The Bank of Canada lowered its policy rate to 2.25% on October
      29 and signaled a hold, stabilizing GoC yields and supporting the financial
      sector. On the negative side, crude oil prices remain under pressure due to
      global supply surpluses, gold is undergoing a technical correction after peaking
      above $4,300/oz in October, and U.S. trade tariff uncertainty acts as a structural
      headwind. The loonie continues to trade near the 1.40 resistance level, boosting
      foreign earning values but reflecting trade risks. Volatility is modeled using
      a student-t distribution to account for fat-tail risks from geopolitical and
      trade policy spillovers.
