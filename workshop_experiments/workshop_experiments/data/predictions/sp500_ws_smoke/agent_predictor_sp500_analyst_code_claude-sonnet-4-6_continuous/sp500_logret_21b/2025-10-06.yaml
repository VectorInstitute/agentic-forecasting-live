      \ days reflects a modest positive drift, with a forward 1-sigma range of approximately\
      \ \xB16%. The distributional tails are widened to account for S&P 500's well-documented\
      \ fat-tail behavior and the binary macro risks (shutdown resolution, delayed\
      \ data surprises, FOMC communication risk) that could materialize within the\
      \ forecast window."
