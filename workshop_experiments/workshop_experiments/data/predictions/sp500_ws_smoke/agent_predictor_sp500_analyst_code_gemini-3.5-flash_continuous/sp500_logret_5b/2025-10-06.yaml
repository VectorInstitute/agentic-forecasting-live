    horizon_rationale: 'Our forecast is constructed using a GARCH(1,1) model fitted
      on the reconstructed daily log returns of the S&P 500 for the post-May 2025
      low-volatility regime. Key macro assumptions are as follows: (1) The Federal
      Reserve''s rate-cutting cycle (with a 25bps cut in September 2025 to 4.00%-4.25%
      and guidance for more cuts) remains highly supportive of equity markets; (2)
      Broad economic growth is cooling but resilient, with corporate earnings (specifically
      in the mega-cap tech and AI sectors) showing robust Q3 momentum; (3) Volatility
      is extremely muted, with the reconstructed conditional daily volatility at approximately
      12.9% annualized; (4) Although the US government shutdown has delayed some macroeconomic
      reports (creating a temporary data blackout), the equity market has historically
      looked past these events and remains focused on long-term monetary easing and
      corporate fundamentals. This GARCH model provides a highly calibrated forecast
      that captures the near-term low-volatility momentum while allowing for a realistic,
      mean-reverting risk structure.'
