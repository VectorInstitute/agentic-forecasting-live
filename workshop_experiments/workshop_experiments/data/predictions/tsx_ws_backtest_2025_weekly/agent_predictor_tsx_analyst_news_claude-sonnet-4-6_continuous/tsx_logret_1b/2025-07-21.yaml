      \ CAD weakness. The TSX is in a compressed-volatility, slight-positive-drift\
      \ regime post-recovery. 1-day forecast centres near zero with \u03C3-scaled\
      \ quantiles and a modest fat-tail adjustment."
    horizon_rationale: "1-day ahead TSX log-return forecast as of 2025-07-21. The\
      \ last close log-return was essentially flat (+0.00011), consistent with a calm,\
      \ low-momentum regime. The trailing 63-day realized daily volatility is \u03C3\
      \u22480.00433 (~6.9% annualized), which is well below the peak volatility seen\
      \ in March\u2013April 2025 (tariff-shock period) and indicates the index has\
      \ settled into a compressed range since the May recovery. The base distribution\
      \ is approximately Gaussian with \u03BC\u2248+0.0001 (slight drift consistent\
      \ with long-run TSX positive drift), \u03C3\u22480.00433, but with mild fat-tail\
