    rationale: 'One-business-day-ahead forecast for the S&P/TSX Composite log-return
      as of June 30, 2025. The effective target session is July 2, 2025, as the TSX
      is closed on Canada Day (July 1). The forecast centres on a modest positive
      drift (+0.001 log-return) supported by: (a) a positive June 30 close and strong
      June month-end momentum in resources; (b) the June LFS jobs surprise (+83k);
      (c) a supportive commodity price environment (oil near $80/bbl, gold elevated).
      Downside risks are weighted toward US tariff escalation, firmer-than-expected
      Canadian CPI limiting BoC easing room, and elevated unemployment (6.9%) signalling
      fragile domestic demand. The distribution is approximately Gaussian scaled to
      a 63-day rolling daily volatility of ~1.28%, with mild positive skew and slightly
      fat tails given trade-policy binary risks.'
    horizon_rationale: "Forecast origin: June 30, 2025 (TSX close). Target session:\
      \ July 2, 2025 (July 1 is Canada Day \u2014 TSX closed). Key assumptions: (1)\
      \ Bank of Canada Policy \u2014 BoC held at 2.75% on June 4 for a second consecutive\
      \ pause, citing trade-policy uncertainty and unexpectedly firm core CPI. No\
      \ BoC decision event in the immediate window; policy is a neutral-to-mildly-supportive\
      \ backdrop for equities. (2) Inflation/Labour \u2014 June CPI came in at 1.9%\
      \ YoY (slight uptick from 1.7% in May), and the June LFS showed a surprising\
      \ +83,000 net jobs gain \u2014 the first positive print since January 2025 \u2014\
      \ though unemployment remained elevated at 6.9%. The jobs surprise is a mild\
      \ positive for equities on the re-open. (3) Commodities \u2014 TSX gained ~2.9%\
      \ in June driven by mining (+10%) and oil & gas (+19%), with Brent touching\
      \ ~$80/bbl intraday. Gold supported as safe-haven. Commodity tailwind supports\
      \ the TSX's energy/materials-heavy composition. (4) USD/CAD and GoC yields \u2014\
      \ CAD strengthened modestly in June (USD/CAD trough ~1.3573), reflecting improved\
      \ risk appetite; GoC yields sensitive to BoC easing expectations vs. firmer\
      \ inflation. No sharp dislocation. (5) US spillovers \u2014 US tariffs on Canadian\
      \ steel, aluminum, and energy products remain a persistent overhang; Canada\
      \ delayed full retaliation. US Fed holding higher-for-longer widens rate differentials\
      \ and pressures CAD. (6) Market dynamics \u2014 Last close on June 30 was positive\
      \ (+0.0062 log-return), June month-end rally was broad-based. Trailing 63-day\
      \ daily std = 0.01278. Statistical framework: approximately normal with \u03C3\
      \ = 0.0128, mild positive central drift of +0.001 (reflecting long-run daily\
