    rationale: "Overall forecast philosophy: For a 1-business-day horizon on the S&P/TSX\
      \ Composite, the dominant driver of uncertainty is day-to-day return volatility\
      \ (~0.50% 1-sigma), not the drift (which contributes ~0.04% over one day). The\
      \ macro backdrop as of Aug 18, 2025 is mixed: TSX at record highs supported\
      \ by gold/financials, but weighed by US tariff escalation (25%\u219235%), soft\
      \ Canadian labour market (unemployment ~7%), Q2 GDP contraction, and CAD under\
      \ pressure from yield differentials. The BoC (at 2.75%) is on hold. No major\
      \ catalysts scheduled for Aug 19. The point forecast of +0.0004 reflects a small\
      \ positive drift at record highs in a risk-on environment. Fat tails are captured\
      \ via Student-t(5) scaling with \u03C3=0.005, consistent with observed TSX daily\
      \ return behaviour across the full history and the recent elevated volatility\
      \ regime (63d std = 0.004955). The distribution is approximately symmetric with\
      \ a slight positive skew from the momentum at record highs."
    horizon_rationale: "1-day ahead forecast for 2025-08-19. Key inputs: (1) Bank\
      \ of Canada policy rate at 2.75%, in cautious wait-and-see mode \u2014 no rate\
