    horizon_rationale: "Forecast for the 1-business-day horizon (May 5 \u2192 May\
      \ 6, 2025). Key inputs: (1) Statistical anchor \u2014 trailing 63-day realised\
      \ daily std of ~1.43%, roughly twice the long-run TSX average (~0.75%), reflecting\
      \ the elevated tariff-induced volatility that dominated March\u2013April 2025.\
      \ The most recent daily log-return was -0.00312, providing a mild negative prior.\
      \ (2) BoC policy \u2014 Bank of Canada held at 2.75% on April 16, pausing after\
      \ seven consecutive cuts, citing 'pervasive uncertainty' around US trade policy.\
      \ A hold stance is broadly neutral for equities. (3) Inflation/Labour \u2014\
      \ CPI ~1.7\u20132.3%, largely contained; unemployment edged up to 6.9%, indicating\
      \ cooling labour market but removing wage-inflation concerns. (4) Commodities\
      \ \u2014 Gold near all-time highs (~USD 3,500/oz) positive for TSX materials\
      \ sector; crude oil fell ~16% in April on demand fears and OPEC+ supply increases,\
      \ headwind for energy sector. Mixed net commodity effect for the TSX. (5) CAD/USD\
      \ ~1.3822, pressured by BoC-Fed divergence and tariff risk premium. (6) US trade\
      \ policy \u2014 25% tariffs on most Canadian goods remain in effect; market\
      \ has partially digested the April 3\u20134 shock and entered a recovery/stabilisation\
      \ phase by late April\u2013early May. (7) FOMC meeting on May 7 creates pre-decision\
      \ caution, slightly increasing left-tail risk on May 6. (8) No major scheduled\
      \ Canadian data release on May 6 to create outsized direction. Distribution:\
      \ Near-symmetric around zero with fat tails calibrated to the 1.43% daily std.\
      \ A slight negative skew is embedded by (a) recent negative last return, (b)\
      \ ongoing tariff uncertainty, (c) FOMC caution ahead. Tail quantiles (~\xB1\
      2.3% at 5th/95th) reflect that single-day moves of this magnitude have occurred\
      \ multiple times in the March\u2013April 2025 sample."
