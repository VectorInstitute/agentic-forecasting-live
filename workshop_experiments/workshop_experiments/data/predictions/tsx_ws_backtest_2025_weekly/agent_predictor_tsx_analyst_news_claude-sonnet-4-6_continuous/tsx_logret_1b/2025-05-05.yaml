      \ under pressure (negative for energy), FOMC looming May 7 (adds near-term uncertainty),\
      \ and US tariffs partially priced in \u2014 support a symmetric-to-mildly-left-skewed\
      \ distribution. Historical analogy: in elevated-volatility TSX regimes (e.g.,\
