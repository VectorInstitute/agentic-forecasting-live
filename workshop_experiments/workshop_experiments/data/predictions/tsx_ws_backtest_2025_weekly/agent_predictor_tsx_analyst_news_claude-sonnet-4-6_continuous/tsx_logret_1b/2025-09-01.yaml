    rationale: "Overall macro backdrop as of 2025-09-01: The TSX is at record highs\
      \ supported by BoC easing, gold strength, and post-tariff-shock stabilization.\
      \ However, weak Canadian labour market (unemployment 7.1%, -66k jobs in August),\
      \ soft GDP (Q2 GDP contracted 1.6% annualized), persistent US trade war (35%\
      \ tariffs), and declining oil prices create meaningful downside risk. The 1-day\
      \ distribution is centred on a small positive drift (~+0.02%) with a daily standard\
      \ deviation of ~0.6%, reflecting the current balance between BoC dovishness\
      \ and commodity/gold tailwinds on the upside versus trade uncertainty and economic\
      \ fragility on the downside. The tail quantiles (5th and 95th) at approximately\
      \ \xB11% capture the residual risk of episodic tariff/trade headline shocks\
      \ that characterized spring 2025 volatility."
    horizon_rationale: "1-day ahead TSX log-return forecast for 2025-09-01 (first\
      \ trading day of September). Key inputs: (1) Bank of Canada in easing cycle\
      \ at 2.75% overnight rate (cut 25bp in March from 3.00%), with a September cut\
      \ to 2.50% widely anticipated \u2014 dovish stance is supportive for TSX equity\
      \ valuations. (2) Labour market significantly weakened: unemployment rose to\
      \ 7.1% in August with -66,000 net jobs \u2014 highest since 2016 excluding pandemic,\
      \ reinforcing BoC cut expectations but signalling economic fragility. (3) Headline\
      \ CPI at ~1.9% (below 2% target), underlying core ~3.2% \u2014 inflation not\
      \ an impediment to further cuts. (4) Commodity divergence: oil prices declining\
      \ (negative for TSX energy sector ~15-18% weight), gold at/near record highs\
      \ (positive for materials/mining ~12% weight). Net commodity effect roughly\
      \ neutral-to-slight positive. (5) USD/CAD ~0.7247 (weak loonie) reflects BoC-Fed\
      \ policy divergence; GoC 10Y yields declining in August supportive of equity\
      \ duration. (6) US tariffs on Canadian goods at ~35% remain a persistent structural\
      \ headwind; US court ruling some tariffs illegal is a modest positive but trade\
      \ war uncertainty keeps risk premium elevated. (7) TSX hit record highs at end\
      \ of August \u2014 positive momentum but also elevated valuation risk. (8) Last\
      \ close return +0.00455 on Aug 29 (positive momentum). Statistical calibration:\
      \ trailing 63-day daily \u03C3 \u2248 0.00498; I use \u03C3 \u2248 0.006 to\
      \ account for slightly elevated tail risk from trade uncertainty. Drift \u03BC\
      \ \u2248 +0.0002/day (modest positive given BoC easing and gold tailwind, partially\
      \ offset by weak jobs and oil softness). Distribution constructed as approximately\
      \ normal with slight positive asymmetry. The 5th/95th percentiles at approximately\
      \ \xB11.6\u03C3 reflect single-day extreme moves still possible given residual\
      \ tariff shock risk (April 2025 saw -4% to -5% days). No major scheduled catalysts\
      \ on Sept 1 itself (no BoC decision, no major data release), so the distribution\
      \ is centered near the unconditional daily mean."
