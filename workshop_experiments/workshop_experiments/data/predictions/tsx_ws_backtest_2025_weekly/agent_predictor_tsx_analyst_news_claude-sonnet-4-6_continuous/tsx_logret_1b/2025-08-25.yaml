    rationale: "Overall macro context for Aug 25, 2025: TSX has been a strong outperformer\
      \ in August driven by materials/gold and BoC easing hopes, but faces headwinds\
      \ from a sharply deteriorating Canadian labor market (unemployment 7.1%, -66K\
      \ jobs in August), Q2 GDP contraction, and ongoing US tariff pressure (35% tariffs\
      \ on Canadian exports). The BoC is in an easing mode (rate ~2.50\u20132.75%),\
      \ which is generally supportive but cannot fully offset trade-war damage. Gold's\
      \ strength supports TSX materials; crude oil faces supply headwinds affecting\
      \ energy sector. USD/CAD ~1.3857, stabilized but CAD remains soft. For a 1-day\
      \ horizon, the forecast distribution is centered near zero with slight negative\
      \ lean, using the 63-day realized daily vol of ~0.50% as the primary width calibrator.\
      \ The key risks are skewed modestly to the downside given the weak macro data\
      \ and tariff overhang, though the TSX's recent upward momentum provides some\
      \ offset."
    horizon_rationale: "Forecast for 1-business-day ahead (Aug 26, 2025) log return\
      \ on S&P/TSX Composite. Key inputs: (1) BANK OF CANADA POLICY: BoC in active\
      \ easing cycle, overnight rate at ~2.50\u20132.75%; further cuts anticipated\
      \ amid GDP contraction and rising unemployment \u2014 generally supportive for\
      \ equities but already largely priced in. (2) MACRO/INFLATION: Canada Q2 GDP\
      \ contracted ~1.6% YoY; CPI ~1.9% (below 2% target); unemployment surged to\
      \ 7.1% in August with ~66K jobs lost \u2014 worst since 2016. These data create\
      \ a stagflation-lite backdrop that limits strong upside catalysts. (3) COMMODITIES:\
      \ Gold remains well-supported as a geopolitical hedge (positive for TSX materials);\
      \ crude oil faces downward pressure from supply/demand imbalance (modest drag\
      \ for energy sector). (4) CAD/YIELDS: USD/CAD ~1.3857, recovering from >1.40\
      \ lows; GoC 10-yr yields declined in August as growth concerns mount; lower\
      \ yields support equity valuations modestly. (5) US SPILLOVERS: 35% US tariffs\
      \ on Canadian imports in force \u2014 persistent headwind particularly for manufacturing,\
      \ transport, and trade-exposed exporters; market has partially absorbed but\
      \ uncertainty persists. (6) RECENT PRICE ACTION: The TSX reached record highs\
      \ in August 2025 with ~5% monthly gain; however the last observed daily return\
      \ was -0.58% (Aug 25), following two consecutive +1% days. This mild reversal\
      \ after a strong run suggests slightly cautious near-term tone. (7) STATISTICAL\
      \ BASIS: Trailing 63-day daily realized vol = 0.50% (\u03C3=0.005). Distribution\
      \ modeled as approximately normal centered at -0.01% (slight negative drift\
      \ from macro headwinds and mean-reversion after recent run-up), with \u03C3\
      =0.005. Slight left-tail widening (roughly symmetric but acknowledging tariff/trade\
      \ shock tail risk). The quantile spread of \xB10.82% at 5th/95th percentile\
      \ reflects the current regime of elevated-but-not-extreme single-day volatility."
