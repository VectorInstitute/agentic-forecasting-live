    rationale: "Overall framework: The March 3, 2025 forecast origin sits at a highly\
      \ unusual binary event risk juncture \u2014 the expiry of the US-Canada tariff\
      \ reprieve on March 4. The TSX already sold off -1.555% on March 3, pricing\
      \ in elevated uncertainty. For the 1-day horizon, I treat the return distribution\
      \ as a mixture: (a) a 'tariffs go live / no deal' scenario (~55% weight, centered\
      \ around -0.8% to -1.5%) and (b) a 'surprise postponement or deal' scenario\
      \ (~25% weight, centered around +1.0% to +1.5%), plus (c) a 'mixed outcome /\
      \ market stabilization' scenario (~20%, centered near 0%). This mixture produces\
      \ a negatively skewed distribution with a median near -0.30%, left tail at -2.5%\
      \ and right tail at +1.6%. The effective daily vol input of ~0.90% reflects\
      \ the event-risk premium above the trailing 63-day realized vol of 0.708%. Bank\
      \ of Canada easing path (3.00% policy rate, further cuts possible) is a medium-term\
      \ support but immaterial for the 1-day horizon. GoC 10-year yields trending\
      \ lower on growth concerns; CAD weakness at ~69.26 cents compounds risk-off.\
      \ Gold at record highs partially offsets via TSX materials sector."
    horizon_rationale: "Forecast as of 2025-03-03 (1 business day ahead = 2025-03-04).\
      \ The TSX just registered a large -1.555% log-return on March 3, driven by mounting\
      \ tariff anxiety ahead of the March 4 deadline when the temporary US reprieve\
      \ on 25% Canadian import tariffs was set to expire. Key factors shaping the\
      \ distribution: (1) TARIFF BINARY EVENT \u2014 the most dominant driver. March\
      \ 4 is the scheduled start of US 25% tariffs on most Canadian goods and 10%\
      \ on energy. A full implementation scenario creates significant additional downside;\
      \ a last-minute negotiated delay/deal creates a sharp upside bounce. This binary\
      \ structure widens the tails materially relative to normal-vol days. (2) PRICE\
      \ MOMENTUM \u2014 after a -1.55% day, mean-reversion is possible but the negative\
      \ newsflow backdrop argues against a strong bounce; median set at -0.30%, a\
      \ modest further drift lower. (3) VOLATILITY REGIME \u2014 trailing 63-day daily\
      \ std of 0.708% is already elevated vs historical norms (~0.6%). I use an effective\
      \ daily \u03C3 of ~0.90% to capture the elevated event-risk regime; combined\
      \ with negative skew from tariff implementation risk, this yields the wider\
      \ left tail. (4) BANK OF CANADA \u2014 overnight rate at 3.00% after January\
      \ cut; BoC in easing mode provides a partial buffer but cannot offset trade\
      \ war shock in a single day. (5) CAD WEAKNESS \u2014 loonie near 69.26 cents\
      \ USD weighs on sentiment; further weakening expected if tariffs go live, amplifying\
      \ equity downside via risk-off. (6) COMMODITIES \u2014 gold at record highs\
      \ provides some support for materials sector (partial offset), but energy sector\
      \ faces direct tariff headwind (10% levy on energy exports). (7) MEAN-REVERSION\
      \ CHECK \u2014 the large -1.55% move yesterday argues for some bounce probability\
      \ but the tariff trigger on March 4 makes continuation downside the higher-probability\
      \ scenario. Left tail (Q05 = -2.50%) captures an acute tariff shock/panic day;\
      \ right tail (Q95 = +1.60%) captures a surprise deal or postponement relief\
      \ rally. Distribution is left-skewed: median below zero, downside quantiles\
      \ wider than upside."
