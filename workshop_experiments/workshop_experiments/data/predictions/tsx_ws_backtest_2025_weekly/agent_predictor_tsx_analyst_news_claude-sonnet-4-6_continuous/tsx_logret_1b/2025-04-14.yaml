    rationale: "Overall approach: Calibrated a near-zero mean, elevated-volatility\
      \ (\u03C3\u22481.8%) 1-day distribution for the TSX, reflecting (a) the current\
      \ tariff-shock regime which has produced 2\u20135% daily swings in early April\
      \ 2025, (b) imminent BoC rate decision on April 16 creating pre-announcement\
      \ uncertainty, (c) mixed commodity signals (oil weak, gold strong), (d) easing\
      \ BoC policy providing modest support, and (e) deteriorating Canadian labour\
      \ market partly weighing on sentiment. The interquantile range (Q10\u2013Q90)\
      \ spans approximately \u20132.2% to +2.3%, consistent with the elevated-volatility\
      \ environment while being grounded in the 63-day trailing \u03C3 of 1.43%. Fat\
      \ tails (Q5=\u20133.0%, Q95=+3.0%) capture the realistic scenario of another\
      \ tariff-driven large move in either direction."
    horizon_rationale: "1-day ahead (April 15, 2025) forecast for S&P/TSX Composite\
      \ cumulative log-return. Key inputs and assumptions: (1) VOLATILITY REGIME:\
      \ The trailing 63-day \u03C3 is 1.43%/day, but the recent tariff-shock period\
      \ (early April 2025) has produced single-day swings of 2\u20135%, indicating\
      \ we are in a structurally elevated volatility regime. I use an effective \u03C3\
      \ of ~1.8\u20132.0%/day for the distributional spread, with fat tails. (2) MEAN/DRIFT:\
      \ Near-zero expected drift for a 1-day horizon; a very slight positive bias\
      \ (~+0.10%) reflects BoC easing support (policy rate at 2.75% after two 25bp\
      \ cuts in Jan and Mar 2025) and gold's continued safe-haven rally supporting\
      \ TSX materials. (3) BANK OF CANADA: Next rate decision is April 16 \u2014 one\
      \ business day away. Pre-decision positioning may reduce directional conviction\
      \ on April 15, keeping the index range-bound but potentially adding tail risk\
      \ if there is any pre-announcement leak or data surprise. (4) TARIFF/TRADE RISKS:\
      \ US-Canada trade tensions remain the dominant risk factor. The TSX experienced\
      \ a +5% single-day surge on April 9 (tariff pause) followed by a \u20133% reversal\
      \ on April 10, illustrating severe two-way tail risk. Any new tariff announcement\
      \ or escalation could produce a \u20133% to \u20135% move; any de-escalation\
      \ could produce a +2% to +4% move. This asymmetry is reflected in the slightly\
      \ wider left tail. (5) COMMODITIES: WTI crude oil is substantially below January\
      \ highs (weakening demand outlook weighs on TSX energy sector, ~20% of index).\
      \ Gold at record highs supports TSX materials/gold miners. Net sector effect\
      \ modestly negative-to-neutral. (6) CAD/YIELDS: USD/CAD trading ~1.38\u2013\
      1.39 (CAD appreciated recently on broad USD weakness). GoC 10-year yields edging\
      \ higher. These are minor near-term headwinds for equities. (7) LABOUR MARKET:\
      \ Canada shed 32,600 jobs in March (first decline since July 2024), unemployment\
      \ at 6.7%. This is a mild negative for sentiment but already partially priced\
      \ in. (8) MOST RECENT LOG-RETURN: +0.01175 on April 14 \u2014 a positive day\
      \ with no strong mean-reversion signal for next day. Distributional choice:\
      \ approximate Student-t (df~5) centered near +0.001, scaled to \u03C3\u2248\
      0.018, with slight left skew to reflect asymmetric tariff downside. Q5/Q95 tails\
      \ widened to \xB10.030 to capture tail scenarios."
