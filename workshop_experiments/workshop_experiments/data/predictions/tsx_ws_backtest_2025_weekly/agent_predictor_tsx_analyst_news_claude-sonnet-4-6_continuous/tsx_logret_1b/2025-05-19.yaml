    rationale: "One-business-day ahead forecast for the S&P/TSX Composite log return,\
      \ as of May 19, 2025. The central scenario reflects a mildly positive drift\
      \ (+0.03%) consistent with long-run equity risk premia, set against an elevated\
      \ but moderating volatility backdrop (\u03C3 \u2248 1.25%/day). The risk-on\
      \ environment post US-China tariff truce, accommodative BoC at 2.75%, and stabilizing\
      \ commodity prices provide modest upside tilt versus a neutral prior. Key downside\
      \ risks: re-escalation of Canada-US tariffs, oil price reversal, or a negative\
      \ US macro/Fed surprise. Key upside risks: further trade de-escalation headlines,\
      \ strong Canadian bank earnings, or a commodity price surge."
    horizon_rationale: "Forecast origin: May 19, 2025 (for the next business day open/close).\
      \ Last observed log return (May 16): +0.00287 (~+0.29%). Trailing 63-day realized\
      \ volatility: 1.420%/day, elevated due to the April 3-4 tariff-shock episode\
      \ (-4% to -5% days). By mid-May, daily returns have stabilized into a narrow\
      \ +0.00 to +0.01 band, suggesting realized vol is moderating toward ~1.25%/day.\n\
      \nKey macro assumptions:\n1. Bank of Canada: Policy rate held at 2.75% (April\
      \ 16 meeting). The BoC completed 7 cumulative cuts from 5.00%; stance is accommodative\
      \ and supportive of equities. No near-term rate action expected.\n2. Trade/tariffs:\
      \ The US-China 90-day tariff pause (announced May 12, cutting US duties from\
      \ 145% to 30%) has driven a significant risk-on recovery in global equities\
      \ through mid-May, benefiting the TSX. US-Canada tariff uncertainty (25% on\
      \ non-energy goods, 10% on energy) persists but has not escalated recently;\
      \ Canada's PM Carney sought de-escalation. Net effect: positive sentiment backdrop\
      \ entering May 20.\n3. Commodities: Oil supported by OPEC+ discipline and geopolitical\
      \ tensions; gold strong as inflation/uncertainty hedge. Base metals mixed. Energy\
      \ and materials are large TSX weights (~30-35% combined), so commodity stability\
      \ is a modest tailwind.\n4. CAD/USD: Loonie under modest pressure from BoC-Fed\
      \ policy divergence and trade uncertainty, but the US-China deal boosted CAD\
      \ slightly. GoC 10-year yields 'sticky' at mid-levels.\n5. US spillovers: Fed\
      \ holding rates steady in cautious mode; US equities recovering from April lows\
      \ after the tariff truce. S&P 500 risk-on momentum provides a positive correlation\
      \ channel for the TSX.\n6. Recent price action: TSX has shown predominantly\
      \ positive daily returns in May 2025, with a recovery from the April 7-8 lows.\
      \ Momentum is gently positive.\n\nDistribution methodology: Approximately normal\
      \ with mean = +0.0003 (long-run daily drift plus slight positive momentum tilt)\
      \ and \u03C3 = 0.0125 (slightly below the 63-day trailing std as the April shock\
      \ fades). Quantiles derived from standard normal z-scores applied to this parameterization.\
      \ The distribution is treated as approximately symmetric; mild positive skew\
      \ from risk-on context is reflected in the +0.0003 median rather than a larger\
      \ upward shift (over a 1-day horizon, economic drift is nearly indistinguishable\
      \ from noise). Tail risk remains elevated relative to pre-2025 norms given the\
      \ ongoing trade-policy uncertainty and potential for surprise tariff escalation\
      \ or commodity shocks."
