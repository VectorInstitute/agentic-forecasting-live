    rationale: 'Overall context: The TSX is in an acute tariff-shock crisis as of
      April 7, 2025. The index fell ~10% in 3 business days following Trump''s sweeping
      Liberation Day tariffs. The Bank of Canada held rates at 2.75% in April (pausing
      its easing cycle), citing the ''major shift'' in US trade policy. Commodity
      signals are mixed (oil down, gold at record highs). The Canadian dollar is under
      pressure from BoC-Fed divergence. For the 1-day-ahead forecast, the key tension
      is between (a) strong mean-reversion bounce probability after such a severe
      multi-day selloff, and (b) ongoing structural uncertainty from unresolved tariff
      conflict. I set the median at +0.003 (slight positive), with a materially elevated
      distributional spread (effective sigma ~0.020 vs trailing 0.0115) to capture
      both the recovery upside and the continuation-of-crisis downside. Fat tails
      are deliberately widened: Q0.05 at -0.037 and Q0.95 at +0.043 reflect that tail
      events in crisis regimes occur far more frequently than a Gaussian model would
      suggest.'
    horizon_rationale: "Forecast origin is April 7, 2025, after a devastating 3-day\
      \ rout driven by Trump's 'Liberation Day' sweeping tariff announcement (April\
      \ 2). The TSX logged approximately -4% (Apr 3), -5% (Apr 4), and -1.45% (Apr\
      \ 7) in cumulative log-returns, totalling roughly -10% in 3 business days. The\
      \ trailing 63-day std of 0.01150 severely understates current realized volatility;\
      \ the effective forward 1-day sigma is estimated at ~0.020, roughly 1.7x the\
      \ trailing measure, reflecting the crisis-level regime. KEY DRIVERS: (1) TARIFFS/TRADE\
      \ WAR: US imposed 25% tariffs on most Canadian goods plus 10% on energy; Canada\
      \ retaliated; BoC called this a 'major shift' in trade policy creating pervasive\
      \ uncertainty \u2014 this is the dominant near-term headwind. (2) BoC POLICY:\
      \ Rate held at 2.75% in April (pausing after 7 consecutive cuts); policy is\
      \ supportive but cannot offset trade shock in the near term. GoC 10-year yield\
      \ fell to ~3.01% and 2-year to ~2.37% by early April, reflecting growth fears.\
      \ (3) COMMODITIES: Oil prices under significant pressure (global demand fears\
      \ from trade war); gold at record highs (safe haven), providing partial offset\
      \ for TSX materials sector (gold miners ~12-14% of TSX). Net commodity effect\
      \ is negative for TSX given energy (~17%) drag outweighing gold support. (4)\
      \ CAD/USD: Canadian dollar pressured by BoC-Fed policy divergence and tariff\
      \ uncertainty, though broad USD weakness provided some offset. (5) MEAN-REVERSION:\
      \ After a cumulative ~10% decline in 3 days, there is a statistically meaningful\
      \ probability of a near-term bounce (relief rally, short-covering, bargain hunting).\
      \ Historical TSX episodes (2008, 2020 COVID crash) show that after 3-day drops\
      \ of this magnitude, the next session is positive ~55-60% of the time. This\
      \ anchors the median at a mildly positive +0.003. (6) TAIL RISKS: Left tail\
      \ risk remains elevated \u2014 further tariff escalation (e.g., US-China contagion),\
      \ retaliatory measures, or negative macro data could extend losses. Right tail\
      \ risk: tariff pause/negotiation headline or Fed/BoC emergency support could\
      \ spark a sharp relief rally (+3% to +5%). The distribution is therefore substantially\
      \ wider than a normal-regime 1-day forecast, with near-symmetric fat tails (~\xB1\
      3.7% at the 5th/95th percentiles). Point forecast (median) = +0.003 log-return\
      \ (~+0.30%), reflecting mild mean-reversion bias."
