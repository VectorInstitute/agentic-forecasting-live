    rationale: "Overall framework: The Feb 3 close embeds a large tariff-shock down\
      \ move. For the single next business day (Feb 4), the primary tension is between\
      \ (a) mean-reversion after an oversold day + tariff-pause relief and (b) sustained\
      \ downside from elevated trade uncertainty, CAD weakness, and energy sector\
      \ headwinds. The BoC's accommodative stance and resilient Jan jobs data provide\
      \ a modest backstop. The 30-day tariff delay is the key asymmetric positive\
      \ catalyst for the very near term. Distribution is centered slightly positive\
      \ (median +0.20%) with wider-than-normal tails (adjusted \u03C3 ~0.0085 vs.\
      \ historical ~0.0065) reflecting the exceptional macro regime: US-Canada trade\
      \ war onset, CAD at 20-year lows, and policy uncertainty from both BoC and Fed.\
      \ No post-origin information used; all signals grounded in data available through\
      \ 2025-02-03."
    horizon_rationale: "Forecast origin: 2025-02-03. The TSX closed down ~1.147% on\
      \ Feb 3 \u2014 approximately 1.78\xD7 its trailing 63-day daily std (0.00645)\
      \ \u2014 driven by the Feb 1 US announcement of 25% tariffs on most Canadian\
      \ imports (10% on energy) and Canada's retaliatory measures. A 30-day implementation\
      \ delay was granted, which introduces a partial 'relief bounce' bias for the\
      \ next session. Key drivers for Feb 4: (1) BoC Policy: Cut to 3.00% on Jan 29\
      \ (6th consecutive), no preset path, trade uncertainty explicitly excluded from\
      \ projections \u2014 mild positive for equities via lower rates but dominated\
      \ by trade shock. (2) Inflation/Jobs: Jan LFS +76k jobs, unemployment 6.6% \u2014\
      \ domestic resilience pre-shock; CPI near 2% target. Constructive but not a\
      \ near-term catalyst. (3) Commodities: Oil under pressure from 10% energy tariff\
      \ threat; gold firm as safe-haven \u2014 mixed for TSX energy (negative) vs.\
      \ materials/gold (positive). (4) FX/Rates: USD/CAD ~1.442 (multi-decade CAD\
      \ weakness), GoC-UST 10y spread ~155bps \u2014 CAD weakness weighs on sentiment.\
      \ (5) US spillovers: Fed on hold at 4.25-4.50%, tariff-induced uncertainty.\
      \ S&P 500 absorbed tariff news more mildly, suggesting TSX sold off disproportionately,\
      \ supporting mild mean-reversion. (6) Historical pattern: After large down days\
      \ (~1.5-2\u03C3), TSX next-day median is slightly positive (+0.1-0.3%) with\
      \ wide dispersion. Point forecast set at +0.20% (log return 0.002) reflecting\
      \ modest mean-reversion after the oversold close but constrained by ongoing\
      \ tariff uncertainty. Distribution uses adjusted \u03C3 \u2248 0.0085 (roughly\
      \ 1.3\xD7 historical std) to account for elevated event risk, producing ~3\xD7\
      \ symmetric normal quantile spread with slight positive skew from relief-bounce\
      \ potential. Left tail at Q5 = -1.48% accounts for tariff escalation/CAD spiral\
      \ risk; right tail at Q95 = +1.92% accounts for tariff rollback/deal announcement\
      \ upside."
