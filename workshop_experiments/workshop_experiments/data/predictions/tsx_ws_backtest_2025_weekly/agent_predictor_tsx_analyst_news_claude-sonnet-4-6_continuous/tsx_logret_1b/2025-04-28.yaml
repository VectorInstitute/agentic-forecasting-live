    horizon_rationale: "Forecast for 1-business-day ahead (2025-04-29) from the 2025-04-28\
      \ close. Key inputs: (1) Bank of Canada held overnight rate at 2.75% on Apr\
      \ 16 \u2014 no imminent catalyst, cautious data-dependent stance maintained;\
