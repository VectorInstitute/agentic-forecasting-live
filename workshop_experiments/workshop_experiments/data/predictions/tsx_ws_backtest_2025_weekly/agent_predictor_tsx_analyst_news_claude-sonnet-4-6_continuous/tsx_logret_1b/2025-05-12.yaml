    horizon_rationale: "Forecast origin: May 12, 2025 (close). The TSX posted a +0.69%\
      \ log-return on May 12, consistent with the global risk-on mood sparked by the\
      \ announced 90-day US-China tariff truce. However, this truce does not directly\
      \ address the Canada-US bilateral tariff dispute, so the TSX's benefit was more\
      \ muted relative to US indices. For the next business day (May 13): (1) Bank\
      \ of Canada held its policy rate at 2.75% in April 2025 and is on pause, reducing\
      \ monetary-driven volatility catalysts; (2) Commodities are mixed \u2014 oil\
      \ remains depressed near $66/bbl (bearish for energy sector) while gold has\
      \ retraced from highs but remains well-supported; (3) USD/CAD ~1.3929 reflects\
      \ ongoing CAD weakness on BoC-Fed divergence, a mild structural headwind; (4)\
      \ The US-China truce sentiment may carry over modestly, but the TSX has partially\
      \ priced this in; (5) US tariffs on Canadian goods remain in force (25% on most\
      \ goods, 10% on energy), continuing to weigh on export-oriented sectors; (6)\
      \ Recent daily return history shows the TSX has been grinding +0.5\u20131% per\
      \ day since the April recovery, suggesting slight positive momentum bias. Balancing\
      \ the positive momentum carryover against mean-reversion post-large-up-day and\
      \ ongoing bilateral trade uncertainty, the median forecast is set at approximately\
      \ +0.03% (near-flat). The dispersion is calibrated using the 63-day trailing\
      \ standard deviation of 1.42%, applying a marginally reduced scale (1.38%) to\
      \ reflect the post-tariff-shock normalization in volatility. Distribution is\
      \ treated as approximately symmetric (near-Gaussian), with quantiles derived\
      \ accordingly. Key risks to the upside: additional trade deal signals, strong\
      \ US data; downside risks: renewed tariff escalation with Canada, weak commodity\
      \ prices, global risk-off."
