      \ prevent a more aggressive downside bias. Tails are calibrated using a near-Normal\
      \ distribution with \u03C3 = 0.0048, which is slightly above the trailing 63d\
      \ realized vol of 0.00422 to account for elevated macro uncertainty. The April\
      \ 2025 tariff shock (\u22124% to \u22125% single-day moves) is treated as a\
      \ tail event not expected to recur at the same magnitude barring a sudden escalation\
      \ announcement. The resulting 5th\u201395th percentile range of roughly \u2212\
      0.84% to +0.74% is consistent with historical 1-day TSX return distributions\
      \ in a moderately uncertain environment."
    horizon_rationale: "1-day-ahead forecast as of 2025-08-04 for the S&P/TSX Composite\
      \ close-to-close log return. Key inputs: (1) Last close (Aug 1) logged a \u2212\
      0.882% return \u2014 a modestly negative signal with potential for mild mean\
