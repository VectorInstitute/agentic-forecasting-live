    rationale: "Overall forecast framework: For a 1-day horizon, the dominant signal\
      \ is the recent trailing volatility (\u03C3 \u2248 0.42\u20130.48% per day).\
      \ The macro backdrop as of 2025-08-04 is mildly risk-off for Canada: weak July\
      \ jobs report, ongoing US tariff uncertainty (25% on most Canadian goods, 10%\
      \ on energy), BoC on hold at 2.75% with next cut possible in September, and\
      \ soft oil demand. These factors motivate a small negative median (\u22120.05%)\
