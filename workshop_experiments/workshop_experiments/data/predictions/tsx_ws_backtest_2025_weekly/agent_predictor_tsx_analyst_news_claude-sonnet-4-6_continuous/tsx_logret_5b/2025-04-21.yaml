    rationale: "Overall forecast rationale: The S&P/TSX Composite is in a recovery\
      \ phase following a severe tariff-shock drawdown in early April 2025. The near-term\
      \ directional bias is modest positive (small positive drift), but the distribution\
      \ is wide and slightly left-skewed given: (a) elevated realized volatility (63d\
      \ trailing \u03C3 ~0.029/day), (b) persistent US-Canada trade conflict with\
      \ 25% tariffs on most Canadian exports, (c) Bank of Canada on hold at 2.75%\
      \ with no near-term easing catalyst, (d) oil price weakness (bearish for TSX\
      \ Energy sector ~20% weight), partially offset by gold strength (bullish for\
      \ TSX Materials/Gold ~12% weight), (e) post-sharp-rebound consolidation risk.\
      \ The 5-day \u03C3 of ~0.065 drives wide quantile spreads. Key upside risks:\
      \ trade deal headlines, gold continuing higher, positive bank earnings surprises.\
      \ Key downside risks: tariff re-escalation, negative employment/GDP data, oil\
      \ price collapse, USD strength."
    horizon_rationale: "Forecast as of 2025-04-21 for the 5-business-day horizon (approx.\
      \ Apr 22\u201328, 2025). KEY INPUTS: (1) RECENT PRICE ACTION \u2014 The TSX\
      \ suffered a sharp drawdown in early April 2025 (cumulative log returns of -0.06\
      \ to -0.11 between Apr 4-10), driven by US tariff escalation fear, followed\
      \ by a strong recovery rally Apr 11-21 (cumulative ~+0.20 from trough). The\
      \ last reported 5-day log return was +0.0177, indicating momentum into the forecast\
      \ window. However, the bounce has been large and some mean-reversion/consolidation\
      \ is plausible. (2) BANK OF CANADA \u2014 Held policy rate at 2.75% on April\
      \ 16 after 7 consecutive cuts. The BoC explicitly cited extreme trade uncertainty,\
      \ presenting scenario ranges rather than a base case in the April MPR. This\
      \ 'on-hold' posture removes a near-term dovish catalyst. (3) INFLATION/LABOUR\
      \ \u2014 CPI moderating (partly carbon-tax removal). March employment declined;\
      \ labour market softening. These macro headwinds weigh on the medium-term outlook.\
      \ (4) COMMODITIES \u2014 Gold surging (safe-haven demand, concerns about Fed\
      \ independence), benefiting TSX Materials/Gold miners (a large TSX sector).\
      \ Oil under meaningful pressure (~$60s WTI range), a headwind for TSX Energy.\
      \ Net: roughly offsetting commodity impulses, slightly negative on balance given\
      \ energy's larger TSX weight. (5) CAD/YIELDS \u2014 USD/CAD moved from ~1.43\
      \ to ~1.38 by April 20, suggesting modest CAD appreciation (a mild positive\
      \ signal for TSX). GoC 10-yr yields volatile but data-dependent. (6) US SPILLOVERS\
      \ \u2014 25% US tariffs on most Canadian goods (10% energy/potash), with a 90-day\
      \ pause on some measures. Extremely fluid policy environment; large two-way\
      \ vol. Fed on hold. (7) VOLATILITY REGIME \u2014 Trailing 63-day std = 0.0292,\
      \ implying a 5-day \u03C3 \u2248 0.0292 \xD7 \u221A5 \u2248 0.0653. This is\
      \ roughly 1.5-2x long-run average. Wide quantile bands are warranted. DISTRIBUTION\
      \ SHAPE: Median set at +0.002 (near zero drift, reflecting a small positive\
      \ equity risk premium slightly offset by post-bounce consolidation pressure\
      \ and negative macro skew from tariff uncertainty). Slight left skew applied:\
      \ the downside tail is fatter given the risk of tariff re-escalation, weak oil,\
      \ and labour market deterioration, while the upside tail reflects potential\
      \ for further relief-rally if trade negotiations progress or gold continues\
      \ to support materials. The 5th percentile at -0.105 captures a scenario of\
      \ trade-war re-escalation or a major negative macro surprise (comparable to\
      \ the -0.09 to -0.11 moves seen in the April 7-8 window). The 95th percentile\
      \ at +0.092 reflects a scenario of meaningful trade de-escalation or a sustained\
      \ commodity/gold surge."
