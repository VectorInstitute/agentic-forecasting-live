    rationale: "Overall rationale: The TSX is in an extremely uncertain environment\
      \ as of April 14, 2025. The index experienced one of the sharpest 2-week drawdowns\
      \ in recent history (-25% cumulative) driven by US tariff escalation, then partially\
      \ recovered on the 90-day pause announcement. The 5-business-day ahead forecast\
      \ reflects: (a) positive near-term momentum from the relief rally; (b) gold\
      \ prices at all-time highs supporting the materials sector; (c) Bank of Canada\
      \ on pause with a dovish lean, which is moderately supportive for equities;\
      \ (d) a significantly elevated volatility regime (trailing 63d daily std of\
      \ 2.7%, implying ~6% weekly vol); and (e) a negatively skewed distribution because\
      \ tariff re-escalation, further job market deterioration, or US recession fears\
      \ could easily unwind the bounce. The distribution is much wider than in normal\
      \ market conditions, with the interquartile range spanning approximately \u2212\
      1.5% to +3.2% and 5th/95th percentile interval of \u22129.5%/+10.5%."
    horizon_rationale: "Forecast as of 2025-04-14 for the next 5 business days (approx.\
      \ Apr 15\u201317 & Apr 22\u201323). Key inputs and assumptions: (1) BANK OF\
      \ CANADA: Paused at 2.75% in April after 7 consecutive cuts totalling 175 bps\
      \ since June 2024. Data-dependent, no forward guidance. BoC April MPR notes\
      \ trade war makes projections 'unusually challenging'. Next decision April 16\
      \ is a key near-term catalyst \u2014 market expects hold with dovish language,\
      \ marginally supportive. (2) CANADIAN MACRO: March LFS shed 32,600 jobs (unemployment\
      \ 6.7%), the first decline since July 2024; March CPI at 2.3%. Carbon tax removal\
      \ in April gives temporary CPI relief. Macro backdrop weakening but not in freefall.\
      \ (3) TARIFFS/TRADE: US 'Liberation Day' tariffs (April 2) \u2014 25% on most\
      \ Canadian goods, 10% on energy \u2014 caused a severe TSX selloff (5-day returns\
      \ of -9%, -11% in early April). US 90-day pause announced April 9 triggered\
      \ partial recovery (+2% Apr 11, +4.3% Apr 14). Uncertainty remains extreme;\
      \ re-escalation is a key left-tail risk. (4) COMMODITIES: Gold at all-time highs\
      \ (safe-haven demand, central bank buying) \u2014 strongly bullish for TSX Materials.\
      \ Oil faces headwinds from demand destruction and OPEC+ supply increases \u2014\
      \ bearish for Energy. Net commodity signal: mixed but gold's outperformance\
      \ moderately positive for the index. (5) CAD/YIELDS: USD/CAD recovered from\
      \ ~1.4296 to ~1.3893 by April 14 \u2014 CAD strength modestly positive. GoC\
      \ 10-yr yields rose ~3.01% to ~3.5% \u2014 headwind for rate-sensitive sectors\
      \ (REITs, utilities). (6) US SPILLOVERS: Fed on hold; divergence with BoC (BoC\
      \ more dovish) pressures CAD and creates yield differential. US tariff policy\
      \ the dominant macro risk globally. (7) PRICE DYNAMICS: The last 5-day log return\
      \ was +4.31% (a sharp relief bounce from ~-25% cumulative crash trough). Trailing\
      \ 63-day daily std ~2.7% implies 5-day vol ~6.0%. Post-crash bounces can see\
      \ continuation (relief rally) or consolidation. Distribution is highly uncertain\
      \ with fat tails. DISTRIBUTION CONSTRUCTION: Central tendency set at +0.5% (mild\
      \ positive drift reflecting relief rally momentum, gold tailwind, and BoC pause\
      \ support). Left tail is fatter than right (tariff re-escalation, weak jobs\
      \ data, potential for retracement of bounce). Q5=\u22129.5% (extreme tariff\
      \ shock re-escalation), Q10=\u22126.5% (sharp pullback), Q20=\u22123.5%, Q30=\u2212\
      1.5%, Q40=\u22120.5%, Q50=+0.5%, Q60=+1.8%, Q70=+3.2%, Q80=+5.0%, Q90=+7.5%,\
      \ Q95=+10.5%. The asymmetry (wider left tail) reflects elevated downside risk\
      \ from trade uncertainty while acknowledging the recent positive momentum and\
      \ gold/BoC support."
