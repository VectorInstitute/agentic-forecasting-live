    rationale: 'Overall forecast rationale: The TSX is in a high-volatility, headline-driven
      regime as of late April 2025. The index recovered sharply from the April tariff-shock
      lows and sits near a 3.2% 5-day gain. Macro fundamentals are soft (cooling jobs,
      BoC on hold, oil pressured) but not catastrophic. Gold''s safe-haven strength
      partially offsets energy weakness. The primary forecast risk is two-tailed:
      tariff escalation (sharp downside) vs. trade deal breakthrough (sharp upside).
      The median (0.50 quantile) is set at a very modest +0.15% drift, reflecting
      the near-neutral balance of forces after an extreme recovery bounce. The distribution
      is fat-tailed and uses the current elevated volatility regime (trailing 63d
      std = 2.95% weekly) as the key scale parameter.'
    horizon_rationale: "Forecast for the 5-business-day (1-week) S&P/TSX Composite\
      \ cumulative log-return ending ~2025-05-05, produced as of 2025-04-28. Key macro\
      \ drivers and assumptions: (1) BANK OF CANADA: BoC held at 2.75% on April 16,\
      \ 2025, pausing after 175bps of cuts since mid-2024. Stance is cautious/data-dependent;\
      \ a further cut is possible at the next meeting if trade headwinds deepen, which\
      \ would provide modest equity support. (2) INFLATION/JOBS: March CPI at 2.3%\
      \ (near target); carbon-tax removal providing a transitory deflationary impulse.\
      \ Labour market cooling\u2014economy shed 32,600 jobs in March, unemployment\
      \ at 6.7%. Macro backdrop is soft but not recessionary yet. (3) OIL & COMMODITIES:\
      \ Crude oil under pressure from global trade-war demand concerns, a headwind\
      \ for the TSX energy sector (~17% of index). Gold soaring as safe-haven, supporting\
      \ TSX materials/gold miners. Net commodity effect roughly neutral-to-slightly-negative.\
      \ (4) CAD/GOC YIELDS: CAD recently firmed on broad USD weakness; GoC 10yr yields\
      \ volatile. BoC-Fed policy divergence wide (BoC 2.75% vs Fed ~4.25-4.5%), keeping\
      \ structural pressure on CAD. (5) US TARIFFS/SPILLOVERS: 25% tariffs on most\
      \ Canadian goods (10% on energy) remain a pervasive uncertainty; partial pauses\
      \ and negotiations ongoing. This creates fat-tail downside risk from headline\
      \ escalation. (6) TSX TECHNICAL/MOMENTUM: After a severe tariff-shock selloff\
      \ (approx -11% cumulative, April 4\u20139), the TSX staged a sharp V-shaped\
      \ rebound (+~15% from the lows through April 28). The April 28 weekly log-return\
      \ was +3.3%, an extreme reading. Mean-reversion forces argue for a softer near-term\
      \ drift; however, continued trade-de-escalation optimism could sustain momentum.\
      \ DISTRIBUTION CONSTRUCTION: Trailing 63-day weekly log-return std = 0.0295\
