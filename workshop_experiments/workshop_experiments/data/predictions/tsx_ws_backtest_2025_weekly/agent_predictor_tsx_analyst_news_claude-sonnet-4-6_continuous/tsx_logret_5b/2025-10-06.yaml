    rationale: 'Overall macro backdrop as of October 6, 2025: Bank of Canada at 2.50%
      with further easing expected (supportive for TSX); inflation near target at
      2.4% Sept (slightly above but not alarming); labour market soft with unemployment
      at 7.1%; gold at record highs aiding materials sector; oil under moderate pressure
      from oversupply; CAD weak versus USD reflecting policy divergence and trade
      uncertainty; US tariffs on Canadian goods remain a structural headwind though
      some surtax relief was granted in September. The TSX has shown significant resilience
      in 2025 and has outperformed many global peers. Near-term positive drift is
      supported by the BoC easing cycle and gold rally, but the prior week''s large
      gain (+1.85%) and macro headwinds limit further immediate upside. Volatility
      is calibrated to the trailing 63-day daily std dev; slight negative skew reflects
      the tail risk from trade-policy escalation or commodity price reversals.'
    horizon_rationale: "Forecast origin: October 6, 2025. The TSX just posted a strong\
      \ +1.85% log return in the prior 5-day window and has been trending positively\
      \ since the April 2025 tariff shock low. The 63-day trailing daily std dev of\
      \ 0.00793 implies a 5-business-day volatility of ~0.0177 (= 0.00793 \xD7 \u221A\
      5). I set the median (Q0.50) at +0.007, reflecting: (1) BoC easing tailwind\
      \ \u2014 rate at 2.50% with a 25bp cut expected Oct 29, supporting financials\
      \ and risk assets; (2) Gold at record highs supporting the materials sector;\
      \ (3) Positive recent daily momentum (Oct 1\u20136 all green); but tempered\
      \ by (4) above-average unemployment (7.1%), which weighs on consumer spending\
      \ and loan quality; (5) oil price headwinds from oversupply; (6) mean-reversion\
      \ pressure after an unusually strong prior week (+1.85% is ~1\u03C3 above typical);\
      \ (7) lingering US tariff uncertainty and CAD weakness. The median is modestly\
      \ positive but well below the prior week's outsized return. A slight negative\
      \ skew is applied: the downside tail (Q0.05 = \u22120.024) is wider than the\
      \ upside tail (Q0.95 = +0.038) relative to the median, reflecting the asymmetric\
      \ risk from trade-policy shocks. The distribution is approximately normal with\
      \ a small negative skew, calibrated to historical 5-day return percentiles from\
      \ 25 years of weekly returns."
