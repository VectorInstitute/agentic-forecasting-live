    rationale: "Overall framework: 5-business-day S&P/TSX Composite cumulative log-return\
      \ forecast as of June 23, 2025. Key macro pillars: (1) BoC at 2.75%, second\
      \ consecutive hold, with market pricing further easing H2 2025 \u2014 net positive\
      \ for equity risk premium; (2) CPI headline at 1.7% (carbon-tax effect), but\
      \ core trim/median at ~3% \u2014 inflation not fully tamed, constraining BoC\
      \ optionality; (3) Labour market stress \u2014 unemployment 6.9%, private sector\
      \ job losses of 70k+ in preceding two months \u2014 drag on domestic demand;\
      \ (4) Commodities: oil elevated (Middle East geopolitics) and gold strong (safe-haven\
      \ demand) \u2014 positive for the ~40% combined energy+materials weight in the\
      \ TSX; (5) TSX outperforming US peers and at record levels in June 2025 \u2014\
      \ positive momentum signal; (6) US tariff uncertainty persists but markets have\
      \ priced in much of the tail risk since the April shock; (7) USD/CAD near 1.357\
      \ \u2014 modestly weak loonie supports commodity export revenues. Net: slightly\
      \ positive drift (+0.002 over 5 days), standard deviation scaled to ~0.060,\
      \ approximately normal distribution with modest fat tails to capture residual\
      \ tariff/geopolitical risk."
    horizon_rationale: "Forecast origin: June 23, 2025. The TSX had just reached record\
      \ highs in June 2025, supported by positive commodity tailwinds (elevated oil\
      \ prices from Middle East tensions; strong gold as a safe haven), broad sector\
      \ gains, and an accommodative BoC stance (policy rate held at 2.75% at June\
      \ 4 meeting, following cuts in Jan and Mar). Recent daily returns over the final\
      \ weeks of June were very small and positive (0.00\u20130.01 range), indicative\
      \ of low-volatility consolidation near all-time highs. Trailing 63-day daily\
      \ std = 0.0284, which includes the severe April 2025 tariff shock (TSX fell\
      \ ~11% peak-to-trough during early April). Spot vol has since normalized substantially.\
      \ For a 5-business-day horizon, I scale to \u03C3 \u2248 0.060 (slightly compressed\
      \ from \u221A5 \xD7 0.0284 = 0.0635 to reflect the normalization of post-April\
      \ shock volatility) and set \u03BC = +0.002 (modest positive drift reflecting\
      \ positive momentum, BoC accommodation, and commodity tailwinds, offset by labour\
      \ market stress \u2014 unemployment at 6.9% \u2014 core inflation stickiness\
      \ at ~3% on trim/median measures, and ongoing US tariff/trade uncertainty).\
      \ The distribution is approximately normal (symmetric), as TSX near record levels\
      \ offers both upside (further rotation into cyclicals, BoC easing premium, commodity\
      \ strength) and downside (tariff escalation, soft labour market, CAD weakness\
      \ amplifying import costs). The 90th\u201395th percentile captures a strong\
      \ 5-day rally in the +8\u201310% range (tail event), while the 5th percentile\
      \ at -9.7% reflects a plausible but unusual 5-day stress scenario. Key assumptions:\
      \ BoC stays on hold through June-end; no major tariff escalation; oil/gold commodity\
      \ prices remain broadly supportive; USD/CAD near 1.36; GoC 10-year yields stable."
