    rationale: "Overall forecast framework: The S&P/TSX Composite 5-business-day log-return\
      \ forecast is centered at +0.003 (slightly positive) reflecting the balance\
      \ between the BoC easing tailwind (policy rate at 2.50%, with further cuts expected),\
      \ strong recent momentum in gold/materials, and countervailing headwinds from\
      \ US trade tariffs (25% on many Canadian imports), a softening labour market\
      \ (unemployment 7.1%), a modest CPI surprise (2.4%), and mean-reversion risk\
      \ after the TSX's strong September 2025 rally. The distribution width (\u03C3\
      \u22480.017) is calibrated to the trailing 63-day daily volatility regime (\u03C3\
      _daily=0.00754), scaled to 5 days. Tail widening beyond the Gaussian baseline\
      \ is applied to reflect ongoing macro uncertainty (tariff escalation risk, geopolitical\
      \ commodity shocks). The positive drift bias (median above zero) reflects the\
      \ structural support from BoC rate cuts, strong gold prices benefiting the large\
      \ materials sector, and declining GoC bond yields supporting equity valuations."
    horizon_rationale: "5-business-day cumulative log-return forecast as of 2025-09-22.\
      \ Key inputs: (1) Bank of Canada cut policy rate to 2.50% on Sept 17, 2025 \u2014\
      \ the easing cycle is supportive of equities, but the cut was fully priced in\
      \ so limited incremental upside catalyst. A further cut to 2.25% is expected\
      \ in October, providing mild medium-term support. (2) Canadian labour market\
      \ deteriorated significantly \u2014 unemployment at 7.1% (highest ex-pandemic\
      \ since 2016), net loss of 66k jobs in August \u2014 indicating economic slack\
      \ and potential earnings headwinds for domestic-facing sectors. (3) CPI surprised\
      \ to the upside at 2.4% vs. 1.9% prior, complicating the pace of further BoC\
      \ easing and adding uncertainty. (4) Commodity backdrop: gold strong on safe-haven/geopolitical\
      \ demand (positive for TSX materials sector); oil mixed with oversupply concerns\
      \ (neutral-to-negative for TSX energy). (5) USD/CAD: Canadian dollar under pressure\
      \ from rate differential (~1.37), which is modestly supportive of resource exporters'\
      \ earnings in CAD terms. GoC 10-year yield ~3.20%, trending lower \u2014 supportive\
      \ of equity valuations. (6) US tariffs at 25% on many Canadian goods create\
      \ ongoing headwind for trade-exposed sectors (autos, steel, aluminum, lumber).\
      \ (7) Recent TSX price action has been strongly positive through September 2025\
      \ with near-consecutive daily gains, creating modest mean-reversion risk over\
      \ the next week. Statistical calibration: trailing 63-day daily std dev = 0.00754;\
      \ 5-day std \u2248 0.00754 \xD7 \u221A5 \u2248 0.01686. Slight positive drift\
      \ of ~0.003 reflects BoC easing tailwind offset by trade/inflation risks and\
      \ mean-reversion tendency after a strong run. Fat tails at q0.05 (\u22120.026)\
      \ and q0.95 (+0.033) reflect macro tail risks (tariff escalation, inflation\
      \ surprise, commodity price shock). Distribution is approximately symmetric\
      \ with a slight positive shift from the easing macro backdrop."
