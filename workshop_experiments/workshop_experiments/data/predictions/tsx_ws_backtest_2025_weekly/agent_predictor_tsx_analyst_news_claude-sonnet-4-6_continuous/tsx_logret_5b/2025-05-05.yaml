    rationale: 'Overall model rationale: The S&P/TSX Composite is forecast at a horizon
      of 5 business days (as of 2025-05-05). The central view is a mild positive drift
      of approximately +0.4% (log return), consistent with decelerating recovery momentum,
      slight BoC accommodation, partial safe-haven support from gold, and a global
      risk-on tilt from the US-China trade truce. The primary risk factors are: (a)
      US-Canada tariff escalation or CUSMA disruption (left-tail), (b) oil price weakness
      weighing on energy sector earnings (mild downside), (c) potential profit-taking
      after the sharp April recovery (mild downside). Right-tail risks include trade-deal
      optimism, gold/commodity surge, or stronger-than-expected Canadian economic
      data. Vol is calibrated at ~3.3% for the 5-day period, above the trailing average
      of 2.97%, to account for the elevated macro-political uncertainty.'
    horizon_rationale: "Forecast origin: 2025-05-05. Horizon: 5 business days (1 calendar\
      \ week). Key assumptions and drivers: (1) Bank of Canada policy rate holds at\
      \ 2.75% \u2014 the BoC is in a data-dependent pause after cutting 175bp since\
      \ mid-2024, broadly accommodative for equities but not a near-term catalyst.\
      \ (2) US-Canada tariff overhang remains: 25% on most Canadian goods and 10%\
      \ on energy are still in effect, creating a structural growth headwind and suppressing\
      \ Canadian business investment. This is partially priced in after the April\
      \ 2025 drawdown (~11% cumulative log-return trough on 2025-04-08). (3) Commodity\
      \ signals are mixed: gold is elevated (safe-haven demand, supports materials/miners)\
      \ but crude oil faces downward pressure from global demand concerns tied to\
      \ the US-China trade war; net effect on TSX is roughly neutral to slight positive\
      \ due to materials offset. (4) A US-China trade truce (90-day respite) announced\
      \ around early May adds some global risk-on sentiment and has contributed to\
      \ the recovery seen from April 11 through May 5. (5) CAD under pressure vs USD\
      \ and GoC-UST yield spreads are wide, which typically constrains foreign capital\
      \ inflows into TSX. (6) Momentum: the TSX staged a sharp recovery from the April\
      \ trough (log-returns of +0.04, +0.07, +0.02, +0.05, +0.02, +0.02, +0.02, +0.02,\
      \ +0.03, +0.02, +0.03, +0.02, +0.01, +0.00, +0.01, +0.01 from April 11 to May\
      \ 5). Momentum is decelerating, suggesting the market may consolidate near current\
      \ levels or drift slightly. The last_log_return of +0.006226 (May 5 daily) is\
      \ modestly positive. Point forecast (median): +0.004 (~+0.4%) over 5 business\
      \ days, capturing slight positive momentum carry balanced against consolidation\
      \ risk. Distribution: elevated vol regime \u2014 trailing 63-period std is ~2.97%\
      \ per 5-day period. Fat tails are warranted given the still-elevated trade-policy\
      \ uncertainty and potential for headline-driven spikes in either direction.\
      \ Effective distributional width uses \u03C3\u22483.3% (slightly above trailing\
      \ due to event-risk premium), with a modest positive skew given the bullish\
      \ recovery momentum and BoC easing backdrop. The left tail (Q5: -5.4%) reflects\
      \ scenarios where tariff escalation resumes, oil drops, or a new risk-off episode\
      \ materialises. The right tail (Q95: +6.3%) reflects a scenario where trade\
      \ resolution news, commodity rally, or positive macro surprise accelerates the\
      \ recovery."
