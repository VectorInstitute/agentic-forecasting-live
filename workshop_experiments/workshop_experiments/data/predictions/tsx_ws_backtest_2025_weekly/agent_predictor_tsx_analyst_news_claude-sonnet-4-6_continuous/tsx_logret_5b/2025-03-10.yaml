    rationale: 'Overall framework: As of March 10 2025, the S&P/TSX Composite is in
      a tariff-shock-driven bear phase with strong negative momentum and elevated
      macro uncertainty. The primary drivers are: (1) US-Canada trade war (25% tariff
      on goods, 10% on energy, Canadian retaliation), (2) Bank of Canada easing cycle
      (policy rate 3.0%, probable 25bp cut on March 12), (3) weak Canadian dollar
      (USD/CAD ~1.437), (4) declining GoC yields on growth fears, (5) mixed commodities
      (weak oil, firm gold as safe haven), and (6) deteriorating labour market (unemployment
      6.7%). For the 5-business-day horizon, the median return is set slightly negative
      (-0.007) reflecting the balance between persistent tariff headwinds and the
      potential for a BoC-cut-driven relief rally. Volatility is elevated at ~4.0%
      over 5 days. The distribution has a mild left skew given the asymmetric downside
      risks from trade escalation versus an upside surprise from tariff de-escalation
      or trade deal news.'
    horizon_rationale: "Forecast origin: 2025-03-10. The TSX has been in a sharp sell-off:\
      \ seven consecutive negative daily bars from March 3\u201310, with the March\
      \ 10 bar alone at -0.025 log-return. The cumulative drawdown since late February\
      \ is roughly 13\u201315%, driven by the US imposing 25% tariffs on most Canadian\
      \ goods (10% on energy) on March 4, 2025, and Canada's retaliatory measures.\
      \ Key inputs: (1) BoC Policy: After 6 consecutive cuts totalling -175bps (policy\
      \ rate at 3.00%), markets priced >85% probability of a further 25bp cut at the\
      \ March 12 announcement. This is a near-term positive catalyst (relief rally\
      \ potential), but the rate cut itself signals trade-war recession risk rather\
      \ than strength. (2) US Tariffs/Trade War: The structural shock is severe. Canada-US\
      \ trade flows disrupted, corporate earnings and capex guidance deteriorating.\
      \ This creates persistent negative pressure. (3) USD/CAD: ~1.4371 (near 20-yr\
      \ lows), wide BoC-Fed yield spread \u2014 weak CAD partially buffers TSX's energy/materials\
      \ in local currency terms but signals macro distress. (4) GoC 10yr yields: Declining\
      \ on growth fears (10yr futures near recent highs March 3); lower yields modestly\
      \ support bank valuations but reflect recession fears. (5) Commodities: Oil\
      \ mixed-to-weak (tariff demand fears); gold elevated on safe-haven demand \u2014\
      \ partially supports TSX materials/gold miners. (6) Labour market: Unemployment\
      \ at 6.7% and rising; business investment restrained. Conditional mean set at\
      \ -0.007 (slight negative bias reflecting tariff headwinds, but extreme oversold\
      \ conditions and BoC cut catalyst inject upward asymmetry). Volatility set at\
      \ ~0.040 (5-day), wider than the recent 63d std of 0.034 (\u221A5 \xD7 0.0153)\
      \ to reflect heightened regime uncertainty. A mild left skew (skew \u2248 -0.3)\
      \ is applied: the downside tail is fatter (tariff escalation, recession confirmation)\
      \ while the upside tail is slightly compressed but still meaningful (tariff\
      \ pause/deal, strong BoC signal, short-covering bounce). The 5th percentile\
      \ at -0.082 captures a scenario of further tariff escalation or macro shock;\
      \ the 95th percentile at +0.056 captures a sharp relief rally on trade negotiations\
      \ or a dovish BoC surprise."
