    rationale: "Overall forecast methodology: Combined historical distributional calibration\
      \ (25 years of weekly 5-day TSX log-return data) with current macro and geopolitical\
      \ context. The primary regime features: (a) BoC easing cycle providing a modest\
      \ tailwind; (b) US tariff risk as the dominant left-tail catalyst given the\
      \ February 1 tariff deadline falling within the forecast window; (c) positive\
      \ recent momentum (TSX +~3% in prior week) providing near-term support; (d)\
      \ commodity prices (gold firm, oil mixed) roughly neutral; (e) CAD weakness\
      \ slightly positive for resource-exporter earnings. Net result: median of approximately\
      \ +0.3% (log) with a left-skewed distribution \u2014 the upper half of the distribution\
      \ is slightly compressed relative to the lower half to reflect the asymmetric\
      \ tariff shock risk."
    horizon_rationale: "5-business-day cumulative log-return forecast as of 2025-01-27.\
      \ Key inputs and assumptions: (1) Bank of Canada policy \u2013 BoC cut rates\
      \ 25bp to 3.0% in January 2025, completing 175bp of easing since June 2024.\
      \ This accommodative stance is modestly supportive for TSX valuations, especially\
      \ rate-sensitive financials and real estate. (2) Canadian inflation/labour \u2013\
      \ December CPI at 1.8% (below target, partly GST/HST holiday effect) and a strong\
      \ +90k jobs print are broadly constructive. No immediate re-tightening risk,\
      \ but inflation floor uncertainty from potential tariffs. (3) US tariff risk\
      \ \u2013 The dominant left-tail risk: the incoming Trump administration signalled\
      \ potential 25% blanket tariffs on Canadian goods, with possible announcement/implementation\
      \ around February 1, which falls within this 5-day horizon. This creates a material\
      \ asymmetric left-tail risk (estimated -5% to -10% TSX draw if tariffs were\
      \ formally enacted). I have fattened the left tail accordingly: Q5 at -6.3%\
      \ (vs. ~-5.3% for a symmetric normal). (4) Commodities \u2013 Gold prices were\
      \ elevated and supportive for TSX materials names. Oil outlook was mixed with\
      \ rising global supply expectations. Net commodity effect is roughly neutral-to-slightly\
      \ positive. (5) CAD/USD \u2013 Loonie under pressure (~1.44 CAD/USD), which\
      \ reduces purchasing power but provides a translation boost to resource-exporter\
      \ earnings. Net slightly positive for TSX in CAD terms. (6) Recent momentum\
      \ \u2013 TSX rallied strongly in the Jan 20\u201327 window (+~3% off mid-January\
      \ lows), supported by the BoC cut and positive global risk sentiment. This provides\
      \ a slight positive carry into the next 5 days but also raises mean-reversion\
      \ risk. (7) Volatility calibration \u2013 Trailing 63-day daily std = 0.01538;\
      \ 5-day std = 0.01538 \xD7 \u221A5 \u2248 0.0344. Distribution is centered at\
      \ +0.003 (slight positive drift reflecting BoC easing and momentum) with slight\
      \ left skew (tariff tail risk). The IQR (Q30\u2013Q70) spans approximately -0.013\
      \ to +0.019, consistent with a typical non-crisis 5-day window. Extreme tails\
      \ (Q5/Q95) are widened modestly relative to the normal to capture the binary\
      \ tariff-announcement event risk."
