      \ near 2002 lows; Canada-US 2-year spread ~135bp (widest since mid-1990s), reflecting\
      \ BoC-Fed policy divergence; weak CAD creates foreign-investor headwind for\
      \ TSX. (5) US tariff/inauguration risk \u2014 The dominant near-term risk factor;\
      \ 25% tariff threats on Canadian imports could materially weigh on Canadian\
      \ GDP and force additional BoC cuts while simultaneously raising inflation risks;\
      \ this inauguration-day uncertainty creates an asymmetric left-tail risk. (6)\
      \ Recent price dynamics \u2014 The last weekly log-return was +0.024 (strong),\
