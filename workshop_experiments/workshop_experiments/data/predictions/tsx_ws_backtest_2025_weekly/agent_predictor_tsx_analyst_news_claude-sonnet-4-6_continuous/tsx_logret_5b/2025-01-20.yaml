    horizon_rationale: "Forecast origin: 2025-01-20 (Trump US inauguration day). Horizon:\
      \ 5 business days ahead. Key factors: (1) Bank of Canada policy \u2014 175bp\
      \ of cuts since June 2024 bring the overnight rate to ~3.0\u20133.25%; a further\
      \ 25bp cut was anticipated at the Jan 2025 meeting, supportive of domestic equities\
