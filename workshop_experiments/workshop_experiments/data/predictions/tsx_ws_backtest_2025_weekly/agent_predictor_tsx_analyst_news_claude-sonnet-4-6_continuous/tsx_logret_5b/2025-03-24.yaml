    rationale: "Overall forecast philosophy: In the current environment (March 24,\
      \ 2025), the S&P/TSX Composite faces a classic stagflationary risk regime\u2014\
      BoC easing providing a floor, but US tariff escalation threatening a sharp growth\
      \ shock and elevated volatility. The TSX's heavy commodity weighting (energy\
      \ + materials) means commodity price moves (especially oil and gold) are critical\
      \ second-order drivers. Gold strength partially offsets oil weakness. The April\
      \ 2 reciprocal tariff event creates material tail risk that skews the distribution\
      \ slightly leftward. The 5-day median is anchored near +0.3% reflecting slight\
      \ positive drift from BoC accommodation and gold tailwind, but subdued by recent\
      \ mean-reversion forces after the prior week's strong recovery. Volatility is\
      \ set at ~1.5% (5-day std), consistent with the trailing 63-day empirical estimate,\
      \ implying the distribution spans roughly \xB13% at 2-sigma."
    horizon_rationale: "Forecast for 5 business days ahead (approx. March 25\u2013\
      31, 2025). The TSX has just recovered +2.07% over the prior 5-day window (Mar\
      \ 17\u201324), bouncing off oversold levels hit during the tariff-driven selloff\
      \ in early/mid-March. The trailing 63-day volatility of ~1.54% per 5-day period\
      \ is elevated, reflecting the high-uncertainty regime around US-Canada trade\
      \ war.\n\nKey drivers considered:\n1. BANK OF CANADA: Cut to 2.75% on March\
      \ 12 (7th straight cut). Dovish stance is supportive of equities via lower discount\
      \ rates, but trade uncertainty dominates the near-term macro picture.\n2. TARIFF/TRADE\
      \ RISK: The US imposed 25% tariffs on most Canadian goods (10% on energy) on\
      \ March 4; Canada retaliated with $30B of counter-tariffs. The April 2 'reciprocal\
      \ tariff' deadline from the US falls just outside or at the edge of this forecast\
      \ horizon, creating a binary tail event. Left-tail skew added to account for\
      \ potential tariff escalation shock.\n3. INFLATION & LABOUR: CPI near 2% target,\
      \ labour market cooling (modest excess supply). Macro fundamentals are benign\
      \ but fragile; trade war is the dominant uncertainty.\n4. COMMODITIES: Gold\
      \ near all-time highs (supportive for TSX Materials/precious metals). WTI oil\
      \ ~$71/bbl, soft (2024 lows), mildly negative for TSX Energy. Base metals face\
      \ global demand headwinds.\n5. CAD/USD: ~1.4467, under pressure from BoC-Fed\
      \ policy divergence. Loonie weakness provides modest CAD-translation lift for\
      \ resource exporters.\n6. GoC YIELDS: Curve steepening \u2014 short-end rallying\
      \ (BoC cuts), long-end rising (tariff-inflation premium). Mixed signal for financials.\n\
      7. US FED: On hold at higher-for-longer stance. Divergence from BoC exerts capital\
      \ outflow pressure on CAD assets, mild headwind.\n8. RECENT MOMENTUM & MEAN\
      \ REVERSION: After a sharp +2% 5-day gain, slight mean-reversion tendency argues\
      \ for a modestly muted expected return. Median set at +0.003 (~+0.3%), slightly\
      \ positive reflecting BoC support and gold tailwind, with near-zero net drift\
      \ after accounting for mean reversion.\n\nDistribution: Approximately normal\
      \ with slight negative skew and fat tails given elevated trade policy uncertainty.\
      \ Standard deviation ~1.5% for 5-day horizon. The 5th\u201395th percentile band\
      \ of -2.5% to +3.0% reflects the asymmetric tariff-escalation risk (deeper downside\
      \ possible) vs. partial relief-rally upside if trade negotiations yield a delay\
      \ or deal."
