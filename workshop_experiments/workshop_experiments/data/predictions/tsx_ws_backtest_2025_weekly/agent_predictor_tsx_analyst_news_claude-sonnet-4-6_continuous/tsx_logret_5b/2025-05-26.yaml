    rationale: "Overall approach: Combined historical distributional analysis of 5-day\
      \ TSX log returns with current macro context. The trailing 63-day daily std\
      \ of 0.0304 is approximately 65% above the long-run average (~0.018), reflecting\
      \ residual tariff-shock volatility. The positive drift assumption (+0.002 over\
      \ 5 days) reflects: (a) BoC easing cycle support, (b) gold-driven materials\
      \ sector tailwind, (c) positive near-term momentum from the April-May recovery\
      \ rally. The wide quantile spread accounts for the still-elevated uncertainty\
      \ around US-Canada trade policy, potential commodity price swings, and the fact\
      \ that 6 weeks of strong gains may be priced for a consolidation. The asymmetry\
      \ is modest \u2014 the positive drift slightly right-shifts the distribution,\
      \ but the left tail is kept slightly fatter than Gaussian to reflect trade event\
      \ risk."
    horizon_rationale: "Forecast for 5-business-day (\u22481-week) cumulative log\
      \ return on the S&P/TSX Composite, origin 2025-05-26.\n\n**Key macro inputs:**\n\
      1. Bank of Canada policy: Rate held at 2.75% with an easing bias; BoC in a 'wait-and-see'\
      \ mode following its mid-2024 to early-2025 cut cycle. Low inflation (April\
      \ CPI 1.7% headline, partly from carbon-tax removal) provides room for further\
      \ easing but core inflation is nudging higher, restraining BoC. No scheduled\
      \ BoC decision in the immediate 5-day window.\n2. Inflation & labour: Headline\
      \ inflation benign; labour market showing some softness in trade-sensitive sectors\
      \ due to US tariff shock. Net effect: mildly supportive for equities (lower\
      \ rates help valuations).\n3. Commodities: Gold well bid on safe-haven demand\
      \ \u2014 strongly positive for TSX materials/miners. Oil mixed: geopolitical\
      \ support offset by global demand concerns and tariff-related growth fears.\
      \ Base metals under pressure from strong USD and industrial demand uncertainty.\n\
      4. USD/CAD: CAD under depreciation pressure from BoC-Fed divergence and tariff-related\
      \ risk aversion. Weaker CAD is a headwind for domestic purchasing power but\
      \ translates commodity revenues more favourably for resource sector earners.\n\
      5. US tariff/trade spillovers: US tariffs imposed in April 2025 triggered a\
      \ sharp -11% TSX drawdown followed by a strong recovery. As of May 26, the market\
      \ has retraced most of the April decline over 6 weeks of positive momentum.\
      \ Uncertainty remains but worst-case tariff scenario has been partially priced.\
      \ Near-term risk: any re-escalation in trade rhetoric.\n6. Sector outlook: Financials\
      \ face slowing domestic growth but benefit from BoC easing on funding costs.\
      \ Energy faces structural uncertainty. Materials (gold miners) are the brightest\
      \ spot. Earnings tone is mixed.\n\n**Statistical calibration:**\n- Trailing\
      \ 63-day daily std = 0.0304 \u2192 5-day \u03C3 \u2248 0.0304\xD7\u221A5 \u2248\
      \ 0.068. Applied \u03C3 = 0.065 (modest mean-reversion discount given current\
      \ elevated vol regime).\n- Drift: +0.002 (mild positive, reflecting slight positive\
      \ momentum after recovery rally, BoC easing, gold support; offset by consolidation\
      \ risk after a 6-week run-up and residual tariff uncertainty).\n- Distribution\
      \ shape: approximately normal with slight left-tail widening at the 5th percentile\
      \ to capture tail risk from tariff re-escalation or commodity shock. The Q5\
      \ is set at -0.105 (approximately -1.65\u03C3 with slight additional left skew).\n\
      - Recent 5-day return readings in the data range: last 4 weeks showed ~+0.01\
