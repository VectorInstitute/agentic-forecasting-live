    rationale: "Overall forecast rationale for S&P/TSX Composite 5-business-day log\
      \ return as of 2025-05-12: The index has recovered strongly from the April tariff\
      \ shock, the most recent daily reading was a large +2.29% on May 12 (possibly\
      \ driven by US-China trade truce news). The base case median is a modest +0.4%\
      \ over the next 5 days, reflecting: (a) continued positive price momentum and\
      \ improving global risk sentiment from trade de-escalation; offset by (b) short-term\
      \ consolidation risk after a large one-day gain and a multi-week rally; (c)\
      \ ongoing macro headwinds from US tariffs on Canadian goods, soft Canadian labour\
      \ market, and a weakening CAD. Volatility remains elevated (~3%/day trailing\
      \ std dev), producing wide forecast intervals. The 10th\u201390th percentile\
      \ range of approximately \u22127.4% to +7.8% reflects the heightened macro uncertainty\
      \ of the current tariff-war environment. Key upside risk: further US-China/US-Canada\
      \ trade deal progress, gold surge, BoC cut signal. Key downside risk: tariff\
      \ re-escalation, oil price collapse, sharp CAD depreciation, or a global risk-off\
      \ event."
    horizon_rationale: "Forecast origin: 2025-05-12. Horizon: 5 business days (1 calendar\
      \ week). Key drivers and assumptions: (1) MOMENTUM vs. DIGESTION \u2014 The\
      \ TSX has staged a powerful recovery from the early-April tariff-shock sell-off\
      \ (~\u221211% trough), rallying strongly since mid-April, with the most recent\
      \ daily log-return at +2.29%. A US-China tariff truce announced around May 12\
      \ has further boosted global risk sentiment, likely pulling forward some near-term\
      \ upside. This creates a modest digestion/consolidation risk for the 5-day forward\
      \ window even as the broader trend remains constructive. Net effect: median\
      \ set at a modest positive +0.004. (2) VOLATILITY REGIME \u2014 Trailing 63-day\
      \ daily \u03C3 \u2248 2.99%, implying a 5-day \u03C3 of ~6.7% (log). Given the\
      \ ongoing tariff-uncertainty regime and elevated policy uncertainty, I maintain\
      \ \u03C3_5d near 6.3%, resulting in wide quantile spreads. The 5th\u201395th\
      \ percentile range spans ~\u22129.8% to +10.1%, consistent with the historically\
      \ observed tail events in the data (e.g., \xB15\u201310% weekly moves during\
      \ 2008, 2020, Apr 2025). (3) BANK OF CANADA \u2014 Holding at 2.75%, data-dependent.\
      \ Paused easing cycle. Inflation eased to ~1.7% YoY in April (carbon tax removal\
      \ effect). Labour market soft (unemployment ~6.9%). BoC policy is not an immediate\
      \ catalyst in either direction over a 5-day horizon but maintains a mild easing\
      \ bias supportive of equities. (4) COMMODITIES \u2014 Gold elevated (geopolitical/safe-haven\
      \ demand), oil mixed (OPEC+ discipline vs. global demand concerns from trade\
      \ war). TSX energy and materials sectors face cross-currents; net commodity\
      \ impact is roughly neutral-to-slightly-positive over the week. (5) TRADE POLICY\
      \ \u2014 US-Canada: 25% tariffs persist but a 90-day pause on some reciprocal\
      \ tariffs remains in effect. US-China: a truce/de-escalation was apparently\
      \ announced around May 12, which is risk-positive for global equities including\
      \ TSX. The tariff uncertainty 'risk premium' has partially compressed but could\
      \ re-expand if headlines deteriorate. (6) DISTRIBUTION SHAPE \u2014 Slightly\
      \ right-skewed (positive momentum, tariff de-escalation tailwind) but with a\
      \ fat left tail (trade-war re-escalation, commodity shock, CAD weakness). The\
      \ interquantile range (0.1\u20130.9) spans ~\u22127.4% to +7.8%, reflecting\
      \ 63-day elevated volatility norms and the current macro regime."
