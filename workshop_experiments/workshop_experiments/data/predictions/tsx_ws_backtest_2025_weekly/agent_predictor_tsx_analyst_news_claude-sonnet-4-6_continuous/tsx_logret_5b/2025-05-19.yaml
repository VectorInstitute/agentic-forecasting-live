      bonds; (c) gold at record highs strongly supporting Materials (~13% TSX weight);
      (d) oil price headwinds for Energy (~17% TSX weight); (e) CAD weakness not necessarily
      a negative for large-cap commodity exporters; (f) strong index momentum since
      the April trough. The 63-day trailing volatility of 3.05% per 5-day window is
      the primary scale driver. The median (+0.3% log return) reflects a modest positive
      drift that is consistent with the recovery phase and supportive monetary policy,
      but well below the prior week''s +2.4% given mean-reversion and persistent uncertainty.'
    horizon_rationale: "Forecast as of 2025-05-19 for the 5-business-day (1 calendar\
      \ week) cumulative log return of the S&P/TSX Composite. Key inputs: (1) Bank\
      \ of Canada policy rate at 2.75% with an easing bias but a data-dependent pause;\
      \ headline CPI at ~1.7% (carbon-tax drag) while core measures are firming, complicating\
      \ further cuts near term \u2014 overall mildly supportive for equities. (2)\
      \ Labour market softening (unemployment ~6.9%) adds mild drag. (3) Gold at record\
      \ ~USD 3,500/oz is a strong tailwind for TSX Materials/gold miners (~13% index\
      \ weight); crude oil facing downward pressure from OPEC+ supply increases and\
      \ demand uncertainty \u2014 mixed for Energy (~17% weight). (4) CAD under pressure\
      \ from BoC-Fed divergence; GoC 10y yields elevated/uncertain. (5) US tariff\
      \ uncertainty persists (25% on most Canadian goods, 10% on energy) but a US-China\
      \ 90-day trade truce in mid-May reduced immediate tail risks globally and supported\
      \ a broad risk-on tone. (6) TSX had a sharp drawdown in early April (~-11% cumulative\
      \ log-return from Apr 4\u20138) followed by a strong recovery; the most recent\
      \ 5-day window (May 12\u201316) printed +2.4%, suggesting the index has largely\
      \ retraced the tariff shock. After such a strong prior week, mild mean-reversion\
      \ is possible but momentum remains positive. Statistical calibration: trailing\
      \ 63-day std = 3.05% per 5-day period is used as the volatility scale. A small\
      \ positive drift of ~+0.3% reflects the net positive macro backdrop (BoC easing,\
      \ gold strength, trade-truce sentiment, recovery momentum) offset by tariff\
      \ uncertainty, labour market softness, and oil weakness. The distribution is\
      \ approximately Gaussian with slightly fattened left tail (tariff escalation\
      \ risk) and marginally fatter right tail (gold strength, further trade-deal\
      \ optimism). Q05 = -0.047 and Q95 = +0.054 reflect the asymmetric tails."
