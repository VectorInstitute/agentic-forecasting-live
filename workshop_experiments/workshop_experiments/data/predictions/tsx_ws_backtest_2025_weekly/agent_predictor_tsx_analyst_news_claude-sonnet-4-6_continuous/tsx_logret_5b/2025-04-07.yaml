    rationale: "Overall forecast context: The TSX on 2025-04-07 is in a full-blown\
      \ tariff-shock bear market with the single-day log return of -8.6% (the worst\
      \ since COVID March 2020). The 5-business-day forward distribution is dominated\
      \ by three forces: (1) extreme mean-reversion potential \u2014 the market is\
      \ deeply oversold and bounces of 5-10% are historically common within the first\
      \ week after such crashes; (2) continued downside risk \u2014 tariff escalation,\
      \ oil price collapse, and recessionary fears in Canada could sustain selling;\
      \ (3) massive policy optionality \u2014 BoC emergency cuts, US tariff exemptions,\
      \ or US-Canada negotiation could catalyze sharp reversals. The 63-day trailing\
      \ std of 0.0207/day translates to ~0.0463 over 5 days under normal conditions;\
      \ I inflate this to ~0.065 for the post-crisis vol regime. Central estimate\
      \ (median) is +1.2%, reflecting that the balance of probabilities slightly favors\
      \ a partial bounce over continued decline at this extreme oversold level, but\
      \ the distribution is so wide that the range from Q10 (-8.2%) to Q90 (+10.2%)\
      \ spans ~18 log-points \u2014 consistent with the extraordinary uncertainty\
      \ of the US-Canada trade war situation."
    horizon_rationale: "As of 2025-04-07, the TSX has just experienced an extraordinary\
      \ two-day rout: -7% on Apr 4 and -8.6% on Apr 7 (cumulative log-return ~-15.5%),\
      \ triggered by the US 'Liberation Day' sweeping tariff announcement (25% on\
      \ most Canadian goods, 10% on energy) and Canadian retaliation. This is comparable\
      \ in severity to the COVID March 2020 crash and the GFC Oct 2008 episode. Key\
      \ macro drivers: (1) Bank of Canada at 2.75% with further cuts anticipated \u2014\
      \ supportive medium-term but cannot offset near-term trade shock; (2) Oil under\
      \ severe pressure from demand destruction fears; gold strong as safe haven;\
      \ (3) CAD near weakest since 2002; (4) US Fed maintaining restrictive stance,\
      \ widening Canada-US policy divergence. For the 5-business-day horizon: I use\
      \ an effective 5-day vol of ~0.065 (roughly 3x the 'normal' 5-day std of ~0.047\
      \ from the trailing daily std of 0.0207, reflecting post-crash realized vol\
      \ spike). The central tendency is a slight positive (~+1.2% median) reflecting\
      \ the strong historical mean-reversion tendency after extreme single-session\
      \ crashes \u2014 bounces of +3-8% are common in the first week post-crash (e.g.,\
      \ 2009-03-22 +7%, 2020-04-05 +4%, 2008-10-12 +7%). However, the distribution\
      \ is very wide and has a heavy left tail because: (a) tariff escalation risk\
      \ remains (China-US contagion, no negotiation progress), (b) oil prices could\
      \ fall further on global demand fears, and (c) banking sector faces margin and\
      \ credit risk from a potential Canadian recession. The right tail is similarly\
      \ fat \u2014 a tariff deal announcement or BoC emergency cut could produce a\
      \ large relief rally. The Q5/Q95 spread of ~24 log-points reflects this extreme\
      \ uncertainty. The slight positive skew in the upper quantiles accounts for\
      \ the historical tendency for post-crash bounces to be sharper than continued\
      \ declines over a 1-week window. Historical analogs post -8%+ daily drops: continued\
      \ decline Q5 tail (~-11.5%), most likely scenario is partial bounce (+1-3%),\
      \ upside Q95 is a strong relief rally (~+12.8%)."
