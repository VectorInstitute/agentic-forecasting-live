      \ could deliver a -5% to -8% week whereas upside surprise from trade deal announcement\
      \ is bounded by market's recent fatigue with relief rallies. The resulting distribution\
      \ captures the fragile but slightly positive near-term bias with elevated downside\
      \ fat tails."
