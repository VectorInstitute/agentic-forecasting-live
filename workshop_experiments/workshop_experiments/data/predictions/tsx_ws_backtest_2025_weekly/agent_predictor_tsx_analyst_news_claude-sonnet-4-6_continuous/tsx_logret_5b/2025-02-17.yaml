      \ central estimate is nudged marginally positive to reflect: (a) BoC easing\
      \ cycle still in progress, (b) gold price tailwind for heavyweight materials\
      \ sector, (c) recent positive price momentum in the index. Downside tail is\
      \ widened and left-skewed to reflect the asymmetric tariff escalation risk that\
      \ dominated market sentiment in this period. The Fed holding policy restrictive\
      \ and the wide Canada-US yield spread (near 40-year highs) add a structural\
      \ CAD depreciation headwind that limits the upside for TSX in USD terms. Net\
      \ result: a near-zero median with a moderately fat left tail reflecting the\
      \ binary tariff-outcome risk premium."
    horizon_rationale: "5-business-day cumulative log-return forecast as of 2025-02-17.\
      \ Key inputs: (1) STATISTICAL BASELINE \u2014 trailing 63-day daily std of 0.01426\
      \ implies a 5-day \u03C3 \u2248 0.0319; the last 5-day observation (+0.0016)\
      \ and recent short-run price action (Feb 2025 readings of +0.00 to +0.02) suggest\
      \ mild positive momentum. (2) BANK OF CANADA \u2014 BoC cut to 3.00% in January\
      \ 2025 (-25bps), completing 175bps of easing since June 2024; no explicit forward\
      \ guidance given tariff uncertainty. Rate easing is mildly supportive of equity\
      \ valuations but the pause signal tempers enthusiasm. (3) INFLATION & LABOUR\
      \ \u2014 January 2025 LFS surprised to the upside (+76K jobs, UR 6.6%), CPI\
      \ near 2% target; broadly neutral-to-slightly-positive, reducing near-term recession\
      \ risk from domestic factors alone. (4) TARIFF/TRADE RISK \u2014 dominant macro\
      \ headwind: US threatened 25% tariffs on most Canadian goods and 10% on energy;\
      \ temporary delays provided relief but structural uncertainty remains severe,\
      \ creating asymmetric downside tail risk and depressing business investment.\
      \ (5) CAD & GoC YIELDS \u2014 CAD near 23-year lows vs USD driven by BoC-Fed\
      \ policy divergence and tariff fears; GoC yields trending lower (safe-haven\
      \ bid, yield curve flattening); weak CAD helps resource exporters but signals\
      \ broader economic stress. (6) COMMODITIES \u2014 gold surging in February (safe-haven\
      \ demand from trade war fears), supportive of TSX materials/mining sector; WTI\
      \ oil steady but subject to tariff-related disruption risk; mixed signals for\
      \ energy sector. (7) DISTRIBUTION SHAPE \u2014 central estimate (median) set\
      \ at +0.002 (small positive: gold/materials tailwind + BoC easing partially\
      \ offset by tariff uncertainty). Effective \u03C3 widened slightly to ~0.033\
      \ to account for elevated event risk (tariff escalation/reversal). Applied mild\
