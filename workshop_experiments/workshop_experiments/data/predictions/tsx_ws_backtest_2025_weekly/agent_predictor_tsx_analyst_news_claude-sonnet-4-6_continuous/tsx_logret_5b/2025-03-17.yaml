    rationale: Overall macro environment for the S&P/TSX Composite as of 2025-03-17
      is characterized by a tug-of-war between (a) accommodative BoC policy, near-record
      gold prices, and a short-term mean-reversion bounce after a severe drawdown,
      vs. (b) an active US-Canada trade war with 25% tariffs, weak CAD, softening
      labour market, above-target inflation, and negative US equity sentiment spillover.
      The net result is a near-zero median forecast with elevated uncertainty (wider
      distribution than average) and meaningful negative skew. The 63-day trailing
      daily vol of 0.01571 implies a 5-day base sigma of ~0.0351; current conditions
      warrant a slight upward adjustment to ~0.037. The single most important risk
      event for the coming week is any new tariff announcement or trade negotiation
      development that could sharply shift sentiment in either direction.
    horizon_rationale: "Forecast origin: 2025-03-17, 5-business-day cumulative log-return\
      \ horizon. Key inputs and assumptions: (1) BANK OF CANADA: Cut policy rate to\
      \ 2.75% on March 12 (7th consecutive cut, -225bp from peak). Easing is supportive\
      \ of equities in principle but the motivation is defensive (trade war buffer),\
      \ not confidence-led, tempering the positive signal. (2) INFLATION/JOBS: February\
      \ CPI at 2.6% YoY, core at 2.9% \u2014 above BoC target, constraining the pace\
      \ of further cuts. Labour Force Survey showing 'cracks' in the labour market\
      \ as of March 2025, adding to downside risk for domestic demand. (3) US TARIFFS:\
      \ 25% tariff on most Canadian goods and 10% on energy effective March 4, 2025,\
      \ with retaliatory Canadian measures in place. This is the dominant macro headwind\
      \ for TSX \u2014 creating business uncertainty, dampening capex and trade flows,\
      \ and creating direct sector-level pressure on energy, autos, and industrials.\
      \ (4) COMMODITIES: Gold near all-time highs due to geopolitical safe-haven demand\
      \ \u2014 a significant positive for the TSX's heavy materials/gold-miner weighting.\
      \ Oil prices under modest downside pressure from demand fears stemming from\
      \ the trade war, capping upside for the energy sector. (5) CAD/GOC YIELDS: USD/CAD\
      \ ~1.43-1.44 (CAD weak), reflecting BoC-Fed divergence and trade uncertainty.\
      \ GoC 10yr yields declining as investors seek safety. Weak CAD is a mild positive\
      \ for exporters and USD-earning miners but signals macro stress. (6) US FED:\
      \ Holding rates steady while BoC cuts \u2014 widening yield differential pressures\
      \ CAD and capital flows. US equity indices also selling off on tariff fears,\
      \ creating spillover negative sentiment into Canadian markets. (7) TSX PRICE\
      \ ACTION: The index experienced a severe drawdown from mid-Feb to mid-March\
      \ (~-15% trough-to-trough in daily returns), and the March 17 close showed a\
      \ significant +1.65% single-day bounce, suggesting potential short-term mean\
      \ reversion. However, the bounce follows extreme selling, and overhead resistance/macro\
      \ uncertainty remain. DISTRIBUTION: Median set at +0.002 (slight positive drift\
      \ on mean-reversion after bounce, offset by macro headwinds). 5-day sigma calibrated\
      \ at ~0.037 (above the historical 5-day sigma of ~0.0351 due to elevated tariff/geopolitical\
      \ vol). Distribution is left-skewed (skewness ~-0.3) reflecting asymmetric downside\
      \ tail risk from tariff escalation, partially cushioned on the downside by BoC\
      \ accommodation and gold price strength. The interquartile range spans approximately\
      \ -0.020 to +0.024."
