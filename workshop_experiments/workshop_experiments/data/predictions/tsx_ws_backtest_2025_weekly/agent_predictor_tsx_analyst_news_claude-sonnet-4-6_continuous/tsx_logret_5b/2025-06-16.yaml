    rationale: "Overall framework: The S&P/TSX Composite enters the forecast week\
      \ in consolidation mode following a strong April\u2013May recovery from the\
      \ tariff shock trough. The Bank of Canada's 2.75% hold, elevated unemployment,\
      \ near-target inflation, and ongoing but somewhat defused US-Canada trade tensions\
      \ create a modestly constructive but uncertainty-laden environment. The TSX's\
      \ commodity-heavy composition (energy, gold, materials) provides structural\
      \ support via elevated gold prices and stable oil. The primary downside risk\
      \ is trade escalation (US tariff expansion, Canadian retaliation resumption);\
      \ upside risk is trade negotiation progress or a commodity spike. With momentum\
      \ fading and no major domestic catalysts expected in the coming week, the median\
      \ forecast is a small positive return (+0.30%) consistent with the slight drift\
      \ embedded in the recovery phase, with wider-than-normal tails reflecting the\
      \ elevated geopolitical and policy uncertainty backdrop."
