    horizon_rationale: "Forecast as of 2025-01-13 for the 5-business-day (1-week)\
      \ cumulative log return of the S&P/TSX Composite. Key inputs and assumptions:\
      \ (1) Bank of Canada policy: BoC has delivered ~6 consecutive rate cuts since\
      \ mid-2024, bringing the overnight rate to ~3.00-3.25%, and signals further\
      \ cuts. This easing cycle is a moderate positive for TSX valuations, partially\
      \ offsetting macro headwinds. (2) Inflation/Labour: Canadian CPI near 2% target,\
      \ and December 2024 LFS showed a positive jobs surprise (employment growth exceeding\
      \ population growth for the first time in ~2 years), providing a modest tailwind.\
      \ (3) Commodities: Oil prices rallied in early January 2025 (US sanctions on\
      \ Russian oil, winter demand), a positive for TSX energy sector (~20% weight).\
      \ Gold showed some softness but remains elevated, providing some support to\
      \ materials. (4) USD/CAD & GoC yields: CAD trading at ~1.4355 vs USD, near multi-year\
      \ lows. Weak loonie boosts CAD-denominated commodity revenues but reflects trade\
      \ risk. US 10-year yields rising (strong jobs data) creates upward pressure\
      \ on GoC yields and risk-off sentiment. (5) US policy spillovers: The Federal\
      \ Reserve held rates steady while BoC cut, widening the yield spread to historically\
      \ wide levels; strong US jobs data (January 10) reinforced a hawkish Fed pause,\
      \ pushing US yields higher and triggering global risk-off. Trump tariff threats\
      \ (potential 25% on Canadian imports) are the dominant macro overhang, already\
      \ weighing on business sentiment and the TSX. (6) Recent price action: Last\
      \ close on Jan 13 showed a sharp -1.87% log return \u2014 a one-day decline\
      \ consistent with the US jobs-data-driven global selloff. The prior week also\
      \ had some negative drift. Short-term mean reversion potential exists, but tariff\
      \ uncertainty limits the upside. Statistical framework: Trailing 63d daily std\
      \ = 0.01480; 5-day scaled vol = 0.01480 \xD7 sqrt(5) = 0.0331. Applied a modest\
      \ fat-tail adjustment (~1.03x) to capture elevated macro uncertainty, giving\
      \ effective sigma ~0.034. The distribution is slightly negatively skewed (downside\
      \ tail marginally wider) to reflect asymmetric tariff tail-risk. Point forecast\
      \ (Q50) of +0.003 reflects: (a) small positive long-run drift (~0.05% per day\
      \ annualized), (b) partial mean-reversion bounce after the sharp Jan 13 decline,\
      \ partially offset by (c) persistent tariff/trade uncertainty and hawkish Fed\
      \ spillover keeping sentiment cautious. The 90th percentile spread (~Q5 to Q95)\
      \ spans roughly -6.3% to +6.4%, consistent with historical weekly TSX distributions\
      \ and elevated current uncertainty."
