    rationale: "Overall framework: The 5-business-day (one week) horizon is anchored\
      \ by three dominant forces: (A) the imminent US 'Liberation Day' tariff announcement\
      \ on April 2, which poses asymmetric downside risk; (B) a partial offset from\
      \ elevated gold prices and BoC monetary easing supporting domestic demand; (C)\
      \ a bearish price-momentum backdrop with the TSX down ~-1.54% on the final day\
      \ of Q1 and the index having experienced a volatile, broadly-negative Q1 end.\
      \ The distribution is centered at -0.003 (approximately flat to slightly negative)\
      \ with a fat left tail to reflect the material probability of a tariff-driven\
      \ shock event. Historical 5-day S&P/TSX cumulative log-return distributions\
      \ from the full 2000\u20132025 history confirm a typical std of ~3\u20133.5%\
      \ over this horizon, with tail events running to \xB16\u201317% in extreme regimes\
      \ (2008, COVID). The current regime is elevated but not yet at crisis-level\
      \ volatility (trailing 63-day daily std of 1.52% vs. a COVID-era peak near 5%),\
      \ warranting a moderately widened distribution relative to the historical unconditional\
      \ distribution."
    horizon_rationale: "Forecast origin: 2025-03-31. The S&P/TSX Composite closed\
      \ at ~24,917 after a -1.54% daily log-return on March 31, extending a volatile\
      \ quarter dominated by US-Canada tariff conflict. Key inputs: (1) Bank of Canada\
      \ Policy: Rate cut to 2.75% on March 12 (7th consecutive cut). Further easing\
      \ is possible but complicated by tariff-induced inflation risk. Rate trajectory\
      \ is supportive at the margin but already largely priced in. (2) Inflation/Labour:\
      \ CPI at ~2.3% YoY (core at ~2.9%), unemployment at ~6.6% and trending higher.\
      \ Softening labour market supports further BoC easing but signals economic weakness\
      \ weighing on TSX earnings outlook. (3) Commodity drivers: Gold trending toward\
      \ record highs (safe-haven demand) \u2014 a positive for TSX materials/gold\
      \ miners. Oil/energy complex under pressure from trade-policy uncertainty and\
      \ demand-growth concerns \u2014 a negative for energy-heavy TSX. Net commodity\
      \ effect is roughly neutral to slightly negative. (4) CAD/GoC yields: USD/CAD\
      \ in a multi-decade weak range (~1.43\u20131.52); GoC 10-year yields trending\
      \ lower on growth fears. Weak CAD is a partial offset for TSX exporters' earnings\
      \ but signals macro stress. (5) US tariff spillover: April 2, 2025 ('Liberation\
      \ Day') falls within the 5-business-day forecast window. The US administration's\
      \ threat to impose broad reciprocal tariffs creates a material left-tail risk\
      \ for the TSX. This is the dominant near-term risk. (6) Price momentum: TSX\
      \ fell sharply in early March, partially recovered mid-March, then reversed\
      \ again in the last week of Q1, with the final day (March 31) down -1.54%. Short-term\
      \ momentum is negative. Statistical calibration: Historical 5-day std \u2248\
      \ 1.52% \xD7 \u221A5 \u2248 3.40%. I widen this to ~3.5% to reflect elevated\
      \ regime uncertainty and apply a mild downward bias (-0.3%) to the median to\
      \ reflect April 2 tariff event risk and bearish price momentum. Left tail is\
      \ stretched relative to right tail given asymmetric tariff risk. The 5th percentile\
      \ at -6.3% captures a severe tariff-shock scenario (analogous to early March\
      \ drawdowns), while the 95th percentile at +5.6% captures a relief rally if\
      \ tariff news proves better than feared."
