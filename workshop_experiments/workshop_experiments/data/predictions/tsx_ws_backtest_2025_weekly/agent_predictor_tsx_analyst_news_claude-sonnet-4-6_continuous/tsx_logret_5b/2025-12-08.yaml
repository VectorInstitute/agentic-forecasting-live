    rationale: 'Overall macro regime as of 2025-12-08: the TSX is in a post-easing-cycle
      consolidation phase. The BoC''s 2.25% hold removes policy-driven volatility
      but also limits fresh stimulus. Commodity prices (oil, gold) remain structural
      tailwinds for the resource-heavy index. The principal risks are: (a) renewed
      US trade escalation via tariff announcements, (b) a CAD depreciation overshoot
      weighing on import-intensive sectors, (c) GoC yield spikes compressing bank
      net-interest margins if data continues to surprise to the upside. The 5-day
      distribution is centred near zero with slight positive drift, reflecting the
      balance between these forces and the typical weekly noise regime of ~3% annualised
      volatility scaling. Historical weekly TSX log-returns from the provided CSV
      are broadly consistent with a zero-drift, ~2.5-3.5% weekly std dev process,
      with fat tails during stress episodes (2008, 2020, April 2025). The current
      volatility environment (1.39% daily) is elevated relative to pre-2020 norms
      but within the post-pandemic regime.'
    horizon_rationale: "5-business-day (1-week) cumulative log-return forecast anchored\
      \ on as_of 2025-12-08. Key macro inputs: (1) Bank of Canada on hold at 2.25%\
      \ after completing its easing cycle (last cut October 2025), removing near-term\
      \ policy uncertainty but also exhausting a key equity tailwind. (2) Canadian\
      \ inflation near 2% target, labour market soft (unemployment ~7.1%), no imminent\
      \ shock. (3) Commodity backdrop mixed-positive: oil supported by OPEC+ discipline\
      \ and geopolitical tensions (TSX energy sector ~18% weight is a tailwind); gold\
      \ elevated on safe-haven demand (materials sector supportive); base metals softer\
      \ on USD strength and weak global industrial demand. (4) USD/CAD: loonie under\
      \ persistent pressure from BoC-Fed policy divergence and GoC-UST yield spread\
      \ \u2014 mild headwind for domestic demand but FX-translation boost for USD-revenue\
      \ sectors. GoC 10-year yields rising into year-end from upside data surprises,\
      \ pressuring bank valuations modestly. (5) US spillovers: broad tariff regime\
      \ (steel, aluminum, autos, lumber) remains in place; most of this shock appears\
      \ priced-in following the TSX's strong recovery from the April 2025 tariff drawdown\
      \ (-6% weekly). US Fed expected to cut 25 bps mid-December 2025 \u2014 generally\
      \ supportive for global risk sentiment. (6) Technical/momentum: TSX posted a\
      \ very strong multi-week November rally (+3-4% individual weekly readings late\
      \ November), with December starting in consolidation mode (near-zero daily returns).\
      \ The most recent 5-day log-return (as of Dec 8) is essentially flat, suggesting\
      \ post-rally digestion. (7) Seasonal: mild positive December bias (year-end\
      \ window dressing, low dealer risk appetite). Net drift assumed +0.10% for the\
      \ 5-day window \u2014 near-neutral with marginal positive skew. Volatility calibration:\
      \ trailing 63-day daily std dev = 1.3923%, scaled to 5-day horizon gives \u03C3\
      \u2085 \u2248 3.11% (log). Tails slightly fattened vs. pure normal (+5% at 5th/95th\
      \ percentiles) to account for binary trade-policy headline risk and any BoC\
      \ communication surprises at the December meeting."
