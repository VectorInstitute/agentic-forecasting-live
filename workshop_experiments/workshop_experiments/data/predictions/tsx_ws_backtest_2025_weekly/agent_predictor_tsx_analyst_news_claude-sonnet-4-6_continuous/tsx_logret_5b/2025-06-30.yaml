    horizon_rationale: "Forecast for 5 business days (approx. July 1\u20137, 2025)\
      \ from 2025-06-30 close. Key inputs: (1) Bank of Canada: held overnight rate\
      \ at 2.75% on June 4, 2025 \u2014 second consecutive pause after 175 bps of\
      \ cuts from mid-2024 to March 2025. Neutral-to-mildly-positive for equities;\
      \ further cuts possible H2 2025 but not near-term. (2) Inflation & Labour: CPI\
      \ +1.9% YoY June (up from 1.7%), core inflation unexpectedly firm. June LFS\
      \ showed +83,000 jobs, nudging unemployment down to 6.9% \u2014 a positive surprise\
      \ supporting equity sentiment and limiting urgency of additional BoC easing.\
      \ (3) Commodities: Energy sector outperformed in June; oil prices supportive.\
      \ Gold remained elevated as geopolitical/trade hedge. TSX materials and energy\
      \ sectors well-positioned. (4) CAD/Yields: USD/CAD ~1.37 monthly average; GoC-UST\
      \ yield spread at multi-decade wides ('bear steepening' of yield curve in May\u2013\
      June). CAD structural headwind continues but largely priced. (5) US/Trade Spillovers:\
      \ US tariffs on Canadian steel, aluminum, and energy remain in place; Canadian\
      \ retaliatory tariffs delayed. Trade volumes still depressed vs. prior year;\
      \ ongoing uncertainty caps upside but near-term tariff shock risk is lower than\
      \ April peak. (6) TSX Momentum: Strong recovery rally from April 7\u201310 trough.\
      \ June daily returns were consistently small (+0 to +1 bps), signalling momentum\
      \ fading as index consolidates Q2 gains. Quarter-end window dressing effect\
      \ fades. Statistical basis: trailing-63d daily vol = 2.809%, implying 5-day\
      \ vol = 2.809% \xD7 \u221A5 \u2248 6.28%. Point forecast (Q0.50) set at +0.003\
      \ reflecting mild positive drift from supportive BoC stance, resilient jobs\
