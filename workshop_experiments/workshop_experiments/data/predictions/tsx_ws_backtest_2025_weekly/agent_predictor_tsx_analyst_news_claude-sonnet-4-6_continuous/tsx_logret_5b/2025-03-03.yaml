    rationale: 'Overall framework: 5-business-day ahead cumulative log-return forecast
      for the S&P/TSX Composite, origin date 2025-03-03. The central scenario is modestly
      negative (-0.9%) driven by: (a) sustained negative price momentum going into
      the forecast period, (b) the ongoing US-Canada 25% tariff shock creating earnings
      and growth headwinds, (c) a weak loonie (USD/CAD ~1.45) and elevated macro uncertainty.
      Partial offsets include BoC easing at 3.00%, gold price strength supporting
      Materials, and gold/safe-haven flows boosting the TSX relative to other developed
      markets. The distribution is slightly left-skewed and wider than historical
      average given the exceptional trade-policy uncertainty environment. Historical
      5-day std from the provided CSV (surveying the last several years) is consistent
      with ~3-4% weekly moves in stressed regimes, which calibrates the quantile spread.'
    horizon_rationale: "Forecast as of 2025-03-03 for 5 business days ahead. KEY INPUTS\
      \ AND ASSUMPTIONS: (1) PRICE MOMENTUM: Last daily log return was -0.597%, and\
      \ the TSX has been in a sustained downtrend since mid-February 2025, with consecutive\
      \ negative weekly readings (approx. -2% to -2.5% per week over the preceding\
      \ 2-3 weeks). This negative price momentum biases the central forecast below\
      \ zero. (2) BANK OF CANADA: BoC cut the overnight rate 25bp to 3.00% in January/February\
      \ 2025, completing a 175bp cumulative easing cycle since June 2024. While accommodative\
      \ policy is structurally supportive for equities, it also signals below-trend\
      \ growth and is insufficient to offset trade-war headwinds at this horizon.\
      \ (3) US-CANADA TARIFF SHOCK: The dominant near-term driver. The US imposed\
      \ 25% tariffs on most Canadian goods and 10% on energy effective ~February 4,\
      \ 2025; Canada retaliated with counter-tariffs. This creates major uncertainty\
      \ for corporate earnings, investment, and growth\u2014particularly for manufacturing,\
      \ automotive, and export-oriented sectors. Tariff uncertainty is asymmetrically\
      \ skewed to the downside. (4) COMMODITIES: Gold surged ~8.9% m/m in February\
      \ 2025 to ~$2,870/oz, providing a partial buffer for TSX Materials/Mining. WTI\
      \ crude is volatile and faces direct 10% US tariff pressure on Canadian energy\
      \ exports, dampening near-term upside for the Energy sector despite elevated\
      \ prices. Net commodity effect is mixed but gold is a partial positive. (5)\
      \ CAD/USD: USD/CAD ~1.4484, reflecting macro stress; the weak loonie provides\
      \ some export competitiveness but amplifies imported inflation risk, complicating\
      \ BoC's path. (6) GOC YIELDS: 10-year GoC yields under downward pressure from\
      \ trade-war growth fears; BoC-Fed divergence (US Fed steady, BoC cutting) widens\
      \ yield spread and weighs on CAD. Lower yields are modestly supportive for rate-sensitive\
      \ sectors (banks, utilities) but growth concerns dominate. (7) VOLATILITY REGIME:\
      \ Trailing 63-day daily std is ~1.43%, implying a 5-day std of ~3.2%. Given\
      \ elevated geopolitical and tariff uncertainty, I apply a slight upward adjustment\
      \ to ~3.4% effective weekly volatility and impose a modest negative skew (left\
      \ tail is fatter). DISTRIBUTION: Median = -0.009 (approximately -0.9% cumulative\
      \ log return over 5 days), reflecting negative momentum, tariff headwinds, and\
      \ defensive investor positioning. Spread scaled to ~3.4% with left-skew adjustment.\
      \ The 5th percentile at -0.068 (-6.8%) captures a tail scenario of tariff escalation\
      \ or broader risk-off shock; the 95th percentile at +0.044 (+4.4%) captures\
      \ a relief rally from tariff pause/deal."
