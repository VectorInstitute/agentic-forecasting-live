    rationale: 'Overall approach: Combined fundamental macro analysis (BoC policy,
      inflation, labour, commodity prices, CAD, trade) with the empirical return distribution
      from 25 years of weekly TSX history. The current regime is characterized by
      elevated volatility (trailing 63d std = 0.0303), a post-shock recovery rally
      in progress, and persistent macro uncertainty from US-Canada trade conflict.
      The median forecast is modestly positive (+0.4%) reflecting the balance between
      positive momentum/BoC easing support and the tariff/labour headwinds. The distribution
      is wider than a typical pre-tariff-war week, with fat tails on both sides but
      a slight positive skew.'
    horizon_rationale: "Forecast for the 5-business-day (1 calendar week) cumulative\
      \ log-return on the S&P/TSX Composite from the June 2, 2025 close. Key assumptions\
      \ and drivers: (1) BANK OF CANADA POLICY: BoC is in a 'holding pattern' at 2.75%\
      \ after cutting ~175 bps from mid-2024 through March 2025. Policy is data-dependent\
      \ with an easing bias if labour market deteriorates further. This is a mild\
      \ tailwind for equity valuations. (2) INFLATION & LABOUR: Headline CPI at ~1.7%\
      \ (below 2% target, partly due to carbon tax removal); core inflation firmer.\
      \ Unemployment at 6.9% with 70,000+ private-sector jobs lost in prior two months.\
      \ Softening demand is negative for domestically exposed sectors but reinforces\
      \ BoC easing expectations. (3) COMMODITIES: Gold elevated on safe-haven demand\
      \ and geopolitical instability \u2014 positive for TSX Materials (gold miners).\
      \ Oil mixed: OPEC+ discipline supports prices but US tariffs on Canadian energy\
      \ (10%) and demand-side concerns are headwinds for TSX Energy. Base metals under\
      \ pressure from strong USD and weak global industrial demand. Net commodity\
      \ effect: modest positive from gold, offset by oil/base metal headwinds. (4)\
      \ CAD/GoC YIELDS: CAD at multi-year lows vs. USD, reflecting trade conflict\
      \ and BoC-Fed divergence. GoC 10-year yields below US Treasuries. Weak CAD is\
      \ a translation tailwind for TSX multinationals/exporters. (5) US TRADE SPILLOVERS:\
      \ 25% US tariffs on most Canadian goods (10% energy) continue to create structural\
      \ uncertainty. US Fed maintaining restrictive policy. Trade conflict = persistent\
      \ headwind on business investment and manufacturing, though markets have been\
      \ pricing this in since February. (6) RECENT PRICE MOMENTUM: The TSX suffered\
      \ a deep correction in April 2025 (cumulative ~-20% in about 2 weeks on tariff\
      \ shock) and staged a strong V-shaped recovery through May 2025, with weekly\
      \ returns consistently +1% to +3%. The last recorded return on June 2 was +1.1%\
      \ on the day, suggesting continued positive momentum but also a possible mean-reversion\
      \ setup after extended gains. (7) VOLATILITY REGIME: Trailing 63-day daily std\
      \ = 0.0303 (elevated vs. pre-2025 norms of ~0.020), implying elevated weekly\
      \ uncertainty. I calibrate the effective 5-day std at ~0.026, reflecting a regime\
      \ that has calmed from the April extremes but remains above normal. (8) CENTRAL\
      \ ESTIMATE: I set the median at +0.004 (~+0.4% for the week), reflecting mild\
      \ positive drift from momentum and BoC support, partially offset by macro headwinds.\
      \ The distribution is slightly positively skewed (recovery momentum still intact),\
      \ with somewhat fat downside tails to account for trade/macro shock risk. The\
      \ 5th percentile is set at -0.040 (reflecting a scenario of tariff escalation\
      \ or macro surprise) and the 95th at +0.047 (strong continuation of the May\
      \ rally)."
