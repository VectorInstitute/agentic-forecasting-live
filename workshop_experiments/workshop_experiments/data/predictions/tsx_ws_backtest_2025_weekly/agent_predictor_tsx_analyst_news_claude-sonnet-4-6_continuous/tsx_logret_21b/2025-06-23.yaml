    rationale: "Overall macro backdrop as of 2025-06-23: The TSX is in a recovery\
      \ mode from the April 2025 trade-war shock but momentum is fading. The BoC hold\
      \ at 2.75% provides a neutral policy backdrop; soft labour (UR 6.9%) and below-target\
      \ headline CPI (1.7%) create room for future cuts. Gold and materials are strong\
      \ near-term supports. Trade tensions remain elevated (US tariffs on steel, aluminum,\
      \ non-CUSMA goods) but a near-term escalation is dampened by Canada's delay\
      \ of counter-tariffs to October. The 21-business-day horizon distribution is\
      \ calibrated around a modest positive drift of ~+1.2% log-return with \u03C3\
      \ \u2248 4.6%, with a slight left-skew to reflect asymmetric tariff downside\
      \ risk."
    horizon_rationale: "Forecast origin: 2025-06-23. The S&P/TSX Composite 21-business-day\
      \ cumulative log-return is currently +0.03, representing a strong recovery from\
      \ the April 2025 tariff-shock lows (which reached -0.08). Momentum is decelerating\
      \ (from +0.12 peak in early May to +0.03 now), and several crosscurrents inform\
      \ this forecast. (1) Bank of Canada policy: BoC held at 2.75% on June 4 for\
      \ the second consecutive meeting \u2014 a neutral anchor for equities, reducing\
      \ rate-shock risk but also limiting a further tailwind from cuts in the near\
      \ term. (2) Inflation/labour: May CPI at 1.7% headline (carbon tax removal)\
      \ with core trim/median ~3%; unemployment rose to 6.9% with private sector shedding\
      \ ~70K jobs in April-May \u2014 this soft labour backdrop creates downside economic\
      \ risk. (3) Commodities: Gold and battery metals at record interest in June\
      \ 2025, supporting TSX materials; oil volatile on Strait of Hormuz concerns\
      \ \u2014 net modest positive for TSX resource-heavy composition. (4) CAD and\
      \ GoC yields: Canadian dollar under pressure from BoC-Fed divergence and tariff\
      \ headwinds; GoC yields sensitive to US-Canada trade evolution. (5) US/trade\
      \ spillovers: 25% tariffs on non-CUSMA goods and escalated steel/aluminum tariffs\
      \ in June; Canada delayed counter-tariffs to October \u2014 reduces immediate\
      \ binary shock risk but maintains structural headwind. (6) Momentum/mean reversion:\
      \ The large run from April lows is likely partly digested; the most recent 21-bd\
      \ readings have faded from 0.07-0.10 to 0.03, suggesting the market is normalising.\
      \ Statistical calibration: trailing 63-day \u03C3 of 21-bd returns = 0.046 (elevated\
      \ regime). Point estimate \u03BC = +0.012 reflects positive but moderate drift\
      \ (recovering economy, supportive BoC hold, commodity strength) against soft\
      \ labour, tariff uncertainty, and momentum fade. A slight left-skew adjustment\
      \ is applied to the distribution (heavier downside tail) reflecting the asymmetric\
      \ tariff escalation risk. Quantile spread is calibrated to observed \u03C3 =\
      \ 0.046 with slight left-skew: Q5 = -0.072, Q95 = +0.084."
