    rationale: "Overall forecast rationale: The S&P/TSX Composite enters the 21-bd\
      \ forward window in a distinctly challenged environment. The US-Canada tariff\
      \ war (25% on goods, 10% on energy, effective Feb 2025) is the dominant macro\
      \ shock. The BoC's 2.75% policy rate (cut March 12) provides some support, but\
      \ the central bank faces a stagflationary dilemma \u2014 lower rates support\
      \ growth but risk amplifying tariff-induced inflation. Commodity signals are\
      \ mixed: oil bearish on demand concerns, gold bullish as a haven. The CAD is\
      \ weak (~1.44 vs USD), and GoC yields have fallen on growth fears. Recent momentum\
      \ is decisively negative (TSX -4% to -6% on a 21-bd basis through March 17).\
      \ The median forecast is slightly negative (-0.5%), reflecting residual downtrend\
      \ pressure and macro headwinds, partially offset by oversold conditions, BoC\
      \ support, and potential for tariff de-escalation. The distribution is wide\
      \ (\u03C3 \u2248 3.2%) with a modest left skew to capture tail risk from further\
      \ trade war escalation or global demand deterioration."
    horizon_rationale: "Forecast as of 2025-03-17 for the 21-business-day (\u2248\
      1 calendar month) cumulative log return on the S&P/TSX Composite. Key inputs\
      \ and assumptions: (1) Bank of Canada Policy \u2013 The BoC cut its overnight\
      \ rate to 2.75% on March 12, 2025, completing 175bp of easing since mid-2024.\
      \ Forward guidance remains data-dependent and cautious; further cuts are possible\
      \ but complicated by tariff-induced inflation risk. Rate easing provides mild\
      \ support for rate-sensitive sectors (banks, real estate) but is insufficient\
      \ to offset trade headwinds. (2) Macro backdrop \u2013 Canadian CPI near 1.9\u2013\
      2.6% YoY (broadly on-target but core slightly elevated). Labour market cooled\
      \ sharply: Feb 2025 added only 1,100 jobs; unemployment at 6.6%. Real GDP per-capita\
      \ declined 1.4% in 2024. (3) Trade/Tariff shock \u2013 The dominant risk. US\
      \ imposed 25% tariffs on most Canadian goods + 10% on energy (Feb 2025). Canada\
      \ retaliated. The TSX fell roughly 5\u20136% in the preceding weeks, with the\
      \ 21-bd cumulative log return at -3.6% on the as-of date. This shock is partially\
      \ priced in, but the probability of further escalation is non-trivial, justifying\
      \ a mildly negative median and elevated left-tail risk. (4) Commodities \u2013\
      \ Oil faces bearish pressure (trade war dampens global demand; robust non-OPEC\
      \ supply). Gold is bullish as a haven asset, supporting TSX gold miners (Materials\
      \ sector ~12% of TSX). Net commodity effect slightly negative to neutral for\
      \ the index. (5) USD/CAD & GoC Yields \u2013 CAD at multi-decade lows (~1.44\
      \ USD/CAD); widest Canada-US yield spread since mid-1990s. GoC 10-yr yields\
      \ declined (growth fears dominant). Weak CAD provides some offset for export\
      \ earnings but is a headwind for domestic consumption. (6) Price momentum \u2013\
      \ The TSX has been in a clear downtrend since late-February 2025, with successive\
      \ 21-bd log returns of -0.04 to -0.06. Momentum is negative. However, mean reversion\
      \ tendencies at these extremes are real, and the BoC easing may begin to be\
      \ digested. (7) Volatility \u2013 Trailing 63-day std of 21-bd log returns =\
      \ 0.0281. Elevated macro uncertainty (trade war) warrants a modest upward adjustment\
      \ to \u03C3 \u2248 0.032 for the forecast horizon. (8) Distribution shape \u2013\
      \ Slight negative skew applied: the left tail (tariff escalation, recession\
      \ scenario) is heavier than the right tail. The upside is capped by tariff uncertainty,\
      \ while the downside could be amplified by a trade war intensification. Median\
      \ set at -0.005 (mildly negative: residual downtrend + trade headwinds offset\
      \ partially by BoC easing, oversold conditions, and mean reversion)."
