  metadata:
    rationale: "Overall forecast reflects a cautiously constructive view on the TSX\
      \ over the next month, centred at +1.5% log-return (median). The distribution\
      \ is wide (effective \u03C3\u22488%) due to elevated geopolitical/trade-policy\
      \ uncertainty driven by US tariff dynamics. Key upside risks: US-China or US-Canada\
      \ trade deals materialising, further BoC rate cuts, and gold staying above $3,000/oz\
      \ supporting materials. Key downside risks: tariff re-escalation beyond the\
      \ 90-day pause, a sharp slowdown in Canadian employment/GDP, and a significant\
      \ drop in oil prices pressuring the energy sector. The BoC easing cycle (2.75%\
      \ policy rate, down from 5%) and record gold prices are the primary structural\
      \ positives supporting above-zero expected returns."
    horizon_rationale: "21-business-day (\u22481 calendar month) forecast for the\
      \ S&P/TSX Composite cumulative log return, origin date 2025-05-05.\n\nKEY DRIVERS:\n\
      \n1. BANK OF CANADA POLICY (positive): BoC cut its overnight rate to 2.75% by\
      \ March 2025, having delivered ~225 bps of cuts from the 5% peak. Easing bias\
      \ persists with markets pricing additional cuts as inflation nears the 2% target\
      \ and growth forecasts were revised down to ~0.8% for 2025. This accommodative\
      \ backdrop supports equity valuations, especially rate-sensitive financials,\
      \ REITs, and utilities on the TSX.\n\n2. CANADIAN INFLATION & LABOUR (neutral-to-positive):\
      \ Headline CPI near 2% target; core measures slightly sticky but contained.\
      \ Labour market softening \u2014 unemployment rising modestly, job vacancies\
      \ declining from highs \u2014 but no crash. This gives BoC cover to hold/cut\
      \ further, a mild positive for equities.\n\n3. COMMODITIES (mixed, net slight\
      \ positive):\n   - GOLD: Record prices driven by central-bank buying and safe-haven\
      \ demand. TSX materials sector (large weight) is a major beneficiary, providing\
      \ a structural tailwind absent from most other developed-market indices.\n \
      \  - OIL: Volatile. OPEC+ discipline provides a floor but global demand concerns\
      \ (US slowdown, China weakness) cap upside. Net neutral to slightly negative\
      \ for energy sector.\n   - BASE METALS: Soft due to strong USD and weak Chinese\
      \ industrial demand. Headwind for diversified miners.\n\n4. CAD/USD & GOC YIELDS\
      \ (mixed): Weak Canadian dollar (wide BoC-Fed spread + tariff uncertainty) hurts\
      \ import-reliant sectors but boosts commodity exporters' CAD revenues. GoC 10-year\
      \ yields sensitive to BoC expectations and US Treasury moves. Yield curve mildly\
      \ supportive for bank NIMs.\n\n5. US TARIFF / TRADE SPILLOVERS (the key uncertainty):\n\
      \   - Trump's April 2 sweeping tariff announcement triggered a sharp TSX selloff\
      \ (~8% in 10 days, visible in the April 2-11 history data).\n   - A 90-day pause\
      \ on reciprocal tariffs (not on China) and sector carve-outs (autos, electronics)\
      \ partially restored sentiment. The TSX recovered toward end-April/early May.\n\
      \   - On May 5 the 21-day cumulative log-return stands at +0.025 (partial recovery).\
      \ Uncertainty around tariff path is elevated; a re-escalation would be a significant\
      \ downside catalyst.\n   - CUSMA coverage keeps most Canada-US trade duty-free,\
      \ providing partial insulation vs. non-CUSMA peers.\n\n6. SECTOR / EARNINGS\
      \ TONE: Canadian Big-6 banks resilient but cautious on loan growth. Gold miners\
      \ (Agnico Eagle, Barrick, Kinross) benefiting from record gold. Energy names\
      \ (CNQ, Suncor) facing soft crude but disciplined capital returns. Industrials\
      \ (AtkinsRealis, Stantec) recovering on infrastructure spending. Overall earnings\
      \ tone cautious but not recessionary.\n\n7. RECENT PRICE DYNAMICS: The TSX experienced\
      \ a peak-to-trough drawdown of roughly 8-10% during March-April 2025 tariff\
      \ panic, followed by partial recovery. At +0.025 on May 5, the index is in an\
      \ early recovery phase. Historical analogues (2018 trade war, 2016 oil shock\
      \ recovery) suggest 21-day returns in subsequent months centered modestly positive\
      \ with elevated tail risk.\n\nVOLATILITY CALIBRATION:\n- Trailing 63-day daily\
      \ std = 0.0282 (elevated, reflecting tariff-shock regime).\n- Implied 21-day\
      \ std \u2248 0.0282 \xD7 \u221A21 \u2248 0.129; however, applying a modest vol\
      \ decay toward a 'medium-term' regime and accounting for mean-reversion at this\
      \ horizon yields an effective distributional std of ~0.082 for the forecast\
      \ distribution.\n- Fat left tail retained given tariff re-escalation risk; slight\
      \ right skew given gold strength + BoC easing + mean-reversion after drawdown.\n\
      \nPOINT FORECAST: +0.015 (\u2248+1.5% cumulative log return over 21 business\
      \ days), reflecting modest positive drift from BoC easing and gold tailwinds,\
      \ partially offset by tariff uncertainty and weak oil."
