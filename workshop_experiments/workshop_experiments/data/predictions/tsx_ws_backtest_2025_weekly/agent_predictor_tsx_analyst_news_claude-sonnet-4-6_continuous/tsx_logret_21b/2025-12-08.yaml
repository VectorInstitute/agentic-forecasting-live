    rationale: 'Overall forecast for the S&P/TSX Composite 21-business-day cumulative
      log return as of 2025-12-08. The Bank of Canada holds at 2.25% (accommodative
      but no further stimulus), commodities (oil, gold) provide a net positive backdrop
      for the TSX''s energy and materials-heavy composition, the CAD''s weakness vs.
      USD is a local-currency tailwind, and price momentum is firmly positive following
      the recovery from the April 2025 tariff shock lows. The principal risks are:
      (downside) re-escalation of US-Canada trade tensions, a sharp commodity price
      correction, or a global risk-off shock; (upside) positive trade resolution surprise,
      strong bank earnings beats, or commodity price spike. The distribution is calibrated
      with 21-day volatility of ~10.9% and a mildly positive skew, yielding a median
      of +1.8% with a 90% confidence interval spanning approximately -11.5% to +15.8%.'
    horizon_rationale: "Forecast origin: 2025-12-08. Horizon: 21 business days (~1\
      \ calendar month). Key assumptions and calibration: (1) Bank of Canada: Policy\
      \ rate held at 2.25% (bottom of neutral range). Easing cycle concluded; 'hold'\
      \ bias confirmed. Rate environment is accommodative but no further cut catalyst\
      \ in the near-term. (2) Canadian inflation/jobs: CPI near 2% target, labour\
      \ market softening with some slack. Neither a positive nor negative shock catalyst.\
      \ (3) Commodities: Oil supported by geopolitical tensions and OPEC+ discipline\
      \ (TSX energy tailwind); gold elevated as inflation/geopolitical hedge (materials\
      \ tailwind); base metals under pressure from strong USD and weak global industrial\
      \ demand (partial offset). Net commodity signal mildly positive for TSX. (4)\
      \ CAD/GoC yields: CAD under significant downward pressure from BoC-Fed policy\
      \ divergence (2-yr spread at widest since mid-1990s); weaker CAD is a mild tailwind\
      \ for TSX in local-currency terms as it boosts export sector revenues. GoC 10-year\
      \ yields reflect softer growth outlook. (5) US spillovers: Tariff/trade uncertainty\
      \ persists but appears largely priced in following months of adjustment; US\
      \ tariffs on Canadian goods remain a structural headwind to business investment\
      \ and export volumes. (6) Price momentum: The TSX has been in a sustained uptrend\
      \ since April 2025 tariff-shock lows; the most recent observed 21-day cumulative\
      \ log return was +0.041 (~+4.1%), and the trailing daily returns from late November\
      \ through December 8, 2025 show values of +0.03 to +0.05, indicating sustained\
      \ positive momentum. December seasonality is historically mild-to-positive.\
      \ (7) Volatility calibration: Trailing 63-day daily standard deviation = 0.02378;\
      \ scaled to 21-day horizon: \u03C3_21 \u2248 0.02378 \xD7 \u221A21 \u2248 0.109\
      \ (~10.9%). Distribution is approximately normal with mild positive skew reflecting\
      \ momentum and commodity tailwinds, and slightly fatter left tail reflecting\
      \ tariff/trade event risk. (8) Median (Q0.50) = +0.018 (~+1.8%): Reflects positive\
      \ momentum and supportive macro context, tempered by mean-reversion tendencies\
      \ after a strong run, tariff uncertainty, and CAD weakness drag on domestic\
      \ conditions. Quantiles are centered on this median with \u03C3_21 \u2248 0.109\
      \ and a slight rightward skew: left tail is modestly compressed relative to\
      \ a symmetric normal, right tail is modestly extended."
