    horizon_rationale: "Forecast as of 2025-03-03 for the 21-business-day ahead S&P/TSX\
      \ Composite cumulative log return. Key drivers and assumptions: (1) TRADE WAR\
      \ SHOCK: The dominant risk is the US-Canada tariff conflict \u2014 a 25% tariff\
      \ on most Canadian goods and 10% on energy effective Feb 4, 2025, with Canadian\
      \ retaliation. This creates significant negative growth drag and pervasive uncertainty\
      \ for TSX corporate earnings. (2) PRICE MOMENTUM: The most recent 21-day cumulative\
      \ log return was -0.03175 (roughly -3.1%), with the TSX trending downward throughout\
      \ late February and early March 2025. This negative momentum is incorporated\
      \ into a below-zero median. (3) BANK OF CANADA: BoC has cut rates by ~175bps\
      \ since June 2024 to approximately 2.75-3.0%, providing partial monetary offset\
      \ to trade headwinds. Further cuts likely, providing support to financials and\
      \ interest-rate-sensitive sectors. (4) COMMODITIES: Oil prices declining on\
      \ tariff-driven demand concerns, creating headwinds for TSX energy sector. Gold\
      \ surging as safe-haven, supporting TSX materials/mining names \u2014 partially\
      \ offsetting oil weakness. Net commodity effect slightly negative given energy's\
      \ larger TSX weight. (5) CAD/USD: Canadian dollar under sustained pressure (widest\
      \ BoC-Fed yield differential since mid-1990s), trading at historically weak\
      \ levels. This partially cushions exporters but signals underlying economic\
      \ stress. (6) GoC YIELDS: 10-year bond yields declining in February as BoC easing\
      \ is priced in, supportive for rate-sensitive sectors. (7) US FEDERAL RESERVE:\
      \ Fed holding rates steady (data-dependent), diverging from BoC easing path.\
      \ This BoC-Fed spread is a persistent headwind for CAD and Canadian asset valuations.\
      \ STATISTICAL CALIBRATION: Trailing 63-day daily std = 0.02841, implying 21-business-day\
      \ std \u2248 0.02841 \xD7 sqrt(21) \u2248 0.1302 (~13%). I apply a slight downward\
      \ shift in the mean to -0.020 (from tariff/momentum headwinds) and a modest\
      \ negative skew (left tail ~10% wider than right tail) reflecting asymmetric\
      \ risk from potential tariff escalation vs. limited upside from trade resolution\
      \ over a 21-day window. Point forecast (median) = -0.020. The 5th/95th percentile\
      \ range of roughly [-0.26, +0.18] is consistent with historical tail observations\
      \ (e.g., -0.39 in COVID crash, +0.15 in post-COVID bounces), appropriately calibrated\
      \ for the current elevated-but-not-crisis volatility environment."
