    rationale: 'Overall forecast driven by: (1) negative short-term price momentum
      on TSX heading into 2025; (2) dominant macro overhang from US tariff threats
      (Trump inauguration Jan 20 within the 21bd window); (3) partial offsets from
      BoC easing cycle, elevated oil/gold prices, and a weak CAD benefiting exporters;
      (4) Canadian labour/inflation backdrop stable but not buoyant. Median set at
      -0.010 (mild negative drift). Distribution is left-skewed with fat tails on
      the downside to capture tariff-shock scenarios, while the upside is capped by
      trade uncertainty suppressing risk appetite. The effective 21bd distributional
      width (~0.055 on each side from median) is calibrated against the historical
      21bd log-return empirical distribution from the provided CSV, with adjustments
      for current elevated macro uncertainty.'
    horizon_rationale: "Forecast origin: 2025-01-13. The 21-business-day (\u22481\
      \ calendar month) horizon forecast for S&P/TSX Composite cumulative log return\
      \ is centred with a mild negative bias of -0.010 (median), reflecting the following\
      \ key inputs:\n\n1. MOMENTUM/RECENT PRICE ACTION: The trailing 21bd log return\
      \ as of the origin date is -0.0387, indicating ongoing selling pressure since\
      \ mid-December 2024. The rolling series in the history CSV shows a clear deterioration\
      \ from +0.06 in late November to -0.04 by Jan 13. This negative momentum provides\
      \ a downward tilt to the median.\n\n2. BANK OF CANADA POLICY: BoC has cut 175bps\
      \ since June 2024 to 3.25% (as of Dec 2024 decision). Further gradual easing\
      \ is expected in 2025, which is broadly supportive for Canadian equities via\
      \ lower discount rates. This is a modest positive offset, preventing a deeply\
      \ negative median.\n\n3. CAD/USD & RATES: USD/CAD near 1.45, the weakest since\
      \ 2002. While this reflects trade and rate-differential stress, a weak loonie\
      \ is a net positive for TSX earnings in energy and materials (USD-priced revenues).\
      \ GoC 10yr yields have fallen in tandem with BoC cuts, supportive for rate-sensitive\
      \ sectors like financials and utilities.\n\n4. US TARIFF RISK (primary downside):\
      \ The incoming Trump administration's threatened 25% tariffs on Canadian goods\
      \ are the dominant macro risk over this horizon. Trump's inauguration on Jan\
      \ 20 falls within the 21bd window, adding a potential catalyst for tariff-related\
      \ volatility. This creates a left-tail skew in the distribution \u2014 the 5th\
      \ and 10th percentile tails (-0.095, -0.075) are wider/more negative than the\
      \ upside tails are positive.\n\n5. COMMODITIES: Oil prices elevated relative\
      \ to prior forecasts, supporting energy names (large TSX weight ~18%). Gold\
      \ benefiting from uncertainty/geopolitical hedging, supportive for materials/gold\
      \ miners (~12% TSX weight). Base metals face pressure from strong USD and trade\
      \ uncertainty. Net commodity effect is modestly positive.\n\n6. LABOUR/INFLATION:\
      \ Dec 2024 LFS surprise (+91k jobs, UR fell to 6.7%) is positive for consumer\
      \ sentiment. CPI near 1.8-2.0%, well-anchored. No inflation-driven hawkish shock\
      \ expected from BoC in this window.\n\n7. DISTRIBUTIONAL CALIBRATION: The 21bd\
      \ trailing std of ~0.0273/day \xD7 \u221A21 \u2248 0.125 gives the raw Gaussian\
      \ scale, but empirically the 21bd return distribution from the history CSV shows\
      \ most observations falling in the -0.05 to +0.07 range in normal regimes, with\
      \ fat tails in crises (-0.40 in March 2020, -0.27 in Oct 2008). I use an effective\
      \ spread of ~0.055 standard deviation units for the central distribution but\
      \ widen the left tail to account for tariff-shock tail risk. The distribution\
      \ is slightly left-skewed."
