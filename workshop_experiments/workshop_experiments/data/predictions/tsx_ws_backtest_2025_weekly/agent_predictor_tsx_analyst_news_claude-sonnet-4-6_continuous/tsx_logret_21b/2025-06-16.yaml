    rationale: 'Overall approach: Combined macro fundamental analysis with empirical
      calibration from the 25-year TSX 21-day log return history. As of June 16, 2025,
      the dominant themes are (a) TSX near record highs with positive momentum off
      the April tariff shock, (b) BoC on hold at 2.75% with a data-dependent stance
      and no imminent easing, (c) gold/materials strength providing commodity support,
      (d) ongoing US tariff risk (25% broad + 50% steel/aluminum) as the primary downside
      tail driver, and (e) softening but not deteriorating labour market. The median
      return of +1.0% over 21 business days reflects a modestly positive expected
      return with an asymmetric risk profile: upside capped by stretched valuations
      near record levels, downside tail from trade-war escalation or commodity reversal.
      Volatility is calibrated at ~4.4% (slightly below the 4.73% trailing measure,
      consistent with some vol mean-reversion as the April shock recedes).'
    horizon_rationale: "Forecast origin: 2025-06-16. The TSX has rallied strongly\
      \ from the April 2025 tariff-shock trough (21-day log returns collapsed to ~-0.08\
      \ in early April) and by mid-June the 21-day cumulative log return is back to\
      \ approximately +0.03, with the index reportedly at or near record highs. Key\
      \ macro drivers and their directional impacts: (1) Bank of Canada policy: BoC\
      \ held at 2.75% on June 4, 2025 ('wait-and-see'), following a 25bp cut in March.\
      \ No further cuts appear imminent given sticky core CPI \u2014 this is broadly\
      \ neutral/slightly supportive for equities via stable short rates. (2) Inflation/labour:\
      \ Headline CPI at 1.7% (April, partly carbon-tax distorted); core measures firmer;\
      \ unemployment at 6.9% with employment little changed. Labour softness is a\
      \ mild drag on domestic demand but not alarming. (3) Commodities: Gold is benefiting\
      \ from safe-haven demand amid geopolitical/trade uncertainty, supporting TSX\
      \ materials. Oil is mixed \u2014 IEA cited rising global supply in June, creating\
      \ headwinds for energy producers, though energy has been resilient. Net commodity\
      \ effect is modestly positive. (4) Currency/yields: GoC yields reflect the BoC\
      \ pause; CAD remains under pressure from US tariff uncertainty (25% on non-CUSMA\
      \ goods, 50% on steel/aluminum for most countries since June 4). A weaker CAD\
      \ is a mild tailwind for USD-revenue earners (energy, materials) but a risk\
      \ for importers. (5) US policy spillovers: Tariff escalations (aluminum/steel\
      \ to 50%) remain the dominant macro risk. However, the market has partially\
      \ priced this in and there are signs of rotation from US equities into TSX as\
      \ investors diversify away from US trade-war exposure. The net US spillover\
      \ is mixed with a negative skew risk. (6) TSX sector dynamics: Financials remain\
      \ the anchor; big banks have benefited from a supportive earnings environment.\
      \ Materials/mining boosted by gold. Technology and life sciences contributed\
      \ to June's broad-based gains. Momentum is positive. Statistical calibration:\
      \ trailing 63-day std = 4.73% (this is the std of 21-day log returns measured\
      \ over recent 63-day window, translating to roughly 4.4\u20134.7% forward vol\
      \ for a 21-day horizon after slight mean reversion in volatility). The median\
      \ (point forecast) is set at +1.0% (0.010 log return), slightly above the long-run\
      \ unconditional average of ~+0.5\u20130.7% per month, reflecting positive price\
      \ momentum and the tailwind from BoC stability and commodity strength, but tempered\
      \ by ongoing tariff uncertainty and the softening domestic labour market. The\
      \ distribution is slightly right-skewed at moderate quantiles (positive momentum)\
      \ but carries a meaningful fat left tail (Q5 at -6.5%) reflecting the persistent\
      \ tariff-escalation and global growth slowdown tail risks. The spread (Q95\u2013\
      Q5 \u2248 14.7%) is consistent with the elevated trailing volatility."
