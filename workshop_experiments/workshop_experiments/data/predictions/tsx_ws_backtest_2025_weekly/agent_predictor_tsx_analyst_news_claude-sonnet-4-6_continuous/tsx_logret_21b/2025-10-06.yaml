    rationale: "Overall forecast rationale: The S&P/TSX Composite enters the 21-business-day\
      \ horizon (approximately late October/early November 2025) in a moderately constructive\
      \ environment. The BoC easing cycle, gold-driven materials strength, and stabilized\
      \ CAD all support a positive median return. However, persistent US trade policy\
      \ uncertainty, soft oil prices, and the fact that the index has already recovered\
      \ sharply from April lows (limiting easy upside) argue for a median below the\
      \ recent trailing 21-day return of +5%. The distribution is centered at +3%\
      \ with a one-sigma band of roughly \xB15.5%, with modest positive skew reflecting\
      \ the asymmetric tailwind from BoC cuts (which support valuations) vs. the tariff\
      \ tail risk (which is already partially priced). The left tail (5th percentile\
      \ at -6.2%) reflects a scenario where US tariff escalation, oil price collapse,\
      \ or a global risk-off event triggers a sharp reversal, while the right tail\
      \ (95th percentile at +12.4%) captures a scenario where trade tensions de-escalate,\
      \ gold surges further, and BoC cuts exceed expectations."
    horizon_rationale: "Forecast as of 2025-10-06 for the 21-business-day cumulative\
      \ log return on the S&P/TSX Composite. Key assumptions and inputs: (1) PRICE\
      \ MOMENTUM: The most recent 21-day cumulative log return is +0.0497, and the\
      \ trailing history shows the TSX has been recovering strongly since the April\
      \ 2025 tariff shock, with recent weekly 21-day readings in the +0.04 to +0.07\
      \ range. The index has largely absorbed the tariff-driven drawdown. (2) BANK\
      \ OF CANADA: Policy rate at 2.50% as of September 2025 with a near-certain 25bp\
      \ cut to 2.25% expected at the October 29 meeting. This accommodative stance\
      \ is supportive for rate-sensitive sectors (financials, real estate) and lowers\
      \ the discount rate on equities broadly. (3) INFLATION/LABOUR: CPI at ~1.9-2.4%\
      \ near target, unemployment at 6.9% with recent resilient job gains. Not a hawkish\
      \ constraint; gives BoC flexibility to ease further. (4) COMMODITIES: Gold at\
      \ record highs \u2014 a major tailwind for the TSX materials/mining sector,\
      \ which is a top index weight. Oil is mixed-to-soft due to OPEC+ supply and\
      \ global demand concerns, creating headwinds for the energy sector, though geopolitical\
      \ tensions provide a floor. Net commodity signal is moderately positive given\
      \ gold's outsized rally. (5) CAD/YIELDS: USD/CAD stabilized around 1.37 after\
      \ recovering from 1.40+; GoC 10-year yields trending lower with BoC easing,\
      \ providing valuation support for equities and easing financial conditions.\
      \ (6) US POLICY SPILLOVERS: US tariff threats (steel, aluminum, autos, forestry)\
      \ remain a structural overhang but markets have digested the initial April 2025\
      \ shock. The TSX is no longer in panic mode but tariff uncertainty caps upside\
      \ conviction. US Fed also in easing mode, limiting CAD depreciation pressure.\
      \ (7) SECTOR EARNINGS: Canadian banks benefit from rate cuts supporting loan\
      \ volumes; gold miners are standout performers; energy is mixed; auto/manufacturing\
      \ facing tariff headwinds. (8) VOLATILITY: 63-day daily vol is 0.01420/day,\
      \ implying 21-day \u03C3 \u2248 0.065. However, the current environment is materially\
      \ calmer than the April 2025 spike, so effective forward vol is estimated at\
      \ ~0.055. (9) MEDIAN/POINT: Set at +0.030 (~+3% over the month), reflecting\
      \ a continued positive trend but with meaningful mean-reversion from the recent\
      \ +5% reading, as elevated levels and tariff uncertainty cap momentum. Slight\
      \ positive skew applied to upper tail given BoC accommodation and gold tailwind."
