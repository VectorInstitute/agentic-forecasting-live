    horizon_rationale: "Forecast anchored on the following key inputs as of 2025-11-24:\
      \ (1) Bank of Canada Policy Path \u2014 BoC is holding its overnight rate at\
      \ 2.25% after a prolonged easing cycle; the Governing Council signalled in late\
      \ October that no further cuts are anticipated in the near term. A policy pause\
      \ reduces both the tailwind from further easing and the risk of a hawkish shock.\
      \ (2) Canadian Inflation & Labour Market \u2014 Headline CPI stable near 2.2%,\
      \ at-target inflation provides no urgent policy impulse either way. Labour market\
      \ resilient (unemployment ~6.9% in Oct 2025), better than feared. (3) Commodity\
      \ Prices \u2014 Gold prices elevated, providing meaningful support to TSX materials/mining\
      \ sector (a top index weight). Oil faces headwinds from global oversupply and\
      \ weakening demand; this is a partial drag on TSX energy names. Net commodity\
      \ impulse is roughly neutral-to-slightly-positive for the TSX overall given\
      \ gold's prominence. (4) CAD & GoC Yields \u2014 CAD remains under some downward\
      \ pressure against USD; GoC 10-year yields fluctuating narrowly. The BoC-Fed\
      \ policy divergence (Fed still easing, BoC paused) creates a mild USD/CAD headwind\
      \ but equity impact is limited as a weaker CAD partly boosts earnings of commodity\
      \ exporters in Canadian dollar terms. (5) US Policy Spillovers \u2014 US tariffs\
      \ on Canadian goods in place since Feb 2025 but impact is less severe than initially\
      \ feared; adaptation underway. Risk of re-escalation remains a tail risk. (6)\
      \ TSX Momentum & Valuation \u2014 The index reached record highs in November\
      \ 2025 driven by materials (gold) and technology. Recent 21-day cumulative log\
      \ returns have been modest and declining toward +0.01, suggesting momentum is\
      \ positive but fading. The 63-day trailing volatility of 2.44% (annualised ~17.2%)\
      \ is well below the long-run average, indicating a low-vol regime. (7) Distribution:\
      \ With annualised \u03C3 \u2248 17% and ~21 business days, the 1-month \u03C3\
      \ \u2248 2.41%. The median (point forecast) is set at +0.008 \u2014 roughly\
      \ consistent with the most recent 21-day reading and a modest positive drift\
      \ assumption (~+9.6% annualised drift in a record-high, low-vol environment\
      \ with pause in BoC easing). A mild left-skew adjustment is applied to reflect:\
      \ elevated valuations near record highs, oil price headwinds, tariff re-escalation\
      \ tail risk, and CAD weakness. The resulting distribution covers: 5th pct at\
      \ -3.8% (severe commodity+tariff shock), 95th pct at +4.6% (gold surge + Fed\
      \ pivot surprise lifting all risk assets)."
