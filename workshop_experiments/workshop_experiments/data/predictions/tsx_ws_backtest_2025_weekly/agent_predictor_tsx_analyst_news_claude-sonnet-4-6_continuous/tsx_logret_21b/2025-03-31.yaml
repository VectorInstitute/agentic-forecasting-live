    rationale: "Overall forecast rationale for S&P/TSX Composite 21-business-day cumulative\
      \ log-return as of 2025-03-31. The TSX enters April 2025 in a technically weak\
      \ position (consistent negative 21BD returns, -1.89% on the last trading day)\
      \ amid a macro backdrop defined by US tariff headwinds affecting over 60% of\
      \ Canadian exports, a softening Canadian labour market, and a historically wide\
      \ BoC-Fed rate differential. The BoC easing cycle (rate now 2.75%) provides\
      \ some fundamental support, and gold strength is a partial offset for the Materials\
      \ sector. However, the dominant risk remains trade policy uncertainty \u2014\
      \ tariffs on Canadian goods at 25% (10% for energy) represent a material GDP\
      \ headwind and earnings drag for the index's heavily-weighted Financials, Energy,\
      \ and Industrials sectors. The median forecast is set at -1.0% (slightly negative,\
      \ consistent with continued downtrend and headwinds), with elevated dispersion\
      \ (\u03C3\u224811.5%) reflecting the unusually uncertain macro environment.\
      \ The distribution has a mild negative skew to account for fat left tails from\
      \ tariff escalation scenarios."
    horizon_rationale: "Forecast origin: 2025-03-31. Horizon: 21 business days (~1\
      \ calendar month). Key drivers and assumptions: (1) PRICE MOMENTUM \u2014 The\
      \ TSX closed with a daily log-return of -1.89% on March 31, the weakest in weeks.\
      \ Rolling 21BD returns throughout March 2025 were consistently negative (-0.01\
      \ to -0.06), establishing a clear downtrend. The trailing 63-day daily std of\
      \ 0.0276 implies a 21BD vol of ~12.6% (= 0.0276\xD7\u221A21), which is substantially\
      \ elevated vs the long-run TSX average (~8-9%). (2) BANK OF CANADA \u2014 BoC\
      \ cut its overnight rate to 2.75% in March 2025, the 7th consecutive cut since\
      \ June 2024. Easing supports valuations in isolation, but the BoC has explicitly\
      \ flagged it cannot fully offset tariff-induced economic damage, limiting the\
      \ stimulative impulse. (3) INFLATION & LABOUR \u2014 CPI has returned to the\
      \ 2% target, a mild positive. However, the unemployment rate has risen to ~6.6-6.7%,\
      \ signalling labour market slack and softening consumer demand, a mild negative\
      \ for domestic-facing sectors. (4) OIL & COMMODITIES \u2014 WCS crude faces\
      \ a 10% US tariff on energy exports, widening the WCS-WTI discount and compressing\
      \ energy-sector margins. Global growth concerns (tariff-induced demand drag)\
      \ add to downside pressure on crude. Partially offsetting: gold is strong on\
      \ safe-haven demand, supporting TSX miners. Base metals are pressured by USD\
      \ strength and weak industrial demand signals. Net commodity effect: slightly\
      \ negative for the index. (5) USD/CAD & GoC YIELDS \u2014 CAD averaged ~0.6957\
      \ vs USD at end-March 2025. The BoC-Fed rate spread reached a historic 175bp\
      \ (2.75% vs 4.50%), maintaining downward pressure on CAD. A weak loonie modestly\
      \ benefits Canadian exporters' earnings translation but signals weak risk appetite.\
      \ GoC yield curve is bearish-steepening, adding to financial-sector headwinds.\
      \ (6) US TARIFFS \u2014 ~25% tariffs on >60% of Canadian goods (with 10% on\
      \ energy) are the dominant macro risk. USMCA uncertainty persists. Trade war\
      \ risks a material drag on Canadian GDP in H1 2025, and this is not yet fully\
      \ priced given the fluid policy environment. (7) SECTOR OUTLOOK \u2014 Financials\
      \ (largest TSX weight) face rising credit risk and potential loan deterioration\
      \ from a slowing economy. Energy faces tariff headwinds. Materials is a relative\
      \ bright spot on gold strength. Industrials face supply-chain disruption. DISTRIBUTION\
      \ ASSUMPTIONS: Median drift set at -1.0% (slightly negative bias reflecting\
      \ tariff/growth headwinds vs BoC easing offset). Volatility parameter \u03C3\
      \u2082\u2081 = 0.115 (slightly below raw 21BD vol of 0.126 to reflect some mean-reversion\
      \ tendency after a sharp drawdown). Mild negative skew applied (left tail extended\
      \ to reflect tail risk of tariff escalation/trade war scenario; right tail reflects\
      \ potential sharp bounce if tariff relief materializes). The resulting distribution\
      \ spans approximately -19.5% (5th percentile, tariff escalation/recession scenario)\
      \ to +15.8% (95th percentile, tariff resolution/commodity surge scenario)."
