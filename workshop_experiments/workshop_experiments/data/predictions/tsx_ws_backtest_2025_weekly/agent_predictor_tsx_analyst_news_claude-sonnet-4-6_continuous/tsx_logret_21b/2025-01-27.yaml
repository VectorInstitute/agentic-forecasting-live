    rationale: "Overall approach: Bayesian combination of (a) historical 21-bd TSX\
      \ return distribution (long-run mean ~+0.01, std ~0.035\u20130.04 in moderate-vol\
      \ regimes), (b) current macro regime signals (BoC easing cycle positive, tariff\
      \ risk negative/left-skewing), and (c) recent momentum (bounce from Dec\u2013\
      Jan selloff largely completed, momentum contribution neutral to slightly positive).\
      \ The dominant uncertainty source is U.S. tariff policy \u2014 25% blanket tariffs\
      \ on Canadian goods would be deeply negative for the TSX (energy, materials,\
      \ autos, banks all exposed), while tariff delays or a negotiated resolution\
      \ would be a significant positive catalyst. This binary uncertainty produces\
      \ a wider-than-normal, left-skewed distribution centered on a modestly positive\
      \ median of +0.010."
    horizon_rationale: "Forecast as of 2025-01-27 for the 21-business-day (\u2248\
      1 calendar month) cumulative log return on the S&P/TSX Composite. Key drivers\
      \ and assumptions: (1) BANK OF CANADA: The BoC just executed its 5th consecutive\
      \ cut, lowering the overnight rate to 3.0% on Jan 29 (imminent as of forecast\
      \ date). The easing cycle is intact and ongoing, reducing discount rates and\
      \ supporting equity valuations. Governor Macklem acknowledged a 'trade war storm'\
      \ creates uncertainty, limiting forward guidance clarity. Net effect: modestly\
      \ positive for equities. (2) CANADIAN INFLATION & JOBS: December 2024 CPI at\
      \ 1.8%, below the 2% target; December employment surged +90K, Jan added +76K,\
      \ unemployment at 6.6\u20136.7%. Wage growth cooling to 3.8% YoY. The labour\
      \ market is resilient but with excess supply in the broader economy. This supports\
      \ continued BoC easing without reigniting inflation \u2014 a Goldilocks setup\
      \ modestly positive for equities. (3) TARIFF/TRADE RISK (dominant tail risk):\
      \ Trump threatened 25% blanket tariffs on all Canadian goods. This is the primary\
      \ left-tail driver. Implementation could push Canada into recession, crushing\
      \ energy, autos, and materials exporters. Uncertainty alone weighs on sentiment\
      \ and earnings guidance. This risk asymmetrically shifts the distribution to\
      \ the left, requiring a fatter left tail. (4) COMMODITIES: Brent crude ~$80/bbl\
      \ in January 2025 \u2014 moderate and supportive for TSX energy sector (roughly\
      \ 18% of index weight). Gold prices elevated and rising \u2014 positive for\
      \ gold miners (a meaningful TSX materials component). Overall commodity backdrop\
      \ is mildly supportive. (5) USD/CAD & GoC YIELDS: CAD at ~1.43\u20131.44 USD/CAD,\
      \ near multi-decade lows. A weaker loonie provides translation gains for TSX\
      \ companies with USD revenues (energy, mining, tech) but signals domestic stress.\
      \ GoC 10-year yields declining as BoC cuts more than the Fed \u2014 positive\
      \ for rate-sensitive sectors (real estate, utilities, financials). (6) US POLICY\
      \ SPILLOVERS: Fed held rates in January 2025 while BoC cut, widening the rate\
      \ differential and pressuring CAD. US growth remains positive and US equities\
      \ are performing well, providing a global risk-on backdrop if tariff fears recede.\
      \ However, tariff implementation (the base risk scenario) would damage Canada\
      \ disproportionately. (7) RECENT PRICE ACTION: The 21-day return as of Jan 27\
      \ is +0.0176, reflecting a strong recovery from the Dec\u2013Jan selloff. The\
      \ TSX dropped sharply Dec 18\u2013Jan 13 (21-bd readings turned deeply negative:\
      \ -0.03 to -0.04) before recovering. This mean-reversion bounce has been largely\
      \ completed by Jan 27. (8) HISTORICAL DISTRIBUTION: The trailing 63-day return\
      \ std of ~0.0275 and historical 21-bd return CSV suggest a typical monthly return\
      \ std of ~0.035\u20130.040 for the current elevated-uncertainty regime. Historical\
      \ median 21-bd returns cluster around +0.01 to +0.02 in non-crisis, easing-rate\
      \ environments. CALIBRATION: Median set at +0.010, reflecting: BoC easing tailwind\
      \ (+), commodity support (+), tariff uncertainty overhang (\u2212), CAD weakness\
      \ partially a net positive for large-cap TSX names with USD revenues (+/\u2212\
      ), recent momentum fading to flat after bounce. Distribution is mildly left-skewed\
      \ to account for tariff tail risk: the 5th percentile at -0.052 captures a scenario\
      \ where tariffs are formally announced/implemented within the horizon, causing\
      \ a sharp selloff. The 95th percentile at +0.073 captures a scenario where tariff\
      \ fears fully dissipate and commodity prices rally. The spread between Q5 and\
      \ Q95 is ~12.5 log-return points, consistent with elevated but not extreme uncertainty\
      \ (similar to late-2018 or mid-2019 tariff-era volatility)."
