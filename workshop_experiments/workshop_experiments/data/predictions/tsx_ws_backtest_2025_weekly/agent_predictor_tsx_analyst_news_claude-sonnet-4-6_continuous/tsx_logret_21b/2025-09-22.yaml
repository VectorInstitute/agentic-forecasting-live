      \ The US Fed also commenced rate cuts in September 2025, generating a 'risk-on'\
      \ environment globally that lifted both US and Canadian equities to record levels.\
      \ Persistent US tariffs on Canadian goods (auto, steel, aluminum, lumber) remain\
      \ a structural headwind and create tail risk, though USMCA protects the majority\
