    horizon_rationale: "Forecast origin: 2025-09-22. The 21-business-day cumulative\
      \ log-return distribution is anchored by the following key inputs: (1) Bank\
      \ of Canada Policy Path \u2014 BoC cut to 2.50% on Sept 17 (8th consecutive\
      \ cut since June 2024); shadow council and market consensus expect a further\
      \ 25bp cut to 2.25% at the October 2025 meeting. This ongoing easing cycle is\
      \ supportive for rate-sensitive TSX sectors (financials, REITs, utilities).\
      \ (2) Canadian Macro \u2014 August 2025 CPI at 1.9% (below target); September\
      \ headline ticked to ~2.4% on energy base effects but core remains contained,\
