      \ geopolitical safe-haven demand, providing a significant boost to TSX materials/mining.\
      \ Energy remains volatile but broadly supportive. (4) USD/CAD & GoC Yields \u2014\
      \ CAD stabilized near 1.37 (USD/CAD) after weakness above 1.40 earlier in 2025;\
