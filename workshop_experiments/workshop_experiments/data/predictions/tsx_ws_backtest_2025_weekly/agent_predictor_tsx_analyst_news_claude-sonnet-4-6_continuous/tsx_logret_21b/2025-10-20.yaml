    horizon_rationale: "Forecast for the 21-business-day cumulative log-return on\
      \ the S&P/TSX Composite from 2025-10-20. Key drivers: (1) Bank of Canada policy\
      \ \u2013 BoC cut to 2.50% in September 2025 and markets widely expect another\
      \ 25bp cut to 2.25% at the October 29 meeting (within this forecast window),\
      \ providing a monetary easing tailwind for Canadian equities via lower discount\
      \ rates and improved credit conditions. (2) Inflation & labour market \u2013\
      \ CPI is near the 2% target (neutral to supportive), but the unemployment rate\
      \ rose to 7.1% (highest since 2016 ex-pandemic), signalling a weakening demand\
      \ backdrop that constrains upside for cyclical sectors. (3) Commodities \u2013\
      \ Gold trending to record highs, benefiting TSX materials/gold miners and adding\
      \ safe-haven support. Oil is range-bound at $60\u201370 (tepid global demand,\
      \ OPEC+ oversupply), creating a modest headwind for TSX energy names. Base metals\
      \ face downward pressure from USD strength and soft industrial demand. Net commodity\
      \ effect is mildly positive, with gold offsetting energy weakness. (4) CAD and\
      \ GoC yields \u2013 USD/CAD stabilised around 1.37 (recovered from >1.40 earlier\
      \ in 2025). GoC 10-year yields are trending lower as BoC pursues aggressive\
      \ easing; Canada-US 10yr spread at approximately -101bps. Lower GoC yields are\
      \ a valuation tailwind for equities. (5) US policy spillovers \u2013 US tariffs\
      \ on Canadian goods (auto, steel, aluminum, lumber) remain in force, creating\
      \ a persistent headwind to business investment and export earnings. This is\
      \ the primary source of negative skew in the distribution. (6) TSX sector earnings\
      \ \u2013 Canadian banks have been resilient (capital markets strength); gold\
      \ miners are outperforming; energy is mixed. The TSX recovered strongly from\
      \ April 2025 lows (~-9% at the trough). Recent 21bd observations have been in\
      \ the +0.03 to +0.05 range as momentum moderates from summer highs. Historical\
      \ return statistics: trailing 63-day daily \u03C3 = 0.01358, implying a 21-day\
      \ \u03C3 \u2248 0.0622. Distribution centred at +0.020 (modest positive drift\
      \ reflecting BoC easing offset by trade/labour headwinds) with \u03C3 \u2248\
