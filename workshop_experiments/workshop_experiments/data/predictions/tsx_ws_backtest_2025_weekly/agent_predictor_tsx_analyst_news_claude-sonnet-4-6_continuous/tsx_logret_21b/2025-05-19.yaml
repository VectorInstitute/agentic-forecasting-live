    rationale: "Overall framework: The TSX has rallied ~+7.45% over the past 21 business\
      \ days into May 16, 2025, driven by a relief bounce from the April tariff shock.\
      \ The forward 21-day window faces mean-reversion pressure from this elevated\
      \ base, persistent US\u2013Canada trade uncertainty (the primary tail risk),\
      \ and a macro backdrop of BoC easing, softening labour market, trending inflation,\
      \ and commodity support from gold. The median forecast of +1.2% log return reflects\
      \ a continuation of modest positive drift from the current elevated level, while\
      \ the distribution is widened vs. normal (trailing vol elevated at 63d std =\
      \ 0.0436 daily) and skewed slightly negative to capture the asymmetric downside\
      \ from potential tariff escalation or commodity price decline. Quantile spacing\
      \ uses an approximate 21-day cumulative std of ~0.046 with mild left skew: the\
      \ 5th percentile (-7.2%) captures a scenario of tariff re-escalation or commodity\
      \ shock; the 95th percentile (+9.6%) captures further risk-on momentum if a\
      \ US\u2013Canada trade deal materializes or commodity prices surge."
    horizon_rationale: "Forecast as of 2025-05-19 for the 21-business-day ahead (\u2248\
      \ mid-June 2025) S&P/TSX Composite cumulative log return. Key considerations:\
      \ (1) STARTING POSITION & MEAN REVERSION: The trailing 21-day cumulative log\
      \ return is an elevated +7.45%, reflecting a sharp V-shaped recovery from the\
      \ April 2025 tariff shock. This is approximately 1.5\u20132 standard deviations\
      \ above the long-run monthly mean of ~+0.5\u20131.0%, creating significant mean-reversion\
      \ pressure. The next 21 days are expected to deliver a more modest drift. (2)\
      \ BANK OF CANADA: The BoC has cut rates 175bps since mid-2024, with the overnight\
      \ rate near 3.25%. A data-dependent 'one-decision-at-a-time' approach signals\
      \ 2\u20133 more cuts through 2025, providing a mild tailwind for equities. (3)\
      \ INFLATION & LABOUR: Canadian CPI at 2.3% y/y (March), trending toward the\
      \ 2% target. Unemployment risen to ~7.0%, giving the BoC room to ease. Soft\
      \ macro supports accommodative policy but not strong growth. (4) COMMODITIES:\
      \ WTI oil ~$75/bbl with OPEC+ discipline; neutral-to-slight positive for TSX\
      \ energy sector. Gold remains elevated on safe-haven demand, supporting Canadian\
      \ gold miners (a key TSX materials component). Base metals (copper, nickel)\
      \ face demand headwinds from China and USD strength. Net commodity impact: mildly\
      \ positive. (5) USD/CAD & GoC YIELDS: CAD trading 1.37\u20131.40 USD/CAD range.\
      \ BoC\u2013Fed policy divergence pressures CAD, but a weaker CAD supports TSX\
      \ exporters. GoC 10-year yield ~3.47%, broadly stable. (6) US TARIFFS/TRADE:\
      \ The 25% US tariff on most Canadian goods remains the dominant uncertainty.\
      \ A 90-day pause on some reciprocal tariffs and auto exemptions provided temporary\
      \ relief, but no comprehensive deal has been reached. Ongoing trade uncertainty\
      \ is the primary downside tail risk. Any escalation could trigger -5 to -10%\
      \ moves. (7) VOLATILITY: Trailing 63-day daily std = 0.0436 (elevated vs. normal\
      \ ~0.025\u20130.030). Implied 21-day cumulative std \u2248 0.04\u20130.05, with\
      \ slight negative skew given current elevated levels and asymmetric trade-war\
      \ downside. (8) DISTRIBUTION CALIBRATION: Historical 21-day return distribution\
      \ from 2000\u20132025 CSV shows typical range of \xB10.06\u20130.10, with extreme\
      \ tail events at -0.39 (COVID 2020) and +0.15 (recovery 2009/2020). Current\
      \ environment warrants a slightly fat left tail given trade policy uncertainty.\
      \ Central (median) estimate of +0.012 reflects a modest positive drift from\
      \ current elevated levels, consistent with long-run expected return (~+0.5\u2013\
      1%/month) and the absence of a strong directional catalyst. The distribution\
