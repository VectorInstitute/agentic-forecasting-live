    rationale: 'Overall forecast philosophy: The TSX faces a tug-of-war between a
      supportive BoC easing cycle (positive) and structural headwinds from US tariffs,
      a weakening labour market, and soft oil prices (negative). Gold strength and
      declining GoC yields provide partial cushions. The median of +2.0% over 21 business
      days reflects modest positive drift in line with the easing catalyst, while
      the ~4.5% 1-sigma spread captures the elevated macro uncertainty. The distribution
      is centered somewhat below recent trailing realized 21-day returns (~+4%) because
      those were boosted by the April-May rebound from the tariff shock trough, and
      momentum has been decelerating since June 2025.'
    horizon_rationale: "Forecast as of 2025-09-08 for the 21-business-day (\u2248\
      1-month) cumulative log return of the S&P/TSX Composite. KEY INPUTS: (1) Bank\
      \ of Canada policy: Rate at 2.75% with ~98% market-implied probability of a\
      \ 25bps cut on Sep 17 (within the horizon), followed by another cut expected\
      \ in October toward 2.25%. This is a near-term positive catalyst for Canadian\
      \ equities via lower discount rates and support for rate-sensitive financials.\
      \ (2) Labour market: August LFS showed a severe -65,500 net job loss, pushing\
      \ unemployment to 7.1% \u2014 worst since 2016 ex-pandemic. This signals slowing\
      \ corporate earnings and consumer spending, acting as an offsetting headwind\
      \ despite confirming the dovish BoC path. (3) CPI/inflation: CPI near 2% target,\
      \ giving BoC room to ease without inflationary constraint. Mild positive for\
      \ equities. (4) Commodities: WTI crude soft at ~$62/bbl, a meaningful headwind\
      \ for TSX energy sector (Cenovus, Suncor, Canadian Natural Resources). Gold\
      \ prices remain elevated on safe-haven demand, supporting TSX materials/mining\
      \ stocks and partially offsetting energy weakness. Industrial metals under pressure\
      \ from trade friction and weak global manufacturing demand. (5) USD/CAD and\
      \ GoC yields: CAD trading ~1.3830 (weak), reflecting BoC-Fed policy divergence.\
      \ GoC yields falling in a bullish flattening \u2014 positive for duration-sensitive\
      \ names. (6) US tariff spillovers: US tariffs on Canadian goods escalated to\
      \ ~35%, creating persistent uncertainty across manufacturing, transportation,\
      \ and trade-exposed sectors. Some exemptions negotiated but friction remains.\
      \ (7) Price history signal: Trailing 63-day daily return std of ~0.992% implies\
      \ 21-day 1-sigma range of ~4.5%. Recent 21-day rolling returns have been declining\
      \ from ~+6% in early June to ~+4% in early September, suggesting momentum is\
      \ fading. The current last_log_return of +0.0446 may partially reflect a mean-reversion\
      \ plateau. DISTRIBUTION: Median set at +2.0% log return, slightly below recent\
      \ realized values to reflect fading momentum, soft oil, and trade headwinds,\
      \ partially supported by the imminent BoC cut catalyst and gold strength. Volatility\
      \ scaled to ~4.5% 21-day sigma. The distribution is approximately normal with\
      \ a very slight positive skew given the BoC easing asymmetry. Tail risks are\
      \ symmetric: downside from tariff escalation or oil shock; upside from trade\
      \ de-escalation, a surprise BoC double-cut, or a commodity price surge."
