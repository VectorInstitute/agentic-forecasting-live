    rationale: 'Overall framework: The S&P/TSX Composite is in an elevated-volatility,
      negatively-trending regime as of April 14, 2025, driven primarily by US-Canada
      trade war escalation (sweeping tariffs), weak oil prices, and a cautious Bank
      of Canada on hold at 2.75%. The negative price momentum (-2.84% over the prior
      21 business days) provides some statistical mean-reversion pull, but the structural
      nature of the tariff shock and softening labour market cap the upside. Gold
      sector strength (gold at record highs) provides partial offset. The forecast
      uses an effective 21-bd volatility of ~5.5%, a median of -0.7%, and a mildly
      left-skewed distribution (fat left tail for tariff escalation/recession risk,
      modest right tail for trade-deal resolution or BoC emergency easing). Historical
      comparisons: most analogous to April 2018 (NAFTA renegotiation uncertainty)
      and March-April 2020 (COVID shock), though severity is between those two episodes.
      The asymmetric distribution reflects that downside catalysts (tariff escalation,
      oil demand collapse, bank credit stress) are more concrete than upside catalysts
      (trade deal, commodity price recovery) at this juncture.'
    horizon_rationale: "Forecast origin: 2025-04-14. The TSX has sustained a sharp\
      \ tariff-shock selloff in early April 2025, with the most recent 21-bd cumulative\
      \ log-return at -2.84%. The trailing 63-day observation std of ~0.031 per 21-bd\
      \ window understates true near-term uncertainty given the regime shift. Key\
      \ inputs and assumptions: (1) BANK OF CANADA: Held policy rate at 2.75% in April\
      \ 2025 after cutting 175 bps since June 2024. Tone is 'unusually challenging'\
      \ with trade uncertainty dominating guidance. No immediate easing catalyst over\
      \ the next 21 business days, though further cuts remain on the table if recession\
      \ risk builds. Mild support from low real rates, but insufficient to offset\
      \ trade headwinds. (2) INFLATION/LABOUR: CPI at 2.3% (March 2025), near target\
      \ but with tariff-driven upside risk and carbon-tax-removal downward pull. Employment\
      \ declined in March; businesses pulling back hiring \u2014 mild stagflation\
      \ risk. (3) OIL: Significant weakness (down ~10% since Aug 2024 with further\
      \ April declines on global demand fears from trade war). Bearish for TSX Energy\
      \ sector (~18% of index). (4) GOLD: Soaring on geopolitical/safe-haven demand\
      \ \u2014 materially supportive for TSX Materials/Gold miners (~13% of index),\
      \ partially offsetting energy weakness. (5) CAD: Strengthened to ~1.3893/USD\
      \ by Apr 14 on broad USD weakness; this is mildly positive for TSX in local\
      \ currency terms. (6) GoC YIELDS: Curve steepening on stagflation fears; moderately\
      \ negative for bank NIMs in the short run. (7) US SPILLOVERS: Sweeping US tariffs\
      \ on Canada (steel, aluminum, autos) with retaliatory Canadian measures; 90-day\
      \ pause in some US tariffs (not Canadian-specific) provides some global relief\
      \ but uncertainty remains extreme. TSX showed relative resilience vs S&P 500\
      \ in Q1 but faces ongoing headwinds. (8) MOMENTUM/MEAN-REVERSION: The -2.84%\
      \ prior 21-bd return creates a partial mean-reversion pull toward zero, but\
      \ the tariff shock is structural rather than transient, limiting the rebound.\
      \ Comparable to mid-2018 NAFTA uncertainty period (small negative drift) rather\
      \ than V-shaped COVID recovery. DISTRIBUTION CONSTRUCTION: Central estimate\
      \ (median) set at -0.007 reflecting slight negative bias from tariff headwinds\
      \ partially offset by mean-reversion dynamics and gold sector support. Effective\
      \ vol calibrated at ~0.055 per 21-bd window (up from 0.031 trailing), consistent\
      \ with stressed historical episodes (2018 trade war, 2015-16 oil shock, 2022\
      \ rate-shock periods). Left tail widened (fat tail at Q0.05 = -0.105) to capture\
      \ tariff escalation / recession scenario. Right tail capped at Q0.95 = +0.085,\
      \ reflecting plausible rebound if trade negotiations advance or BoC delivers\
      \ emergency cut."
