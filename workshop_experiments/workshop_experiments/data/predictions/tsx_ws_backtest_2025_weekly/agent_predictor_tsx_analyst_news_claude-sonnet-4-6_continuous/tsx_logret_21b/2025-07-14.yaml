    rationale: 'Overall macro backdrop as of 2025-07-14 is cautiously positive for
      Canadian equities. The BoC easing cycle has supported financial sector earnings
      and the economy more broadly, while gold''s strength has been a key driver of
      TSX outperformance versus global peers. The tariff shock from early 2025 has
      been largely absorbed, with the TSX reaching record highs. The primary near-term
      risks are: (a) fresh US trade escalation, (b) a correction in gold or oil prices,
      (c) weaker-than-expected Canadian economic data prompting further CAD weakness
      that could signal broader risk-off, and (d) US Federal Reserve holding rates
      higher for longer, widening the Canada-US differential and creating additional
      CAD and capital-flow headwinds. The median forecast of +0.012 log return over
      21 business days (~+1.2%) represents modest continued appreciation from the
      record-high level, consistent with the positive but decelerating momentum observed
      in the recent return history (declining from +0.07 in May to +0.02 in July).
      Uncertainty is captured in the wide quantile spread reflecting both upside (continued
      gold/materials rally, BoC support, positive earnings) and downside (record-high
      mean reversion, trade risk, soft labour market) scenarios.'
    horizon_rationale: "Forecast for S&P/TSX Composite 21-business-day cumulative\
      \ log return, origin 2025-07-14. Key assumptions and drivers: (1) Bank of Canada\
      \ Policy: BoC held its overnight rate steady at ~2.75% at the July 2025 meeting\
      \ after an aggressive 175 bps easing cycle since mid-2024. The pause reflects\
      \ inflation having fallen to ~1.7% (below the 2% target) and a desire to avoid\
      \ further CAD depreciation. This is modestly positive for TSX financials (bank\
      \ margins stabilizing) but removes the marginal stimulus of additional cuts.\
      \ (2) Inflation & Labour: CPI ~1.7% is benign and not a near-term headwind.\
      \ However, unemployment at 6.9% in June 2025 and rising signals domestic economic\
      \ softening, which weighs on consumer-discretionary and cyclical sectors. (3)\
      \ Commodities: Gold is surging as a safe-haven amid geopolitical uncertainty\
      \ and central bank demand \u2014 a strong tailwind for the TSX materials/gold-miner\
      \ sector (~14% index weight). Oil prices are mixed \u2014 OPEC+ support provides\
      \ a floor but US-China trade-related demand concerns cap the upside; net neutral\
      \ to modestly negative for energy sector. (4) CAD/USD & GoC Yields: USD/CAD\
      \ ~1.3693 \u2014 moderately weak CAD boosts export-oriented energy and materials\
      \ firms while adding a headwind for domestic importers. GoC 10-year yield ~3.53%,\
      \ relatively stable. The wide Canada-US yield spread (40-year extremes) is largely\
      \ priced in. (5) US Tariff & Trade Spillovers: The Feb 2025 tariff shock (25%\
      \ on most Canadian goods, 10% on energy) was the primary driver of the March\u2013\
      April \u20138% drawdown. That shock has now been absorbed, and the TSX has recovered\
      \ to record highs as of July 2025. Residual uncertainty persists but acute downside\
      \ risk is lower unless there is a fresh escalation. (6) TSX Momentum & Valuation:\
      \ The most recent 21-day log return is +0.0217; the index is at record highs.\
      \ Strong momentum is a positive signal, but at record highs mean-reversion risk\
      \ is elevated, particularly if risk appetite softens or if oil/gold prices pull\
      \ back. (7) Statistical calibration: Historical 21-day log return distribution\
      \ has a long-run mean drift of ~+0.01 and std ~0.035. The trailing 63-day std\
      \ of 0.03634 reflects elevated but declining volatility. I set the forecast\
      \ median at +0.012 (modest positive drift consistent with positive sector fundamentals\
      \ and BoC support, but tempered by record-high valuation risk and global uncertainty).\
      \ The distribution is modestly negatively skewed: downside tails are extended\
      \ slightly (geopolitical/tariff shock risk, oil price collapse, trade escalation)\
      \ while upper tails are compressed (index already at record highs limits the\
      \ magnitude of further near-term gains). Spread: Q5=-0.060 to Q95=+0.076 reflecting\
      \ a ~13.6% total log-return range, consistent with ~21-day vol of ~3.6% daily\
      \ scaled to monthly."
