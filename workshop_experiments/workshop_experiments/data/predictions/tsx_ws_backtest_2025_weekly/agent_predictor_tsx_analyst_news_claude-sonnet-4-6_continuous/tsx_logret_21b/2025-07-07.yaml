    rationale: "Overall macro regime as of July 7, 2025: TSX is in a post-tariff-shock\
      \ recovery phase with slowing momentum. The index faces a mixed but cautiously\
      \ positive environment \u2014 BoC on hold/easing bias, gold supportive, but\
      \ oil under pressure, US tariffs unresolved, CAD weak, and Canadian labour market\
      \ softening. The 21-business-day median forecast of +0.015 represents a modest\
      \ positive return expectation consistent with a grinding recovery at reduced\
      \ speed. The distribution is centered on a near-normal shape with left skew,\
      \ reflecting the elevated downside risk from trade policy escalation and energy\
      \ price weakness, while maintaining upside optionality from trade resolution,\
      \ gold strength, or stronger-than-expected bank earnings. Historical tail calibration\
      \ draws on the full 25-year TSX history, which includes COVID (\u22120.39),\
      \ GFC (\u22120.27), and post-crisis recoveries (+0.15), to set extreme quantiles\
      \ at \u22120.065 (Q5) and +0.088 (Q95)."
    horizon_rationale: "Forecast origin: 2025-07-07. TSX Composite closed at ~27,020,\
      \ with the last 21-business-day cumulative log return at +0.0254 \u2014 reflecting\
      \ a substantial recovery from the April 2025 tariff shock lows (which pushed\
      \ 21-day returns to as low as \u22120.08). However, forward momentum is clearly\
      \ slowing: recent daily 21-day rolling returns have compressed from +0.10 in\
      \ mid-May to +0.02\u20130.03 by early July, suggesting the rebound is maturing.\n\
      \nKey drivers for the 21-business-day ahead horizon (~early August 2025):\n\n\
      1. Bank of Canada (BoC): Rate held at 2.75% since March 2025. BoC is in a cautious\
      \ holding pattern, monitoring trade/tariff impacts and core inflation (~2.5%).\
      \ No imminent hike expected; mild possibility of a cut if labour weakens further.\
      \ This is broadly equity-neutral with a slight easing bias supportive of rate-sensitive\
      \ sectors.\n\n2. Labour market: Unemployment rose to 6.9% by June 2025, particularly\
      \ in trade-sensitive sectors. This softening is a modest headwind for financials\
      \ (loan growth) and consumer discretionary names.\n\n3. WTI crude oil (~$64/bbl):\
      \ Trading near support, with OPEC+ potentially adding 411k bbl/day \u2014 a\
      \ clear downside risk for the energy-heavy TSX. Energy sector headwind persists.\n\
      \n4. Gold (~$3,288/oz): Strong safe-haven bid; supportive for TSX materials/gold\
      \ miners. Geopolitical and trade uncertainty underpins gold demand, partially\
      \ offsetting energy weakness.\n\n5. US tariffs (25% on most Canadian goods):\
      \ The dominant macro overhang. Tariff uncertainty creates asymmetric risk \u2014\
      \ any resolution (upside catalyst) vs. escalation (sharp downside). No near-term\
      \ resolution is expected in the base case, weighing on business investment and\
      \ export growth.\n\n6. USD/CAD: CAD under pressure from rate differential vs.\
      \ Fed and trade uncertainty. Weak loonie is modestly supportive for export earnings\
      \ but weighs on imported inputs.\n\n7. GoC 10-year yields: Easing alongside\
      \ US Treasuries as inflation cools; supportive for bond-proxy sectors and bank\
      \ NIMs.\n\n8. Canadian bank earnings (Q3 reporting begins in August): Financials\
      \ (~35% of TSX) have shown resilience but investors will scrutinize loan-loss\
      \ provisions given the rising unemployment trend.\n\nStatistical basis: Trailing\
      \ 63-day std of 21-day log returns = 0.0436. Given the elevated uncertainty\
      \ from trade policy, I use sigma ~0.045. A mild negative skew is applied (reflecting\
      \ asymmetric downside risk from tariff escalation vs. upside from trade resolution).\
      \ The median (Q0.50) is set at +0.015 (~1.5%), slightly below the current 21-day\
      \ trailing return of +2.54%, reflecting mean-reversion as the post-shock recovery\
      \ momentum fades and fresh headwinds (oil, labour, trade) persist. Tail quantiles\
      \ are calibrated using a near-normal distribution with the described left-skew\
      \ adjustment."
