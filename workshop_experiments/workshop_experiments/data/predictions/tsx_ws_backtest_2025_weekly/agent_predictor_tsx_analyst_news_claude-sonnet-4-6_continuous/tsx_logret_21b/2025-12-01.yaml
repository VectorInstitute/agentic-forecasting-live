    rationale: "Overall framework: The S&P/TSX Composite as of December 1, 2025 sits\
      \ near record highs after a ~28-29% YTD rally, supported by a BoC that has cut\
      \ rates aggressively to 2.25% (now on hold), surging gold prices boosting the\
      \ materials sector, and healthy Canadian bank earnings. The primary risks for\
      \ the 21-business-day forward window are: (a) US-Canada trade tensions re-escalating,\
      \ (b) a commodity price reversal (especially gold), (c) BoC/Fed divergence pressuring\
      \ CAD and GoC yields, and (d) valuation stretch after a strong rally. Constructive\
      \ offset factors include: BoC policy stability, Q3 GDP upside surprise, gold's\
      \ continued safe-haven bid, seasonal year-end equity tailwinds, and a labour\
      \ market that is stabilizing rather than deteriorating. The median/point forecast\
      \ of +0.012 (~+1.2% log return over 21 bd) is modestly positive, reflecting\
      \ a slight drift with mean-reversion from the recent +2.7% 21-day reading. Uncertainty\
      \ is calibrated to \u03C3\u22480.024 for the 21-bd horizon, consistent with\
      \ the trailing realized volatility and recent return dispersion in the historical\
      \ series."
    horizon_rationale: "Forecast origin: 2025-12-01. Horizon: 21 business days (~1\
      \ calendar month, ending approximately early January 2026). Key assumptions\
      \ and reasoning: (1) BANK OF CANADA POLICY: BoC overnight rate at 2.25%, firmly\
      \ on pause after cutting from 5.0% since mid-2024. No further easing expected\
      \ near-term; Governing Council signalled hold in Oct 2025. This is broadly supportive\
      \ for Canadian equities via improved lending conditions and financial-sector\
      \ margins, but limits additional multiple-expansion catalyst. (2) INFLATION\
      \ & JOBS: Canadian CPI at 2.2% headline, core slightly above 2% target \u2014\
      \ benign but not a trigger for further cuts. Labour market unemployment ~6.5\u2013\
      6.9%, stabilizing with late-2025 job gains. Q3 2025 GDP surprise of +2.6% annualized\
      \ is a positive macro tailwind. (3) COMMODITY PRICES: Gold at/near record highs\
      \ \u2014 highly positive for TSX materials sector (significant index weighting).\
      \ Oil under mild pressure from OPEC+ supply and tepid global demand \u2014 mixed/slight\
      \ drag on energy sector. Net commodity effect is modestly positive given gold's\
      \ large impact on the index. (4) USD/CAD & GOC YIELDS: BoC-Fed policy divergence\
      \ (BoC has cut more aggressively) weighs on CAD; GoC 10-year yields under upward\
      \ pressure from global bond market moves and above-target core inflation. Weaker\
      \ CAD provides a translation benefit for TSX energy/mining multinationals but\
      \ signals growth concerns. (5) US POLICY SPILLOVERS: US tariffs on Canadian\
      \ goods (steel, aluminium, autos) are a persistent headwind; trade uncertainty\
      \ suppressed business investment and dampened manufacturing/transport sectors.\
      \ Markets have largely priced this in from earlier-2025 volatility; incremental\
      \ negative surprise risk remains but is lower than mid-2025 peak. (6) SECTOR/EARNINGS\
      \ CONTEXT: TSX up ~28-29% YTD as of late 2025, at record highs, driven by materials\
      \ (gold) and financials. This elevated level introduces modest valuation stretch\
      \ and mean-reversion risk. Canadian big-6 banks are entering earnings season\
      \ \u2014 financial sector is healthy but expensive. December is historically\
      \ a mild positive seasonality month (window-dressing, tax-loss selling offsets).\
      \ (7) STATISTICAL CALIBRATION: trailing_63d_std = 0.02419 is interpreted as\
      \ the standard deviation of 21-bd log-returns. The historical record shows 21-bd\
      \ returns clustering in the \xB10.03\u20130.05 band in recent benign periods,\
      \ with fat tails in crisis periods (e.g., -0.39 in March 2020). Recent momentum\
      \ is positive (+0.027 last reading), but the index is near record highs suggesting\
      \ some mean-reversion. Point forecast (median) set at +0.012 \u2014 slightly\
      \ below current realized 21-bd return of +0.027, reflecting partial mean-reversion\
      \ from elevated levels. Distribution is approximately normal (\u03C3\u22480.024)\
      \ with a slightly fat left tail (+0.003 added to downside spread) to capture\
      \ residual trade-shock and geopolitical risks, and a modestly extended upper\
      \ tail to allow for a year-end rally continuation. The asymmetry is small: downside\
      \ tail (Q5 = -0.030) is slightly wider than the upside (Q95 = 0.054 gives ~0.042\
      \ above median vs ~0.042 below), reflecting near-symmetric but fat-tailed distribution\
      \ with minimal directional skew."
