      \ is a headwind for domestically oriented businesses but a tailwind for commodity\
      \ exporters reporting in CAD. Net sector effect roughly neutral to slightly\
      \ positive. (5) US TARIFF/TRADE RISK: Incoming Trump administration's 25% blanket\
      \ tariff threat on Canadian goods is the dominant tail risk. This materially\
      \ fattens the left tail of the distribution, particularly for energy, autos,\
      \ and materials exporters. (6) US FED POLICY DIVERGENCE: Fed is easing more\
      \ slowly than BoC; this divergence supports USD strength and pressures CAD,\
