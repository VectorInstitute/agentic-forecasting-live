    rationale: "Overall approach: Grounded in six web searches covering BoC policy,\
      \ Canadian inflation/labour, commodities (oil/gold), USD/CAD and GoC yields,\
      \ US Fed/tariff spillovers, and TSX sector earnings. Key macro inputs: BoC policy\
      \ rate ~2.75% (on hold), headline CPI 1.7%, gold at record highs, WTI ~$75,\
      \ CAD under pressure, 90-day tariff pause reducing (but not eliminating) downside\
      \ tail. Price signal: the trailing 21-bd log return of +0.054 represents a large\
      \ positive mean-reversion bounce already completed; forward median is reset\
      \ closer to the long-run unconditional drift (~0.5% per month). Dispersion calibrated\
      \ to the elevated trailing 63d vol (\u03C3 = 0.0474), with mild left-skew to\
      \ capture asymmetric tariff/commodity downside risks."
    horizon_rationale: "Forecast origin: 2025-05-26. The S&P/TSX Composite has already\
      \ posted a strong 21-business-day cumulative log return of +0.054 (the 'last_log_return'),\
      \ reflecting a sharp recovery from the April 2025 tariff-shock lows (~\u2013\
      0.08 at the trough). This context shapes the forward distribution: (1) Mean-reversion:\
      \ After a ~13% cumulative bounce, further upside from the same momentum is unlikely\
      \ to persist at the same pace over the next 21 days. (2) Elevated volatility:\
      \ The trailing 63-day std of 0.0474 (annualised ~37.7%) remains well above long-run\
      \ norms, reflecting ongoing trade policy uncertainty; this is used as the primary\
      \ dispersion parameter. (3) Bank of Canada on hold at ~2.75% after cutting from\
      \ 5.0% peak; the easing cycle is broadly supportive but the pause limits incremental\
      \ upside. (4) Canadian CPI at 1.7% (April 2025), partially due to carbon-tax\
      \ removal; core inflation edging up, reducing probability of additional near-term\
      \ cuts. (5) Gold near record highs (~$3,500/oz) supports TSX materials/gold\
      \ mining sector (~12% index weight). (6) WTI oil ~$75/bbl: roughly neutral,\
      \ slightly below recent highs; OPEC+ discipline supportive but tariff-driven\
      \ demand slowdown a headwind for the energy sector (~18% index weight). (7)\
      \ US-Canada tariff situation: 90-day reciprocal tariff pause reduces worst-case\
      \ tail, but 25% tariffs on non-CUSMA goods and 10% on energy remain in place;\
      \ trade policy uncertainty is a persistent drag on business investment. (8)\
      \ Labour market: employment broadly unchanged through Q1-Q2 2025; softening\
      \ in trade-exposed sectors. (9) USD/CAD: loonie under pressure from wide Canada-US\
      \ yield spread, which is a mixed signal (good for TSX export earnings, bad for\
      \ macro sentiment). Distributional assumptions: Median set at +0.010 log return\
      \ (~+1.0%), reflecting positive drift from BoC easing and gold strength, modestly\
      \ offset by mean-reversion from the recent bounce and tariff headwinds. Spread\
      \ parameter \u03C3 \u2248 0.046, with mild left skew applied to tail quantiles\
      \ to account for asymmetric downside risks (tariff re-escalation, oil price\
      \ drop, credit tightening from Canadian banks). Quantiles computed as approximately\
      \ skew-adjusted normal. The 5th percentile (~\u20136.9%) captures a scenario\
      \ of renewed tariff escalation or commodity price collapse; the 95th percentile\
      \ (~+8.5%) captures a scenario of tariff resolution or significant BoC cut on\
      \ weaker-than-expected data."
