    rationale: "Overall forecast philosophy: The S&P/TSX Composite enters the 21-business-day\
      \ horizon with a constructive but not exuberant backdrop. The BoC's accommodative\
      \ pivot (rates at multi-year lows), gold's record rally, and a bullishly steepening\
      \ yield curve all argue for a positive median return. However, the weak loonie,\
      \ soft labour market (7.1% unemployment), US tariff headwinds on Canadian exports,\
      \ and range-bound oil prices limit the upside case and keep downside tails material.\
      \ The point forecast of +0.020 is modestly above the long-run unconditional\
      \ mean (~+0.01 per month) and in line with recent realized 21-day returns. The\
      \ distributional width (~5.5\u20136% one-sigma spread) reflects lower-than-historical\
      \ realized volatility in the current regime but acknowledges that trade-policy\
      \ and commodity-market shocks can quickly shift volatility higher. Gold strength\
      \ provides the primary upside asymmetry in the materials sector; oil weakness\
      \ and tariff uncertainty provide the primary downside asymmetry for energy and\
      \ industrial names."
    horizon_rationale: "Forecast for the 21-business-day cumulative log return of\
      \ the S&P/TSX Composite, centred on +0.020 (\u2248+2.0%). Key drivers and assumptions:\
      \ (1) Bank of Canada policy: BoC has cut rates to ~2.25\u20132.50% through 2025\
      \ and is in a cautious pause/easing mode. Accommodative monetary conditions\
      \ provide a modest positive equity tailwind, supporting financials and rate-sensitive\
      \ sectors. (2) Canadian inflation and labour market: CPI near the 2% target\
      \ removes a hawkish risk, but the unemployment rate has risen to ~7.1% (cycle\
      \ high), reflecting economic slack from US tariff headwinds. This mutes domestic\
      \ consumer-spending momentum and keeps risk premium elevated. (3) Commodities\
      \ \u2014 gold: Gold experienced a record-breaking rally into late October 2025,\
      \ acting as a safe-haven amid geopolitical tensions and trade uncertainty. This\
      \ is a material bullish catalyst for the TSX Materials sector, which has significant\
      \ index weight. (4) Commodities \u2014 oil: WTI/Brent remain range-bound and\
      \ trending lower due to ample OPEC+ supply and tepid global demand. This is\
      \ a headwind for the TSX Energy sector and partially offsets the gold tailwind.\
      \ (5) Base metals: Copper and industrial metals face headwinds from Chinese\
      \ property-sector weakness but find support from green-infrastructure investment\
      \ demand; net roughly neutral. (6) USD/CAD and GoC yields: The loonie is weak\
      \ (sub-72 cents US), which buffers CAD-denominated returns for commodity exporters\
      \ and boosts reported earnings of foreign-revenue earners. GoC yield curve is\
      \ bullishly steepening (short rates falling faster), supportive of equity valuations.\
      \ (7) US policy spillovers: US tariffs on Canadian goods remain the primary\
      \ macro risk, creating uncertainty around exports and business investment. The\
      \ Fed's own easing bias is globally supportive, but cross-border trade friction\
      \ keeps a risk premium on Canadian equities. (8) Technical/statistical calibration:\
      \ The trailing 63-day daily std of ~1.545% implies a 21-day 1-sigma range of\
      \ ~7.1% (=1.545%\xD7\u221A21). Recent realized 21-day returns have clustered\
      \ in the +0.02 to +0.05 range with lower realized vol than longer-term history.\
      \ I apply a distributional spread of ~5.5\u20136% (slightly below the full-sample\
      \ implied vol, reflecting the compressed recent volatility regime), centred\
      \ on +0.020. A slight positive skew is applied (+0.010 asymmetry) reflecting\
      \ the gold tailwind and BoC easing support. Tail risks (Q5 = -0.090) reflect\
      \ scenarios where oil prices drop sharply, US trade tensions escalate materially,\
      \ or global risk appetite deteriorates; upside tails (Q95 = +0.113) reflect\
      \ a scenario where gold continues its record run, BoC delivers further surprise\
      \ easing, and US-Canada trade tensions ease."
