      \ 25% US tariffs on most Canadian goods (10% on energy) remain a structural\
      \ headwind for industrials and trade-exposed sectors; some supply chain adaptation\
      \ underway. Fed-BoC divergence adds to CAD pressure. (6) TSX Sector Tone: Index\
