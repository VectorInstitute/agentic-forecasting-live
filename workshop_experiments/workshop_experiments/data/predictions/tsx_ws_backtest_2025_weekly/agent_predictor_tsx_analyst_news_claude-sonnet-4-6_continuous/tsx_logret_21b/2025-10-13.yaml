      1 calendar month) cumulative log return on the S&P/TSX Composite. Key assumptions:\
      \ (1) Bank of Canada Policy: Policy rate at 2.50%; a further 25 bp cut to 2.25%\
      \ is widely priced for October 29. Continued easing supports domestic financial\
      \ conditions and equity valuations, particularly for rate-sensitive financials.\
      \ (2) Inflation/Labour: CPI at ~2.2\u20132.4% YoY (within BoC target band).\
      \ Unemployment at 7.1%, the highest ex-pandemic, signals labour market slack\
