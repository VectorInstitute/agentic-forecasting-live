    rationale: 'Overall framework: The TSX enters September 2025 with meaningful positive
      trailing momentum (+4.3% over the prior 21 business days), supported by a Bank
      of Canada in full easing mode (rate at 2.75%, expected to cut further), stable-to-low
      inflation, gold sector strength, and a weakening CAD that boosts USD-revenue
      sectors. Key risks are the soft Canadian labour market (unemployment at cycle-high
      7.1%), US tariff overhang on exporters, and mixed oil prices. The forecast distribution
      is centred on a modestly above-average positive return (+1.6% median over 21
      business days) with symmetric-ish tails calibrated to current realised volatility
      (~17% annualised), but with a slight negative skew to reflect asymmetric macro
      downside scenarios. The upper quantiles are bounded by the current positive
      momentum regime and easing-cycle dynamics.'
    horizon_rationale: "Forecast as of 2025-09-01 for 21-business-day cumulative log\
      \ return on the S&P/TSX Composite. Key inputs: (1) MOMENTUM \u2014 The most\
      \ recent 21-bd rolling log-return is +0.0427 (~+4.4%), and the trailing price\
      \ history shows a sustained recovery from the April 2025 tariff-shock low (~-0.08\
      \ to -0.10 range) to a positive +0.03\u20130.04 regime through August. This\
      \ positive momentum supports an above-average point estimate. (2) BANK OF CANADA\
      \ \u2014 BoC is in an active easing cycle with the overnight rate at ~2.75%,\
      \ and market consensus expects further cuts to 2.50% in September 2025 with\
      \ additional reductions anticipated by October. Monetary easing is broadly supportive\
      \ for TSX valuations, especially rate-sensitive financials and real estate.\
      \ (3) INFLATION & LABOUR \u2014 Headline CPI below 2% eliminates hawkish upside\
      \ risk; core measures stable. However, unemployment climbed to 7.1% (cycle high),\
      \ reflecting trade-exposed sector weakness (manufacturing, autos) from US tariffs.\
      \ The soft labour market adds macro downside risk but is being countered by\
      \ BoC easing. (4) COMMODITIES \u2014 Gold is a standout performer as a safe-haven\
      \ in 2025, benefiting the TSX materials sector. Oil prices are more mixed (OPEC+\
      \ discipline provides a floor but demand concerns cap upside). Net commodity\
      \ impulse is modestly positive for the TSX. (5) USD/CAD & YIELDS \u2014 CAD\
      \ faces structural downward pressure from BoC/Fed policy divergence and US tariff\
      \ uncertainty. A weaker CAD is broadly supportive for TSX earnings since energy\
      \ and materials revenues are USD-denominated. GoC bond yield curve is bullish-flattening\
      \ as easing is priced in, reducing discount rates for equities. (6) US POLICY\
      \ SPILLOVERS \u2014 US tariffs on Canadian goods remain a significant macro\
      \ overhang, particularly for manufacturing/automotive. However, markets appear\
      \ to have absorbed the initial tariff shock (the April-May drawdown) and the\
      \ subsequent recovery to +4% cumulative return by late August suggests the immediate\
      \ tariff risk premium has been partially digested. (7) VOLATILITY \u2014 Trailing\
      \ 63-day daily std is 0.01086, implying a 21-bd std of ~0.0497 (annualized ~17.2%).\
      \ The distribution is calibrated to this volatility estimate with a modest negative\
      \ skew to account for macro downside risks (tariff escalation, US spillover,\
      \ labour deterioration). Median (Q0.50) set at +0.016, slightly above the long-run\
      \ unconditional monthly mean of ~+0.008, reflecting the positive momentum regime\
      \ and easing cycle tailwind. The left tail (Q0.05 = -0.068) is widened modestly\
      \ relative to a pure Gaussian to reflect asymmetric macro risks (tariff shock\
      \ resurgence, commodity price collapse)."
