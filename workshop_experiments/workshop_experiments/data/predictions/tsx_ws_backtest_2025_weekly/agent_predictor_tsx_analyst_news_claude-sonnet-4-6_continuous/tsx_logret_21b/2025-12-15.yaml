    rationale: Overall macro backdrop for the S&P/TSX Composite is cautiously constructive
      as of 2025-12-15. The BoC pause at 2.25% provides policy certainty; the strong
      Canadian jobs print and near-target inflation suggest a soft-landing scenario
      is materialising. US Fed easing in December adds global liquidity support. However,
      rising GoC yields, oil supply headwinds, US tariff uncertainty, and mean-reversion
      pressure on the strong recent return trajectory all limit upside. The distribution
      is centred on a modest +1.5% 21-business-day log return with a 2.30% sigma and
      fat-tail adjustment, reflecting a balanced but positively-tilted risk environment.
    horizon_rationale: "Forecast origin: 2025-12-15. 21-business-day horizon (approximately\
      \ mid-January 2026). Key inputs and assumptions: (1) Bank of Canada Policy:\
      \ BoC held at 2.25% on Dec 10, 2025, effectively pausing its easing cycle after\
      \ two consecutive 25bp cuts earlier in the year. Forward guidance is data-dependent\
      \ with no near-term cuts expected, and some market participants beginning to\
      \ price slight tightening risk by late 2026. This 'higher-for-longer' pivot\
      \ is a mild headwind for equity multiples but signals macro stabilisation. (2)\
      \ Inflation and Labour: November CPI at 2.2% (near target) and November unemployment\
      \ surprisingly dropped to 6.5% from 6.9%, driven by sustained job gains. This\
      \ upside economic surprise has pushed GoC bond yields higher across the curve,\
      \ which is a modest headwind for TSX valuations. (3) Commodities: Oil faces\
      \ downward pressure from OPEC+ supply adjustments and potential Russian sanctions\
      \ relief \u2014 negative for TSX energy sector. Gold remains firm as a geopolitical\
      \ hedge, supportive of materials/mining stocks. Net commodity impact is roughly\
      \ neutral-to-slightly-negative. (4) CAD and GoC yields: USD/CAD around 1.38,\
      \ relatively stable but weak CAD provides some support for USD-denominated commodity\
      \ earnings. GoC 10-year yields rising, compressing equity valuations at the\
      \ margin. (5) US spillovers: Fed cut rates in December 2025, providing global\
      \ liquidity support. However, ongoing US tariff/trade uncertainty and structural\
      \ disruption to Canada-US trade flows remain a persistent headwind for business\
      \ investment and export-oriented names. (6) Recent price momentum: The trailing\
      \ 21b log return as of the forecast date is +3.74%, and recent December readings\
      \ have clustered in the +3% to +5% range \u2014 strong positive momentum. (7)\
      \ Statistical framework: Trailing 63-day standard deviation of 21b log returns\
      \ = 2.30%. Median set at +1.50% log return \u2014 above the long-run average\
      \ (~+0.5%) to reflect positive momentum and end-of-year seasonal tailwinds,\
      \ but well below the current trailing 21b return (+3.74%), reflecting mean reversion\
      \ tendencies. Distribution is approximately normal around the median with mild\
      \ fat-tail expansion (\u224815%) to account for macro uncertainty (tariff escalation,\
      \ commodity shock, or yield surprise). Downside tail (Q0.05 = -2.6%) captures\
      \ scenarios of oil price collapse, tariff escalation, or global risk-off. Upside\
      \ tail (Q0.95 = +6.1%) captures scenarios of trade resolution, commodity strength,\
      \ and sustained momentum carry into January."
