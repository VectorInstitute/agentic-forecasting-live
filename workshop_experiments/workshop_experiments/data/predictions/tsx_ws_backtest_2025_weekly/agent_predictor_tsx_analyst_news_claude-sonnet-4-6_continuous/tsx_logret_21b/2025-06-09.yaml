    rationale: 'Overall approach: Blended historical distributional analysis of 21-business-day
      S&P/TSX Composite log returns with current macro conditioning. The historical
      series (2000-2025) shows the unconditional median 21-bd return is approximately
      +0.01 to +0.02 in non-recession regimes, with std around 0.025-0.040. The current
      environment (elevated vol regime, post-tariff-shock recovery, BoC on hold, trade
      uncertainty) warrants: (a) a slightly above-unconditional median (+0.012) reflecting
      positive momentum and easing bias, (b) a wider-than-normal distribution (vol
      premium for trade uncertainty), and (c) asymmetric downside tails (tariff escalation
      risk). The Q0.05 at -0.055 captures a one-standard-deviation shock in a high-vol
      month akin to the late-March 2025 episode. The Q0.95 at +0.072 captures a scenario
      where trade tensions ease materially and BoC cuts again, driving a second leg
      of recovery. All quantiles are strictly non-decreasing and the median equals
      the point forecast.'
    horizon_rationale: "Forecast origin: June 9, 2025. Key macro inputs and assumptions:\
      \ (1) Bank of Canada Policy: BoC held the overnight rate at 2.75% on June 4,\
      \ 2025 (second consecutive pause following 175bps of cuts from mid-2024). The\
      \ Governing Council is in 'wait-and-see' mode, monitoring US tariff impacts.\
      \ Next move remains a cut given rising unemployment (6.9-7.0%), but timing is\
      \ data-dependent. This easing bias is modestly supportive for equities but the\
      \ on-hold decision removes near-term positive catalyst. (2) Inflation and Jobs:\
      \ Canadian CPI at ~1.7% in April (below target, partly carbon-tax-removal effect).\
      \ Labour market under clear stress with private sector shedding 70,000+ jobs\
      \ in 2 prior months. Weak labour market limits consumer spending but reinforces\
      \ BoC easing bias. (3) Commodities: Oil is volatile and under downside pressure\
      \ from US tariff-driven demand uncertainty; energy sector faces structural headwinds.\
      \ Gold is strong as a safe-haven and supports the materials sector (positive\
      \ TSX weight ~13%). Base metals mixed (China demand tepid, strong USD). Net\
      \ commodity effect is roughly neutral-to-modestly-negative for TSX. (4) USD/CAD\
      \ and GoC Yields: CAD remains weak near multi-decade lows (BoC-Fed rate divergence\
      \ and trade shock). GoC 10-yr yields influenced by widening Canada-US spread.\
      \ Weaker CAD provides some earnings translation boost for multinationals/resource\
      \ companies but signals economic stress. (5) US Trade Spillovers: 25% US tariffs\
      \ on most Canadian goods (10% on energy) remain in effect. CUSMA uncertainty\
      \ persists. Structural trade shock is a persistent drag; any escalation is a\
      \ major tail-risk downside. Any deal announcement or tariff rollback would produce\
      \ significant upside. (6) TSX Sector/Price Dynamics: The index experienced a\
      \ sharp correction (into April 2025 lows, 21-bd return troughed near -0.08)\
      \ then a very strong recovery (May-early June, 21-bd return rose to +0.12 at\
      \ peak, now at +0.043 as of June 9). This suggests the tariff-shock recovery\
      \ is already substantially priced in. Momentum is still positive but the rapid\
      \ recovery pace suggests risk of consolidation or modest mean-reversion over\
      \ the next 21 bdays. (7) Volatility Regime: Trailing 63-day std is 0.050 (annualized\
      \ ~39%), significantly elevated. For a 21-business-day horizon, implied one-period\
      \ std \u2248 0.050 \xD7 sqrt(21/63) \u2248 0.029. Given persistent uncertainty,\
      \ I apply a slight vol premium to ~0.032-0.034 for the distributional spread.\
      \ (8) Skew: Left-tail risk is asymmetrically larger (tariff escalation, trade\
      \ shock, bank credit stress) than upside tail (trade deal, BoC cut catalyst).\
      \ Distribution is modestly negatively skewed. Point forecast (median): +0.012\
      \ (~+1.2% log return over 21 business days). This reflects a modest continuation\
      \ of the recovery trend, tempered by: (a) elevated macro uncertainty, (b) already-priced-in\
      \ tariff-shock recovery, (c) weak labour market, (d) BoC on hold rather than\
      \ cutting, and (e) modest commodity support from gold offsetting oil softness."
