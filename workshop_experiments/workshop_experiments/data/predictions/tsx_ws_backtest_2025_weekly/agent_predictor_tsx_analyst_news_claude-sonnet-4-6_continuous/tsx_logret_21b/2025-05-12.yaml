    rationale: "Overall framework: The TSX is assessed at a near-term inflection point\
      \ following a sharp recovery from the April 2025 tariff-shock lows. The US-China\
      \ trade truce announced on May 12 provides a positive global risk backdrop,\
      \ but the US-Canada 25% tariff overhang remains the dominant structural headwind\
      \ for the index. The BoC is accommodative at 2.75% but on hold, offering modest\
      \ support without fresh stimulus. Commodities are mixed-to-positive (gold elevated,\
      \ oil steady). The forecast median of +0.8% over 21 business days reflects:\
      \ (a) modest long-run positive drift in equities, (b) partial offset from post-rally\
      \ consolidation and ongoing tariff uncertainty, and (c) a slightly above-normal\
      \ volatility regime (\u03C3 ~4.0% vs. historical ~3.0%), producing wider quantile\
      \ spreads that capture both the upside potential from trade deal progress and\
      \ the downside risk from a re-escalation or deteriorating Canadian macro data."
    horizon_rationale: "Forecast as of 2025-05-12 for the 21-business-day cumulative\
      \ log-return of the S&P/TSX Composite. Key inputs and assumptions: (1) STARTING\
      \ LEVEL & RECENT DYNAMICS: The index has surged sharply from its early-April\
      \ tariff-shock lows (~-8% 21-day cumulative) to +10.4% cumulative log-return\
      \ as of May 12, driven by a broad risk-on recovery. The last few sessions (May\
      \ 5\u201312) saw a +10-12% burst. The as-of-date US\u2013China 90-day tariff\
      \ truce (115pp reduction, effective US rate on Chinese goods ~30% with 24pp\
      \ suspended) is a major positive catalyst already partially priced in the close.\
      \ (2) BANK OF CANADA POLICY: BoC policy rate at 2.75% (on hold after cutting\
      \ in Jan and Mar 2025). Governing Council cited 'pervasive uncertainty' from\
      \ US tariffs and is data-dependent. No imminent cut priced in \u2014 accommodative\
      \ stance provides modest support but no additional tailwind. (3) INFLATION &\
      \ LABOUR MARKET: Canadian CPI at 1.7% in April (boosted by carbon-tax removal;\
      \ underlying slightly higher). Unemployment rising to ~6.9\u20137.0%, labour\
      \ market softening. Weak labour market is a modest headwind for domestic consumption\
      \ and financial sector. (4) COMMODITIES: WTI crude oil ~$75/barrel (OPEC+ discipline\
      \ supporting prices but demand uncertainty from China and trade war); supportive\
      \ for TSX energy sector. Gold elevated on safe-haven demand and central-bank\
      \ buying \u2014 positive for TSX materials/miners. Base metals face headwinds\
      \ from USD strength and China demand uncertainty. Net commodity backdrop: modestly\
      \ supportive. (5) USD/CAD & GOC YIELDS: CAD under pressure from wide Canada-US\
      \ yield differential and trade headwinds (hit weakest since 2002 earlier in\
      \ 2025). GoC 10-year yields reactive to BoC-Fed divergence. CAD weakness is\
      \ a partial offset for TSX exporters but hurts domestic purchasing power. (6)\
      \ US POLICY SPILLOVERS: US-Canada 25% tariffs on most Canadian goods and 10%\
      \ on energy STILL IN FORCE \u2014 ongoing structural drag for manufacturing,\
      \ autos, steel. US-China truce reduces global tail risk but does not directly\
      \ relieve US-Canada tension. Fed on hold ('wait-and-see'), no near-term cut\
      \ expected; US-Canada rate differential remains wide. (7) SECTOR/EARNINGS: Banks\
      \ face headwinds from rising unemployment and potential credit deterioration;\
      \ energy benefiting from OPEC+ but threatened by demand slowdown; gold miners\
      \ bright spot; materials mixed. (8) DISTRIBUTIONAL ASSUMPTIONS: Post-sharp-rally\
      \ consolidation tendency (mean-reversion) slightly offsets the positive macro\
      \ catalysts. Point forecast (median) ~+0.8% over 21 BD, close to the long-run\
      \ monthly mean. Volatility parameter \u03C3 ~4.0% (per 21 BD, consistent with\
      \ trailing 63d std of 3.97%), slightly elevated vs. historical average (~3.0%)\
      \ due to ongoing tariff-regime uncertainty. Distribution is approximately normal\
      \ with modestly fat tails (US-Canada tariffs could escalate/de-escalate). Left\
      \ tail (Q0.05 = -6.3%) captures risk of: tariff escalation resumption, oil price\
      \ collapse, BoC surprise. Right tail (Q0.95 = +7.8%) captures risk of: US-Canada\
      \ deal progress, commodity surge, BoC cut surprise."
