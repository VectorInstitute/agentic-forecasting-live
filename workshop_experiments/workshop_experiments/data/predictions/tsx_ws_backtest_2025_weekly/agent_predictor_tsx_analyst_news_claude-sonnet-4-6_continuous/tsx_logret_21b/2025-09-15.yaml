    rationale: "Overall macro backdrop as of 2025-09-15: The TSX is in a positive-momentum\
      \ phase driven by BoC monetary easing (rate at 2.50%, further cuts expected),\
      \ record gold prices benefiting the materials sector, and resilient Canadian\
      \ bank earnings. Key risks include persistent US tariffs weighing on trade-exposed\
      \ sectors, oil price weakness (energy sector headwind), a softening labour market\
      \ (unemployment 7.1%), a mild CPI uptick in September that could marginally\
      \ complicate the BoC's easing path, and valuation/mean-reversion risk after\
      \ a strong recent run. The 21-business-day conditional distribution is centred\
      \ at a modestly positive median of +0.7%, with \u03C3 \u2248 5.1% and mild left-skew\
      \ to reflect asymmetric downside tail risks from macro shocks."
    horizon_rationale: "Forecast for 21 business days (\u22481 calendar month) ahead\
      \ from 2025-09-15. Key inputs and assumptions: (1) BANK OF CANADA POLICY: BoC\
      \ cut to 2.50% in September 2025 (8th consecutive cut from the 5.0% peak), with\
      \ market consensus pointing to a further 25bp cut to 2.25% in October. This\
      \ dovish trajectory provides a discount-rate tailwind for Canadian equities,\
      \ particularly financials and rate-sensitive sectors. (2) INFLATION & LABOUR:\
      \ CPI was 1.9% in August 2025 (below the 2% target), with September data showing\
      \ a slight bounce to ~2.4% \u2014 a modest upside inflation surprise that could\
      \ modestly temper BoC easing expectations at the margin. Unemployment climbed\
      \ to 7.1% (highest ex-pandemic in nearly a decade), concentrated in trade-sensitive\
      \ manufacturing/transport sectors. Labour slack reinforces the BoC's dovish\
      \ bias but also signals weak aggregate demand \u2014 a mixed signal. (3) COMMODITIES:\
      \ Gold surged to record highs, providing a powerful tailwind for TSX materials\
      \ and gold-mining stocks (a heavy TSX weight). Oil faces headwinds from global\
      \ oversupply and soft China demand, pressuring the energy sector. Base metals\
      \ tepid. On balance, the gold tailwind offsets oil weakness for the index. (4)\
      \ USD/CAD & GOC YIELDS: CAD stabilised ~1.37 (USD/CAD) after earlier 2025 weakness\
      \ above 1.40; GoC 10-year yields trending lower as the BoC eases \u2014 supportive\
      \ for equity valuations. BoC-Fed divergence (BoC more dovish) may keep mild\
      \ CAD depreciation pressure in the background. (5) US TRADE/TARIFF SPILLOVERS:\
      \ US tariffs imposed in February 2025 remain in effect; CUSMA uncertainty continues.\
      \ Many Canadian exports retain exemptions. TSX has outperformed US peers YTD,\
      \ demonstrating structural resilience. Tariffs remain a lingering uncertainty\
      \ headwind, especially for manufacturing. (6) PRICE HISTORY & MOMENTUM: The\
      \ trailing 21-bd log return stands at +5.28% \u2014 a strong recent run suggesting\
      \ some mean-reversion risk. Trailing 63-day daily std = 0.01113, implying a\
      \ 21-day forward std of ~0.051. The index has recovered strongly from the April\
      \ 2025 trough. (7) CONDITIONAL MEAN: I set the median (0.50 quantile) at +0.007\
      \ (\u2248+0.7%) \u2014 modestly above the long-run unconditional drift (~0.5%/month)\
      \ to reflect BoC easing and gold-driven materials strength, partially offset\
      \ by labour weakness, tariff drag, and mean-reversion risk after the recent\
      \ +5% run. (8) DISTRIBUTION SHAPE: Near-Normal with mild left skew (historical\
      \ equity asymmetry). \u03C3\u2082\u2081 \u2248 0.051. The downside quantiles\
      \ are spread slightly wider than upside to reflect fat-tail downside risk from\
      \ trade policy shocks or a commodity reversal. The resulting 90% interval spans\
      \ roughly -5.9% to +7.3%, which is consistent with historical TSX 21-bd return\
      \ distributions at this volatility level."
