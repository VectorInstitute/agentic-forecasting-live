    rationale: 'Overall forecast rationale: The TSX enters early January 2026 from
      a position of significant 2025 outperformance but with reduced near-term policy
      tailwinds (BoC on hold), mixed commodities (gold positive, oil negative), persistent
      US tariff uncertainty, and rising GoC yields. The conditional distribution is
      centered modestly positive (~+1.0% log return over 21 business days), with a
      fat left tail reflecting tail risks from trade escalation or an oil/commodity
      shock, and a thinner right tail given valuation stretch after the +28% 2025
      rally. The 21-day sigma of ~5% is calibrated to recent realized volatility rather
      than the full historical 63-day scaling, but remains elevated enough to capture
      realistic macro event risk over the forecast horizon.'
    horizon_rationale: "Forecast origin: 2025-12-29. The S&P/TSX Composite closed\
      \ out a remarkable +28% calendar year (best since 2009), driven by financials\
      \ (BoC rate cuts boosting bank multiples), gold/silver miners (safe-haven flows),\
      \ and energy (though facing late-year headwinds). The trailing 21-day log return\
      \ at origin is +0.0227, reflecting a positive but decelerating momentum trend.\
      \ Key macro drivers shaping the 21-business-day (approx. Jan 2026) horizon:\
      \ (1) Bank of Canada on hold at 2.25% \u2014 the 225 bp cutting cycle from 5.00%\
      \ is complete; BoC Dec 10 decision was a hold with data-dependent guidance,\
      \ removing near-term rate-cut tailwind for equities; (2) Core CPI-median/trim\
      \ decelerating toward 2%, headline volatile due to GST/HST holiday distortion\
      \ \u2014 inflation not a near-term shock; (3) Labour market stabilising (unemployment\
      \ ~6.5% in Nov vs. 7.1% peak), less economic slack but no overheating; (4) Commodities:\
      \ gold strong from geopolitical safe-haven demand (positive for TSX materials),\
      \ oil pressured by global supply glut and OPEC+ dynamics (headwind for TSX energy);\
      \ net commodity impulse roughly neutral to slightly negative; (5) USD/CAD: CAD\
      \ under pressure from US-Canada monetary policy divergence and tariff fears;\
      \ a weaker loonie provides some earnings translation benefit to multinationals\
      \ but signals macro stress; (6) GoC 10-year yields edging higher as growth/employment\
      \ data surprised to the upside in late 2025, which can cap equity multiples;\
      \ (7) US tariff overhang: persistent trade uncertainty is a structural headwind\
      \ for Canadian exporters across metals, energy, and forestry; risk of escalation\
      \ remains asymmetric to the downside; (8) Post-year-end dynamics: late December\
      \ profit-taking was already underway; January typically sees new institutional\
      \ allocations (mild positive seasonal), but stretched 2025 valuations after\
      \ a +28% year create mean-reversion risk. Volatility calibration: trailing 63-day\
      \ daily std = 0.02158, implying 21-day sigma \u2248 0.0989 via sqrt(21) scaling.\
      \ However, observed 21-day realized volatility in H2 2025 was considerably lower\
      \ (~0.02\u20130.05 range), reflecting a calmer regime. I blend these to arrive\
      \ at an effective 21-day sigma of ~0.050, acknowledging the possibility of a\
      \ vol pickup from tariff or geopolitical shocks. Conditional mean: set at +0.010\
      \ (mild positive), below recent trailing momentum (+0.0227) to reflect stretched\
      \ valuations, no further BoC easing tailwind, US trade risk, and oil headwinds\
      \ partially offset by gold tailwind and January inflows. Distribution shape:\
      \ slight left skew (heavier downside tail) to capture tariff-escalation and\
      \ oil-shock tail risks, consistent with historical TSX crash episodes. The 5th\
      \ percentile (-0.082) and 95th percentile (+0.094) bracket approximately \xB1\
      1.7-sigma events from the conditional mean, with the left tail extended slightly\
      \ further for asymmetric downside risk."
