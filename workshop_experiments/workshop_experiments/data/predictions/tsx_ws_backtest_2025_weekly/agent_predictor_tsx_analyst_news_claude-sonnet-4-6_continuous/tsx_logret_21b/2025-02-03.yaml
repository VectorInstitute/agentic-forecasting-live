  metadata:
    rationale: 'Overall forecast is conditioned on the US tariff shock of February
      1-4, 2025 as the primary driver, creating a negatively skewed, fat-tailed distribution
      for the 21-business-day cumulative log return on the S&P/TSX Composite. The
      median forecast of -2.5% reflects meaningful downside risk from tariff escalation,
      partially offset by BoC easing support, partial CAD depreciation cushion, gold
      price support for materials, and the possibility of a negotiated tariff pause
      within the 30-day horizon. Historical precedent from 2018 trade tensions (TSX
      fell ~7-10% over similar horizons) and the COVID-19 shock (extreme tails) inform
      the tail calibration. The distribution is asymmetric with a wider left tail
      due to: (a) direct tariff exposure on energy and goods exports, (b) recession
      risk for a highly trade-dependent economy, (c) already-stretched CAD weakness,
      and (d) potential second-order effects on bank loan quality and consumer sentiment.'
    horizon_rationale: "Forecast as of 2025-02-03 (21 business days, ~March 5, 2025).\
      \ The dominant risk factor is the US tariff shock: on February 1, 2025, the\
      \ US announced 25% tariffs on most Canadian goods and 10% on Canadian energy\
      \ effective February 4 \u2014 the day after the forecast origin. Canada announced\
      \ retaliatory tariffs. This creates an extreme uncertainty regime with a pronounced\
      \ negative left-skew. Key assumptions: (1) Bank of Canada: Cut rates 175bps\
      \ since June 2024 to 3.00% in Jan 2025; easing bias continues but complicated\
      \ by tariff-driven stagflation risk. BoC support limits downside but cannot\
      \ offset trade frictions. (2) Canadian inflation/jobs: Labour market modestly\
      \ cooling, inflation near 2% target \u2014 provides BoC room to cut, partially\
      \ supportive. (3) Commodities: Oil faces direct 10% tariff headwind for Canadian\
      \ heavy producers (strongly negative for energy sector ~20% of TSX). Gold remained\
      \ elevated (~safe-haven), partially offsetting via materials sector. (4) USD/CAD:\
      \ At ~1.442 and under further pressure from the widest 2Y yield differential\
      \ since the mid-1990s; weaker CAD is a mild positive for TSX earnings translating\
      \ back. (5) GoC yields: Trending lower alongside US yields but trade war creates\
      \ cross-currents; lower yields modestly supportive for rate-sensitive financials/utilities.\
      \ (6) US spillovers: Fed on hold; US tariff regime is the primary driver of\
      \ elevated TSX volatility and negative bias. (7) TSX sector composition: ~20%\
      \ energy (directly tariffed), ~12% materials (some gold exposure positive, base\
      \ metals negative), ~33% financials (recession fears negative), ~15% industrials\
      \ (tariff exposed). Net sector impact is moderately to strongly negative. Calibration:\
      \ Historical 21-day TSX returns show std of ~3-5% in moderate-stress regimes\
      \ and 8-12% in high-stress regimes. Current trailing 63d std of 2.8% will likely\
      \ expand given tariff shock. I set the median at -2.5% log return, reflecting\
      \ a scenario mix: ~30% probability of escalation/recession fears deepening (-8%\
      \ to -15%), ~25% uncertain/volatile with no resolution (-2% to -5%), ~25% partial\
      \ tariff pause/negotiation (+0 to -2%), ~20% deal optimism/full pause (+3% to\
      \ +7%). The distribution is left-skewed with a fat downside tail. The 5th percentile\
      \ at -12% captures near-crisis escalation (comparable to late 2018 trade-war\
      \ drawdowns); the 95th at +7.2% captures a rapid tariff suspension. The interquartile\
      \ range spans approximately -4.5% to +0.5%."
