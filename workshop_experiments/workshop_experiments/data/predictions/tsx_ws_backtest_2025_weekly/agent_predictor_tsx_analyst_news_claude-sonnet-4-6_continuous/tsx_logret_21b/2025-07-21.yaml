      \ (d) oil price moves from geopolitical events; (e) US Fed signals at Jackson\
      \ Hole (late August). The base case is modest positive drift (+1.5% log return)\
      \ with meaningful two-way risk (\xB13% one-sigma range). Historical 21-day return\
      \ distribution from the provided CSV shows the unconditional mean is slightly\
      \ positive (~0.5-1%) and the current conditional starting point of +0.030 adds\
      \ momentum bias, but that momentum has been decelerating materially from the\
      \ May 2025 peak of ~+0.12, supporting a mean-reversion assumption toward a lower\
      \ positive drift."
    horizon_rationale: "Forecast origin: 2025-07-21. The TSX's trailing 21-business-day\
      \ log return is +0.030, with a trailing 63-day std of 0.0313. The median (Q0.50)\
      \ is set at +0.015, reflecting (1) positive but fading momentum \u2014 the index\
      \ rallied from an April tariff trough through May/June and has since stabilised\
