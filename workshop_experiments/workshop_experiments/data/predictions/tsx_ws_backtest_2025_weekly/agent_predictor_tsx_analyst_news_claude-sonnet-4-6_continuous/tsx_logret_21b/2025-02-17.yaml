    rationale: "Overall forecast driven by a balance of supportive monetary policy\
      \ (BoC actively cutting rates), positive commodity dynamics in gold/precious\
      \ metals, and resilient (if cooling) Canadian labour market on the upside, against\
      \ the dominant macro risk of U.S. tariff escalation (25% broad tariffs threatened),\
      \ a weak Canadian dollar signaling underlying stress, and the expiry of the\
      \ GST/HST holiday adding upside CPI noise. The TSX's recent recovery from the\
      \ Dec 2024\u2013Jan 2025 trough provides short-term momentum support, but the\
      \ risk distribution is left-skewed given the binary tariff outcome risk over\
      \ the 21-business-day horizon. The effective 21-day return distribution is calibrated\
      \ at \u03BC \u2248 +0.020, \u03C3 \u2248 0.055, with slight negative skew."
    horizon_rationale: "Forecast as of 2025-02-17 for a 21-business-day cumulative\
      \ log return on the S&P/TSX Composite. KEY INPUTS: (1) Bank of Canada: Policy\
      \ rate at 3.00% following 175bps of cuts since June 2024. Markets pricing further\
      \ easing toward 2% by spring 2025 \u2014 BoC easing is a structural equity support.\
      \ (2) Inflation/Labour: CPI near 2% target, but the Feb 15 GST/HST holiday expiry\
      \ introduces near-term upward pressure. January LFS showed +76k jobs and 6.6%\
      \ unemployment \u2014 resilient but cooling, no imminent tightening threat.\
      \ (3) Commodities: Gold is a strong performer on geopolitical uncertainty and\
      \ central bank buying, supporting the TSX materials sector. Oil is mixed (OPEC+\
      \ discipline vs. global demand concerns). Base metals soft on USD strength.\
      \ Net commodity picture is roughly neutral-to-modestly-positive. (4) USD/CAD\
      \ & GoC Yields: CAD remains under pressure \u2014 Canada-US 2yr yield differential\
      \ near 135bps, widest since mid-1990s. Weak CAD provides some translation benefit\
      \ to commodity earnings but also reflects macro fragility. (5) US Tariff Risk:\
      \ The dominant tail risk \u2014 25% tariff threats on Canadian goods create\
      \ 'pervasive uncertainty.' Even with temporary negotiated pauses, re-escalation\
      \ risk is high through the 21-day window. This is the key source of left skew\
      \ in the distribution. (6) Recent TSX Momentum: The index has recovered meaningfully\
      \ from its Dec 2024\u2013Jan 2025 trough, with the last 21bd log return at +0.025.\
      \ Momentum is positive but stretched relative to the macro backdrop. STATISTICAL\
      \ CALIBRATION: Trailing 63-day daily std of 0.02874 \u2192 21-day cumulative\
      \ std \u2248 0.0287\xD7\u221A21 \u2248 0.132 is the theoretical upper bound;\
      \ but autocorrelation and mean-reversion compress realized 21-day vol. Based\
      \ on the historical CSV, realized 21-day log returns in normal regimes fall\
      \ mostly in [-0.07, +0.10], with crisis observations reaching [-0.39, +0.16].\
      \ I calibrate effective \u03C3 \u2248 0.055 for current conditions (slightly\
      \ elevated vs. quiet periods due to tariff tail risk but well below crisis levels).\
      \ BIAS: Median at +0.020, reflecting (a) mild positive drift from BoC easing\
      \ and gold strength, (b) recent positive momentum partially reverting, and (c)\
      \ tariff uncertainty as a modest headwind. LEFT SKEW applied: downside tail\
      \ is slightly fatter than upside \u2014 Q5/Q95 are asymmetric at -0.075 / +0.110\
      \ \u2014 reflecting the material but not imminent tariff escalation risk."
