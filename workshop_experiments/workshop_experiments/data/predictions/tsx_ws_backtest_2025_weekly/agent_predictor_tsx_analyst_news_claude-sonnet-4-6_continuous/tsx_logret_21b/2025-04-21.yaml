    rationale: 'Overall forecast methodology: The 21-business-day forward cumulative
      log return for the S&P/TSX Composite is forecast from a base of -0.0429 (current
      realized 21-day reading). We use an empirically-calibrated distribution anchored
      to the current elevated-volatility regime (trailing 63d daily sigma = 0.0318,
      implying ~0.146 over 21 days). The median (-0.010) reflects modest partial mean-reversion
      from deeply oversold conditions, tempered by significant structural headwinds:
      US 25% tariffs on Canadian goods, oil price weakness, softening labour market,
      and BoC on hold. Key upside risks: trade de-escalation/exemptions, BoC surprise
      cut, gold-driven materials rally, broad USD weakness supporting risk sentiment.
      Key downside risks: tariff escalation to energy (beyond current 10%), recession
      in Canada triggered by export collapse, oil demand destruction, financial sector
      credit quality deterioration. Volatility is roughly double the long-run average,
      justifying wide quantile bands. Historical analogues: April 2025 tariff shock
      is comparable in pace (but different in nature) to early 2020 COVID shock and
      2008 GFC early phase, both showing high vol, negative skew, and fat tails.'
    horizon_rationale: "Forecast origin: 2025-04-21. The TSX is at a cumulative 21-day\
      \ log-return of -0.0429, deep in a drawdown driven by the April 2025 tariff\
      \ shock. Key inputs: (1) Bank of Canada: Held overnight rate at 2.75% on April\
      \ 16 (pausing after 7 consecutive cuts), citing 'pervasive uncertainty' from\
      \ 25% US tariffs on most Canadian goods and 10% on energy. BoC remains data-dependent\
      \ with an easing bias; further cuts possible in H2 2025 but not imminent, providing\
      \ modest support. (2) Inflation/Labour: February CPI rebounded to 2.6% (8-month\
      \ high) on CAD weakness and tariff pass-through; March employment declined \u2014\
      \ stagflation risk elevated, complicating BoC's room to cut. Carbon tax removal\
      \ provides temporary offset. (3) Commodities: Oil prices dropped sharply in\
      \ early April on global demand concerns from trade war \u2014 headwind for TSX\
      \ energy sector (~19% index weight). Gold surging as safe haven \u2014 tailwind\
      \ for materials/gold miners. Net commodity effect modestly negative for the\
      \ index. (4) FX: USD/CAD moved from ~1.43 to ~1.384 by April 21 (CAD appreciation\
      \ on broad USD weakness) \u2014 mild positive for import-oriented companies\
      \ but reduces repatriated earnings for exporters. (5) US spillovers: Direct\
      \ tariff impacts on automotive, steel, aluminum, forestry; broad earnings uncertainty\
      \ across Canadian exporters. US Fed uncertainty adds volatility. (6) Volatility\
      \ regime: Trailing 63-day daily std = 0.0318 (nearly 2x long-run average of\
      \ ~0.017), implying 21-day forward sigma \u2248 0.0318 \xD7 sqrt(21) \u2248\
      \ 0.146. Distribution is modeled as near-Normal with slight left skew to account\
      \ for binary trade-escalation tail risk. Median set at -0.010 reflecting: (a)\
      \ some mean-reversion from oversold -0.042 current reading, (b) offset by persistent\
      \ trade/macro headwinds and negative earnings revision risk for energy/financials,\
      \ (c) gold strength and BoC easing backstop provide modest floor. The wide quantile\
      \ spread reflects the elevated vol regime and binary trade-war outcomes. Left\
      \ tail is extended vs symmetric Normal to account for tail risk of trade escalation;\
      \ right tail is modest, reflecting potential upside from trade truce or BoC\
      \ surprise cut."
