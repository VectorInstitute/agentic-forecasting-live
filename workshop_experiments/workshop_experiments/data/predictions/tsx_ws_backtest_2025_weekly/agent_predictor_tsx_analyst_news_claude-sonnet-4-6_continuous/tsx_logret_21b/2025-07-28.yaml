    rationale: 'Overall: The S&P/TSX Composite 21-business-day log-return forecast
      as of 2025-07-28 is centred on a modest positive return of +1.0% (log). The
      index has recovered strongly from the April 2025 tariff-shock lows, and momentum
      is now fading toward neutral. The constructive case rests on a dovish BoC, gold/materials
      outperformance, resilient bank earnings, and lower GoC yields. The bear case
      centres on tariff escalation, a softening Canadian labour market (6.9% unemployment),
      oil price weakness, and CAD depreciation risk. Volatility is estimated at ~3.8%
      for the 21-day window (annualised ~27%), below peak stress but above pre-2025
      norms, reflecting persistent trade and geopolitical uncertainty. The distribution
      has a slight left skew to capture binary downside from US-Canada trade negotiation
      breakdown.'
    horizon_rationale: "Forecast origin: 2025-07-28. The 21-business-day (\u22481\
      \ calendar month) cumulative log-return is targeted using the following framework:\
      \ (1) PRICE HISTORY & MOMENTUM \u2014 The most recent 21-day cumulative log-return\
      \ is +0.024, part of a strong post-April-tariff recovery that peaked near +0.12\
      \ in May 2025 and has been fading. The index appears to have largely mean-reverted\
      \ from April lows, suggesting limited further near-term upside from momentum\
      \ alone. (2) BANK OF CANADA POLICY \u2014 The BoC held at 2.75% at its July\
      \ 2025 meeting. Governing Council language is cautious but with a dovish tilt.\
      \ A divided council (some wanted a cut to 2.50%) suggests the next move is more\
      \ likely a cut than a hike, which is mildly supportive of equity valuations.\
      \ (3) INFLATION & LABOUR \u2014 Headline CPI near 2% target, core ~2.5%. Unemployment\
      \ rose to 6.9% in June (multi-year high), with youth unemployment at a 15-year\
      \ peak. Soft labour market supports accommodative BoC bias but signals domestic\
      \ demand headwinds \u2014 a net slight drag. (4) COMMODITIES \u2014 Gold is\
      \ a standout performer supporting TSX Materials (positive for index). Oil/energy\
      \ sector faces pressure from trade tensions and subdued global demand (slight\
      \ drag). Net commodity impact is broadly neutral-to-slightly-positive given\
      \ the index's heavy gold/materials weighting alongside energy. (5) USD/CAD &\
      \ GOC YIELDS \u2014 CAD weakened modestly in Q2 but stabilised in July. GoC\
      \ 10-year yields tracking lower with US Treasuries; lower yields generally support\
      \ equity multiples. Interest rate differential (BoC holds, Fed may ease) adds\
      \ mild CAD tailwind vs earlier in the year. (6) US POLICY / TRADE SPILLOVERS\
      \ \u2014 US tariffs on Canadian steel, aluminum, and electrical equipment persist.\
      \ A 90-day negotiation window supported the May-July rally, but the window introduces\
      \ event risk if talks deteriorate. The US equity market resilience supports\
      \ global risk appetite. (7) VOLATILITY \u2014 Trailing 63-day daily std = 0.02616,\
      \ implying \u03C3\u2082\u2081 \u2248 0.02616\xD7\u221A21 \u2248 0.120 in stress-adjusted\
      \ terms, but this is inflated by the April shock. Normalised 21-day vol in current\
      \ conditions is estimated at ~0.038. (8) FORECAST CONSTRUCTION \u2014 Median\
      \ set at +0.010: mildly positive drift from BoC dovish hold, resilient bank\
      \ earnings, and gold/materials tailwind, partially offset by soft labour, oil\
      \ uncertainty, tariff tail risk, and fading momentum. Distribution uses \u03C3\
      \u2082\u2081 \u2248 0.038 with slight left-tail fattening (downside tail extended\
      \ ~10% vs normal) to account for binary tariff escalation risk. Quantiles are\
      \ constructed to be strictly non-decreasing."
