    rationale: "Overall approach: calibrated probabilistic forecast using (a) historical\
      \ S&P/TSX 21-business-day cumulative log-return distribution, (b) current macro\
      \ context (BoC easing cycle, tariff risk on Trump inauguration day, commodity\
      \ prices, CAD weakness), and (c) recent momentum signals from the price history\
      \ CSV. The dominant theme is elevated uncertainty from US trade policy, which\
      \ widens the distribution relative to calm periods and introduces a modest negative\
      \ skew. The median is set at -0.005 (essentially flat/slightly negative) reflecting\
      \ the balance between BoC easing support and the tariff risk overhang. The \u03C3\
      \ of 0.130 over 21 business days is consistent with the trailing daily vol scaled\
      \ up, with a small uplift for regime uncertainty. No extreme tail compression\
      \ is applied given the binary tariff-decision risk still ahead in the 21-business-day\
      \ window."
    horizon_rationale: "Forecast for 21-business-day cumulative log return as of 2025-01-20.\
      \ Key inputs and assumptions: (1) Bank of Canada policy: BoC cut its overnight\
      \ rate to 3.00% in January 2025 (sixth consecutive cut), signalling further\
      \ gradual easing. This provides a modest tailwind for rate-sensitive sectors\
      \ (banks, utilities, REITs) but the pace of further cuts is uncertain. (2) Inflation/Labour:\
      \ Dec 2024 CPI at 1.8% (below target, partly GST holiday effect); Dec 2024 LFS\
      \ +91K jobs and unemployment 6.7% were a positive surprise, reducing immediate\
      \ recession fears but not altering the BoC's easing bias. (3) US trade/tariff\
      \ risk: The dominant downside risk. Trump's inauguration on Jan 20, 2025 \u2014\
      \ the as-of date \u2014 introduces near-term uncertainty around 25% tariff threats\
      \ on Canadian goods. The BoC MPR explicitly excluded tariffs from its baseline\
      \ but flagged 'more-than-usual uncertainty.' This skews the distribution leftward\
      \ and widens it. (4) Commodities: Gold is trading higher (safe-haven demand\
      \ from tariff/geopolitical risk) supporting TSX materials names. WTI oil is\
      \ in the $69-73/bbl range \u2014 supportive for energy but below recent highs;\
      \ tariff risk to energy exports is a material headwind. (5) CAD/Yields: USD/CAD\
      \ ~1.4303, CAD near multi-year lows (~70 US cents). BoC-Fed policy divergence\
      \ (BoC cutting, Fed on hold) continues to pressure the loonie, which dampens\
      \ returns for unhedged foreign investors but can boost the earnings of commodity\
      \ exporters. GoC 10-year yields sensitive to BoC path and US spillovers. (6)\
      \ Price momentum: The trailing 21-day window in the CSV shows the index has\
      \ been under mild negative pressure since mid-December 2024 (returns ranging\
      \ -0.02 to -0.04) with the most recent reading flat at 0.00 on Jan 20. This\
      \ slight negative momentum, combined with tariff-inauguration overhang, justifies\
      \ a median slightly below zero. (7) Volatility: Trailing 63-day daily \u03C3\
      \ = 0.02748. Annualised to a 21-day horizon: \u03C3_{21d} \u2248 0.02748 \xD7\
      \ \u221A21 \u2248 0.126. I use \u03C3 = 0.130 (slightly wider to reflect elevated\
      \ macro uncertainty) and a leftward shift of ~-0.005 for the median, yielding\
      \ a near-normally distributed fan with mild negative skew. Upside scenarios\
      \ (gold/oil spike, tariffs postponed, strong bank earnings) support the right\
      \ tail; downside scenarios (tariffs imposed, sharp CAD sell-off, oil demand\
      \ destruction) support the left tail."
