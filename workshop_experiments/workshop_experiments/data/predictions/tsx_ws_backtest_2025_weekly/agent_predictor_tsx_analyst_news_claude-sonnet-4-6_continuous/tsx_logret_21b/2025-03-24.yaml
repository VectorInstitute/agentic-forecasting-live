    rationale: "Overall forecast rationale for S&P/TSX Composite 21-business-day cumulative\
      \ log-return as of 2025-03-24: The TSX faces an unusually uncertain macro environment\
      \ dominated by the US-Canada trade conflict. The BoC's aggressive easing cycle\
      \ (policy rate at 2.75% after 7 cuts) provides monetary support, and gold's\
      \ record rally strongly supports the TSX's large materials sector. However,\
      \ US tariffs (25% on goods, 10% on energy), a severely weakened Canadian dollar,\
      \ cooling labour market, and elevated cross-asset volatility (trailing 63d daily\
      \ std = 2.8%) create meaningful downside risk. The median forecast is near-flat\
      \ (+0.2% log return over 21 days), with a wide distribution (\xB112-13% at the\
      \ 1-sigma level). The distribution is slightly left-skewed to reflect the asymmetric\
      \ tariff escalation tail risk. Historical analogs from periods of elevated trade/macro\
      \ stress (2018 tariff episodes, 2015 oil shock) support a fat-tailed, modestly\
      \ negatively-skewed distribution at this horizon."
    horizon_rationale: "Forecast origin: 2025-03-24. Horizon: 21 business days (~one\
      \ calendar month). Key assumptions and drivers: (1) Bank of Canada policy: BoC\
      \ cut its overnight rate to 2.75% on March 12, 2025 (7th consecutive cut since\
      \ June 2024); Governing Council signalled a cautious, data-dependent 'wait-and-see'\
      \ stance. Monetary easing is a mild positive for equities but the pace of further\
      \ cuts is uncertain. (2) Inflation & labour: Canadian CPI ran at ~1.9% YoY in\
      \ early 2025, just below the 2% target, supportive but with tariff-driven upside\
      \ risk. Labour market is cooling (rising unemployment-to-vacancy ratio), consistent\
      \ with a softer growth backdrop. (3) US tariffs and trade spillovers: US imposed\
      \ 25% tariffs on most Canadian goods (10% on energy) in early February 2025,\
      \ with Canada retaliating. This is the dominant headwind for the TSX \u2014\
      \ depressing business investment, export sentiment, and corporate earnings guidance.\
      \ CUSMA provides partial protection for autos. The risk of further escalation\
      \ introduces meaningful negative tail risk. (4) Commodity backdrop: Gold is\
      \ at record levels driven by safe-haven demand and central bank buying, strongly\
      \ supporting TSX materials/mining stocks. Crude oil faces mixed demand signals\
      \ (OPEC+ discipline vs. global growth concerns), providing a partial offset.\
      \ Base metals face headwinds from USD strength and soft Chinese industrial demand.\
      \ Net commodity effect is mildly positive due to gold dominance. (5) USD/CAD\
      \ and GoC yields: Canadian dollar severely weakened (USD/CAD ~1.43\u20131.45\
      \ area) from BoC-Fed policy divergence \u2014 the Canada-US 2-year spread widened\
      \ to levels unseen since the mid-1990s. A weaker CAD is a partial positive for\
      \ TSX commodity exporters (earnings in CAD terms) but signals macro stress.\
      \ GoC 10-yr yield declined to ~3.01% by end-March 2025 from 3.60% in January,\
      \ reflecting recession/tariff concern pricing. (6) TSX price history and technical:\
      \ Trailing 63-day daily std = 0.0282, implying a 21-business-day sigma of ~0.129\
      \ (12.9%). The TSX had sold off sharply mid-March (cumulative log-return trough\
      \ ~-6% over the rolling period), with March 24 showing a tentative +0.6% stabilisation.\
      \ The index is recovering from oversold conditions, but sustained recovery requires\
      \ trade uncertainty to dissipate. (7) Distribution construction: Median/point\
      \ forecast set at +0.002 (near-flat), reflecting weak drift from offsetting\
      \ forces: BoC easing and gold-driven materials tailwind vs. tariff shock and\
      \ CAD weakness. Volatility: \u03C3_21 = 0.129. Applied mild left skew (negative\
      \ skew ~-0.2) reflecting asymmetric downside from potential tariff escalation\
      \ (25% tariffs on all goods, retaliatory spiral) vs. limited near-term upside\
      \ catalyst. Quantiles derived from skewed-normal parameterisation: Q(p) \u2248\
      \ \u03BC + \u03C3 \xD7 [\u03A6\u207B\xB9(p) + skew adjustment], with the downside\
      \ tails (Q05, Q10) widened slightly and upside tails (Q90, Q95) trimmed slightly\
      \ relative to a symmetric normal."
