    rationale: "Overall forecast rationale: The S&P/TSX Composite is under significant\
      \ pressure as of 2025-03-10 due to the US-Canada trade war (25% tariffs effective\
      \ March 4, 2025), a weakening Canadian dollar, soft labour market, and BoC constrained\
      \ by stagflationary pressures. The 21-day ahead distribution is centered near\
      \ -1.2% log return (approximately flat to slightly negative), with substantially\
      \ wider-than-normal tails (\u03C3 \u2248 12.5% for the period) reflecting the\
      \ elevated uncertainty regime. Key upside risks: trade de-escalation, BoC surprise\
      \ cut, gold price surge supporting materials sector. Key downside risks: tariff\
      \ escalation, Canadian recession materializing faster than expected, CAD further\
      \ weakness leading to capital flight, energy sector demand destruction. The\
      \ distribution is slightly left-skewed. Historical base for 21-business-day\
      \ returns shows the unconditional mean is near +0.5\u20130.7%, but the current\
      \ regime justifies a negative conditional mean given the tariff shock overhang\
      \ and recent price momentum."
    horizon_rationale: "Forecast origin: 2025-03-10. The S&P/TSX Composite enters\
      \ the 21-business-day horizon with a deeply negative recent log-return reading\
      \ (-0.0462 on the last day, cumulative 21-day return already -0.046), shaped\
      \ by the US-Canada trade war that escalated sharply with US 25% tariffs (10%\
      \ on energy) effective March 4, 2025. Canada responded with ~$30B in retaliatory\
      \ tariffs. Key drivers and assumptions: (1) TRADE WAR DOMINANT HEADWIND \u2013\
      \ The tariff shock is the primary negative catalyst and introduces elevated\
      \ tail risks to the downside (further escalation/retaliation, recession in H1\
      \ 2025). (2) BANK OF CANADA \u2013 Policy rate at 3.0% (after 6 cumulative cuts\
      \ since mid-2024). BoC faces a dual mandate tension: tariff-induced inflation\
      \ vs. growth slowdown risk. Markets price further cuts over H1 2025, which is\
      \ modestly supportive for equities via lower discount rates and financial sector\
      \ NIMs on variable-rate products. (3) INFLATION/LABOUR \u2013 Canadian CPI at\
      \ 1.8% headline by end-2024, core modestly higher; unemployment ~6.4%. Labour\
      \ softness supports BoC cuts but signals demand weakness. (4) COMMODITIES \u2013\
      \ Oil prices under pressure from demand-fear/trade-disruption headwinds; gold\
      \ rising as safe-haven (supportive for TSX materials/gold miners); base metals\
      \ mixed. Net commodity impact roughly neutral. (5) USD/CAD at ~1.4371 \u2013\
      \ Weak loonie is net supportive for energy and mining exporters' CAD revenues\
      \ but raises import costs and hampers real consumer spending. (6) MOMENTUM \u2013\
      \ Recent price history (late Feb\u2013early Mar 2025) shows 5\u20136 consecutive\
      \ strongly negative 21-day return readings (-0.03 to -0.05), indicating persistent\
      \ selling pressure. (7) MEAN REVERSION \u2013 Historically the TSX recovers\
      \ over 21-day windows after large drawdowns; partial mean-reversion offset to\
      \ the bearish momentum. DISTRIBUTION CONSTRUCTION: Trailing 63-day daily std\
      \ = 0.02680; 21-day \u03C3 \u2248 0.02680 \xD7 \u221A21 \u2248 0.1228. Given\
      \ heightened macro risk and negative skew (tariff escalation asymmetry), I use\
      \ \u03C3 \u2248 0.125 with a mean of ~-0.012 and apply mild left-tail enhancement.\
      \ The median of -0.012 reflects a base case of modest continued downside pressure\
      \ (much of the tariff shock priced in, but residual uncertainty persists), partially\
      \ offset by BoC accommodation and partial mean reversion. The 5th percentile\
      \ (~-0.23) captures severe escalation/recession scenario; the 95th percentile\
      \ (~+0.18) captures a meaningful de-escalation or trade deal scenario. Distribution\
      \ is slightly left-skewed to reflect asymmetric tail risks."
