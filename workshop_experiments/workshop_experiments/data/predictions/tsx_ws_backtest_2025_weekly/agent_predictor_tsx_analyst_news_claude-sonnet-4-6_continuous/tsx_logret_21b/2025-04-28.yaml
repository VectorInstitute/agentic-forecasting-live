    rationale: 'Overall forecast rationale for TSX 21-BD log return as of 2025-04-28:
      The S&P/TSX Composite sits in a difficult macro environment dominated by US
      tariff policy uncertainty, a softening Canadian labour market, a BoC on hold
      after aggressive easing, mixed commodity signals (gold up, oil down), and a
      weak CAD. The index has already partially repriced downside risk (down ~6-8%
      from February peak through early April), which limits the downside tail somewhat.
      However, unresolved trade tensions, rising unemployment, and oil price weakness
      keep the central tendency of the 21-BD return close to zero with meaningful
      left-skew. We use an effective distributional standard deviation of ~0.037 for
      the forward 21-BD window, slightly wider than the backward-looking 63-day std
      of 0.030 to account for elevated regime uncertainty. The distribution is centred
      at +0.005 with asymmetric tails (left tail heavier), reflecting the current
      trade and growth risk environment.'
    horizon_rationale: "Forecast origin: 2025-04-28. The S&P/TSX Composite last 21-BD\
      \ cumulative log return is -0.0145, reflecting partial recovery from the April\
      \ 2\u20139 tariff-shock lows (which drove the rolling return to around -0.08).\
      \ The trailing 63-day std of 21-BD log returns is 0.030, indicating elevated\
      \ but not extreme recent volatility. Key macro drivers as of April 28, 2025:\
      \ (1) Bank of Canada Policy \u2014 BoC held at 2.75% at April 16 meeting after\
      \ delivering 175bp of cuts since June 2024; stance is data-dependent and cautious;\
      \ further cuts are possible if growth deteriorates, which would be a mild equity\
      \ tailwind. (2) Inflation & Labour \u2014 CPI near 2% target but tariff pass-through\
      \ risks re-acceleration; unemployment rising (~6.9%), signalling a softening\
      \ labour market and demand headwinds. (3) Commodities \u2014 Oil under pressure\
      \ from trade-war demand fears and OPEC+ supply, a headwind for TSX Energy (~18%\
      \ index weight); Gold surging on safe-haven and central bank buying, a tailwind\
      \ for TSX Materials/Gold miners (~13% weight); net effect is approximately neutral\
      \ to slightly negative. (4) CAD & GoC Yields \u2014 CAD soft (USD/CAD spiked\
      \ to 1.45 at tariff shock, partially stabilized); BoC-Fed policy divergence\
      \ widening yield spreads; weak CAD provides modest revenue translation benefit\
      \ for resource exporters. (5) US Federal Reserve & Trade Spillovers \u2014 Fed\
      \ on cautious hold; US 25% tariff on most Canadian goods + 10% on energy creates\
      \ structural headwind; the 30-day implementation delay offered temporary relief\
      \ but pervasive uncertainty persists. (6) Sector Earnings \u2014 Banks face\
      \ credit quality risks from potential recession; energy producers face margin\
      \ compression; gold miners benefit from elevated gold prices; defensives provide\
      \ partial cushion. Distribution rationale: The median is set at +0.005 (mild\
      \ positive lean) reflecting: the index has already absorbed a large tariff shock\
      \ drawdown, BoC easing supports valuations, and gold strength partially offsets\
      \ oil weakness. The distribution is modestly left-skewed (\u03C3_eff \u2248\
      \ 0.037) to account for asymmetric downside risk from tariff escalation, recession\
      \ scenarios, or oil price collapse. The left tail (Q0.05 = -0.073) is calibrated\
      \ to roughly a 2-sigma tariff-escalation/recession scenario consistent with\
      \ observed drawdowns in the 2025 tariff period and 2022 bear market. The right\
      \ tail (Q0.95 = +0.081) is more truncated, reflecting limited near-term catalysts\
      \ for a sharp rally absent a comprehensive trade deal."
