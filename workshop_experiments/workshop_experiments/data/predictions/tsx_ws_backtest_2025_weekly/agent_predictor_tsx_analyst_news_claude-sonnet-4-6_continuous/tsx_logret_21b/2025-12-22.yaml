    rationale: 'Overall macro regime as of 2025-12-22: Bank of Canada on pause at
      2.25% (accommodative but not easing further), inflation near target, labour
      market stabilizing, gold supportive of materials sector, oil mildly weak, CAD
      under pressure, and US tariff risks creating a persistent left-tail threat.
      The TSX has rallied strongly since the April 2025 tariff-shock low (CSV shows
      consistent +0.02 to +0.07 monthly returns throughout mid-to-late 2025). The
      forecast median of +1.5% over the next 21 business days reflects: (a) above-average
      momentum persistence adjusted for mean-reversion, (b) neutral-to-supportive
      BoC stance, (c) gold strength offsetting oil weakness in commodity sectors,
      and (d) a modest holiday seasonality tailwind. The distribution width (effective
      std ~0.032 vs trailing 0.022) is widened to account for year-end liquidity thinning
      and unresolved US trade policy uncertainty. Negative skew applied at the tails
      to reflect asymmetric downside from a potential tariff escalation or macro shock.'
    horizon_rationale: "Forecast origin: 2025-12-22. The trailing 21-business-day\
      \ cumulative log return was +0.059 (strong recent momentum), and the trailing\
      \ 63-day std of 21-bday returns is 0.022 (a notably low-volatility regime).\
      \ Key macro inputs: (1) Bank of Canada held its overnight rate at 2.25% on Dec\
      \ 10, 2025 (following an Oct 25bp cut), with consensus expecting a hold through\
      \ H1 2026; this provides a stable, mildly accommodative backdrop. (2) Canadian\
      \ CPI near 2.2% in October \u2014 at target \u2014 and labour market stabilizing\
