    rationale: "Overall macro context as of 2025-08-25: The TSX has demonstrated notable\
      \ resilience in August 2025, rising to record highs despite a challenging backdrop.\
      \ Key supportive factors are: (i) BoC easing cycle (policy rate 2.75%, dovish\
      \ forward guidance), (ii) gold at elevated levels supporting the large materials\
      \ weighting, (iii) financial sector supported by lower GoC yields. Key headwinds\
      \ are: (i) 35% U.S. tariffs on Canadian goods \u2014 the most significant structural\
      \ risk \u2014 causing business investment contraction and Q2 GDP to shrink 1.6%;\
      \ (ii) labour market deterioration (unemployment 7.1%, broad-based job losses);\
      \ (iii) soft oil prices constraining energy-sector earnings; (iv) CAD weakness\
      \ reducing real returns for foreign investors. The 21-business-day horizon (roughly\
      \ to late September 2025) corresponds to a period where: a BoC decision could\
      \ provide a catalyst (likely dovish/hold), Q3 earnings pre-announcements may\
      \ be cautious, and US-Canada trade developments remain the primary tail risk.\
      \ The median forecast of +1.5% log-return reflects a mildly positive outlook\
      \ anchored by momentum and BoC support, with a spread consistent with recent\
      \ elevated volatility conditions."
    horizon_rationale: "Forecast origin: 2025-08-25. The S&P/TSX Composite is at or\
      \ near record highs, having risen ~5% in August 2025. The 21-business-day (\u2248\
      1 calendar month) horizon log-return distribution is centred on a modest +1.5%\
      \ median, reflecting: (1) BoC on hold at 2.75% after prior cuts, with a dovish\
      \ bias (further easing possible) supportive of financials and rate-sensitive\
      \ sectors; (2) gold strength benefiting the heavily-weighted materials sector\
      \ \u2014 gold is in safe-haven demand amid tariff/geopolitical uncertainty;\
      \ (3) headline CPI at 1.9% (below 2% target) reducing inflation-driven rate-hike\
      \ risk; (4) index momentum slightly positive (trailing 21-day log-return ~+0.03\
      \ at the as-of date); (5) GoC 10-year yields trending lower on weak macro data,\
      \ a tailwind for equity valuations. Key risks restraining the upside and widening\
      \ the left tail: U.S. 35% tariffs on Canadian imports (effective Aug 1) caused\
      \ Q2 GDP to contract 1.6%; unemployment at 7.1% (highest ex-pandemic since 2016);\
      \ CAD under pressure (~1.3857 USD/CAD) limiting overseas earnings translation;\
      \ core inflation above 3% limiting BoC's ability to cut aggressively; oil prices\
      \ soft/declining, weighing on the energy sector. Volatility calibration: trailing\
      \ 63-day daily std = 0.01271; annualised ~20.2%. Scaling to 21 business days:\
      \ \u03C3_21d \u2248 0.01271 \xD7 \u221A21 \u2248 0.058, which I mildly adjust\
      \ up to ~0.062 to capture the elevated tariff/macro uncertainty. Left-tail widening\
      \ reflects the asymmetric downside risk from potential tariff escalation or\
      \ a sharper-than-expected labour market deterioration. The distribution is near-symmetric\
      \ but with a slight negative skew: the gap from Q0.50 to Q0.05 is ~10.5 ppts\
      \ versus Q0.50 to Q0.95 of ~9.5 ppts."
