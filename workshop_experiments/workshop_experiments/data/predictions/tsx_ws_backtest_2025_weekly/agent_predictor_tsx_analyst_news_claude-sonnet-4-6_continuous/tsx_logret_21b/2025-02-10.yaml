  metadata:
    rationale: "Overall forecast philosophy: The TSX faces a classic tug-of-war between\
      \ domestic monetary easing (supportive) and US tariff/trade headwinds (negative),\
      \ with commodity prices providing partial offset. The 30-day tariff pause (announced\
      \ Feb 1) explains why the index recovered to recent highs by Feb 10, but the\
      \ outlook over the next 21 business days (through early March 2025) coincides\
      \ exactly with the tariff pause expiry window \u2014 making this period particularly\
      \ binary and high-uncertainty. The median forecast is a modestly positive +1.0%\
      \ log-return reflecting: (a) BoC easing tailwind, (b) positive recent momentum,\
      \ (c) some probability that the tariff pause leads to a negotiated resolution\
      \ (bullish), offset by (d) elevated probability of tariff implementation or\
      \ escalation (bearish). The distribution is wider than historical norms and\
      \ negatively skewed, with Q0.05 at -8.0% to capture a tariff-escalation/risk-off\
      \ scenario and Q0.95 at +9.6% to capture a trade-deal resolution rally scenario."
    horizon_rationale: "Forecast as of 2025-02-10 for the 21-business-day (\u2248\
      1-month) horizon. Key inputs and assumptions: (1) Bank of Canada policy: BoC\
      \ cut to 3.00% on Jan 29, 2025 (cumulative 175bps since Jun 2024), signaling\
      \ continued easing. This is supportive for TSX valuation but the pace of further\
      \ cuts is uncertain given tariff-driven inflation risk. (2) Inflation: Dec 2024\
      \ CPI at 1.8% YoY \u2014 below the 2% target and distorted lower by the GST/HST\
      \ tax holiday. Underlying inflation is contained; BoC retains room to cut if\
      \ tariffs damage growth. (3) Labour market: Jan 2025 LFS showed +76,000 jobs\
      \ and unemployment at 6.6%, stronger than expected, reducing urgency for emergency\
      \ easing. (4) US tariffs / trade war: The dominant risk. On Feb 1, 2025, the\
      \ US announced 25% tariffs on Canadian goods (10% on energy) with a 30-day implementation\
      \ pause. Canada retaliated with $155B in tariffs on US goods. This creates material\
      \ downside risk to corporate earnings (especially banks, auto parts, industrials)\
      \ and near-term GDP. The 30-day pause buys time but uncertainty is extremely\
      \ elevated and weighs on risk appetite. (5) USD/CAD: ~1.4543, near 23-year lows,\
      \ driven by wide Canada-US yield spread (~135bps on 2Y). Weak loonie partially\
      \ cushions energy and materials exporters but signals broad macro stress. (6)\
      \ GoC 10-year yields: reflecting BoC easing trajectory; foreign investor demand\
      \ for Canadian bonds was strong in Jan 2025. (7) Commodities: Gold acting as\
      \ safe-haven hedge amid trade uncertainty \u2014 positive for TSX materials\
      \ sector. Oil faces demand-destruction risk from tariff-induced slowdown. Net\
      \ commodities impact roughly neutral to slight positive. (8) US Fed: Paused\
      \ easing; sticky inflation in the US limits Fed rate cuts, widening Canada-US\
      \ divergence. (9) Recent TSX momentum: The 21-BD cumulative log-return has recovered\
      \ from ~-0.04 in mid-Jan 2025 to +0.04 by Feb 10, reflecting partial resolution\
      \ of the tariff shock (30-day pause). Distribution is constructed with \u03BC\
      =+0.010 (modest positive drift from BoC easing and recent momentum, partially\
      \ offset by tariff headwind), \u03C3\u22480.052 (elevated vs long-run 21BD \u03C3\
      \ of ~0.044, reflecting heightened policy and trade uncertainty), and a slight\
      \ left skew (tail risk from tariff escalation). The 63-day trailing daily std\
      \ of 0.0280 implies a 21BD annualized \u03C3 of ~0.128 but the realized distribution\
      \ of 21BD returns in the historical CSV suggests \u03C3 closer to 0.040\u2013\
      0.050, so we use 0.052 to capture the current elevated-uncertainty regime. Left\
      \ tail is padded vs symmetric normal to reflect the asymmetric tariff escalation\
      \ risk."
