    rationale: "Overall methodology: Combined a fat-tailed (Student-t, df\u22487)\
      \ parametric distribution centered on a positive-drift median with empirical\
      \ calibration from 25 years of 21bd TSX cumulative log-return history. The median\
      \ of +0.015 reflects a mild bullish lean given BoC easing expectations and post-tariff-shock\
      \ recovery, while the \u03C3\u22480.065 is anchored to the trailing 63d realized\
      \ volatility scaled to the 21bd horizon. Key upside risks: further BoC rate\
      \ cuts, gold price surge, US-Canada trade truce, strong Canadian bank earnings.\
      \ Key downside risks: tariff re-escalation, oil price decline, global risk-off\
      \ event, BoC holding rates, CAD shock."
    horizon_rationale: "Forecast as of 2025-08-18 for 21-business-day cumulative log\
      \ return of the S&P/TSX Composite. Key inputs and assumptions: (1) Bank of Canada\
      \ Policy: BoC policy rate held at 2.75% (last cut March 2025). Markets expect\
      \ BoC to resume cutting in autumn 2025, which is mildly supportive for equities\
      \ via lower discount rates and improved sentiment. The BoC-Fed differential\
      \ remains wide, as the Fed is on a slower easing path, keeping downward pressure\
      \ on CAD. (2) Canadian Inflation & Labour: CPI at ~1.9% (below the 2% target),\
      \ supportive of further easing; however, core measures were stickier earlier\
      \ in 2025 due to tariff pass-through. Labour market is soft (unemployment ~7%),\
      \ limiting consumer spending upside but also strengthening the BoC's dovish\
      \ case. (3) Commodities: Oil prices declined during August 2025, pressuring\
      \ the TSX energy sector (a major index weight). Gold trended higher on safe-haven\
      \ demand, supporting the materials sector. Net commodity effect is roughly neutral-to-slightly-positive\
      \ for the TSX given gold's recent strength. (4) CAD & GoC Yields: GoC 10-year\
      \ yields moved lower in August, reflecting a growth-soft/easing-bias environment;\
      \ falling yields are broadly supportive for equity valuations. CAD remains under\
      \ modest pressure from rate differential, which provides a mild tailwind for\
      \ USD-earning Canadian multinationals. (5) US Tariff Spillovers: 25% U.S. tariffs\
      \ on most Canadian goods (imposed Feb 2025) caused a significant GDP contraction\
      \ in Q2 2025 and sharp TSX selloff in March-April. By August, trade truce hopes\
      \ and partial accommodation reduced acute risk, but residual tariff risk remains\
      \ a key left-tail driver. (6) TSX Sector & Level Context: The index recovered\
      \ strongly from April lows and reached record highs by late August 2025. Recent\
      \ 21bd cumulative returns were clustered in +0.02 to +0.03 range (muted, stable\
      \ momentum). Being at record highs raises modest mean-reversion risk. Canadian\
      \ banks have been strong; energy weaker; materials mixed. (7) Volatility: Trailing\
      \ 63d daily std = 0.01575, implying a 21bd horizon sigma of ~0.072. Realized\
      \ 21bd return volatility in recent months has been lower. I use an effective\
      \ sigma of ~0.065 for the distribution, reflecting the current modestly-elevated-but-not-extreme\
      \ volatility regime. (8) Distribution shape: Student-t with ~7 degrees of freedom\
      \ (fat tails) centered at +0.015 median to account for fat tail risks on both\
      \ sides\u2014left from tariff re-escalation or oil shock, right from BoC surprise\
      \ cut or trade resolution. The positive drift (+0.015 over 21bd, roughly +0.9%)\
      \ reflects the mild bullish bias from BoC easing expectations, gold strength,\
      \ and strong bank earnings, partially offset by record-high valuation risk,\
      \ soft labour market, and oil price weakness."
