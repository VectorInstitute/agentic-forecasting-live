    rationale: "Overall forecast produced for April 7, 2025, a date of extreme market\
      \ stress following the U.S. 'Liberation Day' tariff announcement. Key assumptions:\
      \ (1) BoC at 2.75%, with further cuts likely over the next month; (2) WTI crude\
      \ below US$60/bbl, a significant headwind; (3) Gold near record highs ~US$3,057/oz,\
      \ a partial offset; (4) CAD near 0.70 USD, near cycle lows; (5) GoC 10-year\
      \ yields falling on recession fears; (6) TSX in deeply oversold territory (21-bd\
      \ return of -8%), with partial mean-reversion tendency but elevated two-sided\
      \ uncertainty. The distribution is intentionally wide (5th to 95th pct spanning\
      \ ~45 log-return points, or roughly \xB122%) to reflect genuinely extreme macroeconomic\
      \ uncertainty, and is modestly left-skewed to account for asymmetric downside\
      \ tail risk from trade-war escalation, oil price weakness, and recession materialization."
    horizon_rationale: "Forecast origin is April 7, 2025, immediately following the\
      \ 'Liberation Day' tariff shock of April 2. The TSX 21-business-day cumulative\
      \ log return entering April 7 is -0.0798 (~-7.7% price), an extreme reading\
      \ near the 5th historical percentile. Trailing 63-day daily vol is 2.97%, implying\
      \ a 21-bd 1-sigma range of ~\xB113.6%.\n\nKEY DRIVERS:\n1. TARIFF SHOCK: Trump's\
      \ April 2 'Liberation Day' announcement imposed a 10% blanket tariff plus higher\
      \ reciprocal tariffs globally. Nasdaq entered bear market territory; S&P 500\
      \ saw worst session in ~5 years. The TSX has heavy exposure through energy (~18%\
      \ weight) and materials (~13%). Canada was partially exempted from the most\
      \ aggressive rounds but faces ongoing uncertainty.\n2. OIL PRICES: Crude fell\
      \ below US$60/bbl on recession demand fears \u2014 a significant headwind for\
      \ TSX energy stocks and the broader index.\n3. GOLD: Near US$3,057/oz, a record,\
      \ providing a material offset for gold miners and the materials sector.\n4.\
      \ BANK OF CANADA: Rate at 2.75% (held at April meeting, noting 'pervasive uncertainty').\
      \ BoC has already cut 7 times since June 2024 and may cut further. This provides\
      \ modest macro support and helps financials' NIM trajectory.\n5. CAD/USD: ~0.7034\
      \ \u2014 near cycle lows, suppressed by BoC-Fed policy divergence and trade\
      \ uncertainty. Weak CAD slightly boosts export-denominated earnings translations\
      \ but raises import costs.\n6. GOC 10-YEAR YIELDS: Under downward pressure as\
      \ recession fears mount \u2014 supportive of rate-sensitive sectors.\n7. LABOUR\
      \ MARKET: Employment contracted -32,600 in March 2025; unemployment at ~6.6%.\
      \ Cooling labour market argues for continued BoC easing but raises consumer/credit\
      \ concerns for banks.\n8. INFLATION: CPI at 1.9%-2.3%, near target. No immediate\
      \ inflation constraint on BoC.\n\nFORECAST RATIONALE:\nMedian (+0.03): From\
      \ deeply oversold conditions (~-8% 21-bd return entering the forecast), historical\
      \ patterns across crisis analogs (2008, 2020, 2002 trade shock) show partial\
      \ mean reversion over the next 21 business days. Factors supporting a modest\
      \ bounce: oversold conditions, BoC easing support, potential for tariff negotiation/pause\
      \ signals, gold-sector strength. Factors capping the upside: recession fears,\
      \ oil weakness, trade war escalation risk, weakening jobs data.\n\nDISTRIBUTION\
      \ SHAPE: Left-skewed due to tail risks (tariff escalation to Canada, recession\
      \ materializing, further oil decline, financial stress). The right tail is real\
      \ (tariff pause/deal, coordinated central bank easing, commodity recovery),\
      \ but capped relative to the left tail. \u03C3_21bd calibrated to ~0.13 with\
      \ negative skew adjustment of ~-0.015 to shift the distribution slightly left\
      \ of symmetric-normal.\n\nHISTORICAL CROSS-CHECK: In the 2020 COVID crash, the\
      \ TSX bounced 11-16% over 21 bdays from the trough. In 2008, recoveries from\
      \ similar drawdown levels ranged from -14% to +9% over 21 bdays depending on\
      \ timing. The current episode has significant policy response capacity (BoC\
      \ cuts, fiscal stimulus potential) but faces a more persistent structural uncertainty\
      \ than a pure liquidity shock."
