    rationale: 'Overall approach: Combined quantitative scaling from trailing volatility
      (63d std = 0.0498, implying ~3% 21-day forward vol) with qualitative macro adjustments.
      The median (0.50 quantile) of +0.015 reflects a mild positive drift from BoC
      easing and gold tailwinds, offset by mean-reversion after a ~10% rally off the
      April lows, persistent US tariff headwinds on Canadian goods, a weakened CAD,
      and a softening labour market. The distribution is slightly negatively skewed
      to capture the asymmetric downside tail from potential tariff re-escalation.
      The 5th percentile at -0.047 and 95th at +0.065 define the plausible extreme
      outcomes over the one-month horizon.'
    horizon_rationale: "Forecast as of 2025-06-02 for a 21-business-day horizon (approx.\
      \ end of June 2025). Key drivers and assumptions:\n\n1. MOMENTUM & MEAN REVERSION:\
      \ The TSX staged a powerful recovery from April's tariff-shock lows. The cumulative\
      \ 21-day log return peaked at ~+0.12 in early-to-mid May 2025 and sits at +0.062\
      \ on the forecast date, reflecting a substantial bounce. After such a sharp\
      \ rally, near-term mean-reversion forces are likely \u2014 the index has re-priced\
      \ much of the tariff-relief news. This argues for a below-recent-trend forward\
      \ return.\n\n2. BANK OF CANADA POLICY: BoC cut its policy rate aggressively\
      \ from 5.0% (April 2024) to 2.75% (March 2025). The April 2025 meeting produced\
      \ a data-dependent pause. Further cuts are anticipated for H2 2025 given the\
      \ rising unemployment rate (~7%) and inflation near the 2% target. An accommodative\
      \ BoC is a medium-term tailwind for equities, but the near-term pause and uncertainty\
      \ cap the immediate upside.\n\n3. CANADIAN LABOUR MARKET: Rising unemployment\
      \ (7%) and job losses in trade-exposed manufacturing/automotive sectors weigh\
      \ on consumer spending and domestic earnings outlooks. This is a mild negative\
      \ for the TSX near-term.\n\n4. US TARIFFS & TRADE UNCERTAINTY: The US imposed\
      \ 25% tariffs on most Canadian goods and 10% on energy in early 2025. While\
      \ a US-China 90-day truce lifted global risk sentiment in May (driving the TSX\
      \ rally), Canada-specific tariffs remain in place. Re-escalation risk constitutes\
      \ the key left-tail scenario, informing the wider/negatively-skewed lower quantiles.\n\
      \n5. COMMODITIES: Gold prices remained elevated, providing a cushion for TSX\
      \ materials and gold mining stocks. Crude oil faces headwinds from OPEC+ supply\
      \ unwinding and weaker global demand; the 10% energy tariff also caps upside.\
      \ Base metals are under pressure from a strong USD and subdued Chinese industrial\
      \ demand. On net, commodity signals are mixed \u2014 gold positive, oil/base\
      \ metals neutral-to-negative.\n\n6. USD/CAD & GoC YIELDS: CAD weakened sharply\
      \ on tariff shock (approaching 2002 lows) but partially recovered. The BoC-Fed\
      \ rate differential (~150 bps) remains a structural CAD headwind, compressing\
      \ CAD-denominated returns for foreign investors and limiting domestic purchasing\
      \ power. GoC 10-year yields trended lower as bond markets priced in further\
      \ BoC cuts, mildly supportive for equity valuations.\n\n7. VOLATILITY REGIME:\
      \ Trailing 63-day std of ~0.0498 indicates an elevated vol regime. Assuming\
      \ daily vol \u2248 0.63% and scaling to 21 days gives a ~2.9% forward std. Given\
      \ residual macro uncertainty, I use \u03C3 \u2248 0.030 for the forward distribution,\
      \ with a modest negative skew to reflect the asymmetric tariff re-escalation\
      \ tail risk.\n\n8. POINT ESTIMATE: Median set at +0.015 (roughly +1.5% log return),\
      \ reflecting: (a) mild BoC easing tailwind, (b) gold sector support, (c) partial\
      \ mean-reversion drag after the May rally, (d) tariff uncertainty as an ongoing\
      \ headwind, net to a modestly positive drift above zero but well below the recent\
      \ realized gains."
