      \ tail risk (escalation scenarios cause sharper drawdowns than equivalent upside\
      \ from de-escalation)."
    horizon_rationale: "Forecast origin: 2025-06-30. The S&P/TSX Composite last 21-business-day\
      \ cumulative log return was +0.0257, and the index has been recovering strongly\
      \ from the April trough, reaching record highs in June. The trailing 63-day\
      \ std of 21-day returns is 4.52%, still elevated relative to the long-run average\
      \ of ~3.0-3.5%, reflecting tariff/trade shock residual volatility.\n\nKey macro\
      \ assumptions:\n1. BANK OF CANADA POLICY: BoC held at 2.75% (second consecutive\
      \ pause). No imminent change expected. Rate stability is mildly supportive \u2014\
      \ removes tightening risk but provides no new easing catalyst. Market prices\
      \ 1\u20132 additional cuts in H2 2025, which would be incrementally supportive\
      \ for equities later in the year.\n2. INFLATION & LABOUR: Canadian unemployment\
      \ rose to ~6.9\u20137.0% with 70,000+ private-sector job losses in two months.\
      \ Headline CPI ~1.7% (carbon tax base effect), but core inflation firmer-than-expected.\
      \ Weak labour adds potential easing probability (supportive for risk assets)\
      \ but also signals economic softness (headwind for financials and consumer sectors).\n\
      3. COMMODITIES (OIL & GOLD): Energy sector strong \u2014 geopolitical tensions\
      \ supporting oil prices. Gold elevated as safe-haven amid ongoing trade uncertainty.\
      \ Both positive for TSX given heavy energy (~18%) and materials (~13%) weighting.\
      \ Mining also broadly positive.\n4. USD/CAD & GoC YIELDS: CAD stable near 1.36/USD;\
      \ GoC curve bear-steepening (mid/long yields rising). Rising long yields modestly\
      \ negative for rate-sensitive sectors (REITs, utilities) but manageable.\n5.\
      \ US TRADE/TARIFF SPILLOVERS: Canada-US trade tensions remain the primary tail\
      \ risk. Tariffs on steel, aluminum, and energy still in place. Some stabilization/negotiation\
      \ activity in June reduced the acute risk premium, but uncertainty remains elevated.\
      \ Tail scenario: tariff escalation could knock 8\u201312% off the index.\n6.\
      \ TECHNICAL/MOMENTUM: TSX near record highs. Recent 21-day returns fading from\
      \ +7\u201310% (May peak) to +2.5\u20133% (end June), consistent with mean-reversion\
      \ as the April-tariff-panic bounce matures. Positive momentum still intact but\
      \ pace of gains decelerating.\n7. SEASONALITY: July is a historically average\
      \ month for TSX. No strong seasonal effect.\n\nParametric approach: \u03C3 =\
      \ 0.045 (trailing 63d std). Median set at +0.015, reflecting: (a) slight positive\
      \ drift from BoC easing path and commodity support; (b) offset by record-high\
      \ mean-reversion risk and tariff tail. Distribution is slightly negatively skewed\
      \ (left tail modestly fatter) to account for asymmetric tariff escalation risk.\
      \ The 5th percentile (-0.074) represents a moderate tariff shock or commodity\
      \ price correction. The 95th percentile (+0.088) represents continued commodity\
      \ rally and trade-deal progress."
