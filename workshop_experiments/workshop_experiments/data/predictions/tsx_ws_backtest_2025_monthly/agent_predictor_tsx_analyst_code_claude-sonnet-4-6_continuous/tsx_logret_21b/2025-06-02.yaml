    horizon_rationale: "Forecast origin: 2025-06-02. The TSX has staged a strong recovery\
      \ from its April 2025 tariff-shock lows (cumulative 21-bd log return moved from\
      \ roughly -0.08 in early April to +0.06 by June 2), implying ~14% bounce in\
      \ ~8 weeks. Momentum is positive but the bulk of the snap-back rally appears\
      \ priced in, so I apply only a modest forward drift of +1.2% over the next 21\
      \ business days. Key supports: (1) BoC in a cautious easing cycle \u2014 rate\
      \ cuts begun in early 2025 with data-dependent forward guidance, providing a\
      \ soft floor for valuations; (2) headline CPI at 1.7% (May 2025) and core at\
      \ 3.0% \u2014 on-target or slightly above but trending down, limiting further\
      \ hawkish surprises; (3) gold elevated on geopolitical uncertainty, supporting\
      \ TSX materials sector. Key risks: (1) private-sector labour market shed 70,000+\
      \ jobs in the two months prior \u2014 macro softness caps upside; (2) US tariff\
      \ uncertainty persists and CAD remains under pressure, squeezing export margins;\
      \ (3) trailing 63-day vol of ~5.0% (in cumulative log-return units) is elevated\
      \ (~31% annualised), reflecting regime of uncertainty \u2014 fat tails warranted\
      \ on both sides. Distribution modelled as a fat-tailed (t, df\u22485) distribution\
      \ centred at +0.012 with scale 0.050, with a slight positive skew reflecting\
      \ BoC easing optionality and commodity support versus the heavier downside tail\
      \ from tariff escalation risk. Q05/Q95 span of \u224817 log-return points reflects\
      \ the elevated volatility environment."
