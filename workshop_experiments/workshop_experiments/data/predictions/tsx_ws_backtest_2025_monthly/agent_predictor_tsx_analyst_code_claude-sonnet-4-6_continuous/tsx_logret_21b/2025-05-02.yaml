      \ capture the fat-tail risk from potential tariff escalation or surprise trade\
      \ deal. Negative skew is preserved from the historical series."
    horizon_rationale: "Forecast as of 2025-05-02 for the 21-business-day (\u2248\
      1 calendar month) cumulative log return on the S&P/TSX Composite. Key inputs\
      \ and assumptions: (1) Bank of Canada policy path: The BoC has cut 175bps since\
      \ June 2024 to 2.75%, providing a supportive easing backdrop. However, most\
      \ of this cycle is already priced and further cuts are uncertain given trade-war-induced\
      \ inflation risk. Net: modestly positive for equities but not a strong incremental\
      \ tailwind. (2) US tariff/trade spillovers: The US imposed 25% tariffs on non-CUSMA\
      \ Canadian goods and specific duties on autos, steel, aluminum, and energy effective\
      \ April 4, 2025. The TSX dropped roughly 8% in early April (21b return bottomed\
      \ near -0.08). By May 2, the index had partially recovered (21b return = -0.01),\
      \ suggesting markets have absorbed the initial shock. Residual uncertainty about\
      \ escalation/de-escalation creates asymmetric tail risk in both directions.\
      \ (3) Commodities: Gold is rising as a safe-haven hedge, which is positive for\
      \ the TSX materials sector. Oil faces headwind from demand uncertainty stemming\
      \ from trade tensions and is a moderate negative for the energy sector. Base\
      \ metals are soft on China demand concerns. (4) CAD / GoC yields: BoC-Fed divergence\
      \ has widened the 2-year yield spread to multi-decade highs, pressuring the\
      \ loonie. Weak CAD is a mild positive for export earnings but signals overall\
      \ growth headwinds. (5) Regime context: The current period (post-tariff-shock\
      \ stabilization) most resembles early-2016 oil-shock recovery and late-2018\
      \ Fed-shock recovery \u2014 both cases where the TSX mean-reverted modestly\
      \ positive over the subsequent month after an initial sharp drawdown. (6) Statistical\
      \ calibration: Empirical full-sample 21b return distribution (N\u22481,417 observations,\
      \ 2000\u20132025) has mean +0.003, std 0.044, and significant negative skew\
      \ (-1.85) and excess kurtosis (10.7). The recent 2-year (2023\u20132025) distribution\
      \ is narrower (std 0.030, mean +0.003). Current 63d daily vol = 0.0279, implying\
      \ elevated near-term uncertainty. The forecast blends 30% full-history empirical\
      \ quantiles, 40% recent-2Y empirical quantiles, and 30% a Normal(\u03BC=+0.002,\
      \ \u03C3=0.040) distribution, then applies a small negative drift adjustment\
      \ (-0.005) to account for ongoing trade-war headwinds. This yields a median\
      \ of +0.003 (slight positive mean reversion), with a wider-than-recent-average\
      \ distribution (IQR \u2248 0.031, 90\u201310 range \u2248 0.093) reflecting\
      \ elevated macro uncertainty. The left tail is heavier than the right tail given\
      \ skew in the historical series and current tariff escalation risks; the right\
      \ tail captures de-escalation upside."
