    rationale: "21b horizon TSX Composite forecast from 2025-05-02. Central view:\
      \ marginal positive drift (+0.003 log return) supported by BoC easing, post-shock\
      \ mean reversion, and gold/materials tailwind; offset by US tariff headwinds\
      \ on energy/industrials, weak CAD, and elevated macro uncertainty. Distribution\
