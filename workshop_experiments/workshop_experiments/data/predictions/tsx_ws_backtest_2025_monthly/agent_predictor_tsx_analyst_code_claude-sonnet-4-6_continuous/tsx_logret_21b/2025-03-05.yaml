    horizon_rationale: "Forecast origin: 2025-03-05. The 21-business-day cumulative\
      \ log return is centred near zero (+0.0013 median), reflecting a balance between\
      \ offsetting forces. Key macro assumptions: (1) Bank of Canada policy \u2014\
      \ BoC cut the overnight rate to 2.75% in March 2025 (25 bp cut fully priced),\
      \ continuing an easing cycle totalling ~175 bp since mid-2024; this provides\
      \ a modest positive impulse to risk appetite and equity valuations. (2) Inflation\
      \ \u2014 Canadian CPI running near 1.9% in January 2025, close to the 2% target;\
      \ temporary GST holiday distorting the reading. Inflation is not an immediate\
      \ headwind. (3) Trade/tariff shock \u2014 the dominant negative factor: broad\
      \ US tariffs of 25% on most Canadian goods and 10% on energy, effective from\
      \ February 1 2025, creating 'pervasive uncertainty' per the BoC. This suppresses\
      \ business investment, hits Canadian bank credit outlooks, and weighs on rail/logistics.\
      \ The TSX energy sector (~18% weight) faces both tariff risk and demand uncertainty,\
      \ while financials (~33% weight) face credit-quality concerns. (4) Commodity\
      \ picture \u2014 gold prices near all-time highs (safe-haven demand), a positive\
      \ for TSX materials (~15% weight). Oil mixed to negative given trade uncertainty.\
      \ Base metals under pressure from global manufacturing slowdown. Net commodity\
      \ effect: modestly positive due to gold. (5) CAD/USD \u2014 loonie under pressure\
      \ from BoC-Fed policy divergence (2-year Canada-US spread at widest since mid-1990s);\
      \ weak CAD partially offsets tariff headwinds by boosting CAD revenues of exporters.\
      \ (6) GoC yields \u2014 falling on safe-haven demand and BoC easing expectations;\
      \ this supports equity discount rates marginally. (7) Momentum \u2014 the last\
