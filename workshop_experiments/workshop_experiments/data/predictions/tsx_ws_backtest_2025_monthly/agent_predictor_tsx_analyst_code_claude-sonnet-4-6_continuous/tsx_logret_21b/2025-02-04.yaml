    rationale: "Overall forecast philosophy: The as-of date (2025-02-04) marks the\
      \ precise onset of the US-Canada tariff conflict, creating an unusually binary\
      \ macro environment. The TSX, with heavy energy and materials exposure, faces\
      \ direct tariff headwinds but benefits from BoC easing and a recovery from the\
      \ Jan 2025 lows. The 21-business-day horizon (~4 calendar weeks) is long enough\
      \ to capture the first round of trade negotiation outcomes. Quantile distribution\
      \ is deliberately left-skewed relative to the symmetric historical baseline\
      \ \u2014 reflecting the asymmetric tariff risk \u2014 but not as extreme as\
      \ the 2020 COVID shock. The median of +0.5% reflects a slight positive bias\
      \ from BoC accommodation and the 30-day tariff pause, offset by structural trade\
      \ uncertainty."
    horizon_rationale: "Forecast as of 2025-02-04 for the 21-business-day S&P/TSX\
      \ Composite cumulative log return. Key inputs and assumptions: (1) TARIFF SHOCK:\
      \ The US announced 25% tariffs on most Canadian imports (10% on energy) effective\
      \ Feb 4, with Canada retaliating on $155B of US goods. A 30-day implementation\
      \ pause was signalled, providing short-term relief but leaving 21-day horizon\
      \ under structural uncertainty. This is the dominant macro risk. (2) BANK OF\
      \ CANADA: Cut overnight rate 25bps to 3.00% on Jan 29, 2025, sixth consecutive\
      \ cut (-175bps since Jun 2024). Easing cycle supportive for equities but BoC\
      \ has less room to counter tariff-driven stagflation. Further cuts priced in\
      \ (~2%). (3) COMMODITIES: Oil under tariff headwind (energy-specific 10% levy);\
      \ gold supportive for materials sector. Net commodity effect near-neutral to\
      \ mildly negative for TSX. (4) CAD/YIELDS: Canadian dollar at weakest levels\
      \ since 2002 vs USD; BoC-Fed policy divergence widest since mid-1990s. Weaker\
      \ CAD mixed \u2014 supports export earners, pressures domestic margins. GoC\
      \ 10yr yields trending lower (rate-cut expectations). (5) STATISTICAL REGIME:\
      \ Full-history 21bd return series shows mean=+0.47%, std=4.38%, significant\
      \ negative skew (-1.95) and excess kurtosis (11.20), indicating fat left tails.\
      \ Trailing 63d std of 2.80% indicates current low-vol regime vs history. Recent\
      \ 1-year median = +1.0%, but includes the Dec-Jan pullback (-4% trough). Current\
      \ 21bd reading of +1.0% reflects early-2025 recovery. (6) SCENARIO WEIGHTING:\
      \ 35% tariff-resolution/pause (positive, mean ~+1.5%); 45% ongoing uncertainty/status\
      \ quo (neutral, mean ~0%); 20% escalation (negative, mean ~-2.5%). Blended via\
      \ t-distribution (df=5) simulation yields scenario median ~+0.3%. (7) FINAL\
      \ BLEND: 40% full-history empirical + 30% recent-3Y empirical + 30% scenario\
      \ simulation, then -0.5% downward shift for tariff net drag and skew adjustment.\
      \ Result: Q0.50 = +0.5%, distribution skewed left vs symmetric normal, 90% CI\
      \ of [-4.0%, +4.5%] broadly consistent with trailing vol (\xB11.645\xD72.8%\
      \ \u2248 \xB14.6%) but with heavier left tail. Left tail (Q0.05 = -6.0%) reflects\
      \ full tariff-war escalation risk; right tail (Q0.95 = +6.0%) reflects scenario\
      \ of rapid tariff reversal plus commodity surge."
