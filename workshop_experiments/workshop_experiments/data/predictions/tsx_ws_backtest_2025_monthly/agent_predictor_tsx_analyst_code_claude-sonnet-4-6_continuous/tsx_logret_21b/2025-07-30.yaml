    rationale: "Overall framework: The TSX 21-business-day cumulative log-return forecast\
      \ is built on (a) empirical return history from 2000-2025 including the full\
      \ 6,404-observation panel, (b) current macro regime assessment (BoC hold at\
      \ 2.75%, near-target inflation, mixed but not alarming labour data, oil demand\
      \ weak, gold supportive, tariff uncertainty persisting but largely priced in\
      \ after April shock recovery), and (c) regime-conditional volatility calibration\
      \ using trailing_63d_std=0.02535 as daily vol input. The median +0.020 reflects\
      \ positive price momentum, accommodative real rate environment (BoC at 2.75%\
      \ vs ~1.9% CPI), but is tempered by energy-sector headwinds (weak oil demand,\
      \ OPEC+ supply) and residual tariff risk. The \u03C3_21\u22480.050 distributional\
      \ assumption is consistent with a moderate-volatility regime \u2014 above the\
      \ quiet 2017-era (\u03C3_daily~0.006) but well below COVID or GFC episodes.\
      \ Fat tails (t-distribution approximation, ~8 df) account for potential tariff\
      \ escalation or commodity shock scenarios."
    horizon_rationale: "Forecast origin: 2025-07-30. Key macro inputs: (1) Bank of\
      \ Canada held overnight rate at 2.75% on July 30, consistent with expectations\
      \ \u2014 neutral signal for equities, removes near-term rate-cut catalyst but\
      \ avoids tightening headwind. (2) Canada CPI at 1.9% YoY (June), core ~2.5-3.0%\
      \ \u2014 inflation near target, not alarming. June LFS: +83k jobs, unemployment\
      \ 6.9%. July LFS showed -33k, slight softening but not recessionary. Net labour\
      \ picture: mixed but not alarming. (3) TSX had recovered strongly from the April\
      \ 2025 tariff shock (~+10-12% from early-May lows), reaching all-time highs\
      \ in June. By late July, the 21-day rolling cumulative log returns are running\
      \ at approximately +0.02 to +0.03, consistent with a positive momentum regime.\
      \ (4) Commodity headwinds: oil demand growth forecast at only ~700 kb/d for\
      \ 2025 (weakest since 2009 ex-COVID), OPEC+ supply increases weigh on energy\
      \ sector (TSX's largest weight). Gold remains supportive for materials. Net\
      \ commodity signal: slight negative bias vs. historical average. (5) US tariff\
      \ uncertainty: markets have largely repriced the initial shock, but ongoing\
      \ uncertainty caps upside and adds tail risk. The TSX is still susceptible to\
      \ a renewed tariff escalation shock. (6) Regime: trailing 63-day daily vol =\
      \ 0.02535; implied 21-business-day vol \u2248 0.02535\xD7\u221A21 \u2248 0.116\
      \ (raw), but empirically the regime-conditional distribution is narrower \u2014\
      \ I calibrate \u03C3_21 \u2248 0.050 based on recent return dispersion (consistent\
      \ with a moderate-vol recovery regime, down from peak tariff-shock volatility).\
      \ Point forecast (median) set at +0.020, reflecting mild positive drift from\
      \ momentum and BoC hold, offset by oil/tariff headwinds. Distribution is roughly\
      \ symmetric with slight positive skew (upside from US-Canada tariff resolution\
      \ or commodity rebound). Quantiles constructed as a t-distribution (df\u2248\
      8 for fat tails) centred at +0.020 with \u03C3_21=0.050, scaled to match the\
      \ empirical TSX tail risk seen in recent stress episodes (April 2025: ~-0.08\
      \ over 21 days; GFC/COVID tails much wider but lower probability). Downside\
      \ tail risk kept moderate given the post-shock recovery regime."
