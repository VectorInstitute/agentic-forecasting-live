    rationale: 'Overall framework: empirical distribution of 21BD TSX log returns
      combined with current macro regime signals. The TSX is in a post-tariff-shock
      recovery phase with fading positive momentum. BoC on hold at 2.75%, trade uncertainty
      persisting but not escalating acutely, commodities (oil, gold) broadly supportive.
      Median forecast of +1.0% log return over 21 business days reflects modest positive
      drift. Distribution width anchored by trailing 63D vol of ~4.5% (21BD), with
      slight negative skew reflecting asymmetric downside from trade/geopolitical
      tail risks.'
    horizon_rationale: "Forecast origin: 2025-07-01. The TSX recovered sharply from\
      \ the April 2025 tariff-shock lows (cumulative 21BD log return bottomed near\
      \ -0.08 in early April, then surged to +0.12 by mid-May as US-Canada trade tensions\
      \ partially eased). By June 30 the 21BD rolling return had faded back to +0.03,\
      \ signalling momentum deceleration. Key macro inputs: (1) BoC held overnight\
      \ rate at 2.75% for a second consecutive meeting, adopting 'wait and see' posture\
      \ \u2014 accommodative relative to 2024 but not providing fresh stimulus impulse;\
      \ (2) unemployment near 7%, soft labour market constrains upside; (3) CPI broadly\
      \ near target but core ticked higher in April, limiting further BoC easing optionality\
      \ near-term; (4) USD/CAD ~1.368, modest CAD weakness providing mild support\
      \ for exporters/energy sector; (5) oil prices firm on OPEC+ discipline and geopolitical\
      \ tension (Strait of Hormuz risk), supporting TSX energy sector (~20% weight);\
      \ (6) gold elevated, supporting materials sector; (7) base metals mixed on global\
      \ demand uncertainty; (8) US tariffs on Canadian steel, aluminum and autos remain\
      \ in place \u2014 structural headwind that has already been partly priced; (9)\
      \ GoC 10Y yields drifting lower, supportive for equity valuations particularly\
      \ in rate-sensitive financials. Net regime: mild-positive drift with elevated\
      \ uncertainty. Trailing 63D std of ~0.0453 on 21BD cumulative returns anchors\
      \ the spread. Slight negative skew applied given asymmetric downside from potential\
      \ trade re-escalation or commodity price reversal. Median set at +0.010, approximately\
      \ one-third of current 21BD trailing return (+0.03), reflecting mean-reversion\
      \ of momentum. The 5th/95th percentile span of ~0.147 is consistent with ~1.65-sigma\
      \ of the trailing vol estimate."
