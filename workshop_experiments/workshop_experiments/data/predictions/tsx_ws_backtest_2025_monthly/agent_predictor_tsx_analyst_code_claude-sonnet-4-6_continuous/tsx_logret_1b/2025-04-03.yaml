    rationale: 'Dominant driver for this 1-day forecast is the Liberation Day tariff
      shock and immediate China retaliation. The TSX already absorbed a -3.91% hit
      on April 3; for April 4 I assign a continued negative median (-1.06%) with crisis-level
      vol (~2.3% daily std, ~2.4x the trailing 63d sigma). The distribution is a 3-component
      mixture: continued-pressure, escalation-panic, and technical-bounce scenarios.
      The negative skew and fat left tail reflect asymmetric downside risk from further
      tariff escalation, oil price weakness, and global risk-off flows. The Bank of
      Canada''s easing path (policy rate 2.75%) provides a modest structural support,
      but is insufficient to offset near-term trade-war sentiment damage. Gold''s
      relative resilience partially offsets TSX materials sector losses, but the energy
      and financials drag dominates.'
    horizon_rationale: "Forecast origin: April 3, 2025 (close). The TSX fell -3.91%\
      \ on April 3 \u2014 a -4.05 sigma event driven by Trump's 'Liberation Day' sweeping\
      \ tariff package (10% baseline on all imports, country-specific additions).\
      \ Immediately after market close on April 3, China announced 34% retaliatory\
      \ tariffs on US goods, amplifying the global panic. VIX surged to ~45, oil (WTI)\
      \ collapsed ~7%, and global equities were in a multi-trillion-dollar rout. For\
      \ April 4 (1 business day ahead), I model three scenarios: (1) Continued selling/digestion\
      \ [55% weight, mu=-0.8%, sig=2.0%]: tariff escalation momentum, energy sector\
      \ headwinds from oil collapse, financials under credit/recession pressure, sentiment\
      \ fragile; (2) Escalation panic [30% weight, mu=-2.8%, sig=2.0%]: China retaliation\
      \ crystallises, further margin calls, risk-off positioning, oil-sensitive TSX\
      \ energy sector hammered; (3) Technical bounce/policy relief [15% weight, mu=+1.2%,\
      \ sig=1.5%]: short-covering, oversold conditions, speculation of tariff carve-outs\
      \ or BoC emergency action. Key macro inputs: BoC at 2.75% (7 cuts), easing path\
      \ intact but unable to offset trade-war structural shock; Canada CPI cooling\
      \ (2.3% y/y March); labour market showing strain; CAD under pressure; GoC 10y\
      \ yield in bearish-steepening trend. The TSX's heavy weighting in energy (~18%),\
      \ financials (~33%), and materials (~12%) makes it acutely sensitive to oil\
      \ price collapse and global recession risk \u2014 all of which are deteriorating\
      \ post-Liberation Day. Median forecast: -1.06%; 90th pct: +1.89%, 10th pct:\
      \ -4.16%; distribution is left-skewed with fat tails reflecting crisis-regime\
      \ volatility."
