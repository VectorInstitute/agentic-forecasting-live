      that erupted in late February/early March 2025. After two -2% days (Mar 3-4)
      and a +1.21% bounce (Mar 5), the market is uncertain: tariff retaliations are
      ongoing, BoC easing provides partial offset, gold is strong (positive for TSX
      materials), oil is soft (negative for TSX energy), and CAD weakness is somewhat
      supportive for exporters. Net bias is near-zero with widened tails. The blended
      normal/t-distribution with vol-adjusted scale provides a well-calibrated distribution
      for the elevated-uncertainty environment.'
    horizon_rationale: "Forecast origin: 2025-03-05 (1 business day ahead). Key context:\
      \ (1) TARIFF SHOCK \u2014 US imposed 25% tariffs on most Canadian goods and\
      \ 10% on energy effective March 4. Canada retaliated with $155B in counter-tariffs.\
      \ TSX fell ~1.7% on Mar 4 (preceded by a similar drop on Mar 3), then bounced\
      \ +1.21% on Mar 5. (2) BANK OF CANADA \u2014 Cut to 3.0% in February 2025 as\
      \ an insurance measure against trade-war recession risk; supportive for equities\
      \ at the margin but insufficient to fully offset tariff headwinds. (3) COMMODITIES\
      \ \u2014 Gold surged ~8.9% in February (safe-haven bid, positive for materials/gold\
      \ miners on TSX); oil under pressure from tariff-related demand-destruction\
      \ fears and potential OPEC+ supply adjustments \u2014 negative for TSX energy\
      \ sector. Net commodity effect is mixed. (4) USD/CAD \u2014 ~1.4337 (CAD weak\
      \ due to BoC/Fed policy divergence and trade uncertainty), which provides some\
      \ currency hedge for TSX exporters. (5) MONETARY \u2014 Fed on hold; BoC on\
      \ easing path. Yield spreads widen CAD-unfavorable. (6) VOLATILITY REGIME \u2014\
      \ Trailing 63d daily std = 0.00754; in the current tariff-shock regime this\
      \ is elevated vs. historical norm (~0.0055). Applied a 25% vol premium (effective\
      \ std ~0.00942) to reflect regime uncertainty. (7) MEAN DRIFT \u2014 Post-bounce\
      \ after a large shock, markets often retest support; slight negative drift assumed\
