# Deployed ladder for the live daily S&P/TSX Composite forecasting harness.
#
# The Vector live experiment is Canada-focused: one run per trading day, shortly
# after the Toronto market close, every predictor below forecasts S&P/TSX
# Composite (^GSPTSE) cumulative log returns at h = 1 / 5 / 21 business days from
# today's close. Predictions + rationales are written as schema-conforming records
# into the append-only log; resolutions and scores land as horizons mature; the
# monitor aggregates are regenerated; everything is committed+pushed.
#
# The S&P 500 machinery is retained for retrospective use (registry `naive`/
# `agent_*`/... methods, sp500_ws_* specs); it is simply not the deployed live
# ladder any more. To redeploy S&P 500, set `target_family: sp500`, `target_ticker:
# ^GSPC`, and swap the `tsx_*` registry methods below for their bare counterparts.
#
# Model lists are CONFIG, not code — edit the `models:` arrays to change the
# deployed matrix. The registry-method -> schema-method-enum binding lives in
# `config.py` (it is a taxonomy binding, not a tuning knob).

schema_version: "1.1.0"

# Target and horizons ------------------------------------------------------
target_ticker: "^GSPTSE"
# Target family prefix: drives the `{family}_logret_{h}b` task ids and the
# `{family}_<method>` predictor join keys. `tsx` is the deployed experiment.
target_family: "tsx"
horizons: [1, 5, 21]

# Submission timing --------------------------------------------------------
# One submission attempt per trading day at this local wall-clock time.
submission:
  time_local: "17:30"
  timezone: "America/Toronto"

# Retry policy for a failed submission evening -----------------------------
# Bounded, same-evening retries only; a hard stop guarantees the run never
# bleeds into the next day. Exhausted methods become logged gaps, not backfills.
retry:
  max_attempts: 3
  backoff_minutes: 20
  hard_stop_local: "21:00"

# Paths (repo-root relative) ----------------------------------------------
paths:
  log_dir: "workshop_experiments/workshop_experiments/live/log"
  aggregates_dir: "monitor/site/data"
  # Committed smoke predictions used as fake "today" outputs by `--simulate`.
  smoke_store: "workshop_experiments/workshop_experiments/data/predictions/tsx_ws_smoke"

# The deployed predictor ladder (S&P/TSX Composite) ------------------------
predictors:
  # Free, local, API-free methods. Each maps to a distinct (schema_method,
  # model_label) pair so the leaderboard keeps them as separate rows.
  conventional:
    - method: tsx_naive
    - method: tsx_ets
    - method: tsx_kalman
    - method: tsx_autoarima
    - method: tsx_lightgbm
    - method: tsx_lightgbm_cov

  # LLM-Process quantile-grid variants: one structured completion per origin.
  # `_cov` folds the covariate panel into the prompt. Runs across every model.
  llmp:
    methods: [tsx_llmp_qgrid, tsx_llmp_qgrid_cov]
    models:
      - gemini-3.1-flash-lite-preview
      - gemini-3.5-flash
      - claude-sonnet-4-6
      - claude-opus-4-7
      - gpt-5.4
      - gpt-5.5

  # News-grounded and code-executing analyst agents. Deliberately a narrower
  # model set — agents are the most expensive rungs.
  agent:
    methods: [tsx_agent_news, tsx_agent_code]
    models:
      - gemini-3.5-flash
      - claude-sonnet-4-6

# Adaptive twins (stage 2c) ------------------------------------------------
# Two rungs built from ONE adaptive predictor config pointed at the trained
# strategy dir. Frozen twin: strategy read-only forever (the control). Learning
# twin: same agent + the gated adaptation mechanism. Kept OUT of the `predictors`
# ladder above — they deploy later (twin deployment date is a first-class event)
# and must not perturb the stateless-ladder record. `enabled: false` until the
# study has produced a trained strategy and Ethan signs off on the twin launch.
twins:
  enabled: false
  model: gemini-3.5-flash

# Tiered-gate parameters (provisional, pending Ethan) ----------------------
# Config, not constants: the learning twin's gate reads these.
gates:
  confirmation_threshold: 3      # k — confirmations before a hypothesis graduates
  shadow_window_days: 10         # M — trading days a tier-3 candidate runs in shadow
  circuit_breaker_window: 21     # trailing window for the learner-vs-frozen CRPS check
  circuit_breaker_ratio: 1.15    # learner mean CRPS may not exceed 1.15x the frozen twin's
  max_graduations_per_week: 1    # rate limit on graduated behavioral changes
  max_open_hypotheses: 5         # cap on simultaneously-open hypotheses
