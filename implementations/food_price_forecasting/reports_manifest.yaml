# Canada's Food Price Report (CFPR) acquisition manifest.
#
# This file is the COMMITTED source of truth for which report PDFs the
# pipeline downloads. The PDFs themselves and any extracted text are cached
# under data/ (gitignored) by `scripts/fetch_cfpr.py` -- never committed.
#
# Why hard-coded URLs (and not a templated pattern):
#   The Dalhousie CDN filenames are inconsistent year to year (spaces,
#   apostrophes, edition prefixes, "low.res" tags), so they cannot be derived
#   from a template. Each URL is pinned explicitly. `fetch_cfpr.py` FAILS LOUDLY
#   on a 404 / non-PDF response so a moved filename surfaces immediately instead
#   of silently caching an HTML error page.
#
# publication_date:
#   CFPR for forecast-year Y is released in early December of year Y-1. This is
#   the cutoff key a future DocumentStore will filter on (publication_date <=
#   as_of). For the canonical CFPR backtest (annual JULY origins) only the
#   month/year matters -- a report released any time in December Y-1 is
#   available by the July-Y origin and unavailable at the July-(Y-1) origin --
#   so day-level precision is not critical here. Verify exact days before any
#   sub-annual / monthly-origin use.
#
# sha256:
#   Pins the exact bytes used by the bootcamp. `fetch_cfpr.py` verifies the
#   downloaded PDF against this digest and fails loudly on a mismatch, so a
#   silently re-uploaded / "corrected" CDN file cannot change results unnoticed.
#
# Scope: English-only for the reference implementation. French editions exist
# on the same CDN folder and can be added as additional `lang: fr` entries.

source: cfpr
description: >-
  Canada's Food Price Report, published annually each December by the
  Agri-Food Analytics Lab at Dalhousie University with a rotating university
  collective. Covers the past several editions (11th-16th).

reports:
