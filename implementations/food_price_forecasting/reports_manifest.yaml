    edition: "11th edition"
    lang: en
    publication_date: 2020-12-08
    url: "https://cdn.dal.ca/content/dam/dalhousie/pdf/sites/agri-food/Food%20Price%20Report%202021%20-%20EN%20(December%208).pdf"
